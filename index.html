国免荘","t":"g"},{"n":16,"q":"国司が国内の耕地を調査し，税額を定めるために派遣した役人を何というか。","a":"検田使","t":"g"},{"n":17,"q":"荘園領主がその権威によって獲得した，国衙の役人の立入りやさらには警察権の介入をも拒否する権利を何というか。","a":"不入（の権）","t":"g"}]},{"t":"地方の反乱と武士の成長","q":[{"n":1,"q":"地方政治の混乱と治安の乱れから武装するようになった，土着した国司の子孫や地方豪族などの戦闘組織の集団を何というか。","a":"武士団","t":"g"},{"n":2,"q":"統率者のもとで武士の集団を構成する同族のことを何というか。","a":"家子","t":"g"},{"n":3,"q":"統率者のもとで武士の集団を構成する従者のことを何というか。","a":"郎党（郎等・郎従）","t":"g"},{"n":4,"q":"中小の武士団を統合した大武士団の統率者を何というか。","a":"棟梁","t":"g"},{"n":5,"q":"大武士団の統率者には，もともとどのような出身の者が多いか。","a":"国司","t":"g"},{"n":6,"q":"大武士団の統率者の代表的な例で，桓武天皇の流れを何というか。","a":"桓武平氏","t":"g"},{"n":7,"q":"大武士団の統率者の代表的な例で，清和天皇の流れを何というか。","a":"清和源氏","t":"g"},{"n":8,"q":"武士は，やがて公的な地位にも就任するようになるが，10世紀以降，上京して宮中の警備にあたった者を何というか。","a":"滝口の武者（武士）","t":"g"},{"n":9,"q":"内乱などに際して，地方の武士と兵士を統率して鎮圧にあたった者を何というか。","a":"押領使","t":"g"},{"n":10,"q":"盗賊や反乱者を捕えるために中央から派遣された者を何というか。","a":"追捕使","t":"g"},{"n":11,"q":"貴族の身辺護衛にあたる者を何とよんだか。","a":"侍","t":"g"},{"n":12,"q":"1019（寛仁３）年に，中国の沿海州地方の民族が対馬・壱岐・九州北部を襲うという事件がおこったが，これを何というか。","a":"刀伊の入寇","t":"g"},{"n":13,"q":"12（＝刀伊の入寇）の事件を起こしたのは，何という民族か。","a":"女真（族）","t":"g"},{"n":14,"q":"12（＝刀伊の入寇）の事件の時，大宰府の官人を率いて奮戦し，これを撃退した大宰権帥はだれか。","a":"藤原隆家","t":"p"},{"n":15,"q":"桓武平氏は，桓武天皇の子孫が平の姓を賜わり，上総介となり任地に土着して関東各地に広がったものだが，この人物の名をあげよ。","a":"高望王（平高望）","t":"g"},{"n":16,"q":"桓武平氏の一族で，下総の猿島を本拠とし，一族間の争いから，やがて中央政府への反乱をおこすにいたった人物はだれか。","a":"平将門","t":"p"},{"n":17,"q":"16（＝平将門）の人物は，常陸・下野・上野の国府を攻め落とし，関東の大半を征服して，ある称号を名乗ったがその名称をあげよ。","a":"新皇","t":"g"},{"n":18,"q":"16（＝平将門）の人物が反乱をおこしたのは西暦何年か。","a":"939年","t":"d"},{"n":19,"q":"平将門の乱を鎮圧した関東の武士を２人あげよ。","a":"平貞盛・藤原秀郷","t":"g"},{"n":20,"q":"もと伊予国司で伊予の日振島を根拠に瀬戸内海の海賊を率いて乱をおこし，伊予の国府や大宰府を襲った人物はだれか。","a":"藤原純友","t":"p"},{"n":21,"q":"藤原純友の乱を鎮圧した人物の１人で，清和源氏の祖となった人物はだれか。","a":"源経基（経基王）","t":"p"},{"n":22,"q":"藤原純友の乱は平将門の乱と同じころにおこったが，この２つの乱を当時の年号をとって何とよぶか。","a":"天慶の乱","t":"g"}]},{"t":"源氏の進出","q":[{"n":1,"q":"安和の変で源高明を密告して摂関家に近づき，摂津国多田荘に土着して勢力を伸ばした人物はだれか。","a":"源満仲","t":"p"},{"n":2,"q":"1（＝源満仲）の子で藤原道長に仕えた兄弟をあげよ。","a":"源頼光・頼信","t":"g"},{"n":3,"q":"1028（長元元）年に房総で反乱をおこした人物をあげよ。","a":"平忠常","t":"g"},{"n":4,"q":"3（＝平忠常）の乱を平定し，源氏の東国進出のきっかけをつくった人物はだれか。","a":"源頼信","t":"p"},{"n":5,"q":"1051（永承６）年に陸奥でおこり，前後12年におよんだ戦いを何というか。","a":"前九年合戦（前九年の役）","t":"g"},{"n":6,"q":"5（＝前九年合戦）の戦いをひきおこした陸奥の豪族とは何氏か。","a":"安倍氏","t":"g"},{"n":7,"q":"5（＝前九年合戦）の戦いを平定した父子をあげよ。","a":"源頼義・義家","t":"g"},{"n":8,"q":"7（＝源頼義・義家）の父子を支援し，前九年合戦ののちには陸奥・出羽両国で大きな勢力を得た一族は何氏か。","a":"清原氏","t":"g"},{"n":9,"q":"1083（永保３）年におきた，8（＝清原氏）の一族の内紛に端を発した戦いを何というか。","a":"後三年合戦（後三年の役）","t":"g"},{"n":10,"q":"陸奥守兼鎮守府将軍の地位にあり，9（＝後三年合戦）の戦いを鎮定した人物はだれか。","a":"源義家","t":"p"},{"n":11,"q":"9（＝後三年合戦）の戦いののち，奥羽全域にわたる支配を確立した清衡とその子孫のことを何というか。","a":"奥州藤原氏","t":"g"}]}]}]},{"t":"第4章　中世社会の成立","sec":[{"t":"1　院政と平氏の台頭","s":[{"t":"延久の荘園整理令と荘園公領制","q":[{"n":1,"q":"1068（治暦４）年に即位し，摂関家と外戚関係がなく，摂関家をはばからずに親政を行った天皇はだれか。","a":"後三条天皇","t":"p"},{"n":2,"q":"紀伝道の家系で，1（＝後三条天皇）の天皇の近臣としてその政治を補佐した人物はだれか。","a":"大江匡房","t":"p"},{"n":3,"q":"1（＝後三条天皇）の天皇によって，1069（延久元）年に出された荘園整理令を何というか。","a":"延久の荘園整理令","t":"g"},{"n":4,"q":"1（＝後三条天皇）の天皇が荘園整理のために提出させた文書を，審査する役所を何というか。","a":"記録荘園券契所（記録所）","t":"g"},{"n":5,"q":"1（＝後三条天皇）の天皇が制定した公定枡を何というか。","a":"宣旨枡","t":"g"},{"n":6,"q":"荘園が発達するなかで，国司の支配下にある土地は何とよばれるようになったか。","a":"公領（国衙領）","t":"g"},{"n":7,"q":"院政期に，国司が国内を新たに再編成した行政単位を何というか。","a":"郡・郷・保","t":"g"},{"n":8,"q":"7（＝郡・郷・保）の行政単位の徴税責任者をそれぞれ何というか。","a":"郡司・郷司・保司","t":"g"},{"n":9,"q":"一国の編成において，荘・郡・郷などが並立する荘園と公領で重層的に構成される体制が，11世紀半ばから形成された。これを何というか。","a":"荘園公領制","t":"g"},{"n":10,"q":"荘園や公領内の耕地の大部分は名（名田）として，田堵などの有力な農民に割り当てられたが，彼らはやがて耕作する田地への権利を強めて何とよばれるようになったか。","a":"名主","t":"g"},{"n":11,"q":"有力農民から土地を借りて耕作（請作）する農民で，さらにその一部を他の小農民に耕作させたりもした農民を何とよぶか。","a":"作人","t":"g"},{"n":12,"q":"土地を所有せず，譲与・売買・質入れの対象ともなっていた隷属農民を何というか。","a":"下人","t":"g"},{"n":13,"q":"作人が名主に納める小作料を何というか。","a":"加地子","t":"g"},{"n":14,"q":"名主が荘園領主に納めるもののうち，主に米・絹などで納入するものを何というか。","a":"年貢","t":"g"},{"n":15,"q":"名主が荘園領主に納めるもののうち，糸・布・炭・野菜など手工業製品や特産物を納入するものを何というか。","a":"公事","t":"g"},{"n":16,"q":"荘園領主に対する負担で，労役を奉仕するものを何というか。","a":"夫役","t":"g"}]},{"t":"院政の開始","q":[{"n":1,"q":"譲位後の天皇のことを何というか。","a":"上皇（太上天皇）","t":"g"},{"n":2,"q":"譲位後の天皇の居所のことで，のちにはその人を意味するようになった言葉は何か。","a":"院","t":"g"},{"n":3,"q":"譲位後の天皇が出家した場合，これを何というか。","a":"法皇","t":"g"},{"n":4,"q":"天皇の位を譲ったのちも，上皇として天皇を後見しながら国務を執行する政治形態を何というか。","a":"院政","t":"g"},{"n":5,"q":"4（＝院政）の政治形態は，だれによって始められたか。","a":"白河上皇","t":"p"},{"n":6,"q":"5（＝白河上皇）の上皇は，だれに譲位したのちに院政を始めたか。","a":"堀河天皇","t":"p"},{"n":7,"q":"5（＝白河上皇）の上皇が院政を始めたのは西暦何年のことか。","a":"1086年","t":"d"},{"n":8,"q":"5（＝白河上皇）の上皇の孫で，院政を行った上皇はだれか。","a":"鳥羽上皇","t":"p"},{"n":9,"q":"院政のために開かれた役所を何というか。","a":"院庁","t":"g"},{"n":10,"q":"9（＝院庁）の役所の職員を何というか。","a":"院司","t":"g"},{"n":11,"q":"白河上皇によって院の御所の警護に採用され，院政の武力となった武士を何というか。","a":"北面の武士","t":"g"},{"n":12,"q":"院政のもとで出される文書のうち，院庁から出されるものを何というか。","a":"院庁下文","t":"g"},{"n":13,"q":"上皇の命令として，院より直接出されるかたちの文書を何というか。","a":"院宣","t":"g"},{"n":14,"q":"院政を行った白河・鳥羽・後白河の３上皇はいずれも出家して法皇となり，仏教を厚く信仰したが，白河天皇が京都に造営し，八角九重塔など壮大な堂塔を誇った寺院は何か。","a":"法勝寺","t":"g"},{"n":15,"q":"14（＝法勝寺）の寺院以後，院政期に天皇家により造営された寺院は，いずれもある字が名称に共通して使われていたことから，総称して何といわれたか。","a":"六勝寺","t":"g"},{"n":16,"q":"院政期の上皇がくりかえし行った寺社参詣のうち，特に紀伊国の３カ所の宗教的聖地への参詣を何というか。","a":"熊野詣","t":"g"},{"n":17,"q":"院政期の上皇がくりかえし行った寺社参詣のうち，紀伊国にある真言宗の本拠地に参詣したものを何というか。","a":"高野詣","t":"g"}]},{"t":"院政期の社会","q":[{"n":1,"q":"院政を行う上皇の側近として権勢をふるった者を何というか。","a":"院近臣","t":"g"},{"n":2,"q":"1（＝院近臣）の者たちには，富裕な受領や后妃の一族，上皇の養育にかかわった者の一族が多いが，この養育にかかわった女性を何というか。","a":"乳母","t":"g"},{"n":3,"q":"特定の国の支配権を上級貴族や寺社に与えて，その国からの収益を取得させる院政期に広まった制度を何というか。","a":"知行国制度","t":"g"},{"n":4,"q":"3（＝知行国制度）の制度において一国の支配権・収益権を与えられた者を何というか。","a":"知行国主","t":"g"},{"n":5,"q":"院政期の上皇には荘園の寄進が集中し，大量の荘園からなる天皇家領が形成されたが，鳥羽法皇が第３皇女に譲った荘園群で，平安時代末で約100カ所，最終的には200カ所以上にのぼったといわれるのは何か。","a":"八条（女）院領","t":"g"},{"n":6,"q":"後白河法皇が御所内の持仏堂に寄進した荘園群で，鎌倉時代初めころには約90カ所にものぼるといわれているものは何か。","a":"長講堂領","t":"g"},{"n":7,"q":"巨大な荘園を集積して，世俗的権力となった寺院が組織した武力を何というか。","a":"僧兵","t":"g"},{"n":8,"q":"7（＝僧兵）は，神木や神輿をおしたてるなどして，しばしば集団行動で朝廷に対し訴えをおこしたが，この行動を何というか。","a":"強訴","t":"g"},{"n":9,"q":"大荘園と僧兵を持つ寺院の２大勢力であった興福寺と延暦寺を，それぞれ何とよぶか。","a":"南都・北嶺","t":"g"},{"n":10,"q":"奈良法師とよばれた興福寺の僧兵が，強訴の時ささげてきた神木はどこのものか。","a":"春日神社","t":"l"},{"n":11,"q":"山法師とよばれた延暦寺の僧兵が，強訴の時ささげてきた神輿はどこのものか。","a":"日吉神社","t":"l"},{"n":12,"q":"院政期に，地方では各地の武士が一族や地域との結びつきを強めていたが，奥羽地方で繁栄した一族を何というか。","a":"奥州藤原氏","t":"g"},{"n":13,"q":"12（＝奥州藤原氏）の一族は３代100年にわたって繁栄を誇ったが，３代の名を順にあげよ。","a":"藤原清衡・基衡・秀衡","t":"g"},{"n":14,"q":"12（＝奥州藤原氏）の一族の陸奥にある根拠地名をあげよ。","a":"平泉","t":"g"}]},{"t":"保元・平治の乱","q":[{"n":1,"q":"院政期に院と結んで勢力を伸ばした，桓武平氏の一族が地盤としていた地域はどこか。","a":"伊賀・伊勢","t":"l"},{"n":2,"q":"院政期に，白河上皇に重用され，出雲で反乱をおこした源義家の子を討って武名をあげた武士はだれか。","a":"平正盛","t":"p"},{"n":3,"q":"1108（天仁元）年に，出雲で反乱をおこして2（＝平正盛）の人物に討たれた源義家の子とはだれか。","a":"源義親","t":"p"},{"n":4,"q":"平正盛の子で，鳥羽法皇の信任を得て瀬戸内海の海賊平定に功績をあげ，西国一帯に勢力をもつようになった人物はだれか。","a":"平忠盛","t":"p"},{"n":5,"q":"鳥羽法皇の死後，皇族および摂関家内部の対立によって京都でおこった内乱を何というか。","a":"保元の乱","t":"g"},{"n":6,"q":"5（＝保元の乱）の乱は，西暦何年におこったか。","a":"1156年","t":"d"},{"n":7,"q":"5（＝保元の乱）の乱で勝利した天皇はだれか。","a":"後白河天皇","t":"p"},{"n":8,"q":"5（＝保元の乱）の乱に敗れ，讃岐に配流された上皇はだれか。","a":"崇徳上皇","t":"p"},{"n":9,"q":"5（＝保元の乱）の乱の際，摂関家内で対立した人物を，勝者と敗者の順にあげよ。","a":"藤原忠通・藤原頼長","t":"g"},{"n":10,"q":"5（＝保元の乱）の乱で天皇方につき，勝利した武士を２人あげよ。","a":"源義朝・平清盛","t":"g"},{"n":11,"q":"5（＝保元の乱）の乱で上皇方につき，敗北した武士を３人あげよ。","a":"源為義・源為朝・平忠正","t":"g"},{"n":12,"q":"武家の棟梁の勢力争いと後白河上皇の近臣の権力争いが結びついて，京都でおこった内乱を何というか。","a":"平治の乱","t":"g"},{"n":13,"q":"12（＝平治の乱）の乱は，西暦何年におこったか。","a":"1159年","t":"d"},{"n":14,"q":"12（＝平治の乱）の乱で勝利者となり，武家の棟梁としての地位を確立した人物はだれか。","a":"平清盛","t":"p"},{"n":15,"q":"後白河上皇の近臣として活躍し，12（＝平治の乱）の乱で自殺に追い込まれた人物はだれか。","a":"藤原通憲（信西）","t":"p"},{"n":16,"q":"12（＝平治の乱）の乱で敗れ，東国へ逃れる途中，尾張で殺された源氏の棟梁はだれか。","a":"源義朝","t":"p"},{"n":17,"q":"後白河上皇の近臣で，12（＝平治の乱）の乱で兵をあげたが敗れ，捕えられて斬られた人物はだれか。","a":"藤原信頼","t":"p"}]},{"t":"平氏政権","q":[{"n":1,"q":"平治の乱の後，異例の昇進をとげ，武士としてはじめて太政大臣となり，権力をふるった人物はだれか。","a":"平清盛","t":"p"},{"n":2,"q":"1（＝平清盛）の人物の娘で，天皇の中宮となったのはだれか。","a":"平徳子","t":"p"},{"n":3,"q":"2（＝平徳子）の人物が中宮となった天皇はだれか。","a":"高倉天皇","t":"p"},{"n":4,"q":"2（＝平徳子）の人物は天皇の生母となって特に院号を与えられたが，何という院号か。","a":"建礼門院","t":"g"},{"n":5,"q":"2（＝平徳子）の人物が生んだ天皇はだれか。","a":"安徳天皇","t":"p"},{"n":6,"q":"平清盛の政権の呼び方にもなっている京都の地名はどこか。","a":"六波羅","t":"l"},{"n":7,"q":"平氏はその権力が強まるにつれて，これまでの院政と対立するようになるが，この時に院政を行っていた上皇はだれか。","a":"後白河上皇（法皇）","t":"p"},{"n":8,"q":"平清盛の長男で，父と7（＝後白河上皇）の上皇（法皇）との対立の和解につとめたが，父にさきだって病死した人物はだれか。","a":"平重盛","t":"p"},{"n":9,"q":"平氏政権の武士的側面として，畿内から瀬戸内海を経て九州までの武士を従者に組織したが，武士の社会で従者のことを何というか。","a":"家人","t":"g"},{"n":10,"q":"平氏は畿内・西国の武士と主従関係を結ぶために，彼らを荘園や公領の現地支配者に任命したが，この地位を何というか。","a":"地頭","t":"g"},{"n":11,"q":"平氏政権の経済的基盤は摂関家と共通する面があるが，それは何か。２つあげよ。","a":"知行国・荘園","t":"g"},{"n":12,"q":"平氏政権が積極的に取り組んだ対外貿易とは何か。","a":"日宋貿易","t":"g"},{"n":13,"q":"平清盛が12（＝日宋貿易）の貿易のために，現在の神戸に修築した港を何というか。","a":"大輪田泊","t":"g"},{"n":14,"q":"1177（治承元）年に，後白河法皇の近臣らが平氏の打倒を企てたが失敗に終わった。この事件を何というか。","a":"鹿ヶ谷の陰謀","t":"g"},{"n":15,"q":"14（＝鹿ヶ谷の陰謀）の事件で捕えられ，鬼界ヶ島に流され，その悲劇的な流罪生活がのちに能や歌舞伎の題材に取り入れられた人物はだれか。","a":"俊寛","t":"p"},{"n":16,"q":"14（＝鹿ヶ谷の陰謀）の事件で捕えられ，備前国へ流されて殺されたのはだれか。","a":"藤原成親","t":"p"}]},{"t":"院政期の文化","q":[{"n":1,"q":"12世紀前半に，奥州藤原氏の根拠地平泉に建立された阿弥陀堂をあげよ。","a":"中尊寺金色堂","t":"g"},{"n":2,"q":"豊後（大分県）高田に建立された九州最古の阿弥陀堂をあげよ。","a":"富貴寺大堂","t":"g"},{"n":3,"q":"陸奥国（福島県）白水に建立された阿弥陀堂をあげよ。","a":"白水阿弥陀堂","t":"g"},{"n":4,"q":"院政期に，伯耆国（鳥取県）に建立された，山岳寺院の奥の院の建物を何というか。","a":"三仏寺投入堂","t":"g"},{"n":5,"q":"民間におこった歌謡で貴族の間でも流行し，後白河院が特に愛好したものは何か。","a":"今様","t":"g"},{"n":6,"q":"平安時代末期に5（＝今様）を編集して成立した歌謡集を何というか。","a":"梁塵秘抄","t":"g"},{"n":7,"q":"6（＝梁塵秘抄）の歌謡集を編集したのはだれか。","a":"後白河法皇","t":"p"},{"n":8,"q":"奈良時代に唐から伝わった曲芸・奇術・小舞踏などの雑多な戯芸で，のちの能の源流ともなったものは何か。","a":"猿楽（散楽）","t":"g"},{"n":9,"q":"田植えの時に豊作を祈り，農民の労をなぐさめる音楽や踊りからおこり，平安時代中期以降芸能化して，京都で流行したものは何か。","a":"田楽","t":"g"},{"n":10,"q":"11世紀ころから，和文体で物語風に書かれた歴史書がつくられるようになったが，これを何というか。","a":"歴史物語","t":"g"},{"n":11,"q":"文徳天皇から後一条天皇までの藤原氏全盛期を藤原道長の栄華を中心に批判的に叙述した，『世継物語』ともよばれる，かな書き紀伝体の10（＝歴史物語）の傑作は何か。","a":"大鏡","t":"g"},{"n":12,"q":"平安時代末期に成立した説話集で，天竺（インド）・震旦（中国）・本朝（日本）の部からなり，貴族・武士・庶民の生活のありさまを伝えるものは何か。","a":"今昔物語集","t":"g"},{"n":13,"q":"戦いを主要な題材とし，武士の活躍を描いた文芸作品を何というか。","a":"軍記物語","t":"g"},{"n":14,"q":"13（＝軍記物語）の文芸作品の初期のものとして，平将門の乱を漢文で記したものは何か。","a":"将門記","t":"g"},{"n":15,"q":"前九年合戦の経過を描いた軍記物語を何というか。","a":"陸奥話記","t":"g"},{"n":16,"q":"絵と詞書とをおりまぜて，物語などの進行を示すものが平安時代末期に生まれたが，これを何というか。","a":"絵巻物","t":"g"},{"n":17,"q":"平安時代中期の代表的物語文学に題材をとり，吹抜屋台・引目鉤鼻という特徴のある描き方で宮廷貴族の生活を描いた絵巻物を何というか。","a":"源氏物語絵巻","t":"g"},{"n":18,"q":"大納言伴善男がひきおこしたという，応天門の変を描いた絵巻物を何というか。","a":"伴大納言絵巻","t":"g"},{"n":19,"q":"信貴山にこもって毘沙門天をまつった僧命蓮に関する３つの説話を題材としたもので，庶民の生活・風俗をよく描いている絵巻物を何というか。","a":"信貴山縁起絵巻","t":"g"},{"n":20,"q":"詞書はなく全巻墨一色で描かれ，蛙・兎・猿を擬人化して生き生きと描いた異色の絵巻物は何か。","a":"鳥獣戯画","t":"g"},{"n":21,"q":"20（＝鳥獣戯画）の絵巻物の作者と伝えられる人物はだれか。","a":"鳥羽僧正覚猷","t":"p"},{"n":22,"q":"貴族たちが書写して四天王寺などに納めた装飾経で，扇形の紙に大和絵で当時の風俗が描かれ，京都市中の店のありさまなど，民衆の生活をうかがうことのできるものは何か。","a":"扇面古写経","t":"g"},{"n":23,"q":"平清盛以下が一門の繁栄を祈って書写し，安芸の宮島にある神社に奉納した装飾経は何か。","a":"平家納経","t":"g"},{"n":24,"q":"平清盛が23（＝平家納経）の経を奉納した，平氏が氏神とした神社を何というか。","a":"厳島神社","t":"g"}]}]},{"t":"2　鎌倉幕府の成立","s":[{"t":"源平の争乱","q":[{"n":1,"q":"1180（治承４）年に，後白河法皇の皇子を奉じ，最初に平氏打倒の兵をあげた武士はだれか。","a":"源頼政","t":"p"},{"n":2,"q":"1（＝源頼政）の人物と平氏打倒の兵をあげた後白河法皇の皇子はだれか。","a":"以仁王","t":"p"},{"n":3,"q":"反平氏の決起をよびかけた2（＝以仁王）の人物からの命令文書を何というか。","a":"令旨","t":"g"},{"n":4,"q":"2（＝以仁王）の人物のよびかけに応じて蜂起した，信濃の木曽谷の武士はだれか。","a":"源義仲","t":"p"},{"n":5,"q":"平治の乱で伊豆に流され，1180年８月に挙兵した源氏の嫡流はだれか。","a":"源頼朝","t":"p"},{"n":6,"q":"1180年から1185（文治元）年にいたる源平の争乱を，その主な年号をとって何というか。","a":"治承・寿永の乱","t":"g"},{"n":7,"q":"1180年に，全国的内乱が広まるなかで平清盛は一時都を移した。それはどこか，国名をつけて答えよ。","a":"摂津国福原京","t":"l"},{"n":8,"q":"源頼朝は挙兵後最初の戦いで，平氏方の武将大庭景親と戦い大敗したが，この戦いを何というか。","a":"石橋山の戦い","t":"g"},{"n":9,"q":"源頼朝が，平維盛らの平氏の追討軍を迎えて，これを敗走させた1180年10月の戦いを何というか。","a":"富士川の戦い","t":"g"},{"n":10,"q":"1180年の末，反平氏の拠点であった南都の東大寺や興福寺を焼打ちした平氏の総大将はだれか。","a":"平重衡","t":"p"},{"n":11,"q":"1180年夏，西日本が旱ばつで凶作となり，この年から２〜３年飢饉がつづいた。この1181（養和元）年を中心とする大飢饉を何というか。","a":"養和の飢饉","t":"g"},{"n":12,"q":"1183（寿永２）年，北陸から入京をはかる源義仲の軍と，平維盛軍が，越中・加賀国境で激突し，平氏軍を敗走させた戦いを何というか。","a":"倶利伽羅峠（砺波山）の戦い","t":"g"},{"n":13,"q":"源頼朝の軍と平氏との合戦のうち，1184（元暦元）年２月に，摂津国福原に集結した平氏の軍が敗れた戦いを何というか。","a":"一の谷の合戦（戦い）","t":"g"},{"n":14,"q":"1185年２月，讃岐国に拠点を持つ平氏の軍を，源義経の率いる源氏の軍が奇襲し，敗走させた戦いを何というか。","a":"屋島の合戦（戦い）","t":"g"},{"n":15,"q":"1185年３月に，長門の海上で平氏一門が滅亡した戦いを何というか。","a":"壇の浦の戦い","t":"g"},{"n":16,"q":"平清盛の３男で，清盛死後の平氏一門を統率し，15（＝壇の浦の戦い）の戦いで捕えられたのち斬殺されたのはだれか。","a":"平宗盛","t":"p"},{"n":17,"q":"平氏との戦いに，軍を率いて各地を転戦した源頼朝の弟を２人あげよ。","a":"源範頼・義経","t":"g"}]},{"t":"鎌倉幕府","q":[{"n":1,"q":"源頼朝は平氏打倒の挙兵後まもなく，東国を中心に自己の権力基盤の確立をはかった。頼朝が根拠地としたのは相模のどこか。","a":"鎌倉","t":"l"},{"n":2,"q":"1063（康平６）年，前九年合戦の後，源頼義が石清水八幡宮を勧請し，のち鎌倉幕府の守護神として尊崇された神社を何というか。","a":"鶴岡八幡宮","t":"g"},{"n":3,"q":"後白河法皇が源頼朝に，東国の支配権（東海・東山両道の支配権）を認めた宣旨を何というか。","a":"寿永二年十月宣旨","t":"g"},{"n":4,"q":"1185（文治元）年，源頼朝が源義経追捕を理由として，国ごとに設置したものは何か。","a":"守護","t":"g"},{"n":5,"q":"4（＝守護）の役職は，当初何とよばれたか２つ答えよ。","a":"惣追捕使・国地頭","t":"g"},{"n":6,"q":"4（＝守護）の役職の３つの権限をあげよ。","a":"京都大番役の催促，謀叛人・殺害人の逮捕","t":"g"},{"n":7,"q":"6（＝京都大番役の催促，謀叛人・殺害人の逮捕）の権限をまとめて何というか。","a":"大犯三カ条","t":"g"},{"n":8,"q":"1185年，源頼朝が諸国の公領・荘園に設置することを朝廷に認めさせた，土地管理・年貢徴収・治安維持の任務を持つ役職を何というか。","a":"地頭","t":"g"},{"n":9,"q":"8（＝地頭）の役職の設置にともない，１段当り５升ずつの米の徴収が認められたが，翌年停止された。この米を何とよぶか。","a":"兵粮米","t":"g"},{"n":10,"q":"奥州藤原氏は，清衡以後３代にわたって平泉を中心に繁栄していたが，４代目の時に逃亡した源義経をかくまったことを理由に源頼朝により滅ぼされた。この時の奥州藤原氏の当主はだれか。","a":"藤原泰衡","t":"p"},{"n":11,"q":"奥州藤原氏が滅亡したのは西暦何年か。","a":"1189年","t":"d"},{"n":12,"q":"奥州藤原氏滅亡ののち，この地の御家人統率のためにおかれた幕府の機関を何というか。","a":"奥州総奉行","t":"g"},{"n":13,"q":"鎌倉幕府の機構のなかで，1180（治承４）年におかれた御家人の統率，軍事・警察の任にあたった機関は何か。","a":"侍所","t":"g"},{"n":14,"q":"13（＝侍所）の機関の初代長官（別当）はだれか。","a":"和田義盛","t":"p"},{"n":15,"q":"1184（元暦元）年におかれた，幕府の一般政務や財政をつかさどる機関は何か。","a":"公文所","t":"g"},{"n":16,"q":"15（＝公文所）の機関の初代長官（別当）はだれか。","a":"大江広元","t":"p"},{"n":17,"q":"1184年におかれた，幕府の訴訟・裁判処理機関は何か。","a":"問注所","t":"g"},{"n":18,"q":"17（＝問注所）の機関の初代長官（執事）はだれか。","a":"三善康信","t":"p"},{"n":19,"q":"1185（文治元）年におかれた，九州の御家人統率と軍事・警察の任務をつかさどる幕府の機関を何というか。","a":"鎮西奉行","t":"g"},{"n":20,"q":"1185年に京都の治安維持，朝廷との交渉などの目的を持って設置された，幕府の機関を何というか。","a":"京都守護","t":"g"},{"n":21,"q":"1190（建久元）年と1192（建久３）年に源頼朝が就任した官職を順にあげよ。","a":"右近衛大将・征夷大将軍","t":"g"},{"n":22,"q":"源頼朝の奏請によって朝廷に設置され，親幕派の公卿が任命された朝廷の重要政務を議する職名を何というか。","a":"議奏公卿（議奏）","t":"g"},{"n":23,"q":"22（＝議奏公卿）の職に任命された人物で，『玉葉』という日記を記した摂関家出身の貴族はだれか。","a":"九条（藤原）兼実","t":"p"}]},{"t":"幕府と朝廷","q":[{"n":1,"q":"鎌倉時代に将軍と主従関係を結んだ武士を何というか。","a":"御家人","t":"g"},{"n":2,"q":"1以外の武士を何というか。","a":"非御家人","t":"g"},{"n":3,"q":"将軍と御家人の主従関係は，将軍の与える恩恵と御家人側の奉仕義務とによって結ばれたが，この恩恵と奉仕義務をそれぞれ何というか。","a":"御恩・奉公","t":"g"},{"n":4,"q":"御恩のうち，父祖伝来の領地の保持を認めるものを何というか。","a":"本領安堵","t":"g"},{"n":5,"q":"御恩のうち，功績によって新たな領地を与えることを何というか。","a":"新恩給与","t":"g"},{"n":6,"q":"一般に土地の給与を通じて結ばれている主従関係を何とよぶか。","a":"封建制度","t":"g"},{"n":7,"q":"鎌倉幕府は国衙に命じて，一国内の荘園・公領ごとの田地の面積や，荘園領主・地頭の氏名を記す土地台帳をつくらせたが，これを何というか。","a":"大田文","t":"g"},{"n":8,"q":"御家人の奉仕義務のうち，御家人が交代で担当し，内裏や院御所の警護にあたった番役を何というか。","a":"京都大番役","t":"g"},{"n":9,"q":"御家人の奉仕義務のうち，御家人が交代で担当し，鎌倉の将軍御所の警備にあたった番役を何というか。","a":"鎌倉番役","t":"g"},{"n":10,"q":"御家人の奉仕義務のうち，惣領が一族を率いて戦時に出陣・参戦することを何というか。","a":"軍役","t":"g"},{"n":11,"q":"鎌倉幕府の経済的基盤のうち，鎌倉殿（将軍）が本所（荘園領主）として支配した荘園を何というか。","a":"関東御領","t":"g"},{"n":12,"q":"鎌倉幕府の将軍の知行国を何というか。","a":"関東知行国（関東御分国）","t":"g"},{"n":13,"q":"鎌倉幕府の所領ではないが，幕府が地頭の設置や兵粮米徴収などの権利を持つ公領や荘園を何というか。","a":"関東進止所領","t":"g"},{"n":14,"q":"10世紀以降，律令・格式の編纂ののちに朝廷から出された法令は，しだいに何とよばれるようになったか。","a":"新制","t":"g"}]}]},{"t":"3　武士の社会","s":[{"t":"北条氏の台頭","q":[{"n":1,"q":"源頼朝の死後，政所・侍所の別当を兼ねた北条氏が鎌倉幕府の実権を握ることになった。この政治形態を何というか。","a":"執権政治","t":"g"},{"n":2,"q":"源頼朝の死後，将軍職を継いだのはだれか。","a":"源頼家","t":"p"},{"n":3,"q":"執権に最初に就任したのはだれか。","a":"北条時政","t":"p"},{"n":4,"q":"石橋山の戦いで源頼朝を救ったことから侍所の所司として重用されたが，頼朝の死後，御家人たちに弾劾されて失脚した有力御家人はだれか。","a":"梶原景時","t":"p"},{"n":5,"q":"２代将軍の外戚として権勢を得たが，北条氏追討に失敗し，1203（建仁３）年に北条時政に殺された人物はだれか。","a":"比企能員","t":"p"},{"n":6,"q":"源頼家は北条氏と対立し，1204（元久元）年に暗殺されたが，その場所はどこか。","a":"伊豆の修禅寺","t":"l"},{"n":7,"q":"鎌倉幕府の３代将軍はだれか。","a":"源実朝","t":"p"},{"n":8,"q":"父である北条時政を引退させて２代執権となったのはだれか。","a":"北条義時","t":"p"},{"n":9,"q":"1213（建保元）年に8（＝北条義時）の人物は，侍所別当であった有力御家人を滅ぼして政所・侍所別当を兼ね，執権の地位を確立した。この時に滅ぼされた御家人はだれか。","a":"和田義盛","t":"p"},{"n":10,"q":"9（＝和田義盛）の人物が敗死した戦いを何というか。","a":"和田合戦","t":"g"}]},{"t":"承久の乱","q":[{"n":1,"q":"鎌倉幕府成立後，院政を開始して幕府に対する朝廷の勢力を回復させようとする動きの中心になった人物はだれか。","a":"後鳥羽上皇","t":"p"},{"n":2,"q":"1（＝後鳥羽上皇）の人物によって，院の新たな武力として設置されたものを何というか。","a":"西面の武士","t":"g"},{"n":3,"q":"1219（承久元）年に，鎌倉幕府の３代将軍を暗殺した，２代将軍の遺児はだれか。","a":"公暁","t":"p"},{"n":4,"q":"鎌倉幕府の４代将軍として，京都の摂関家から迎えられたのはだれか。","a":"藤原（九条）頼経","t":"p"},{"n":5,"q":"鎌倉幕府の４代・５代将軍のことを，その出身から何とよんでいるか。","a":"藤原将軍（摂家将軍）","t":"g"},{"n":6,"q":"源頼朝の妻で，京都から迎えられた幼少の将軍を後見して幕政を裁断し，尼将軍とよばれたのはだれか。","a":"北条政子","t":"p"},{"n":7,"q":"後鳥羽上皇による，鎌倉幕府打倒の戦いを何というか。","a":"承久の乱","t":"g"},{"n":8,"q":"7（＝承久の乱）の戦いの時，諸国に追討の宣旨が発せられたが，その対象となった幕府の執権はだれか。","a":"北条義時","t":"p"},{"n":9,"q":"7（＝承久の乱）の戦いは西暦何年に始まったか。","a":"1221年","t":"d"},{"n":10,"q":"7（＝承久の乱）の戦いで東海道を京都に攻め上がった，幕府軍の将を２人あげよ。","a":"北条泰時・北条時房","t":"g"},{"n":11,"q":"7（＝承久の乱）の戦いに敗れた後鳥羽上皇は，どこに流されたか。","a":"隠岐","t":"l"},{"n":12,"q":"7（＝承久の乱）の戦いに敗れ，佐渡に流された上皇はだれか。","a":"順徳上皇","t":"p"},{"n":13,"q":"7（＝承久の乱）の戦いに敗れ，土佐（のち阿波）に流された上皇はだれか。","a":"土御門上皇","t":"p"},{"n":14,"q":"7（＝承久の乱）の戦いののち，幕府により廃された天皇はだれか。","a":"仲恭天皇","t":"p"},{"n":15,"q":"7（＝承久の乱）の戦い後に廃された14（＝仲恭天皇）の天皇にかわって幕府の意向で即位した天皇はだれか。","a":"後堀河天皇","t":"p"},{"n":16,"q":"7（＝承久の乱）の戦いののち，従来の京都守護にかわって，新たに設置された幕府の機関を何というか。","a":"六波羅探題","t":"g"},{"n":17,"q":"16（＝六波羅探題）の機関の初代長官を２人あげよ。","a":"北条泰時・北条時房","t":"g"},{"n":18,"q":"承久の乱後，朝廷側についた貴族・武士の所領3000余カ所が没収され，新たに多数の地頭が任命されたが，この地頭を何とよんでいるか。","a":"新補地頭","t":"g"},{"n":19,"q":"承久の乱後の新たな地頭に対して，従来の地頭を何とよんだか。","a":"本補地頭","t":"g"},{"n":20,"q":"新補地頭の得分について，得分が明確でないところに，幕府は一定の基準を定めて給与を保障したが，この基準を何というか。","a":"新補率法","t":"g"},{"n":21,"q":"新補地頭の得分のうち，荘園領主への年貢や課役納入が免除される免田（給田）とよばれる田地は，どのような比率で与えられるか。","a":"田畑11町ごとに1町の割合","t":"g"},{"n":22,"q":"領主に納める年貢に加えて地頭が自分の収益として農民から徴収できる付加米を何というか。","a":"加徴米","t":"g"},{"n":23,"q":"22（＝加徴米）の数量はどのくらいか。","a":"1段につき5升","t":"g"}]},{"t":"執権政治","q":[{"n":1,"q":"承久の乱後に３代執権となり，執権政治を確立したのはだれか。","a":"北条泰時","t":"p"},{"n":2,"q":"1（＝北条泰時）の人物の時に新設された，執権の補佐役を何というか。","a":"連署","t":"g"},{"n":3,"q":"2（＝連署）の役職の初代はだれか。","a":"北条時房","t":"p"},{"n":4,"q":"1225（嘉禄元）年，幕府最高の政務の決定や裁判の裁決にあたる会議が設置されたが，これを構成する役職を何というか。","a":"評定衆","t":"g"},{"n":5,"q":"北条泰時によって制定された，武家の最初の体系的法典を何というか。","a":"御成敗式目（貞永式目）","t":"g"},{"n":6,"q":"5（＝御成敗式目）の法は西暦何年に制定されたか。","a":"1232年","t":"d"},{"n":7,"q":"5（＝御成敗式目）の法は何条からなっているか。","a":"51カ条","t":"g"},{"n":8,"q":"5（＝御成敗式目）の法が基準（根拠）としたものは，源頼朝以来の先例と，武家社会の何か。","a":"道理","t":"g"},{"n":9,"q":"北条泰時は，5（＝御成敗式目）の法の制定の趣旨を書簡で六波羅探題として在京中の弟に宛てた。弟はだれか。","a":"北条重時","t":"p"},{"n":10,"q":"5（＝御成敗式目）の法の制定後，必要に応じて出された法令を何というか。","a":"式目追加","t":"g"},{"n":11,"q":"室町幕府の法令で建武年間以後の10（＝式目追加）の法は何とよばれたか。","a":"建武以来追加","t":"g"},{"n":12,"q":"御成敗式目に対して，朝廷の支配下で効力を持った法の総称を何というか。","a":"公家法","t":"g"},{"n":13,"q":"荘園領主のもとで効力を持った法の総称を何というか。","a":"本所法","t":"g"},{"n":14,"q":"鎌倉幕府の５代執権はだれか。","a":"北条時頼","t":"p"},{"n":15,"q":"14（＝北条時頼）の人物が，裁判の公正と迅速化をはかるために設置した機関を何というか。","a":"引付","t":"g"},{"n":16,"q":"15（＝引付）の機関の役人を何というか。","a":"引付衆","t":"g"},{"n":17,"q":"執権北条氏の独裁体制が確立したのは，1247（宝治元）年に北条時頼が有力御家人であった三浦一族を滅ぼして以降であるが，この戦いを何というか。","a":"宝治合戦","t":"g"},{"n":18,"q":"17（＝宝治合戦）の戦いで滅ぼされた三浦氏の当主はだれか。","a":"三浦泰村","t":"p"},{"n":19,"q":"北条時頼は，それまでの将軍にかえて天皇の皇子を６代将軍に迎えたが，このような将軍を何というか。","a":"皇族将軍（親王将軍・宮将軍）","t":"g"},{"n":20,"q":"北条時頼が，６代将軍に迎えた，後嵯峨天皇の皇子はだれか。","a":"宗尊親王","t":"p"}]},{"t":"武士の生活","q":[{"n":1,"q":"鎌倉時代の武士の居館を何というか。","a":"館","t":"g"},{"n":2,"q":"鎌倉時代の武士が家族や下人などに耕作させた，館近くの年貢や公事のかからない直営地を何というか。","a":"佃（門田・正作・用作）","t":"g"},{"n":3,"q":"鎌倉時代の武士の相続形態は，原則としてどのようなかたちか。","a":"分割相続","t":"g"},{"n":4,"q":"平安時代後期から武家の間に始まった女性が男性の家に入る婚姻形式を何というか。","a":"嫁入婚","t":"g"},{"n":5,"q":"鎌倉時代の武士は一門・一家とよばれる同族的な集団をつくっていたが，その首長である宗家の長を何といったか。また，その他の人々を何といったか。","a":"惣領（家督）・庶子","t":"g"},{"n":6,"q":"武士の一門（一家）の宗家の長は，一門全体の所領の統制権を持ち，戦時にも統率権を持つなど，幕府への軍事勤務やその他の奉公を一門を率いてつとめた。こうした体制を何というか。","a":"惣領制","t":"g"},{"n":7,"q":"鎌倉時代の武士の間で盛んに行われた，３種類の弓技名をあげよ。","a":"笠懸・犬追物・流鏑馬","t":"g"},{"n":8,"q":"7（＝笠懸・犬追物・流鏑馬）の弓技を総称して何というか。","a":"騎射三物","t":"g"},{"n":9,"q":"多数の勢子を使って獲物を追い出し，弓矢で射止める大規模な武士の狩猟を何というか。","a":"巻狩","t":"g"},{"n":10,"q":"鎌倉時代の武士たちの日常生活のなかから生まれた道徳を当時何といったか。","a":"兵の道（武家のならい・弓馬の道）","t":"g"}]},{"t":"武士の土地支配","q":[{"n":1,"q":"年貢や土地をめぐる荘園領主と地頭との紛争の解決策として，地頭に荘園管理のいっさいをまかせ，定額の年貢納入を請け負わせる契約を何というか。","a":"地頭請所（地頭請）","t":"g"},{"n":2,"q":"荘園領主が現地の土地の相当部分を地頭に分け与え，相互に干渉せず土地・農民を支配することを何というか。","a":"下地中分","t":"g"},{"n":3,"q":"13世紀半ば，地頭と領家との間で荘園が分けられた絵図で有名な，京都の松尾神社が伯耆国に有していた荘園の名をあげよ。","a":"東郷荘","t":"g"}]}]},{"t":"4　蒙古襲来と幕府の衰退","s":[{"t":"蒙古襲来","q":[{"n":1,"q":"13世紀の初め，大陸北部のモンゴル高原に住むモンゴル諸部族を統合したのはだれか。","a":"チンギス＝ハン（成吉思汗）","t":"p"},{"n":2,"q":"1（＝チンギス＝ハン）の人物の孫が中国に建てた国の名をあげよ。","a":"元","t":"g"},{"n":3,"q":"女真族が中国東北部に建てた王朝で遼を滅ぼしたが，モンゴルにより滅亡した王朝を何というか。","a":"金","t":"g"},{"n":4,"q":"中国に元という王朝を樹立したモンゴルの皇帝はだれか。","a":"フビライ＝ハン（忽必烈汗）","t":"p"},{"n":5,"q":"元の首都名と現在の地名をあげよ。","a":"大都・北京","t":"g"},{"n":6,"q":"フビライ＝ハンが征服した朝鮮半島の国を何というか。","a":"高麗","t":"g"},{"n":7,"q":"元の侵入に対して頑強に抵抗した，6（＝高麗）の王に直属した３編成の精鋭部隊を何というか。","a":"三別抄","t":"g"},{"n":8,"q":"元軍が日本に襲来した時の鎌倉幕府の８代執権はだれか。","a":"北条時宗","t":"p"},{"n":9,"q":"最初の元軍の襲来を何というか。また，それは西暦何年のことか。","a":"文永の役・1274年","t":"d"},{"n":10,"q":"9（＝文永の役・1274年）の際，元軍が使用した鋳鉄製の球に火薬を詰めて破裂させた武器を何というか。","a":"てつはう","t":"g"},{"n":11,"q":"元軍の再来襲に備え，幕府は九州に所領を持つ御家人に課していた北九州沿岸警備役を強化したが，この役を何というか。","a":"異国警固番役","t":"g"},{"n":12,"q":"元軍の再来襲に備えた防衛施設として，博多湾沿岸に築かれた，上陸を防ぐための施設を何というか。","a":"防塁（石築地・石塁）","t":"g"},{"n":13,"q":"２度目の元軍の襲来を何というか。また，それは西暦何年のことか。","a":"弘安の役・1281年","t":"d"},{"n":14,"q":"13（＝弘安の役・1281年）に際し，朝鮮半島南部の合浦から進発した元軍と高麗軍の混成軍を何というか。","a":"東路軍","t":"g"},{"n":15,"q":"13（＝弘安の役・1281年）に際し，長江の南の慶元から進発した，南宋の降兵が主力の軍を何というか。","a":"江南軍","t":"g"},{"n":16,"q":"２度にわたる元軍の襲来をまとめて何というか。","a":"蒙古襲来（元寇）","t":"g"},{"n":17,"q":"16（＝蒙古襲来）の戦いの際に奮戦した肥後国の御家人が，武功を子孫に伝えるために描かせた絵巻物を何というか。","a":"蒙古襲来絵巻（絵詞）","t":"g"},{"n":18,"q":"17（＝蒙古襲来絵巻）の絵巻を描かせた御家人はだれか。","a":"竹崎季長","t":"p"}]},{"t":"蒙古襲来後の政治","q":[{"n":1,"q":"鎌倉幕府が蒙古襲来後，西国防備の必要から，北条氏一族を九州に派遣して軍事・行政・裁判の処理にあたらせた職を何というか。","a":"鎮西探題","t":"g"},{"n":2,"q":"鎌倉幕府内部で専制的地位を確立していった北条氏の家督を継ぐ嫡流の当主を何というか。","a":"得宗","t":"g"},{"n":3,"q":"2（＝得宗）の家の家臣団を何とよぶか。","a":"御内人","t":"g"},{"n":4,"q":"3（＝御内人）の中心人物として幕政の実権を握った者を何というか。","a":"内管領","t":"g"},{"n":5,"q":"蒙古襲来後，3（＝御内人）の者と旧来の御家人との対立が激しくなり，有力御家人の一族が滅亡した。1285（弘安８）年におこったこの事件を何というか。","a":"霜月騒動","t":"g"},{"n":6,"q":"5（＝霜月騒動）の事件で滅ぼされた有力御家人はだれか。","a":"安達泰盛","t":"p"},{"n":7,"q":"5（＝霜月騒動）の事件で，有力御家人を滅ぼした内管領はだれか。","a":"平頼綱","t":"p"},{"n":8,"q":"7（＝平頼綱）の内管領が滅ぼされた（平禅門の乱）のち，北条氏の専制的な地位ができあがったが，このような政治を何というか。","a":"得宗専制政治","t":"g"},{"n":9,"q":"7（＝平頼綱）の内管領を滅ぼした，９代執権はだれか。","a":"北条貞時","t":"p"}]},{"t":"琉球とアイヌの動き","q":[{"n":1,"q":"琉球で貝塚文化から農耕経済に移行した12世紀ころ，琉球に出現した豪族を何というか。","a":"按司","t":"g"},{"n":2,"q":"12世紀，琉球各地に出現した1（＝按司）が拠点とした石垣をめぐらした城砦を何というか。","a":"グスク","t":"g"},{"n":3,"q":"樺太・千島・北海道地方に古くから住む人々で，現在は主として北海道に住む先住民族を何というか。","a":"アイヌ","t":"g"},{"n":4,"q":"津軽半島の十三湖に位置する港を何というか。","a":"十三湊","t":"g"},{"n":5,"q":"陸奥国津軽地方の安倍貞任の子孫と伝えられ，鎌倉時代初期に北条義時の被官（御内人）となり蝦夷管領に任じられた豪族を何というか。","a":"安藤（安東）氏","t":"g"}]},{"t":"社会の変動","q":[{"n":1,"q":"鎌倉時代における農業技術の進歩を顕著に示す事例として，同じ土地を年２回耕作することが畿内周辺や西日本各地で行われたが，それは何か。","a":"二毛作","t":"g"},{"n":2,"q":"鎌倉時代には中国から多収穫米が輸入されたが，それは何か。","a":"大唐米","t":"g"},{"n":3,"q":"鎌倉時代には肥料の使用も盛んとなったが，どのようなものが主に使われたか。２つあげよ。","a":"刈敷・草木灰","t":"g"},{"n":4,"q":"鎌倉時代の農耕技術の進歩として普及したことは何か。","a":"鉄製の農具や牛馬の利用","t":"g"},{"n":5,"q":"中世，主に瀬戸内海沿岸の畑で栽培され，実をしぼった油が灯明に用いられたシソ科の一年草は何か。","a":"荏胡麻","t":"g"},{"n":6,"q":"糸や布を藍で染める業者を何というか。","a":"紺屋","t":"g"},{"n":7,"q":"寺社の門前，荘園や交通の要地で月に数回，一定の日に開かれた市を何というか。","a":"定期市","t":"g"},{"n":8,"q":"鎌倉時代には，7（＝定期市）は月に３度がふつうになってきたが，これを何というか。","a":"三斎市","t":"g"},{"n":9,"q":"『一遍上人絵伝』には，ある国の市場の様子がよく描かれているが，それはどこの市か。","a":"備前国福岡市","t":"l"},{"n":10,"q":"鎌倉時代には，京都・奈良・鎌倉などの中心的都市では，常設の小売店も見られるようになったが，これを何といったか。","a":"見世棚","t":"g"},{"n":11,"q":"天皇家や貴族・大寺院のもとに，その権威をたよって，販売や製造の特権を持つ商工業者の同業団体が生まれた。これを何というか。","a":"座","t":"g"},{"n":12,"q":"11（＝座）の構成員のうち，大寺社に属し芸能や手工業，雑役で奉仕にあたった下級神職を何というか。","a":"神人","t":"g"},{"n":13,"q":"11（＝座）の構成員のうち，天皇家に属し天皇に供御（食物・調度）を貢納した職能民を何というか。","a":"供御人","t":"g"},{"n":14,"q":"鎌倉時代に河川や港など交通の要地に誕生した，商品の中継ぎと委託販売・運送を行う業者を何というか。","a":"問（問丸）","t":"g"},{"n":15,"q":"鎌倉時代には，交換経済の発展にともない，それまでの米・絹布などにかわり，中国との貿易で輸入された貨幣が広く流通し始めた。この貨幣を総称して何というか。","a":"宋銭","t":"g"},{"n":16,"q":"遠隔地間の金銭の輸送，貸借の決済を手形で行う体制ができたが，これを何というか。","a":"為替","t":"g"},{"n":17,"q":"鎌倉時代には，金融を営む高利貸業者もあらわれたが，これを何というか。","a":"借上","t":"g"},{"n":18,"q":"高野山文書には，1275（建治元）年に，ある荘園で百姓などが地頭湯浅氏の非法を荘園領主に訴えた有名な訴状があるが，この荘園名をあげよ。","a":"紀伊国阿氐河荘","t":"g"}]},{"t":"幕府の衰退","q":[{"n":1,"q":"鎌倉武士は，分割相続により所領が細分化されて窮乏したため，女性に与えられてきた財産は本人一代限りで，死後は惣領に返すかたちが多くなった。これを何というか。","a":"一期分","t":"g"},{"n":2,"q":"鎌倉幕府は，蒙古襲来後の窮乏する御家人を救うため，御家人の所領の質入れや売買を禁じ，過去に売買したものは無償でとりもどすことができるという法令を出したが，その名称と西暦年代をあげよ。","a":"永仁の徳政令・1297年","t":"d"},{"n":3,"q":"2（＝永仁の徳政令・1297年）の法令が出された時の鎌倉幕府執権はだれか。","a":"北条貞時","t":"p"},{"n":4,"q":"鎌倉時代中後期に，武力で年貢納入を拒否したり，荘園領主に抵抗する地頭や非御家人の新興武士の動きが幕府をなやますようになる。これらの武士を何とよんだか。","a":"悪党","t":"g"}]}]},{"t":"5　鎌倉文化","s":[{"t":"鎌倉文化","q":[{"n":1,"q":"鎌倉時代は，伝統文化を受け継ぎながらも，一方で新しい文化が生み出され，成長していく時代であった。新しい文化の担い手をあげよ。","a":"武士と庶民","t":"g"},{"n":2,"q":"1（＝武士と庶民）の人々が，文学や美術に反映した気風を，漢字２字で２つあげよ。","a":"素朴・質実","t":"g"},{"n":3,"q":"鎌倉文化に影響を与えたのは，僧侶・商人の往来や亡命してきた僧侶らによって伝えられた中国文化であるが，それは中国のどの時代の文化か。","a":"南宋・元の時代","t":"g"}]},{"t":"鎌倉仏教","q":[{"n":1,"q":"平安時代末期から鎌倉時代中期におこった，武士・庶民を対象とした新しい仏教の総称をあげよ。","a":"鎌倉仏教","t":"g"},{"n":2,"q":"1（＝鎌倉仏教）の仏教には，どんな階層の人でも行いやすい修行を１つだけ選ぶという特色があったが，行いやすい修行のことを何というか。また，１つだけ選ぶことを何というか。それぞれ漢字２字で示せ。","a":"易行・選択","t":"g"},{"n":3,"q":"1（＝鎌倉仏教）の仏教には，選んだ修行に専念するという特色があったが，これを何というか。漢字２字で示せ。","a":"専修","t":"g"},{"n":4,"q":"1（＝鎌倉仏教）の仏教は大別すると，みずから悟りを開くものと，仏の力にすがるものがある。それぞれを漢字２字で示せ。","a":"自力・他力","t":"g"},{"n":5,"q":"美作国の押領使の家に生まれ，初め比叡山で諸学を学んだが，1175（安元元）年に京都でひたすら念仏をとなえることで救われると説き，新しい宗派を開いたのはだれか。","a":"法然（源空）","t":"p"},{"n":6,"q":"5（＝法然）の人物が開いた新しい宗派を何というか。","a":"浄土宗","t":"g"},{"n":7,"q":"ひたすら念仏をとなえることによって極楽浄土に往生できるという，6（＝浄土宗）の宗派の教えを示す語をあげよ。","a":"専修念仏","t":"g"},{"n":8,"q":"浄土宗や浄土真宗などでとなえられる念仏の名号を何というか。","a":"南無阿弥陀仏","t":"g"},{"n":9,"q":"法然が九条兼実の求めにより，浄土宗の教義を説いた著書をあげよ。","a":"選択本願念仏集","t":"g"},{"n":10,"q":"法然の往生の地である京都東山に建立された，浄土宗の総本山の寺院名をあげよ。","a":"知恩院","t":"g"},{"n":11,"q":"法然の弟子で，越後に流されている間に信仰を深め，絶対他力をとなえ，人々はすべて阿弥陀仏の救いを信じてすがれば，極楽往生が約束されると説き，北陸から東国の武士・農民に布教した人物はだれか。","a":"親鸞","t":"p"},{"n":12,"q":"11（＝親鸞）の人物を開祖とする宗派名をあげよ。","a":"浄土真宗（一向宗）","t":"g"},{"n":13,"q":"11（＝親鸞）の人物の代表的な著書をあげよ。","a":"教行信証","t":"g"},{"n":14,"q":"「善人なをもちて往生をとぐ，いはんや悪人をや」といい，自力で修行を積んで善人だと満足している人よりは，悩みに気付いて悪人であるとの自覚を持っている人こそ救われるという，親鸞の思想を何というか。","a":"悪人正機","t":"g"},{"n":15,"q":"「善人なをもちて往生をとぐ，いはんや悪人をや」という言葉は，親鸞の弟子が師の口伝に異説の多いことを歎き，これを正すために著した書物に記載されているが，この書物とその弟子の名をあげよ。","a":"歎異抄・唯円","t":"g"},{"n":16,"q":"のちに浄土真宗の中心となった京都の寺院をあげよ。","a":"本願寺","t":"g"},{"n":17,"q":"鎌倉時代中期，伊予国の武士の子に生まれ，天台宗・浄土宗を学んだのちに新しい宗派を開き，熊野・伊勢などの神社信仰を利用しながら各地を遊行し，念仏によりすべての人が救われると説いた僧侶はだれか。","a":"一遍（智真・遊行上人）","t":"p"},{"n":18,"q":"17（＝一遍）の人物に従って遊行した人々を何というか。","a":"時衆","t":"g"},{"n":19,"q":"17（＝一遍）の人物を開祖とする宗派名をあげよ。","a":"時宗","t":"g"},{"n":20,"q":"17（＝一遍）の人物の法語・消息・和歌などを弟子らが編集し，江戸時代後期に刊行された書は何か。","a":"一遍上人語録","t":"g"},{"n":21,"q":"念仏をとなえながら鉦や太鼓に合わせて踊り，極楽往生の喜びを表現したものを何というか。","a":"踊念仏","t":"g"},{"n":22,"q":"神奈川県藤沢市にある，時宗の総本山の寺院名をあげよ。","a":"清浄光寺（遊行寺）","t":"g"},{"n":23,"q":"鎌倉時代中期に，安房国の漁夫の子に生まれ，比叡山などで修行ののち新しい宗派を開き，法華経を釈迦の正しい教えとして選び，題目をとなえることによってすべての人々が救われると説いた僧侶はだれか。","a":"日蓮","t":"p"},{"n":24,"q":"23（＝日蓮）の人物が開いた宗派名をあげよ。","a":"日蓮宗","t":"g"},{"n":25,"q":"24（＝日蓮宗）の宗派の題目を漢字で記せ。","a":"南無妙法蓮華経","t":"g"},{"n":26,"q":"日蓮が執筆して執権北条時頼に献じ，そのなかで他宗を邪教として非難し，国難到来を予言して伊豆流罪の原因となった書を何というか。","a":"立正安国論","t":"g"},{"n":27,"q":"日蓮宗の総本山は何という寺院か。また，その所在地はどこか。","a":"久遠寺・山梨県身延山","t":"l"},{"n":28,"q":"中国から伝来した坐禅により，悟りを開く自力中心の仏教宗派を何というか。","a":"禅宗","t":"g"},{"n":29,"q":"はじめ比叡山に学び，２度入宋して，鎌倉時代初期に新しい宗派を日本に伝え，京都に建仁寺を創建した人物はだれか。","a":"栄西","t":"p"},{"n":30,"q":"29（＝栄西）の人物が宋から伝えた禅宗の宗派をあげよ。","a":"臨済宗","t":"g"},{"n":31,"q":"29（＝栄西）の人物の主要著書で，旧仏教側の非難に対し禅宗の本質を説いたものを何というか。","a":"興禅護国論","t":"g"},{"n":32,"q":"臨済宗で，師の禅僧から坐禅者に示され，考える手がかりとする問題を何というか。","a":"公案","t":"g"},{"n":33,"q":"栄西は茶の種を宋から伝えたとされるが，彼が著した茶に関する書物をあげよ。","a":"喫茶養生記","t":"g"},{"n":34,"q":"栄西が源頼家から土地を寄進されて創建した，京都における臨済宗の中心寺院は何というか。","a":"建仁寺","t":"g"},{"n":35,"q":"1246（寛元４）年に来日し，北条時頼の帰依を受け，鎌倉に創建された寺院の開山となった宋の禅僧と，その寺院の名をあげよ。","a":"蘭溪道隆・建長寺","t":"g"},{"n":36,"q":"1279（弘安２）年に北条時宗の招きで来日し，鎌倉に創建された寺院の開山となった宋の禅僧と，その寺院の名をあげよ。","a":"無学祖元・円覚寺","t":"g"},{"n":37,"q":"公家の家に生まれ，天台・臨済宗を学び，入宋して曹洞禅を伝え，のちに越前で弟子を養成した僧侶はだれか。","a":"道元","t":"p"},{"n":38,"q":"37（＝道元）の人物が説いた，「ひたすら坐禅にうちこむこと」を何というか。","a":"只管打坐","t":"g"},{"n":39,"q":"37（＝道元）の人物が宋から伝えた禅宗の宗派をあげよ。","a":"曹洞宗","t":"g"},{"n":40,"q":"37（＝道元）の人物の代表的著書をあげよ。","a":"正法眼蔵","t":"g"},{"n":41,"q":"37（＝道元）の人物が地頭波多野義重の援助で，越前に創建した寺院名をあげよ。","a":"永平寺","t":"g"},{"n":42,"q":"法相宗の僧侶で，戒律の復興につとめ，念仏を排撃して旧仏教の復興につとめたのはだれか。","a":"貞慶（解脱）","t":"p"},{"n":43,"q":"華厳宗の学僧で，高山寺を建立し，『摧邪輪』を著して念仏宗派に対抗し，華厳宗の興隆につとめたのはだれか。","a":"明恵（高弁）","t":"p"},{"n":44,"q":"律宗の僧侶で，西大寺を中心に戒律の復興と民衆化につとめて，天皇家・幕府の尊信を得た人物はだれか。","a":"叡尊（思円）","t":"p"},{"n":45,"q":"44（＝叡尊）の人物の弟子で，貧民救済・施療などの社会事業に尽し，鎌倉極楽寺に招かれ開山となった僧侶はだれか。","a":"忍性（良観）","t":"p"},{"n":46,"q":"45（＝忍性）の人物により奈良に創建されたハンセン病者救済施設を何というか。","a":"北山十八間戸","t":"g"},{"n":47,"q":"仏教などさまざまな信仰の影響を受けた，呪術的な山岳信仰を何というか。","a":"修験道","t":"g"},{"n":48,"q":"真言密教にもとづく両部神道の影響で，鎌倉時代末期に発生した，神主仏従の神道を何というか。","a":"伊勢神道（度会神道）","t":"g"},{"n":49,"q":"48（＝伊勢神道）の神道の神道説を何というか。","a":"神本仏迹説（反本地垂迹説）","t":"g"},{"n":50,"q":"鎌倉時代末期に『類聚神祇本源』を著し，48（＝伊勢神道）の神道を形成した伊勢神宮外宮の神職はだれか。","a":"度会家行","t":"p"}]},{"t":"中世文学のおこり","q":[{"n":1,"q":"もと北面の武士で，出家して諸国を行脚した平安時代末期の代表的歌人をあげよ。","a":"西行","t":"g"},{"n":2,"q":"1（＝西行）の人物の歌集をあげよ。","a":"山家集","t":"g"},{"n":3,"q":"京都賀茂神社の神職の家に生まれた人物が，転換期の世相を深い思索の眼で見つめて記した鎌倉時代初期の随筆で，中世隠者文学の代表作を何というか。","a":"方丈記","t":"g"},{"n":4,"q":"3（＝方丈記）の随筆の作者をあげよ。","a":"鴨長明","t":"g"},{"n":5,"q":"鎌倉時代初期に，天台宗一門を統括する最高職をつとめ，政治上では武家に好意を寄せながら，摂関政治の立場に立った独自の史観を展開した僧侶はだれか。","a":"慈円（慈鎮）","t":"p"},{"n":6,"q":"5（＝慈円）の人物の独自の史観の内容を示す言葉は何か。","a":"道理","t":"g"},{"n":7,"q":"5（＝慈円）の人物が独自の史観にもとづいて著した歴史書を何というか。","a":"愚管抄","t":"g"},{"n":8,"q":"5（＝慈円）の人物がつとめた比叡山延暦寺の僧職で，天台宗一門を統括する最高職を何というか。","a":"天台座主","t":"g"},{"n":9,"q":"5（＝慈円）の人物の兄で鎌倉幕府草創期，源頼朝と親しく，摂政・関白をつとめたのはだれか。","a":"九条（藤原）兼実","t":"p"},{"n":10,"q":"平安時代以来，勅撰和歌集の編集はひきつづいて行われたが，後鳥羽上皇の命によって撰集された和歌集をあげよ。","a":"新古今和歌集","t":"g"},{"n":11,"q":"10（＝新古今和歌集）の歌集の撰者の１人で，多くの歌学書を残し，父俊成のあとを継いで象徴的な歌風を大成したのはだれか。","a":"藤原定家","t":"p"},{"n":12,"q":"鎌倉時代の史料としても重要な，11（＝藤原定家）の人物の日記名をあげよ。","a":"明月記","t":"g"},{"n":13,"q":"鎌倉幕府３代将軍源実朝の歌集名をあげよ。","a":"金槐和歌集","t":"g"},{"n":14,"q":"13世紀初めの紀行文で，作者は不詳であるが，京都・鎌倉間の東海道の様子を知ることができる書名をあげよ。","a":"海道記","t":"g"},{"n":15,"q":"源親行が著したといわれる紀行文で，京都・鎌倉を旅し，さらに鎌倉に滞在して帰途につくまでのことを記した書名をあげよ。","a":"東関紀行","t":"g"},{"n":16,"q":"1277（建治３）年，実子と継子の所領争い解決のため，鎌倉におもむいた人物が著した紀行文を何というか。","a":"十六夜日記","t":"g"},{"n":17,"q":"16（＝十六夜日記）の紀行文の作者はだれか。","a":"阿仏尼","t":"p"},{"n":18,"q":"戦乱を題材に，実在の武士を主人公として，その活動を和漢混淆文で勇壮かつ流麗に描いた戦記文学を総称して何というか。","a":"軍記物語","t":"g"},{"n":19,"q":"18（＝軍記物語）の文学のなかで，1156（保元元）年におこった戦乱を，源為朝を中心として描いた作品を何というか。","a":"保元物語","t":"g"},{"n":20,"q":"18（＝軍記物語）の文学のなかで，1159（平治元）年におこった戦乱を，源義朝の長子義平を中心に描いた作品を何というか。","a":"平治物語","t":"g"},{"n":21,"q":"平氏一門の興隆から衰亡までを，仏教的無常観にもとづいて脚色した18（＝軍記物語）の文学の傑作をあげよ。","a":"平家物語","t":"g"},{"n":22,"q":"21（＝平家物語）の作品の作者といわれている人物はだれか。","a":"信濃前司行長","t":"p"},{"n":23,"q":"21（＝平家物語）の作品は琵琶の伴奏で語られたが，これを何というか。","a":"平曲","t":"g"},{"n":24,"q":"21（＝平家物語）の作品の語り手を何というか。","a":"琵琶法師","t":"g"},{"n":25,"q":"作者不詳で，21（＝平家物語）の作品と内容がほぼ同じであることから，異本の一種とも見られているが，21（＝平家物語）の作品にはない史料・説話も記されている軍記物語名をあげよ。","a":"源平盛衰記","t":"g"},{"n":26,"q":"橘成季の著で，古今の伝説を多方面にわたって集録した説話集を何というか。","a":"古今著聞集","t":"g"},{"n":27,"q":"鎌倉時代末期に書かれたもので，説話文学の系譜をひき，著者の広い見聞と鋭い観察眼による随筆の名作をあげよ。","a":"徒然草","t":"g"},{"n":28,"q":"27（＝徒然草）の著作の作者はだれか。","a":"兼好法師（卜部兼好）","t":"p"},{"n":29,"q":"13世紀初めに書かれ，作者不詳だが，題名は『今昔物語集』の補遺の意でつけられ，仏教や世事に関する奇談が多い説話集を何というか。","a":"宇治拾遺物語","t":"g"},{"n":30,"q":"鎌倉時代中期に書かれ，作者不詳だが，説話を10項目に分けて年少者への教訓としたもので，儒教的色彩が濃い説話集を何というか。","a":"十訓抄","t":"g"},{"n":31,"q":"1283（弘安６）年に著された仏教説話集で，庶民に理解しやすく仏の功徳や極楽往生を説いた説話集を何というか。","a":"沙石集","t":"g"},{"n":32,"q":"31（＝沙石集）の説話集を著したのはだれか。","a":"無住","t":"p"},{"n":33,"q":"朝廷や公家社会の儀式・礼儀・年中行事・官職などについて研究する学問を当時何といったか。","a":"有職故実の学","t":"g"},{"n":34,"q":"順徳天皇が著した33（＝有職故実の学）の書は何というか。","a":"禁秘抄（禁中抄）","t":"g"},{"n":35,"q":"鎌倉時代に『万葉集』の研究に画期的な貢献をした，天台宗の僧侶はだれか。","a":"仙覚","t":"p"},{"n":36,"q":"35（＝仙覚）の人物が1269（文永６）年に著した書を何というか。","a":"万葉集註釈","t":"g"},{"n":37,"q":"鎌倉時代中期の古典研究家で，特に『日本書紀』の研究に業績を残したのはだれか。","a":"卜部兼方","t":"p"},{"n":38,"q":"37（＝卜部兼方）の人物が著した『日本書紀』の注釈書をあげよ。","a":"釈日本紀","t":"g"},{"n":39,"q":"鎌倉時代中期，武蔵国の称名寺内に多くの書物を集めた図書館が開設されたが，これを何というか。","a":"金沢文庫","t":"g"},{"n":40,"q":"39（＝金沢文庫）の私設図書館 人物はだれか。","a":"加藤景正","t":"p"},{"n":47,"q":"13世紀以降に尾張国で盛んに生産されるようになった，46（＝加藤景正）の人物が祖といわれる陶器を何というか。","a":"瀬戸焼","t":"g"}]}]}]},{"t":"第5章　武家社会の成長","sec":[{"t":"1　室町幕府の成立","s":[{"t":"鎌倉幕府の滅亡","q":[{"n":1,"q":"鎌倉時代中期にある上皇が亡くなると，以後皇室は２つにわかれて皇位や皇室領荘園をめぐる争いをくり広げた。ある上皇とはだれか。","a":"後嵯峨上皇","t":"p"},{"n":2,"q":"鎌倉時代中期以後，皇室は２つの流れにわかれて対立したが，この２統を何というか。","a":"大覚寺統・持明院統","t":"g"},{"n":3,"q":"大覚寺統の祖となった天皇名をあげよ。","a":"亀山天皇","t":"g"},{"n":4,"q":"持明院統の祖となった天皇名をあげよ。","a":"後深草天皇","t":"g"},{"n":5,"q":"14世紀の初めに，２統が交代で皇位につく方式が成立したが，これを何というか。","a":"両統迭立","t":"g"},{"n":6,"q":"鎌倉時代後期，花園天皇の後に，朱子学の大義名分論を学んで朝廷政治の刷新をめざす天皇が即位したが，この天皇はだれか。","a":"後醍醐天皇","t":"p"},{"n":7,"q":"6（＝後醍醐天皇）の天皇の皇統名をあげよ。","a":"大覚寺統","t":"g"},{"n":8,"q":"亀山天皇の子で，後二条・後醍醐天皇の時に院政を行っていた上皇はだれか。","a":"後宇多上皇","t":"p"},{"n":9,"q":"鎌倉時代末期の執権で，最後の得宗はだれか。","a":"北条高時","t":"p"},{"n":10,"q":"9（＝北条高時）の人物に仕えた内管領はだれか。","a":"長崎高資","t":"p"},{"n":11,"q":"後醍醐天皇は２度にわたって討幕計画を企て失敗したが，1324（正中元）年に発生した最初の事件を何というか。","a":"正中の変","t":"g"},{"n":12,"q":"1331（元弘元）年に後醍醐天皇が挙兵したが失敗し，幕府に捕えられ，翌年隠岐に流された。この事件を何というか。","a":"元弘の変","t":"g"},{"n":13,"q":"後醍醐天皇が12（＝元弘の変）の事件ののち，隠岐に流されていた期間に，京都で即位した天皇の名と，その皇統名をあげよ。","a":"光厳天皇・持明院統","t":"g"},{"n":14,"q":"伯耆国の豪族で，隠岐を脱出した後醍醐天皇を船上山に迎えて挙兵したのはだれか。","a":"名和長年","t":"p"},{"n":15,"q":"鎌倉時代末期から南北朝動乱期に，荘園を侵略し領主や幕府に反抗する地頭や名主があらわれたが，これを何とよんでいたか。","a":"悪党","t":"g"},{"n":16,"q":"河内の豪族で，元弘の変に呼応して挙兵し幕府軍と戦ったのはだれか。","a":"楠木正成","t":"p"},{"n":17,"q":"16（＝楠木正成）の人物が本拠とした城を２つあげよ。","a":"赤坂城・千早城","t":"g"},{"n":18,"q":"鎌倉幕府の有力御家人で，六波羅探題を攻略した人物はだれか。","a":"足利高氏（尊氏）","t":"p"},{"n":19,"q":"鎌倉を攻め，幕府を滅ぼした人物はだれか。","a":"新田義貞","t":"p"},{"n":20,"q":"鎌倉幕府の滅亡は西暦何年か。","a":"1333年","t":"d"}]},{"t":"建武の新政","q":[{"n":1,"q":"鎌倉幕府滅亡後に開始された，後醍醐天皇による政治を何というか。","a":"建武の新政（建武の中興）","t":"g"},{"n":2,"q":"建武という年号は，中国で漢王朝が復興した時の年号を採用したものであるが，漢王朝を復興した皇帝はだれか。","a":"光武帝","t":"p"},{"n":3,"q":"天皇の意志を蔵人が伝える形式の文書で，建武の新政で絶対万能とされたものは何か。","a":"綸旨","t":"g"},{"n":4,"q":"武士社会において土地の事実的支配を何年以上継続支配している場合，その土地の所有権の変更はできないことになっていたか。","a":"20年","t":"d"},{"n":5,"q":"後醍醐天皇が親政を行うにあたって再興した一般政務を担当する機関を何というか。","a":"記録所","t":"g"},{"n":6,"q":"鎌倉幕府滅亡後，後醍醐天皇によってつくられた新しい政治機関で，幕府の引付を受け継いで所領問題などの訴訟を扱った機関を何というか。","a":"雑訴決断所","t":"g"},{"n":7,"q":"建武政府の職制で，鎌倉幕府滅亡の際の論功行賞を取り扱った機関を何というか。","a":"恩賞方","t":"g"},{"n":8,"q":"建武政府の職制で，京都の治安維持のための軍事・警察機関を何というか。","a":"武者所","t":"g"},{"n":9,"q":"8（＝武者所）の機関の頭人の名をあげよ。","a":"新田義貞","t":"g"},{"n":10,"q":"後醍醐天皇の皇子成良親王と足利直義が，命を受けて関東10カ国の支配にあたった機関を何というか。","a":"鎌倉将軍府","t":"g"},{"n":11,"q":"後醍醐天皇の皇子義良親王と北畠顕家が，陸奥・出羽の統治にあたった機関を何というか。","a":"陸奥将軍府","t":"g"},{"n":12,"q":"建武の新政の混乱ぶりを批判した有名な史料名をあげよ。","a":"二条河原落書（落首）","t":"g"},{"n":13,"q":"12（＝二条河原落書）の風刺は何という書物に記載されているか。","a":"建武年間記","t":"g"},{"n":14,"q":"1335（建武２）年に，北条高時の子が鎌倉幕府の再興をはかっておこした反乱を何というか。","a":"中先代の乱","t":"g"},{"n":15,"q":"14（＝中先代の乱）の反乱をおこした北条高時の子の名をあげよ。","a":"北条時行","t":"g"},{"n":16,"q":"14（＝中先代の乱）の反乱の際に，足利尊氏と対立して鎌倉に幽閉された後醍醐天皇の皇子が，足利直義により殺されたが，その皇子の名をあげよ。","a":"護良親王","t":"g"}]},{"t":"南北朝の動乱","q":[{"n":1,"q":"九州から再度上洛する足利尊氏軍を楠木正成が摂津で迎え撃ったが敗死した。この戦いを何というか。","a":"湊川の戦い","t":"g"},{"n":2,"q":"建武の新政権に反旗をひるがえした足利尊氏は，一時，後醍醐天皇の軍に敗れて九州に敗走したが，再挙して1336（建武３）年に京都を奪回した。この時，尊氏によって擁立された持明院統の天皇はだれか。","a":"光明天皇","t":"p"},{"n":3,"q":"1336年に，足利尊氏によって示された幕政の方針17カ条を何というか。","a":"建武式目","t":"g"},{"n":4,"q":"3（＝建武式目）の幕政の方針は，鎌倉幕府の遺臣に諮問して制定されたが，遺臣の代表的人物を１人あげよ。","a":"中原章賢（是円）","t":"g"},{"n":5,"q":"室町幕府が「本条」とよんで基本法令としたものは何か。","a":"御成敗式目（貞永式目）","t":"g"},{"n":6,"q":"室町幕府が基本法令とした5（＝御成敗式目）に，建武年間以後，必要に応じて追加制定された法令を何というか。","a":"建武以来追加","t":"g"},{"n":7,"q":"1336年に，足利尊氏に幽閉されていた後醍醐天皇が，京都を脱出して新たな朝廷を開いたのはどこか。","a":"吉野","t":"l"},{"n":8,"q":"後醍醐天皇が7（＝吉野）で開いた朝廷を何というか。","a":"南朝","t":"g"},{"n":9,"q":"8（＝南朝）の朝廷側の中心として活躍し，『神皇正統記』を書いてその正統性を主張した人物はだれか。","a":"北畠親房","t":"p"},{"n":10,"q":"『神皇正統記』の作者の子で，8（＝南朝）の朝廷側の武将として活躍したのはだれか。","a":"北畠顕家","t":"p"},{"n":11,"q":"14世紀に，２つの朝廷が同時に存在し，全国で争乱がつづいたが，これを何というか。","a":"南北朝の動乱","t":"g"},{"n":12,"q":"足利尊氏が京都に開いた幕府を，のちの所在地から何というか。","a":"室町幕府","t":"g"},{"n":13,"q":"1338（暦応元）年に，足利尊氏を征夷大将軍に任命したのはだれか。","a":"光明天皇","t":"p"},{"n":14,"q":"室町幕府では，鎌倉幕府的体制の再建をめざす漸進派と新たな体制をつくろうとする急進派との対立が表面化し，1350（観応元）年には争乱に突入した。この争乱を何というか。","a":"観応の擾乱","t":"g"},{"n":15,"q":"漸進派の中心人物である足利尊氏の弟の名をあげよ。","a":"足利直義","t":"g"},{"n":16,"q":"足利尊氏の側近で，幕政を握っていた急進派の中心人物はだれか。","a":"高師直","t":"p"},{"n":17,"q":"足利尊氏の側近である16（＝高師直）の人物の職名をあげよ。","a":"執事","t":"g"},{"n":18,"q":"足利尊氏の側室の子として生まれ，尊氏から実子と認められず叔父直義の養子となり，観応の擾乱で尊氏と戦ったのはだれか。","a":"足利直冬","t":"p"},{"n":19,"q":"南北朝の動乱が長期化し全国化した背景には，大きな社会的変化があった。動乱期に定着した武士社会の相続法を何というか。","a":"（嫡子）単独相続","t":"g"},{"n":20,"q":"南北朝の動乱期に一般化した，武士団内部の結合のあり方を何というか。","a":"地縁的結合","t":"g"}]},{"t":"守護大名と国人一揆","q":[{"n":1,"q":"守護の権限拡大の例として，田地をめぐる紛争で立稲を一方的に刈り取る実力行使を，取り締まる権限が加えられた。この実力行使を何というか。","a":"刈田狼藉","t":"g"},{"n":2,"q":"守護の権限拡大の例として，幕府の裁判の判決を強制執行する権限を何というか。","a":"使節遵行","t":"g"},{"n":3,"q":"1352（文和元）年，近江・美濃・尾張の３国において，動乱による軍費調達のため，荘園や公領の年貢の半分を徴収する権限を守護に与える法令が出されたが，これを何というか。","a":"半済（半済令）","t":"g"},{"n":4,"q":"1352年に出された3（＝半済）の制度は，その後どうなったか。","a":"全国的，永続的になった","t":"g"},{"n":5,"q":"国人・土豪の非法や農民の年貢未納に悩まされた荘園領主が，年貢の徴収を守護に請け負わせた制度を何というか。","a":"守護請","t":"g"},{"n":6,"q":"室町時代に守護は，幕府支配の下で任国内の荘園や公領を把握し，国内の武士を家臣化して，荘園・公領を問わず一国全体を統轄した。このような守護を従来の守護と区別して何というか。","a":"守護大名","t":"g"},{"n":7,"q":"14世紀後半に発展した，守護が一国全体を統轄する支配体制を何とよぶか。","a":"守護領国制","t":"g"},{"n":8,"q":"中世の人々が協力して１つの目的を実現しようとする際に，神仏に誓約してつくりだした一致団結した状態を何というか。","a":"一味同心","t":"g"},{"n":9,"q":"8（＝一味同心）により結ばれた集団を何というか。","a":"一揆","t":"g"},{"n":10,"q":"荘官・地頭が在地に土着し，経営基盤を確立して領主層に成長した武士を何というか。","a":"国人（国衆）","t":"g"},{"n":11,"q":"地方土着の武士は，みずからの領主権を守るために地域的な一味同心の地縁的集団をつくり，自主的な地域権力を持った。この集団を何というか。","a":"国人一揆","t":"g"},{"n":12,"q":"11（＝国人一揆）の一揆において，参加者が守るべき規約（一揆契状）の署名には，参加者の平等性を示すためにどのような方法が用いられたか。","a":"傘連判","t":"g"}]},{"t":"室町幕府","q":[{"n":1,"q":"足利尊氏の第３子として生まれ，２代将軍として幕府の基礎を築いたのはだれか。","a":"足利義詮","t":"p"},{"n":2,"q":"南北朝を合体させ，幕府の全国統一を実現した将軍はだれか。","a":"足利義満","t":"p"},{"n":3,"q":"足利尊氏・義詮に従い四国を領有し，のち管領となり幼主義満を補佐したのはだれか。","a":"細川頼之","t":"p"},{"n":4,"q":"征西将軍として，南朝最後の拠点九州で活躍した後醍醐天皇の皇子はだれか。","a":"懐良親王","t":"p"},{"n":5,"q":"約60年にわたる南北朝の動乱が終結し，南北朝合体が実現したのは西暦何年のことか。","a":"1392年","t":"d"},{"n":6,"q":"南北朝合体は，南朝（大覚寺統）の天皇から北朝（持明院統）の天皇への譲位というかたちをとって行われたが，この時の南朝の天皇はだれか。","a": 夷ヶ島","t":"g"},{"n":9,"q":"8（＝蝦夷ヶ島）の地に渡った本州系日本人の呼称は何か。","a":"和人（シャモ）","t":"g"},{"n":10,"q":"津軽海峡を渡った人々は8（＝蝦夷ヶ島）の地の南部に進出し，渡島半島の南部一帯の海岸沿いに連なって館をつくった。これを現在では何とよんでいるか。","a":"道南十二館","t":"g"},{"n":11,"q":"10（＝道南十二館）の１つで津軽海峡に臨む段丘上にあり，14世紀末から15世紀初めころに埋められた約39万枚の中国銭が出土した館を何というか。","a":"志苔館","t":"g"},{"n":12,"q":"室町時代に，蝦夷ヶ島に勢力を伸ばした津軽の豪族名をあげよ。","a":"安藤氏（安東氏）","t":"g"},{"n":13,"q":"蝦夷ヶ島に進出した和人と，古くから住んでいたアイヌとの対立は，1457（長禄元）年に大乱に発展した。この時のアイヌの大首長はだれか。","a":"コシャマイン","t":"p"},{"n":14,"q":"13（＝コシャマイン）の人物との戦いに勝利し，渡島半島南部地域の和人居住地の支配者に成長したのは何氏か。","a":"蠣崎氏","t":"g"},{"n":15,"q":"14（＝蠣崎氏）の氏を継いだ武田信広がコシャマインとの戦いののち築城したもので，武家屋敷や職人の工房跡，和人・アイヌの墓地などの遺構などが発掘された上之国の館を何というか。","a":"勝山館","t":"g"},{"n":16,"q":"14（＝蠣崎氏）の一族が，江戸時代に蝦夷ヶ島を支配する大名になったが，何と名乗ったか。","a":"松前氏","t":"g"}]}]},{"t":"2　幕府の衰退と庶民の台頭","s":[{"t":"惣村の形成","q":[{"n":1,"q":"南北朝の動乱期を経て，農民らの自治的集団としての村が発達してきたが，このような自治的な村を何というか。","a":"惣（惣村）","t":"g"},{"n":2,"q":"1（＝惣）の村の結合の中心となった神社の祭礼を行う農民たちの祭祀集団を何というか。","a":"宮座","t":"g"},{"n":3,"q":"1（＝惣）の村を構成する村民を何というか。","a":"惣百姓","t":"g"},{"n":4,"q":"1（＝惣）の村がよく発達した地域はどこか。","a":"畿内と周辺部","t":"l"},{"n":5,"q":"1（＝惣）の村の指導者は，どのような階層の者か。","a":"地侍・有力名主","t":"g"},{"n":6,"q":"室町時代後期から自治的組織を持つ村々が連合するようになったが，このような形態を何というか。","a":"郷村制","t":"g"},{"n":7,"q":"惣村の自治的協議機関を何というか。","a":"寄合","t":"g"},{"n":8,"q":"惣村の自治的運営の指導者をひらがな３字で答えよ。","a":"おとな","t":"g"},{"n":9,"q":"惣村の自治的運営の指導者を漢字３字で答えよ。","a":"沙汰人","t":"g"},{"n":10,"q":"惣村の規約を何というか。","a":"惣掟（地下掟・村法）","t":"g"},{"n":11,"q":"惣村の規約を定めて，村民が自分たちで警察・裁判権を行使したが，このような権限を何というか。","a":"地下検断（自検断）","t":"g"},{"n":12,"q":"惣村の機能として，灌漑用水の自主管理や山野などの共有地管理などがあったが，この村の共有地を何とよぶか。","a":"入会地","t":"g"},{"n":13,"q":"惣村では，領主へ納める年貢を村として請け負う制度も生まれたが，この制度を何というか。","a":"地下請（村請・百姓請）","t":"g"},{"n":14,"q":"武士・農民が特定の目的の下に集団を結成することを何というか。","a":"一揆","t":"g"},{"n":15,"q":"神仏を木版刷りした紙の裏に記すことで，契約の遵守を神仏に誓った証拠文書を何というか。","a":"起請文","t":"g"},{"n":16,"q":"一揆などの際，15（＝起請文）の文書を焼き，神水に入れて飲みかわし，その結束を固めることを何というか。","a":"一味神水","t":"g"},{"n":17,"q":"結束した農民たちは，その支配者に対して種々の要求・反抗をしたが，年貢の減免などを領主に嘆願することを何というか。","a":"愁訴","t":"g"},{"n":18,"q":"集団の威 持仏堂がある。これを何というか。","a":"東求堂","t":"g"},{"n":5,"q":"4（＝東求堂）の持仏堂の東北隅にある，４畳半の書斎を何とよぶか。","a":"同仁斎","t":"g"},{"n":6,"q":"禅院で，水を用いず岩石と砂利を組み合わせて象徴的な自然をつくり出す庭園様式を何というか。","a":"枯山水","t":"g"},{"n":7,"q":"6（＝枯山水）の様式の代表例で，狭い長方形の平庭に白砂と大小15の石を配置した京都の寺院の庭園名をあげよ。","a":"龍安寺石庭","t":"g"},{"n":8,"q":"京都の林下で有名であった寺院にある6（＝枯山水）の様式の代表的な庭園をあげよ。","a":"大徳寺大仙院庭園","t":"g"},{"n":9,"q":"将軍に芸能・技能をもって仕えた者を何というか。","a":"同朋衆","t":"g"},{"n":10,"q":"9（＝同朋衆）の者の一人で，東山山荘の庭をつくり８代将軍足利義政から天下第一と称えられた作庭師はだれか。","a":"善阿弥","t":"p"},{"n":11,"q":"東山文化のころに水墨画を大成した人物で，「秋冬山水図」などで知られるのはだれか。","a":"雪舟","t":"p"},{"n":12,"q":"11（＝雪舟）の人物の代表作で，四季の変化を描いた山水画の作品名をあげよ。","a":"四季山水図巻（山水長巻）","t":"g"},{"n":13,"q":"大和絵の世界で，土佐派の地位を確立した人物はだれか。","a":"土佐光信","t":"p"},{"n":14,"q":"水墨画に大和絵を取り入れ，装飾画化を進め，狩野派の画風を確立した父子の名をあげよ。","a":"狩野正信・元信","t":"g"},{"n":15,"q":"京都大徳寺に，狩野元信の代表作と伝えられる作品があるが，何というか。","a":"大仙院花鳥図","t":"g"},{"n":16,"q":"足利義政に仕え，彫金にすぐれ，以後子孫が代々金工の宗家となったのはだれか。","a":"後藤祐乗","t":"p"},{"n":17,"q":"簡素な小座敷・道具立てで精神的な深さを味わう草庵の茶を何というか。","a":"侘茶","t":"g"},{"n":18,"q":"室町時代中期の奈良の人で，一休宗純に参禅して禅の精神を学び，17（＝侘茶）の茶の方式を始めた人物はだれか。","a":"村田珠光","t":"p"},{"n":19,"q":"堺の商人で17（＝侘茶）の茶の方式をさらに簡素化し，次の時代の千利休にひき継いだ人物はだれか。","a":"武野紹鷗","t":"p"},{"n":20,"q":"東山文化のころに成立した生花の芸術を何というか。","a":"花道（立花）","t":"g"},{"n":21,"q":"京都の六角堂の僧侶で，生花を芸術的に高め，20（＝花道）の芸術の祖といわれる東山文化のころの人物をあげよ。","a":"池坊専慶","t":"g"},{"n":22,"q":"『古今和歌集』を和歌の聖典として神聖化し，そのなかの難解な部分の解釈や歌の故実などを，師から弟子に授けることを何というか。","a":"古今伝授","t":"g"},{"n":23,"q":"22（＝古今伝授）のことを最初に行った人物はだれか。","a":"東常縁","t":"p"},{"n":24,"q":"応仁・文明期に活躍し，有職故実や古典の研究で室町時代随一の学者といわれた公家はだれか。","a":"一条兼良","t":"p"},{"n":25,"q":"24（＝一条兼良）の人物の著で，朝廷の年中行事について，その起源や変遷を述べた有職故実書をあげよ。","a":"公事根源","t":"g"},{"n":26,"q":"24（＝一条兼良）の人物の著で，将軍足利義尚の諮問に答えた政治上の意見書を何というか。","a":"樵談治要","t":"g"},{"n":27,"q":"24（＝一条兼良）の人物の著で，『源氏物語』の注釈書は何か。","a":"花鳥余情","t":"g"},{"n":28,"q":"戦国時代に，京都の吉田神社の神職により大成された神道説で，反本地垂迹説の立場で儒教・仏教を統合しようとした神道を何というか。","a":"唯一神道（吉田神道）","t":"g"},{"n":29,"q":"28（＝唯一神道）の神道を大成した人物はだれか。","a":"吉田兼倶","t":"p"}]},{"t":"庶民文芸の流行","q":[{"n":1,"q":"室町時代から，自由な詩形で民間で歌われ広く流行した歌謡を何というか。","a":"小歌","t":"g"},{"n":2,"q":"1（＝小歌）の歌謡の歌集として有名なものをあげよ。","a":"閑吟集","t":"g"},{"n":3,"q":"室町時代の庶民的な短編物語の総称を何というか。","a":"御伽草子","t":"g"},{"n":4,"q":"庶民文太が製塩業で富を築き，娘も貴人の妻になるという3（＝御伽草子）の文学の作品を何というか。","a":"文正草子","t":"g"},{"n":5,"q":"３年寝たままの男が，歌才によって宮中に召され，立身出世をするという内容の3（＝御伽草子）の文学の作品を何というか。","a":"物くさ太郎","t":"g"},{"n":6,"q":"打出の小槌を得た小人が，貴族となるという内容の3（＝御伽草子）の文学の作品を何というか。","a":"一寸法師","t":"g"},{"n":7,"q":"南北朝時代，連歌の地位を確立した摂関家出身の公家はだれか。","a":"二条良基","t":"p"},{"n":8,"q":"7（＝二条良基）の人物が制定した連歌の規則書を何というか。","a":"応安新式","t":"g"},{"n":9,"q":"7（＝二条良基）の人物が編集した連歌集で，勅撰集に準ぜられたものをあげよ。","a":"菟玖波集","t":"g"},{"n":10,"q":"諸国を遊歴して全国に連歌を広め，その芸術性を高めた人物はだれか。","a":"宗祇","t":"p"},{"n":11,"q":"10（＝宗祇）の人物が確立した，深みのある芸術的な連歌を何というか。","a":"正風連歌","t":"g"},{"n":12,"q":"10（＝宗祇）の人物が編集した連歌集で勅撰集に準ぜられたものをあげよ。","a":"新撰菟玖波集","t":"g"},{"n":13,"q":"10（＝宗祇）の人物とその弟子の肖柏と宗長の師弟３人が詠んだ連歌百句で，連歌の模範とされているものを何というか。","a":"水無瀬三吟百韻","t":"g"},{"n":14,"q":"連歌はやがて規則にこだわり自由な気風が失われていったので，新しい自由な庶民的精神を根本とし，滑稽を旨とする連歌が始まった。これを何というか。","a":"俳諧連歌","t":"g"},{"n":15,"q":"14（＝俳諧連歌）の連歌の創始者といわれる人物はだれか。","a":"（山崎）宗鑑","t":"p"},{"n":16,"q":"15（＝宗鑑）の人物が編集した連歌集をあげよ。","a":"犬筑波集","t":"g"},{"n":17,"q":"室町時代に庶民にもてはやされた芸能のうち，越前国幸若大夫一派の舞で，織田信長ら武人が愛好したものを何というか。","a":"幸若舞","t":"g"},{"n":18,"q":"室町時代に発展した，仮装をしたり，華美な服装で踊るものを何というか。","a":"風流（風流踊り）","t":"g"},{"n":19,"q":"空也や一遍に始まり，念仏・和讃をとなえながらの踊りを何というか。","a":"念仏踊り","t":"g"},{"n":20,"q":"盂蘭盆の時に，祖先の精霊をなぐさめる踊りを何というか。","a":"盆踊り","t":"g"}]},{"t":"文化の地方普及","q":[{"n":1,"q":"肥後の菊池氏や薩摩の島津氏が招いて儒学の講義を受けた，五山の禅僧で朱子学者の名をあげよ。","a":"桂庵玄樹","t":"g"},{"n":2,"q":"1（＝桂庵玄樹）の人物を祖とする薩摩の朱子学派を何というか。","a":"薩南学派","t":"g"},{"n":3,"q":"16世紀半ばに土佐でおこった朱子学派を何というか。","a":"海南学派（南学）","t":"g"},{"n":4,"q":"3（＝海南学派）の学派の祖といわれる人物はだれか。","a":"南村梅軒","t":"p"},{"n":5,"q":"鎌倉時代初期に下野国に設置され，中世唯一の学校施設として，のちに宣教師ザビエルにより西洋に「坂東の大学」と紹介されたのは何か。","a":"足利学校","t":"g"},{"n":6,"q":"15世紀に5（＝足利学校）の施設を再興した人物はだれか。","a":"上杉憲実","t":"p"},{"n":7,"q":"饅頭屋宗二が出版したという日常語句を類別した国語辞書を何というか。","a":"節用集","t":"g"},{"n":8,"q":"書簡形式で，室町時代に庶民の教科書として広く流布したものを何というか。","a":"庭訓往来","t":"g"}]},{"t":"新仏教の発展","q":[{"n":1,"q":"室町幕府の保護を受けた五山派に対し，より自由な活動を求めて民間布教につとめた禅宗諸派を何というか。","a":"林下","t":"g"},{"n":2,"q":"1（＝林下）の諸派のなかで，曹洞系では永平寺が中心寺院であるが，臨済系で中心となった花園天皇の離宮を堂舎として開創した寺院を何というか。","a":"妙心寺","t":"g"},{"n":3,"q":"臨済系の1（＝林下）の諸派の僧で，在家的，民衆的な禅を説き，当時の貴族や五山派の腐敗を強く批判したのはだれか。","a":"一休宗純","t":"p"},{"n":4,"q":"3（＝一休宗純）の僧でも有名な臨済宗の寺院を何というか。","a":"大徳寺","t":"g"},{"n":5,"q":"15世紀後半に，日蓮宗の宗勢を，東国から京都や九州・中国地方に広めた僧侶はだれか。","a":"日親","t":"p"},{"n":6,"q":"京都の町衆を中心とする法華宗徒による，日蓮宗信仰を基盤として結ばれた一揆を何というか。","a":"法華一揆","t":"g"},{"n":7,"q":"延暦寺との対立から，1536（天文５）年に京都の日蓮宗寺院21カ寺が破壊され，法華宗徒が一時京都を追われた事件を何というか。","a":"天文法華の乱","t":"g"},{"n":8,"q":"浄土真宗（一向宗）諸派のうち，応仁の乱後，北陸・東海・近畿の農村に急速に勢力を拡大したのは何派か。","a":"本願寺派","t":"g"},{"n":9,"q":"8（＝本願寺派）の派が隆盛する基盤を築いた人物はだれか。","a":"蓮如","t":"p"},{"n":10,"q":"9（＝蓮如）の人物が布教のために書いた，一向宗の信仰を平易な言葉で説明した手紙を総称して何というか。","a":"御文","t":"g"},{"n":11,"q":"9（＝蓮如）の人物が，北陸布教の拠点として越前国に建立した坊舎を何というか。","a":"吉崎道場（吉崎御坊）","t":"g"},{"n":12,"q":"9（＝蓮如）の人物が現在の大阪の地に建立した隠居所にはじまり，一向一揆の中心として織田信長と戦った寺院を何というか。","a":"石山本願寺","t":"g"},{"n":13,"q":"一向一揆の基盤となった，坊主を中心として信者が連携を深めた集団を何というか。","a":"講","t":"g"},{"n":14,"q":"浄土真宗の信者のうち，出家しないで農・工・商などの業を営む者を何というか。","a":"門徒","t":"g"}]}]},{"t":"4　戦国大名の登場","s":[{"t":"戦国大名","q":[{"n":1,"q":"応仁の乱のころから織田信長の上洛（1568年）のころまでの，約100年におよぶ戦乱の時代を何とよぶか。","a":"戦国時代","t":"g"},{"n":2,"q":"1（＝戦国時代）の時代に，守護大名にかわってみずからの力で新たな領国支配を行うようになった勢力を何というか。","a":"戦国大名","t":"g"},{"n":3,"q":"2（＝戦国大名）の者の多くは，守護大名の家臣から身をおこした者だが，京都に在住した守護にかわって現地を支配した代官を何とよぶか。","a":"守護代","t":"g"},{"n":4,"q":"細川政元が10代将軍足利義材（のちの義稙）が出陣中に足利義澄を11代将軍に擁立して，将軍の廃位を行った政変を何というか。","a":"明応の政変","t":"g"},{"n":5,"q":"讃岐・阿波・河内・和泉などを領国とし，幕府の管領として勢威をふるった細川氏の家臣で，主家の衰退に乗じて幕政の実権を握った人物はだれか。","a":"三好長慶","t":"p"},{"n":6,"q":"主家の実権を奪い，さらに13代将軍足利義輝を襲って自害させ，東大寺大仏殿を焼打ちにし，のちに織田信長に討たれた人物はだれか。","a":"松永久秀","t":"p"},{"n":7,"q":"鎌倉公方足利成氏が関東管領上杉憲忠を謀殺したことを発端として起こった戦乱を何というか。","a":"享徳の乱","t":"g"},{"n":8,"q":"東国を支配する鎌倉公方は，応仁の乱直前に分裂して２つにわかれたが，それぞれどこに移ったか。","a":"古河・堀越","t":"l"},{"n":9,"q":"初代堀越公方はだれか。","a":"足利政知","t":"p"},{"n":10,"q":"初代古河公方はだれか。","a":"足利成氏","t":"p"},{"n":11,"q":"関東管領上杉氏は４家にわかれたが，15世紀後半以降勢力をふるい，しばしば衝突をくりかえした２家をあげよ。","a":"山内上杉氏・扇谷上杉氏","t":"g"},{"n":12,"q":"関東管領の分裂に乗じ，関東の大半を制圧した戦国大名家をあげよ。","a":"北条氏（後北条氏）","t":"g"},{"n":13,"q":"京都から駿河に下り，今川氏に寄食していたが，15世紀後半に頭角をあらわし，伊豆の堀越公方を倒して伊豆韮山に進出し，戦国大名に成長した人物はだれか。","a":"北条早雲（伊勢宗瑞）","t":"p"},{"n":14,"q":"13（＝北条早雲）の人物が根拠地とした城下町はどこか。","a":"小田原","t":"l"},{"n":15,"q":"13（＝北条早雲）の人物の孫で，北条氏の全盛期をつくり出した人物をあげよ。","a":"北条氏康","t":"g"},{"n":16,"q":"主家の姓と関東管領職を継ぎ，甲斐の勢力としばしば戦った戦国大名はだれか。","a":"上杉謙信（長尾景虎）","t":"p"},{"n":17,"q":"甲斐の守護から戦国大名に成長し，甲斐・信濃を中心に中部地方一帯の大領国を形成した人物はだれか。","a":"武田信玄（晴信）","t":"p"},{"n":18,"q":"16（＝上杉謙信）の人物と17（＝武田信玄）の人物が，５回にわたって信濃国で対陣した戦いをあげよ。","a":"川中島の戦い","t":"g"},{"n":19,"q":"もと油売りを業としたといわれ，美濃守護土岐氏の老臣の家をのっとり，土岐氏を追放して美濃を手に入れた戦国大名はだれか。","a":"斎藤道三","t":"p"},{"n":20,"q":"越前の守護斯波氏の家臣で，主家の内紛に乗じて越前一国を支配下におさめた戦国大名家をあげよ。","a":"朝倉氏","t":"g"},{"n":21,"q":"20（＝朝倉氏）の戦国大名の本拠地はどこか。","a":"一乗谷","t":"l"},{"n":22,"q":"尾張の守護斯波氏の守護代の一族から成長した戦国大名家をあげよ。","a":"織田氏","t":"g"},{"n":23,"q":"足利氏一門で，駿河守護から遠江・三河をも合わせて征服し，東海地方の戦国大名家となったものをあげよ。","a":"今川氏","t":"g"},{"n":24,"q":"中国地方７カ国の守護を兼ね，勘合貿易を独占し，応仁の乱後，没落した公家・僧侶を城下に迎えて，京都の文化を移植した戦国大名はだれか。","a":"大内義隆","t":"p"},{"n":25,"q":"24（＝大内義隆）の人物の重臣で周防の守護代をつとめ，1551（天文20）年に，24（＝大内義隆）の人物にそむいて自害に追い込み，大内氏の実権をにぎったのはだれか。","a":"陶晴賢","t":"p"},{"n":26,"q":"安芸の国人からおこり，25（＝陶晴賢）の人物を厳島に破り，周防・長門を領有し，さらに山陰の大名を滅ぼして，中国地方の戦国大名となったのはだれか。","a":"毛利元就","t":"p"},{"n":27,"q":"富田（月山）城に拠り，石見銀山をめぐり26（＝毛利元就）の人物と戦って滅ぼされた，山陰の大名家を何というか。","a":"尼子氏","t":"g"},{"n":28,"q":"土佐の豪族で，四国全土を制圧して戦国大名に成長した人物はだれか。","a":"長宗（曽）我部元親","t":"p"},{"n":29,"q":"薩摩を中心に九州南部を広く支配した戦国大名家をあげよ。","a":"島津氏","t":"g"},{"n":30,"q":"豊後を中心に九州北部に勢力を伸ばした戦国大名家をあげよ。","a":"大友氏","t":"g"},{"n":31,"q":"最多の条文数からなる分国法を制定した陸奥国の戦国大名家をあげよ。","a":"伊達氏","t":"g"},{"n":32,"q":"戦国大名が家臣に給付する土地を何というか。","a":"知行地","t":"g"},{"n":33,"q":"国人や地侍の収入額を銭に換算した表示を用い，戦国大名が家臣への軍役や領民への課役の基準として利用した制度を何というか。","a":"貫高制","t":"g"},{"n":34,"q":"主家に対して負う軍事的負担を何というか。","a":"軍役","t":"g"},{"n":35,"q":"戦国大名が領内の国人や地侍などを家臣団に編入する時，有力家臣を親とし，他の武士をその子になぞらえて支配関係をつくりあげたが，この関係を何というか。","a":"寄親・寄子制","t":"g"}]},{"t":"
