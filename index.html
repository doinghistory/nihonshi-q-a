"t":"g"},{"n":12,"q":"11（＝検地帳・国絵図）の土地台帳の提出により，すべての大名の石高が確定され，各大名は石高に応じて豊臣秀吉に軍事的な奉仕を行う体制が確立した。この軍事負担を何というか。","a":"軍役","t":"g"},{"n":13,"q":"1588（天正16）年に，豊臣秀吉が，方広寺の大仏造営を口実に諸国の農民から武器を没収した法令を何というか。","a":"刀狩令","t":"g"},{"n":14,"q":"13（＝刀狩令）の法令は農民の一揆を防止する目的のほかに，もう１つ目的があったが何か，漢字４字で示せ。","a":"兵農分離","t":"g"},{"n":15,"q":"1591（天正19）年，豊臣秀吉は武士の百姓・町人化，百姓の移転・転業を禁じ，身分を固定するための法令を出したが，これを何というか。","a":"人掃令（身分統制令）","t":"g"},{"n":16,"q":"豊臣秀吉の姉の子で秀吉の養子となり，秀吉にかわり関白となったのはだれか。","a":"豊臣秀次","t":"p"}]},{"t":"秀吉の対外政策と朝鮮侵略","q":[{"n":1,"q":"豊臣秀吉は九州平定の帰路，博多で突然キリスト教の禁教政策を打ち出したが，この法令を何というか。","a":"バテレン（宣教師）追放令","t":"g"},{"n":2,"q":"1（＝バテレン追放令）の法令は西暦何年に発布されたか。","a":"1587年","t":"d"},{"n":3,"q":"1588（天正16）年，豊臣秀吉はイエズス会領となっていた地を没収して直轄地としたが，どこか。","a":"長崎","t":"l"},{"n":4,"q":"3（＝長崎）の地をイエズス会に寄進したキリシタン大名はだれか。","a":"大村純忠","t":"p"},{"n":5,"q":"1587（天正15）年，豊臣秀吉は大名らのキリスト教入信を許可制にしたが，この時キリスト教を捨てず領地を取り上げられた播磨国明石城主はだれか。","a":"高山右近","t":"p"},{"n":6,"q":"1596（慶長元）年，土佐に漂着したスペイン船の乗組員が，スペインが領土拡張に宣教師を利用していると証言する事件がおこった。この事件を何というか。","a":"サン＝フェリペ号事件","t":"g"},{"n":7,"q":"1596年，豊臣秀吉は6（＝サン＝フェリペ号事件）の事件を機に京畿地方のフランシスコ会の宣教師や信者を長崎で処刑した。これを何というか。","a":"26聖人殉教","t":"g"},{"n":8,"q":"豊臣秀吉は長崎・京都・堺などの商人に渡航許可証を与えて貿易を保護・奨励した。この許可証を何というか。","a":"朱印状","t":"g"},{"n":9,"q":"1588年に，豊臣秀吉が倭寇などの海賊行為を禁止し，海上支配を強化するために発した命令を何というか。","a":"海賊取締令","t":"g"},{"n":10,"q":"豊臣秀吉は東アジア諸地域に強圧的な書簡を送り，服属と入貢を求めたが，それはどこにあったポルトガル政庁か。","a":"ゴア","t":"l"},{"n":11,"q":"豊臣秀吉が強圧的な書簡を送り，服属と入貢を求めたのは，それはどこにあったスペイン政庁か。","a":"マニラ","t":"l"},{"n":12,"q":"豊臣秀吉は高山国に入貢を求めたが，高山国とはどこのことか。","a":"台湾","t":"l"},{"n":13,"q":"豊臣秀吉と朝鮮との仲介にあたった対馬の大名は何氏か。","a":"宗氏","t":"g"},{"n":14,"q":"豊臣秀吉が，朝鮮に対し入貢と明への出兵の先導を求めたが拒否され，15万余りの大軍を朝鮮に派兵した。この１度目の朝鮮出兵を何というか。","a":"文禄の役","t":"g"},{"n":15,"q":"14（＝文禄の役）の朝鮮出兵は西暦何年に始まったか。","a":"1592年","t":"d"},{"n":16,"q":"豊臣秀吉による朝鮮出兵の本陣とされ，城が築かれたのは肥前のどこか。","a":"名護屋","t":"l"},{"n":17,"q":"文禄の役の先鋒として，兵を率いて出兵したキリシタン大名はだれか。","a":"小西行長","t":"p"},{"n":18,"q":"文禄の役の先鋒として出兵した，豊臣秀吉の子飼いの武将はだれか。","a":"加藤清正","t":"p"},{"n":19,"q":"文禄の役の時，朝鮮側の水軍を率いて奮戦した朝鮮の武将はだれか。","a":"李舜臣","t":"p"},{"n":20,"q":"文禄の役後の日明交渉は，豊臣秀吉の意図と大きく異なったため秀吉は再出兵した。この２度目の朝鮮出兵を何というか。","a":"慶長の役","t":"g"},{"n":21,"q":"20（＝慶長の役）の朝鮮出兵は西暦何年に始まったか。","a":"1597年","t":"d"},{"n":22,"q":"朝鮮出兵の際，首にかえて戦功として日本に送られた耳や鼻を埋めたとされる京都方広寺近くにある埋納施設を何というか。","a":"耳塚（鼻塚）","t":"g"},{"n":23,"q":"豊臣秀吉の２度の朝鮮出兵は，朝鮮では何とよばれたか。","a":"壬辰・丁酉倭乱","t":"g"}]}]},{"t":"2　桃山文化","s":[{"t":"桃山文化","q":[{"n":1,"q":"織田信長・豊臣秀吉に代表される新興武将と豪商の財力を土台とした文化を何というか。","a":"桃山文化","t":"g"},{"n":2,"q":"1（＝桃山文化）の文化の特色を３つあげよ。","a":"①仏教色のうすい文化（現世的・人間的文化），②豪華・壮大な文化，③西欧文化の積極的受容","t":"g"}]},{"t":"桃山美術","q":[{"n":1,"q":"桃山文化を象徴する高層の楼閣や郭・櫓を持つ建築物は何か。","a":"城郭","t":"g"},{"n":2,"q":"1（＝城郭）の建築の中心をなす高層の楼閣を何というか。","a":"天守閣","t":"g"},{"n":3,"q":"城郭は，軍事的拠点として山上を利用したものから，桃山時代にどのような形式に変化していったか。城郭の変遷を時代順に３つあげよ。","a":"山城・平山城・平城","t":"g"},{"n":4,"q":"池田輝政が慶長年間に築城した平山城で，五層七重の大天守に３個の小天守をつなぐ連立式天守を持つ城郭をあげよ。","a":"姫路城","t":"g"},{"n":5,"q":"豊臣秀吉の晩年の邸宅を兼ねた平山城で，秀吉死後，徳川家康が居館としたが，のちに破壊された京都の城郭を何というか。","a":"伏見城","t":"g"},{"n":6,"q":"5（＝伏見城）の城郭の遺構を本殿とする，琵琶湖の竹生島にある神社を何というか。","a":"都久夫須麻神社","t":"g"},{"n":7,"q":"豊臣秀吉が京都に造営した城郭風の邸宅で，豊臣秀次に譲られ，秀次滅亡後に破壊された建築物を何というか。","a":"聚楽第","t":"g"},{"n":8,"q":"7（＝聚楽第）の建築物の遺構といわれているものを２つあげよ。","a":"西本願寺飛雲閣・大徳寺唐門","t":"g"},{"n":9,"q":"徳川家康が上洛の時の居館として造営した平城で，桃山風の二の丸御殿と庭園を持つ城郭をあげよ。","a":"二条城","t":"g"},{"n":10,"q":"桃山文化を代表する絵画は，城郭の内部をかざる襖や屏風に描かれたものだが，このような絵を何というか。","a":"障壁画（障屏画）","t":"g"},{"n":11,"q":"10（＝障壁画）の絵画に多く用いられた手法で，金地に群青や緑青などを厚く塗った金碧濃彩画を何というか。","a":"濃絵","t":"g"},{"n":12,"q":"10（＝障壁画）の絵画にすぐれ，江戸幕府の御用絵師となった画派をあげよ。","a":"狩野派","t":"g"},{"n":13,"q":"12（＝狩野派）の画派の発展の基盤を築いた人物で，安土城・大坂城などの障壁画を描いたのはだれか。","a":"狩野永徳","t":"p"},{"n":14,"q":"13（＝狩野永徳）の人物の代表作で，雌雄一対の獅子を描いた屏風絵を何というか。","a":"唐獅子図屏風","t":"g"},{"n":15,"q":"13（＝狩野永徳）の人物の門弟で，絵画に装飾性を強めた画風を築き，「松鷹図」「牡丹図」で有名な絵師はだれか。","a":"狩野山楽","t":"p"},{"n":16,"q":"水墨画と金碧濃彩画の両方ですぐれた作品を残した画家で，水墨画では「松林図屏風」，金碧濃彩画では「智積院襖絵」の作者と伝えられる人物はだれか。","a":"長谷川等伯","t":"p"},{"n":17,"q":"桃山文化の代表的画家で「山水図屏風」の作者はだれか。","a":"海北友松","t":"p"},{"n":18,"q":"桃山文化の庶民生活や風俗を題材とする絵画を総称して，何というか。","a":"風俗画","t":"g"},{"n":19,"q":"京都内外の名所や市民生活を描いた，狩野永徳の屏風絵を何というか。","a":"洛中洛外図屏風","t":"g"},{"n":20,"q":"諸種の職人の姿を描いた屏風絵で，狩野吉信の作品を何というか。","a":"職人尽図屏風","t":"g"},{"n":21,"q":"桜花の下で貴人と供の男女の遊楽を描く屏風絵で，桃山時代の風俗をよく示している狩野長信の作品を何というか。","a":"花下遊楽図屏風","t":"g"},{"n":22,"q":"桃山時代に盛んに行われるようになった，戸や障子の上部にある鴨居と天井との間の板の部分にほどこされた彫刻を何というか。","a":"欄間彫刻","t":"g"},{"n":23,"q":"朝鮮侵略の際に木製の活字印刷術が伝えられたが，この印刷術によって後陽成天皇の勅命を受けて出版された数種の書物を何というか。","a":"慶長勅版","t":"g"}]},{"t":"町衆の生活","q":[{"n":1,"q":"堺の豪商出身で草庵茶室を完成し，茶道を大成した人物をあげよ。","a":"千利休（千宗易）","t":"g"},{"n":2,"q":"1（＝千利休）の人物が完成した茶道を何というか。","a":"侘茶","t":"g"},{"n":3,"q":"1（＝千利休）の人物が造作したとされる，京都の臨済禅院にある草庵風茶室建築を何というか。","a":"妙喜庵待庵","t":"g"},{"n":4,"q":"1587（天正15）年に，豊臣秀吉が身分・貧富の差なく自由に参集を求めた大茶会（大茶湯）は，京都のどこで行われたか。","a":"北野神社","t":"l"},{"n":5,"q":"桃山時代にある女性が創始し，念仏踊りに簡単な所作を加え，江戸時代に民衆演劇の代表的なものに発展するもととなったのは何か。","a":"阿国歌舞伎（かぶき踊り）","t":"g"},{"n":6,"q":"5（＝阿国歌舞伎）の踊りを創始したとされる人物はだれか。","a":"出雲阿国","t":"p"},{"n":7,"q":"16世紀半ばに琉球から日本に伝来したころは蛇皮を張っていたが，のちに猫皮を利用した三絃ともよばれる楽器は何か。","a":"三味線","t":"g"},{"n":8,"q":"7（＝三味線）の楽器を伴奏楽器として，操り人形を動かす民衆演劇を何というか。","a":"人形浄瑠璃","t":"g"},{"n":9,"q":"堺の商人高三隆達が節付けしたという小歌を何というか。","a":"隆達節","t":"g"},{"n":10,"q":"桃山時代に男女の間に一般化した，袖が筒状の衣服を何というか。","a":"小袖","t":"g"},{"n":11,"q":"近世以降，男性が10（＝小袖）の衣類の上に身につけた，略礼服の上下をそれぞれ何というか。","a":"肩衣・袴","t":"g"}]},{"t":"南蛮文化","q":[{"n":1,"q":"桃山時代に，日本人の手によって南蛮人との交易や風俗を主題とする屏風絵が描かれたが，これらの作品を何というか。","a":"南蛮屏風","t":"g"},{"n":2,"q":"金属製の活字による活字印刷術を伝えた，イエズス会の宣教師はだれか。","a":"ヴァリニャーニ","t":"p"},{"n":3,"q":"活字印刷術によって，宗教書の翻訳や辞典・日本古典などが印刷・刊行されたが，これらの書物を何というか。","a":"キリシタン版（天草版）","t":"g"},{"n":4,"q":"3（＝キリシタン版）の書物のなかで，日本古典を全文ポルトガル系ローマ字で記述した代表的な例をあげよ。","a":"天草版平家物語","t":"g"},{"n":5,"q":"3（＝キリシタン版）の書物のなかで，ヨーロッパの物語をローマ字で記述して刊行した代表的な例をあげよ。","a":"天草版伊曽保物語","t":"g"},{"n":6,"q":"3（＝キリシタン版）の書物の１つで，長崎で刊行されたイエズス会宣教師編纂による，日本語をローマ字で収録してポルトガル語で説明した辞書を何というか。","a":"日葡辞書","t":"g"}]}]},{"t":"3　幕藩体制の成立","s":[{"t":"江戸幕府の成立","q":[{"n":1,"q":"三河の小大名出身で，小田原の北条氏の滅亡後，豊臣秀吉が東国の支配をまかせた人物はだれか。","a":"徳川家康","t":"p"},{"n":2,"q":"1（＝徳川家康）の人物は東国支配のため，北条氏の支城を根拠地としたが，その城の所在地はどこか。","a":"江戸","t":"l"},{"n":3,"q":"1（＝徳川家康）の人物が覇権を確立した天下分け目の戦いは，西暦何年の何という戦いか。","a":"1600年・関ヶ原の戦い","t":"d"},{"n":4,"q":"3（＝1600年・関ヶ原の戦い）の戦いで西軍の中心になった豊臣政権の五奉行の一人で，内政面に練達した人物はだれか。","a":"石田三成","t":"p"},{"n":5,"q":"五大老のうち，4（＝石田三成）の人物に推されて関ヶ原の戦いで西軍の盟主になったのはだれか。","a":"毛利輝元","t":"p"},{"n":6,"q":"関ヶ原の戦いは西軍の敗北に終わったが，西軍の武将のうち，朝鮮出兵で活躍し，キリシタン大名としても有名なのはだれか。","a":"小西行長","t":"p"},{"n":7,"q":"豊臣秀吉の武将の一人で，朝鮮出兵で活躍し，関ヶ原の戦いでは東軍に属した肥後を領国とする築城の名手はだれか。","a":"加藤清正","t":"p"},{"n":8,"q":"豊臣秀吉の武将の一人で，関ヶ原の戦いでは東軍に属し，広島城主となったが，のちに居城を無断で修築したことを江戸幕府にとがめられ，領地を没収されたのはだれか。","a":"福島正則","t":"p"},{"n":9,"q":"江戸幕府の大名に対する処分で，領地を没収しその家を断絶させることを何というか。","a":"改易","t":"g"},{"n":10,"q":"江戸幕府の大名に対する処分で，領地を削減することを何というか。","a":"減封","t":"g"},{"n":11,"q":"江戸幕府の大名に対する処分で，領地の変更を何というか。","a":"転封（国替）","t":"g"},{"n":12,"q":"関ヶ原の戦いに勝利した徳川家康は，征夷大将軍に任じられ幕府を創設したが，この幕府を何というか。","a":"江戸幕府","t":"g"},{"n":13,"q":"12（＝江戸幕府）の政権が開かれたのは西暦何年か。","a":"1603年","t":"d"},{"n":14,"q":"徳川家康は諸大名に，一村ごとの石高を郡単位に記載しこれを一国単位にまとめた帳簿の作成を命じたが，この帳簿を何というか。","a":"郷帳","t":"g"},{"n":15,"q":"征夷大将軍の職は，1605（慶長10）年に徳川家康の３男に譲られ，家康の子孫が継承することが世に示された。この３男とはだれか。","a":"徳川秀忠","t":"p"},{"n":16,"q":"征夷大将軍を辞した徳川家康は駿府に移ったが，前将軍として実権は握りつづけた。前将軍に対する尊称は何か。","a":"大御所","t":"g"},{"n":17,"q":"豊臣氏は，1614（慶長19）年・1615（元和元）年の２度の戦いで滅びたが，この戦いを何というか。","a":"大坂の役（大坂冬の陣・夏の陣）","t":"g"},{"n":18,"q":"17（＝大坂の役）の戦いで滅ぼされた豊臣秀吉の子はだれか。","a":"豊臣秀頼","t":"p"},{"n":19,"q":"17（＝大坂の役）の戦いの発端となった「国家安康，君臣豊楽」の銘がある鐘は，何という寺のものか。","a":"方広寺","t":"g"}]},{"t":"幕藩体制","q":[{"n":1,"q":"大坂の役の直後に，幕府は諸大名に対し，居城以外の城は破却するように命じたが，この法令を何というか。","a":"一国一城令","t":"g"},{"n":2,"q":"大坂の役の後，徳川家康は諸大名を伏見城に集め，将軍徳川秀忠の名で大名の守るべき基本法を公表した。これを何というか。","a":"武家諸法度（元和令）","t":"g"},{"n":3,"q":"2（＝武家諸法度）の法令を起草したのは，徳川家康に仕えた南禅寺の僧で「黒衣の宰相」とよばれた人物であるが，だれか。","a":"金地院崇伝（以心崇伝）","t":"p"},{"n":4,"q":"江戸時代には，将軍と主従関係を結んだ石高１万石以上の支配地を与えられた武家が270家前後あったが，これを何というか。","a":"大名","t":"g"},{"n":5,"q":"江戸時代の大名のうち，徳川氏の一門を何とよんだか。","a":"親藩","t":"g"},{"n":6,"q":"関ヶ原の戦い以前から徳川氏に臣従していた大名を何というか。","a":"譜代","t":"g"},{"n":7,"q":"関ヶ原の戦いに前後して徳川家に臣従した大名を何というか。","a":"外様","t":"g"},{"n":8,"q":"徳川氏一門のなかでも家康の子どもの家系には最高の格式が与えられ，将軍を出すことができる家柄と定められていたが，それを何というか。","a":"三家","t":"g"},{"n":9,"q":"8（＝三家）の家柄の家名（藩名）をあげよ。","a":"尾張・紀伊・水戸","t":"g"},{"n":10,"q":"江戸幕府３代将軍で，幕府の支配体制を確立した人物はだれか。","a":"徳川家光","t":"p"},{"n":11,"q":"江戸幕府は諸大名や旗本に，石高に応じて人馬や武器類の保有を義務づけ，戦時にはこれらの兵馬をひきつれて参加させた。これを何というか。","a":"軍役","t":"g"},{"n":12,"q":"江戸幕府は必要に応じ，諸大名に城郭の普請や修理・河川工事などを課したが，これを何というか。","a":"お手伝（お手伝普請）","t":"g"},{"n":13,"q":"３代将軍徳川家光の時に発布された大名統制の基本法は何か。","a":"武家諸法度（寛永令）","t":"g"},{"n":14,"q":"13（＝武家諸法度）の法は西暦何年に出されたか。","a":"1635年","t":"d"},{"n":15,"q":"13（＝武家諸法度）の法によって，大名統制のために明文化された制度を何というか。","a":"参勤交代","t":"g"},{"n":16,"q":"13（＝武家諸法度）の法によって大名は何石以上の船の建造が禁止されたか。","a":"500石","t":"g"},{"n":17,"q":"強力な領主権を持つ将軍（幕府）と大名（藩）が，土地と人民を統治する支配体制を何というか。","a":"幕藩体制","t":"g"}]},{"t":"幕府と藩の機構","q":[{"n":1,"q":"江戸幕府の直轄地を何というか。","a":"幕領（天領）","t":"g"},{"n":2,"q":"1（＝幕領）の領地は全国におよんだが，何万石ぐらいあったか。","a":"400万石","t":"g"},{"n":3,"q":"徳川将軍直属の家臣を総称して何というか。","a":"直参","t":"g"},{"n":4,"q":"3（＝直参）の家臣は石高１万石未満のものであったが，このうち領地を与えられてその支配を許された上級の家臣を何というか。","a":"旗本","t":"g"},{"n":5,"q":"4（＝旗本）の家臣が支配を許された領地を何というか。","a":"旗本知行地","t":"g"},{"n":6,"q":"旗本の領地は全部で何万石ぐらいあったか。","a":"300万石","t":"g"},{"n":7,"q":"直参のうち，給与である蔵米を支給されていた下級家臣を何というか。","a":"御家人","t":"g"},{"n":8,"q":"旗本と御家人とでは，将軍に謁見を許されるかどうかという決定的な違いがあった。将軍に謁見することを何というか。","a":"お目見え","t":"g"},{"n":9,"q":"江戸幕府草創期の政治組織は，家老・年寄など三河時代の方式によったため，「庄屋仕立て」などといわれたが，整備されたものになるのは何代目将軍のだれの時か。","a":"3代将軍徳川家光","t":"p"},{"n":10,"q":"江戸幕府の職制のうち，政務を統轄していた常置の最高職を何というか。","a":"老中","t":"g"},{"n":11,"q":"幕府の非常時に，10（＝老中）の職の上位におかれた幕府の最高職を何というか。","a":"大老","t":"g"},{"n":12,"q":"老中を補佐し，旗本・御家人の監督を行う職を何というか。","a":"若年寄","t":"g"},{"n":13,"q":"老中の下にあり，特に大名の監察にあたる職を何というか。","a":"大目付","t":"g"},{"n":14,"q":"若年寄の下にあり，旗本・御家人の監察にあたる職を何というか。","a":"目付","t":"g"},{"n":15,"q":"江戸幕府の職制のなかで，三奉行と総称された役職をすべてあげよ。","a":"寺社奉行・勘定奉行・町奉行","t":"g"},{"n":16,"q":"三奉行のうち，将軍直属で譜代大名より選任され，最高の格式を持ち，寺社・寺社領の管理や宗教統制，関八州以外の私領の訴状受理などを担当したのは何か。","a":"寺社奉行","t":"g"},{"n":17,"q":"三奉行のうち，旗本から選任され，幕領の租税徴収や，関八州の公私領や全国の幕領の訴訟を担当したのは何か。","a":"勘定奉行","t":"g"},{"n":18,"q":"三奉行のうち，旗本から選任され，江戸市中の行政・司法・警察を担当し，南北両奉行からなっていたのは何か。","a":"町奉行","t":"g"},{"n":19,"q":"江戸幕府の職制の特色は，各役職が複数で構成され，月ごとに勤務を交代した点にあるが，これを何というか。","a":"月番交代","t":"g"},{"n":20,"q":"三奉行が専決できない重大事や管轄のまたがる訴訟などは，三奉行に老中などを加えて最高司法機関を構成して処理したが，この機関を何とよんだか。","a":"評定所","t":"g"},{"n":21,"q":"江戸幕府の職制のうち，朝廷の監察や連絡，西国大名の監視などにあたった要職を何というか。","a":"京都所司代","t":"g"},{"n":22,"q":"江戸幕府の支配する城を，将軍にかわって守衛し政務をつかさどった職名を何というか。","a":"城代","t":"g"},{"n":23,"q":"22（＝城代）のうち，西国諸大名の監視も行った職は何か。","a":"大坂城代","t":"g"},{"n":24,"q":"江戸幕府は重要直轄地に奉行を設置したが，この奉行を総称して何というか。","a":"遠国奉行","t":"g"},{"n":25,"q":"東照宮が造営された江戸幕府の直轄地の警衛のためにおかれた遠国奉行を何というか。","a":"日光奉行","t":"g"},{"n":26,"q":"江戸幕府直轄の金山の管理と民政のためにおかれた遠国奉行は何か。","a":"佐渡奉行","t":"g"},{"n":27,"q":"オランダや清との貿易やその町の民政を管轄する遠国奉行を何というか。","a":"長崎奉行","t":"g"},{"n":28,"q":"江戸時代に，江戸以外で町奉行が設置された直轄都市を３つあげよ。","a":"京都・大坂・駿府","t":"g"},{"n":29,"q":"町奉行をはじめ幕府の主な職に配属されて，上役を助ける実務の職を何というか。２つあげよ。","a":"与力・同心","t":"g"},{"n":30,"q":"奉行支配地以外の直轄地の民政は，勘定奉行の支配下の職がそれにあたった。そのうちでおよそ10万石以上の地を担当した職を何というか。","a":"郡代","t":"g"},{"n":31,"q":"10万石に達しない幕領の支配を担当した職を何というか。","a":"代官","t":"g"},{"n":32,"q":"江戸時代の大名の領地・領民・統治機構などを総称して，何というか。","a":"藩","t":"g"},{"n":33,"q":"大名の重臣で，大名領の政治を総轄した職を一般的に何というか。","a":"家老","t":"g"},{"n":34,"q":"大名領でも，幕領と同様に，地方民政を担当した職があったが，これを一般的に何というか。","a":"郡奉行","t":"g"},{"n":35,"q":"各藩において，大名が家臣に禄高にあたる一定の領地を与え，その領民支配を認める制度を何というか。","a":"地方知行制","t":"g"},{"n":36,"q":"大名が家臣に蔵米を支給する制度を何というか。","a":"俸禄制度","t":"g"}]},{"t":"天皇と朝廷","q":[{"n":1,"q":"1613（慶長18）年に出された公家衆法度で陰陽道を家業とされたのは何家か。","a":"土御門家","t":"g"},{"n":2,"q":"朝廷や公家の統制のために江戸幕府が制定した法令で，「天子諸芸能の事，第一御学問也」で始まるのは何か。また，これは西暦何年に定められたか。","a":"禁中並公家諸法度・1615年","t":"d"},{"n":3,"q":"江戸幕府が朝廷統制の主導権を与えた関白・三公を何と総称するか。","a":"摂家","t":"g"},{"n":4,"q":"公家から２人選ばれ，朝廷に幕府側の指示を与えた役職を何というか。","a":"武家伝奏","t":"g"},{"n":5,"q":"江戸幕府は天皇の領地を必要最低限にとどめ，徳川家康が整理して約１万石，のち秀忠が１万石，綱吉が１万石を献じて計約３万石とした。この天皇領を何というか。","a":"禁裏御料","t":"g"},{"n":6,"q":"1627（寛永４）年に，朝廷と寺社の関係に幕府が介入し，天皇の勅許を無効としたため，これに抗議した僧侶が処罰されたり，天皇が突然譲位したりする事件がおこった。これを何というか。","a":"紫衣事件","t":"g"},{"n":7,"q":"6（＝紫衣事件）の事件の時，譲位した天皇はだれか。","a":"後水尾天皇","t":"p"},{"n":8,"q":"6（＝紫衣事件）の事件後に皇位についたのは，２代将軍徳川秀忠の娘和子との間に生まれた娘であったが，何天皇か。","a":"明正天皇","t":"g"},{"n":9,"q":"8（＝明正天皇）の天皇は奈良時代以来，859年ぶりの女性天皇であったが，その後の女性天皇で，桃園天皇急死後の1762（宝暦12）〜70（明和７）年に在位したのは何天皇か。","a":"後桜町天皇","t":"g"},{"n":10,"q":"紫衣事件の時，幕府に抗議し，出羽に配流された大徳寺の僧侶はだれか。","a":"沢庵（宗彭）","t":"p"}]},{"t":"禁教と寺社","q":[{"n":1,"q":"江戸幕府が直轄領に禁教令を出したのは西暦何年か。","a":"1612年","t":"d"},{"n":2,"q":"1614（慶長19）年に，マニラに追放されたキリシタン大名をあげよ。","a":"高山右近","t":"g"},{"n":3,"q":"1622（元和８）年に，長崎でキリスト教宣教師・信徒ら55名が処刑された事件を何というか。","a":"元和の大殉教","t":"g"},{"n":4,"q":"江戸時代に禁教にもかかわらず表面的には棄教を装い，密かに信仰を持続したキリシタンを何というか。","a":"隠れ（潜伏）キリシタン","t":"g"},{"n":5,"q":"九州のキリシタン農民らが領主（松倉氏や寺沢氏）の圧政に反抗して一揆をおこしたが，これを何というか。","a":"島原の乱","t":"g"},{"n":6,"q":"5（＝島原の乱）の一揆は西暦何年におこったか。","a":"1637年","t":"d"},{"n":7,"q":"5（＝島原の乱）の一揆の際に寺沢氏が領主をつとめていた領地を何というか。","a":"天草","t":"g"},{"n":8,"q":"5（＝島原の乱）の一揆の首領とされた少年はだれか。","a":"益田（天草四郎）時貞","t":"p"},{"n":9,"q":"5（＝島原の乱）の一揆勢が，籠城したのはどこか。","a":"原城跡","t":"l"},{"n":10,"q":"5（＝島原の乱）の一揆を鎮圧した功績で川越藩主となった老中はだれか。","a":"松平信綱","t":"p"},{"n":11,"q":"江戸幕府はキリシタン摘発のため，キリスト像やマリア像を踏ませた。これを何というか。","a":"絵踏","t":"g"},{"n":12,"q":"江戸幕府は一般民衆を必ずどこかの寺院に所属させ，キリシタンでないことを証明させたが，この制度を何というか。","a":"寺請制度","t":"l"},{"n":13,"q":"12（＝寺請制度）の制度で，寺院に所属した人々を何というか。","a":"檀徒（檀家・檀那）","t":"g"},{"n":14,"q":"12（＝寺請制度）の制度にもとづいて，寺院が結婚・奉公・旅行などの際に発行する身分証明書を何というか。","a":"寺請証文（宗旨手形・寺請証明）","t":"g"},{"n":15,"q":"江戸幕府が禁教の目的で行った民衆の信仰調査を何というか。","a":"宗門改め","t":"g"},{"n":16,"q":"15（＝宗門改め）の調査の結果，作成された帳簿を何というか。","a":"宗門改帳（宗旨人別帳・宗門人別帳）","t":"g"},{"n":17,"q":"法華を信じない者の施しを受けず，また施さずとする仏教の日蓮宗の宗派も，キリスト教とともに弾圧されたが，この派を何というか。","a":"不受不施派","t":"g"},{"n":18,"q":"江戸幕府が出した寺院法度では，宗派ごとに中心寺院の地位を保障してその統制下の寺院を組織させた。この制度を何というか。","a":"本末制度（本山・末寺の制）","t":"g"},{"n":19,"q":"江戸幕府が1665年に出した，宗派をこえて仏教寺院の僧侶全体を共通に統制するために制定した法令を何というか。","a":"諸宗寺院法度","t":"g"},{"n":20,"q":"江戸幕府が1665年に出した，神社・神職に対する統制のために制定した法令を何というか。","a":"諸社禰宜神主法度","t":"g"},{"n":21,"q":"江戸時代の神職に関する多くの免状発行権を認められ，白川家とともに神職の統制に貢献したのは何家か。","a":"吉田家","t":"g"},{"n":22,"q":"17世紀半ばに，来日した明の僧侶によって伝えられた禅宗の一派を何というか。","a":"黄檗宗","t":"g"},{"n":23,"q":"22（＝黄檗宗）の禅宗を伝えた明の僧侶とはだれか。","a":"隠元（隆琦）","t":"p"},{"n":24,"q":"23（＝隠元）の人物によって山城の宇治に建立された中国風の寺院を何というか。","a":"万福寺","t":"g"}]},{"t":"江戸時代初期の外交","q":[{"n":1,"q":"1600（慶長５）年に，豊後臼杵湾に漂着したヨーロッパの船名をあげよ。","a":"リーフデ号","t":"g"},{"n":2,"q":"1（＝リーフデ号）の船はどこの国の船か。","a":"オランダ","t":"l"},{"n":3,"q":"イギリスやオランダなどが17世紀初めに設立した，貿易・統治の権限を持った東洋経営のための特許会社を何というか。","a":"東インド会社","t":"g"},{"n":4,"q":"リーフデ号の乗組員のなかで，徳川家康の外交・貿易顧問となったイギリス人はだれか。","a":"ウィリアム＝アダムズ","t":"p"},{"n":5,"q":"4（＝ウィリアム＝アダムズ）の人物の日本名を何というか。","a":"三浦按針","t":"g"},{"n":6,"q":"リーフデ号の航海士で徳川家康の信任を受け，江戸に屋敷を与えられ，朱印船貿易に従事したオランダ人はだれか。","a":"ヤン＝ヨーステン","t":"p"},{"n":7,"q":"6（＝ヤン＝ヨーステン）の人物の日本名を何というか。","a":"耶揚子","t":"g"},{"n":8,"q":"江戸時代初期，オランダ人やイギリス人は何とよばれたか。","a":"紅毛人","t":"g"},{"n":9,"q":"江戸時代初期，イギリスやオランダは，日本との貿易のための商館をどこに開設したか。","a":"平戸","t":"l"},{"n":10,"q":"1610（慶長15）年に，徳川家康はスペインの植民地であった現在のメキシコに使節を派遣して通商を求めたが，使節として派遣された京都の商人はだれか。","a":"田中勝介（勝助）","t":"p"},{"n":11,"q":"江戸時代初期，スペイン領であったメキシコを何とよんだか。","a":"ノビスパン","t":"g"},{"n":12,"q":"1613（慶長18）年に，宣教師ルイス＝ソテロのすすめで，ヨーロッパへ派遣された使節を何というか。","a":"慶長遣欧使節","t":"g"},{"n":13,"q":"12（＝慶長遣欧使節）の使節を派遣した仙台藩主はだれか。","a":"伊達政宗","t":"p"},{"n":14,"q":"12（＝慶長遣欧使節）の使節として派遣されたのはだれか。","a":"支倉常長","t":"p"},{"n":15,"q":"江戸時代初期に，対日貿易で巨利を得ていたポルトガル商人の日本への最大の輸出品は何か。","a":"中国産の生糸（白糸）","t":"g"},{"n":16,"q":"1604（慶長９）年に，ポルトガル商人の利益独占を排除するため，江戸幕府が定めた特定商人に15（＝中国産の生糸）の輸入品を一括購入させる制度を何というか。","a":"糸割符制度","t":"g"},{"n":17,"q":"16（＝糸割符制度）の制度で，輸入の特権が与えられた特定商人の構成員を何というか。","a":"糸割符仲間","t":"g"},{"n":18,"q":"17（＝糸割符仲間）の構成員は，はじめ３カ所の都市の商人にだけ認められたが，どこの都市の商人か。","a":"堺・長崎・京都","t":"l"},{"n":19,"q":"17（＝糸割符仲間）の構成員は，のちに江戸・大坂の商人が加えられたが，これらの特定商人たちを総称して何とよんだか。","a":"五カ所商人","t":"g"},{"n":20,"q":"江戸時代初期，海外貿易を盛んにするために幕府が発行した渡航許可証を何というか。","a":"朱印状","t":"g"},{"n":21,"q":"20（＝朱印状）の許可証を所有し，海外に渡航した船を何というか。","a":"朱印船","t":"g"},{"n":22,"q":"21（＝朱印船）の船の渡航地のうち，スペインがアジア貿易の拠点とした地域はどこか。","a":"ルソン","t":"l"},{"n":23,"q":"朱印船貿易の時代，タイは何とよばれていたか。","a":"シャム","t":"g"},{"n":24,"q":"朱印船貿易の時代，ベトナム北部の地は何とよばれていたか。","a":"アンナン","t":"g"},{"n":25,"q":"朱印船貿易の時代，ベトナムの地に隣接し，メコン川の下流域に位置した国はどこか。","a":"カンボジア","t":"l"},{"n":26,"q":"朱印船貿易で活躍した，長崎と摂津平野（大坂）の豪商をそれぞれあげよ。","a":"末次平蔵・末吉孫左衛門","t":"g"},{"n":27,"q":"朱印船貿易で活躍した，京都の豪商を２人あげよ。","a":"角倉了以・茶屋四郎次郎","t":"g"},{"n":28,"q":"日本人の海外貿易の活発化にともない，海外に日本移民の集団居住地が形成されたが，これを何というか。","a":"日本町","t":"g"},{"n":29,"q":"日本人居住地があったシャムの首都を何というか。","a":"アユタヤ","t":"g"},{"n":30,"q":"29（＝アユタヤ）の日本人居住地の長で，シャム王室に重く用いられ，リゴール（六昆）太守にもなった人物はだれか。","a":"山田長政","t":"p"},{"n":31,"q":"明の海禁政策により，日明両国の商人が主に東南アジアに出向いて行った貿易の形態を何というか。","a":"出会貿易","t":"g"}]},{"t":"鎖国政策","q":[{"n":1,"q":"1616（元和２）年に，幕府は貿易統制のためヨーロッパ船の来航地を限定したが，その２港をあげよ。","a":"長崎・平戸","t":"g"},{"n":2,"q":"1624（寛永元）年に幕府が来航を禁じたのは，どこの国の船か。","a":"スペイン","t":"l"},{"n":3,"q":"1623（元和９）年にオランダとの貿易競争に敗れ，平戸の商館を閉鎖して引きあげたのはどこの国か。","a":"イギリス","t":"l"},{"n":4,"q":"いわゆる鎖国令の最初として，日本人の海外渡航は朱印状のほかに別の許可状を持つ船以外は禁止になった。その許可状と，それを持つ船のことを何というか。","a":"老中奉書・奉書船","t":"g"},{"n":5,"q":"4（＝老中奉書・奉書船）の船以外の海外渡航禁止は西暦何年のことか。","a":"1633年","t":"d"},{"n":6,"q":"日本人の海外渡航と帰国を全面的に禁止した鎖国令は西暦何年に出されたか。","a":"1635年","t":"d"},{"n":7,"q":"鎖国を実質的に完成させた法令は，「かれうた」の来航を禁止したものだが，「かれうた」とはどこの国の船のことか。","a":"ポルトガル","t":"l"},{"n":8,"q":"7（＝ポルトガル）の船の来航を禁じた法令は西暦何年に出されたか。","a":"1639年","t":"d"},{"n":9,"q":"1641（寛永18）年に，オランダ商館が，平戸から長崎港内につくられた扇形の埋立地に移され，鎖国体制が完成した。この埋立地を何というか。","a":"出島","t":"g"},{"n":10,"q":"オランダ商館の医師として日本に滞在したドイツ人医師・博物学者で，帰国後に『日本誌』を著した人物はだれか。","a":"ケンペル","t":"p"},{"n":11,"q":"鎖国という言葉は，10（＝ケンペル）の人物が記した『日本誌』を翻訳する過程で，ある通詞がはじめて用いたとされている。このオランダ通詞はだれか。","a":"志筑忠雄","t":"p"}]},{"t":"長崎貿易","q":[{"n":1,"q":"鎖国体制の完成によって，日本との長崎貿易を許された国を２つあげよ。","a":"オランダ・清","t":"g"},{"n":2,"q":"鎖国の間，幕府がオランダ船入港のたびに提出させた海外事情の報告書を何というか。","a":"オランダ風説書","t":"g"},{"n":3,"q":"2（＝オランダ風説書）の報告書を作成・提出したのはだれか。","a":"オランダ商館長（カピタン・甲比丹）","t":"p"},{"n":4,"q":"長崎郊外に設置した清国人の居住地を何というか。","a":"唐人屋敷","t":"g"}]},{"t":"朝鮮と琉球・蝦夷地","q":[{"n":1,"q":"豊臣秀吉の出兵で絶えた朝鮮との国交が回復し，江戸に派遣されるようになった修好使節を何というか。","a":"（朝鮮）通信使","t":"g"},{"n":2,"q":"朝鮮との貿易は，1609（慶長14）年に，対馬の宗氏と朝鮮との間に通商条約が結ばれて始まった。この条約を何というか。","a":"己酉約条（慶長条約）","t":"g"},{"n":3,"q":"16世紀前半まで中継貿易で発展した琉球王国は，後期倭寇やポルトガル船の進出により急速に衰退した。1609年に，この琉球王国を武力で征服した藩はどこか。また当時の藩主はだれか。","a":"薩摩藩・島津家久","t":"p"},{"n":4,"q":"琉球王国は，国王の代がわりごとに就任を感謝する使節を江戸幕府に派遣したが，これを何というか。","a":"謝恩使","t":"g"},{"n":5,"q":"琉球王国は，江戸幕府の将軍の代がわりごとにそれを奉祝する使節を幕府に派遣したが，これを何というか。","a":"慶賀使","t":"g"},{"n":6,"q":"蝦夷ヶ島の和人居住地に勢力を持っていた蠣崎氏は，近世になって何と改称したか。","a":"松前氏","t":"g"},{"n":7,"q":"松前藩の支配地以外の広大な地域に居住するアイヌとの交易対象地を何というか。","a":"商場（場所）","t":"g"},{"n":8,"q":"蝦夷地の松前氏は，交易対象地での交易権を家臣に与えることで主従関係を維持したが，この制度を何というか。","a":"商場知行制","t":"g"},{"n":9,"q":"1669（寛文９）年に，アイヌの首長が松前藩と戦闘におよんだが，この戦いを何というか。","a":"シャクシャインの戦い","t":"g"},{"n":10,"q":"18世紀前半までには，多くのアイヌとの交易対象地は和人商人の請負となったが，この制度を何というか。","a":"場所請負制度","t":"g"}]},{"t":"寛永期の文化","q":[{"n":1,"q":"南宋の朱熹が大成し，鎌倉時代にわが国に伝来し，五山の禅僧の間で発展した儒学を何というか。","a":"朱子学","t":"g"},{"n":2,"q":"もと五山の相国寺の僧で，徳川家康に儒学を進講し，弟子を推薦したのはだれか。","a":"藤原惺窩","t":"p"},{"n":3,"q":"2（＝藤原惺窩）の人物を祖とする朱子学の学派名をあげよ。","a":"京学","t":"g"},{"n":4,"q":"2（＝藤原惺窩）の人物の弟子で徳川家康に仕え，さらに４代将軍徳川家綱の代まで将軍の侍講となり，また幕政にも参与した儒者はだれか。","a":"林羅山（道春）","t":"p"},{"n":5,"q":"３代将軍徳川家光が幕府の財力を投じて建立した，祖父家康をまつる華麗な霊廟を何というか。","a":"日光東照宮","t":"g"},{"n":6,"q":"5（＝日光東照宮）の建物は，本殿と拝殿とを相の間で結ぶという建築様式をとった代表的なものである。この様式を何というか。","a":"権現造","t":"g"},{"n":7,"q":"後陽成天皇の弟が京都桂川のほとりに造営した，書院建築群と庭園で有名な別邸を何というか。","a":"桂離宮","t":"g"},{"n":8,"q":"7（＝桂離宮）の別邸を造営した後陽成天皇の弟の名をあげよ。","a":"八条宮智仁親王","t":"g"},{"n":9,"q":"7（＝桂離宮）の建物の茶室風の建築様式を何というか。","a":"数寄屋造","t":"g"},{"n":10,"q":"後水尾天皇の山荘で，比叡山を背景に自然の傾斜面を利用した，雄大な庭園を持つ離宮を何というか。","a":"修学院離宮","t":"g"},{"n":11,"q":"江戸時代初期の幕府の御用絵師で，狩野派繁栄の基礎を築いた人物はだれか。","a":"狩野探幽","t":"p"},{"n":12,"q":"11（＝狩野探幽）の人物の代表作の方丈襖絵の残る寺院はどこか。","a":"大徳寺","t":"l"},{"n":13,"q":"11（＝狩野探幽）の人物の門人で，庶民的な画題の作品を描いた絵師はだれか。","a":"久隅守景","t":"p"},{"n":14,"q":"13（＝久隅守景）の人物の代表作をあげよ。","a":"夕顔棚納涼図屏風","t":"g"},{"n":15,"q":"江戸時代初期の京都の絵師で，土佐派の画法をもとに，新しい絵の様式を生み出した人物をあげよ。","a":"俵屋宗達","t":"g"},{"n":16,"q":"15（＝俵屋宗達）の人物の代表作で，ユーモラスな２神を描いた屏風絵を何というか。","a":"風神雷神図屏風","t":"g"},{"n":17,"q":"15（＝俵屋宗達）の人物が生み出した新しい様式の絵を何というか。","a":"装飾画","t":"g"},{"n":18,"q":"徳川家家臣の井伊家が所蔵していた，当世風の風俗や生活を描いた屏風を何というか。","a":"彦根屏風","t":"g"},{"n":19,"q":"古典に通じ，蒔絵・陶芸・書道の諸分野で活躍した江戸時代初期を代表する芸術家はだれか。","a":"本阿弥光悦","t":"p"},{"n":20,"q":"19（＝本阿弥光悦）の人物の蒔絵の代表作を何というか。","a":"舟橋蒔絵硯箱","t":"g"},{"n":21,"q":"肥前鍋島藩で始まった，釉をかけて高温で焼き，その上に模様や絵を描き，低温で焼く上絵付の技法を完成してその名を高めた磁器を何というか。","a":"有田焼","t":"g"},{"n":22,"q":"21（＝有田焼）の磁器の上絵付の技法を完成させた人物をあげよ。","a":"酒井田柿右衛門","t":"g"},{"n":23,"q":"22（＝酒井田柿右衛門）の人物が生み出した技法を何というか。","a":"赤絵","t":"g"},{"n":24,"q":"朝鮮人陶工の沈寿官らが始めたのは何焼か。","a":"薩摩焼","t":"g"},{"n":25,"q":"京都の楽家初代長次郎が豊臣秀吉の命で，京都の聚楽第で低温で焼いた軟質の陶器を何というか。","a":"楽焼","t":"g"},{"n":26,"q":"毛利氏のもとで始まった焼物を何というか。","a":"萩焼","t":"g"},{"n":27,"q":"肥前国で，平戸焼とともに朝鮮の陶工の手によって始められた陶器を何というか。","a":"唐津焼","t":"g"},{"n":28,"q":"室町時代末期に，宗鑑らによって俳諧連歌が展開されたが，しだいに五・七・五のみが独立して一句を形成するようになった。これを何というか。","a":"俳諧","t":"g"},{"n":29,"q":"俳諧の作成を推進したのは江戸時代初期の貞門派であったが，貞門派の祖といわれるのはだれか。","a":"（松永）貞徳","t":"p"},{"n":30,"q":"江戸時代初期に，婦人・子ども向きに絵が描かれ，平易に仮名文で書かれた短編小説を何というか。","a":"仮名草子","t":"g"}]}]},{"t":"4　幕藩社会の構造","s":[{"t":"身分と社会","q":[{"n":1,"q":"公式に苗字（名字）を称し，また刀を腰に帯びる武士の特権を何というか。","a":"苗字帯刀","t":"g"},{"n":2,"q":"町人・農民らから法外の無礼を受けた時は斬殺しても処罰されないという武士の特権を何というか。","a":"切捨御免","t":"g"},{"n":3,"q":"将軍直属の家臣である旗本・御家人を指し，幕臣ともよばれた家臣を何というか。","a":"直参","t":"g"},{"n":4,"q":"家来のまた家来の意味で，将軍の臣下である大名・旗本の家臣を何というか。","a":"陪臣","t":"g"},{"n":5,"q":"農業を中心に林業・漁業など小規模な経営に従事する者を何というか。","a":"百姓","t":"g"},{"n":6,"q":"大工や左官などの手工業者であり，江戸時代に商人とともに城下町などに集住した者を何というか。","a":"職人","t":"g"},{"n":7,"q":"武家・百姓・町人の社会で，主家の家業・家事に従事した者を何というか。","a":"奉公人","t":"g"},{"n":8,"q":"手工業者の主家に従事し，７〜10年の年期で無給で親方の家に住み込み，雑用もしながら技術を教わる制度を何というか。","a":"徒弟制度","t":"g"},{"n":9,"q":"商家に年季奉公する10〜15・16歳の幼年者で，無給で走り使いなどの雑用をする者を何というか。","a":"丁稚","t":"g"},{"n":10,"q":"商家の使用人中の最上位にある者で，主人から認められれば，暖簾分けして別家を出してもらうこともあった奉公人を何というか。","a":"番頭","t":"g"},{"n":11,"q":"江戸時代の職能にもとづく身分制を何というか。","a":"士農工商","t":"g"},{"n":12,"q":"江戸時代に政治的意図などから11（＝士農工商）の下に設置された身分で，結婚・交際・居住など社会生活において差別された者の総称を何というか。","a":"賤民","t":"g"},{"n":13,"q":"12（＝賤民）のうち，皮革処理や牢屋の牢番・行刑役などを主な生業とした者を何というか。","a":"えた（穢多）・かわた（長吏）","t":"g"},{"n":14,"q":"12（＝賤民）のうち，村や町から排除され集団化をとげ，物乞い・遊芸・清掃などに従事した者を何というか。","a":"非人","t":"g"},{"n":15,"q":"山岳修行により，呪術的宗教活動を行う者を何というか。","a":"修験者","t":"g"},{"n":16,"q":"一家の主として，家族に対して強い権限を持った家の構成員の中心は誰か。","a":"家長","t":"p"},{"n":17,"q":"男尊女卑の風潮が強く，女性は，幼少期・結婚後・老後も男性に従うのがその心構えであるとされたが，この考え方を何というか。","a":"三従の教","t":"g"},{"n":18,"q":"離婚の権利も夫が有し，簡略な離縁状ですまされたが，離縁状のことを俗に何というか。","a":"三行半","t":"g"},{"n":19,"q":"離婚したくても夫が承知をしない女性のために，足かけ３年在寺すると離婚を成立させた尼寺を何というか。","a":"縁切寺（駆込寺）","t":"g"}]},{"t":"村と百姓","q":[{"n":1,"q":"江戸時代の百姓のなかで基本的な階層は，検地帳に登録された田畑屋敷を持ち，耕作に必要な用水権・入会権などを有する年貢負担者であった。この百姓を何というか。","a":"本百姓（高持百姓）","t":"g"},{"n":2,"q":"検地帳に記載されず，田畑も所有せず，貢租も直接負担しない江戸時代の百姓を何というか。","a":"水呑百姓（無高百姓）","t":"g"},{"n":3,"q":"江戸時代の村には，特定の地主と身分的隷属関係を持つ最下層の人々がいたが，その呼称を２つあげよ。","a":"名子・被官","t":"g"},{"n":4,"q":"江戸時代の多くの村は50戸前後の自然集落であった。領主はこれを行政単位として，村の役人を通じて村を支配したが，この村の役人を総称して何というか。","a":"村方三役（地方三役）","t":"g"},{"n":5,"q":"4（＝村方三役）の役人のうち，村の長を，関東・関西・東北ではそれぞれ何というか。","a":"名主・庄屋・肝煎","t":"g"},{"n":6,"q":"4（＝村方三役）の役人のうち，名主などの村の長の補佐役を何というか。","a":"組頭","t":"g"},{"n":7,"q":"4（＝村方三役）の役人のうち，村民代表を何というか。","a":"百姓代","t":"g"},{"n":8,"q":"江戸時代の田畑・屋敷地に対する本租で，本百姓が負担した税を何というか。","a":"本途物成（本年貢）","t":"g"},{"n":9,"q":"江戸時代に本百姓が負担した税で，山林などからの収益や産物収入などを対象とした雑税を何というか。","a":"小物成","t":"g"},{"n":10,"q":"江戸時代の税で，村高に応じて課せられた付加税を何というか。","a":"高掛物","t":"g"},{"n":11,"q":"朝鮮使節の往来費や治水工事など，国ごとに課された江戸時代の臨時の税を何というか。","a":"国役","t":"g"},{"n":12,"q":"江戸時代の税で，街道筋の村々の農民に課せられた公用交通の運送補助の負担を何というか。","a":"伝馬役・助郷役","t":"g"},{"n":13,"q":"本年貢は村高に一定の税率をかけて計算され，名主など村役人が責任者となって納めたが，このように村が責任を持って税を納めることを何というか。","a":"村請制","t":"g"},{"n":14,"q":"江戸幕府初期の本年貢の税率は，収穫の４割が標準であったが，この税率をどのように表現したか。","a":"四公六民","t":"g"},{"n":15,"q":"本年貢の税率は，はじめ米の収穫前に役人が派遣されて作柄を調査して定めた。この年貢率を決定する方法を何というか。","a":"検見法（毛見法）","t":"g"},{"n":16,"q":"本年貢は，享保ころから豊凶に関係なく一定額の年貢を納入させるようになった。この方法を何というか。","a":"定免法","t":"g"},{"n":17,"q":"江戸幕府は，年貢納入や治安維持などで連帯責任を負う，５戸１組を基本とした隣保組織を制度化したが，これを何とよぶか。","a":"五人組","t":"g"},{"n":18,"q":"村では，田植えや屋根葺など一時に多くの人手を必要とする時は，お互いに助けあったが，これを何というか。","a":"結","t":"g"},{"n":19,"q":"自治の規律を持つ村は，種々の約束事を決め，これに反するものに制裁を加えたが，交際を断つことを何とよんでいるか。","a":"村八分","t":"g"},{"n":20,"q":"江戸幕府は本百姓の没落を防ぎ，年貢徴収高を維持するために，田畑の売買を禁止する法令を出した。この法令は西暦何年に出されたか。また，法令名をあげよ。","a":"1643年・田畑永代売買禁止令","t":"d"},{"n":21,"q":"1673（延宝元）年に，零細農民の増加を防ぎ，年貢の確保のために土地の分割相続についての制限令を出した。これを何というか。","a":"分地制限令","t":"g"},{"n":22,"q":"21（＝分地制限令）の法令では，一般の百姓の田畑面積・石高をいくつ以上と定めたか。","a":"1町・10石","t":"n"},{"n":23,"q":"本田畑に五穀（米・麦・黍・粟・豆）以外の作物を栽培することを禁じた，江戸幕府の法令を何というか。","a":"田畑勝手作りの禁","t":"g"}]},{"t":"町と町人","q":[{"n":1,"q":"江戸時代，都市に住む商工階級の人たちを広く町人とよんだが，厳密には違いがあった。五人組を組織し，町政に参加できた町人を何というか。","a":"地主・家持（家主）","t":"g"},{"n":2,"q":"長屋などに借屋住まいをし，家守（大家）の監督を受けたものを何というか。","a":"借家・店借","t":"g"},{"n":3,"q":"土地（屋敷地）を借り自分で家屋を建てて住んだ者を何というか。","a":"地借","t":"g"},{"n":4,"q":"江戸町奉行の下にあって町政を担当した町役人を３つあげよ。","a":"町年寄・町名主・月行事","t":"g"},{"n":5,"q":"町人は重い年貢負担をまぬかれたが，都市機能を維持するための負担費用やさまざまな夫役を課された。この夫役を何というか。","a":"町人足役","t":"g"},{"n":6,"q":"町に住む商工業者には，営業税や営業免許税が課せられたが，それを２つあげよ。","a":"運上・冥加","t":"g"},{"n":7,"q":"屋敷の間口に応じて課せられた宅地税を何というか。","a":"地子（銭）","t":"g"},{"n":8,"q":"江戸時代後期，幕府・諸藩が財政補填のため御用商人らに課した，臨時・不定期の賦課金を何というか。","a":"御用金","t":"g"}]},{"t":"農業","q":[{"n":1,"q":"1670（寛文10）年に完成した大規模な治水・灌漑工事で，芦ノ湖の水を富士山麓の深良村へ導いた用水を何というか。","a":"箱根用水","t":"g"},{"n":2,"q":"江戸時代，検地済みの本田畑のほかに，新たに海浜の浅瀬・湖沼などを干拓するなどして耕地として造成することを何というか。","a":"新田開発","t":"g"},{"n":3,"q":"17世紀末から各地に見られた，有力な都市商人が資金を投下して大規模な治水工事などを行い，開発した新田を何というか。","a":"町人請負新田","t":"g"},{"n":4,"q":"1673（延宝元）年に工事が完了し，18カ村の新田村落が生まれた下総の湖沼干拓を何というか。","a":"椿海","t":"g"}]},{"t":"林業・漁業","q":[{"n":1,"q":"尾張藩と秋田藩で藩が直轄する山林から伐り出された材木を商品化し，有名になったものはそれぞれ何か。","a":"木曽檜・秋田杉","t":"g"},{"n":2,"q":"江戸時代の漁業先進地である瀬戸内・熊野地方の漁法で，各種の網を使用したものを何というか。","a":"上方漁法","t":"g"},{"n":3,"q":"多くの零細漁民を使用し，城下町の魚問屋と取引した網漁経営者を何というか。","a":"網元（網主）","t":"g"}]},{"t":"手工業・鉱山業","q":[{"n":1,"q":"江戸時代に広まった，楮を主な原料とする和紙を生産する紙漉の技術を何というか。","a":"流漉","t":"g"},{"n":2,"q":"室町時代に朝鮮から伝わった銀の精錬技術で，銀鉱石に鉛を含ませた含銀鉛を骨灰を塗った炉で熱して，鉛などの不要物を除去する方法を何というか。","a":"灰吹法","t":"g"},{"n":3,"q":"16世紀以後に開発され，戦国大名の争奪が激しかった島根県の銀山を何というか。","a":"石見（大森）銀山","t":"g"},{"n":4,"q":"16世紀半ばの発見といわれ，信長・秀吉・家康が直轄した銀山を何というか。","a":"（但馬）生野銀山","t":"g"},{"n":5,"q":"江戸時代，秋田藩が経営した銀山を何というか。","a":"院内銀山","t":"g"},{"n":6,"q":"16世紀後半に盛大に金銀が採掘され，明治時代には政府から三菱に払い下げられた新潟県の鉱山を何というか。","a":"佐渡（相川）金・銀山","t":"g"},{"n":7,"q":"1610（慶長15）年に発見されて江戸幕府の御用山とされ，明治時代には古河市兵衛が買収した栃木県にある日本最大の銅山を何というか。","a":"足尾銅山","t":"g"},{"n":8,"q":"1690（元禄３）年に発見され，大坂泉屋（住友家）が経営した江戸時代最大の銅山を何というか。","a":"別子銅山","t":"g"},{"n":9,"q":"足踏み式の送風装置のある炉に砂鉄・木炭を交互に入れ，高熱を発生させて精錬する日本式製鉄法を何というか。","a":"たたら製鉄","t":"g"}]},{"t":"商業","q":[{"n":1,"q":"戦国時代から活発化した全国的な商取引や海外貿易の発達を背景に，権力者と結んだ特権的商人が活躍した。これを何というか。","a":"豪商","t":"g"},{"n":2,"q":"朱印船貿易を行い，糸割符仲間としても活躍した京都嵯峨の商人で，大堰（保津）・富士・天竜・高瀬川などの水路開発にも貢献した人物はだれか。","a":"角倉了以","t":"p"},{"n":3,"q":"江戸幕府の呉服師であり，朱印船貿易や糸割符仲間で巨利を得た京都の商人を何というか。","a":"茶屋四郎次郎","t":"g"},{"n":4,"q":"家康の命で銀座の創設に尽力，朱印船貿易でも活躍した摂津平野の商人を何というか。","a":"末吉孫左衛門","t":"g"},{"n":5,"q":"父の宗久に茶の湯を学び，秀吉・家康にも仕えて茶頭をつとめた堺の商人を何というか。","a":"今井宗薫","t":"g"},{"n":6,"q":"博多の商人の子で長崎に移住し，長崎代官もつとめた朱印船貿易家を何というか。","a":"末次平蔵","t":"g"},{"n":7,"q":"17世紀後半から全国の商品流通を支配し，生産者や荷主と仲買・小売商人の仲介をしたものを何というか。","a":"問屋","t":"g"},{"n":8,"q":"7（＝問屋）の商人や仲買は，都市や生産地で業種ごとに同業者団体をつくり，独自の法を定めて営業権を独占しようとしたが，この法を何というか。","a":"仲間掟","t":"g"}]}]}]},{"t":"第7章　幕藩体制の展開","sec":[{"t":"1　幕政の安定","s":[{"t":"平和と秩序の確立","q":[{"n":1,"q":"江戸時代初期の武力を背景とする幕府の強圧的な政治を何というか。","a":"武断政治","t":"g"},{"n":2,"q":"儒学などを奨励して人民を教化し，法律や制度を整えることによって権威を高め，支配しようとする幕府政治を何というか。","a":"文治政治","t":"g"},{"n":3,"q":"江戸幕府が2（＝文治政治）の政治へ転換したのは，何という将軍の時か。","a":"徳川家綱","t":"g"},{"n":4,"q":"江戸幕府の2（＝文治政治）の政治への転換の契機となった牢人の不満による事件をあげよ。また，その事件がおこったのは西暦何年か。","a":"由井（由比）正雪の乱（慶安の変）・1651年","t":"d"},{"n":5,"q":"17世紀半ばころに社会秩序が安定するなかで，社会に不満を持ち，秩序におさまらない人々もいたが，このような人々は一般的に何とよばれたか。","a":"かぶき者","t":"g"},{"n":6,"q":"４代将軍徳川家綱の時，牢人発生の原因となる大名の改易を減らすために緩和されたことは何か。","a":"末期養子の禁","t":"g"},{"n":7,"q":"４代将軍徳川家綱の時，戦国時代の遺風をなくすためにとられた政策は人質（証人）の廃止と何か。","a":"殉死の禁止","t":"g"},{"n":8,"q":"1657年，４代将軍徳川家綱の時におきた大火で，江戸城天守閣も焼失し，多額の復興経費が幕府財政窮迫の一因になったといわれる，死者10万人をだした大火を何というか。","a":"明暦の大火（振袖火事）","t":"g"},{"n":9,"q":"４代将軍徳川家綱がその権威を示すため，すべての大名に対して，あらためて領土を与える文書を出したが，これを何というか。","a":"領知宛行状","t":"g"},{"n":10,"q":"徳川家光の異母弟であり，山崎闇斎に朱子学を学び，藩政の刷新をはかった会津藩主はだれか。","a":"保科正之","t":"p"},{"n":11,"q":"陽明学者熊沢蕃山を登用し，儒学にもとづく藩政改革を行った岡山藩主はだれか。","a":"池田光政","t":"p"},{"n":12,"q":"熊沢蕃山が1641（寛永18）年に開いた私塾を何というか。","a":"花畠教場","t":"g"},{"n":13,"q":"池田光政が1668（寛文８）年に開いた郷学を何というか。","a":"閑谷学校","t":"g"},{"n":14,"q":"江戸に彰考館を設けて『大日本史』の編纂を開始し，水戸学のもとをつくった水戸藩主はだれか。","a":"徳川光圀","t":"p"},{"n":15,"q":"木下順庵，室鳩巣らの学者を招き，図書の収集につとめ，『東寺百合文書』の保存に尽力した加賀藩主はだれか。","a":"前田綱紀","t":"p"}]},{"t":"元禄時代","q":[{"n":1,"q":"徳川家光の子で，館林藩主から５代将軍に就任したのはだれか。","a":"徳川綱吉","t":"p"},{"n":2,"q":"1（＝徳川綱吉）の将軍の擁立に功があり，大老となったが，1684（貞享元）年に江戸城内で刺殺されたのはだれか。","a":"堀田正俊","t":"p"},{"n":3,"q":"1（＝徳川綱吉）の将軍の館林時代からの側近で，文治政治を推進し，のちには大老格となった人物はだれか。","a":"柳沢吉保","t":"p"},{"n":4,"q":"文治政治を推進した柳沢吉保の役職名をあげよ。","a":"側用人","t":"g"},{"n":5,"q":"将軍徳川綱吉は林家が上野忍ヶ岡に設けた孔子廟と家塾を，学問所として江戸の別の場所に移したが，これを何というか。","a":"湯島聖堂・聖堂学問所","t":"g"},{"n":6,"q":"将軍徳川綱吉に仕えた林家の人で，儒学を仏教から分離させたのはだれか。","a":"林信篤（鳳岡）","t":"p"},{"n":7,"q":"6（＝林信篤）の人物以来，林家が世襲した幕府の役職名は何というか。","a":"大学頭","t":"g"},{"n":8,"q":"大嘗会などの朝廷儀礼の復興に意欲的に取り組み，朝幕協調した関係を築いた天皇はだれか。","a":"霊元天皇","t":"p"},{"n":9,"q":"1701（元禄14）年におきた赤穂事件で，朝廷関係の儀礼を管掌する高家の旗本を斬りつけたことで切腹を命じられた赤穂藩主はだれか。","a":"浅野長矩","t":"p"},{"n":10,"q":"将軍徳川綱吉が出した極端な動物愛護令を何というか。","a":"生類憐みの令","t":"g"},{"n":11,"q":"1684年，近親者に死者があった時に，喪に服したり忌引きをする日数を定めた法令が出されたが，それを何というか。","a":"服忌令","t":"g"},{"n":12,"q":"将軍徳川綱吉の華美な生活や多くの寺社造営による財政悪化に対し，悪貨への改鋳による差益を幕府の収入にする政策を進めた勘定吟味役（のち勘定奉行）はだれか。","a":"荻原重秀","t":"p"},{"n":13,"q":"12（＝荻原重秀）の人物の意見により，貨幣の改鋳をして発行された金銀貨を総称して何というか。","a":"元禄金銀","t":"g"},{"n":14,"q":"将軍徳川綱吉がその母桂昌院の願いにより亮賢を開山として建立した寺院名をあげよ。","a":"護国寺","t":"g"}]},{"t":"正徳の政治","q":[{"n":1,"q":"江戸幕府の６代・７代将軍の名をあげよ。","a":"徳川家宣・家継","t":"g"},{"n":2,"q":"江戸幕府の６代・７代将軍の側用人をあげよ。","a":"間部詮房","t":"g"},{"n":3,"q":"江戸幕府の６代・７代将軍の時，侍講として文治政治を展開した朱子学者はだれか。","a":"新井白石","t":"p"},{"n":4,"q":"3（＝新井白石）の人物は，朱子学ではだれの弟子にあたるか。","a":"木下順庵","t":"p"},{"n":5,"q":"3（＝新井白石）の人物の展開した政治を何というか。","a":"正徳の政治（治）","t":"g"},{"n":6,"q":"3（＝新井白石）の人物が1715（正徳５）年に出した，貿易の制限を行う法令を何というか。","a":"海舶互市新例（正徳新令・長崎新令）","t":"g"},{"n":7,"q":"6（＝海舶互市新例）の法令の対象となった国を２つあげよ。","a":"清・オランダ","t":"g"},{"n":8,"q":"新井白石は貨幣の改鋳を行い，家康時代と同質同量の良貨を発行したが，これらを何というか。","a":"正徳金銀","t":"g"},{"n":9,"q":"正徳の政治で，東山天皇の皇子を独立させ，新しい宮家を創立したが，この宮家を何というか。","a":"閑院宮家","t":"g"},{"n":10,"q":"正徳の政治で，ある国の使節の待遇を簡素化したが，どこの国の使節か。","a":"朝鮮","t":"l"}]}]},{"t":"2　経済の発展","s":[{"t":"農業生産の進展","q":[{"n":1,"q":"江戸時代に発明・改良された農具で，田の荒おこしや深耕のため考案されたものを何というか。","a":"備中鍬","t":"g"},{"n":2,"q":"手回しの翼でおこす風によって，籾がらや塵芥を箱外に飛ばす選別農具を何というか。","a":"唐箕","t":"g"},{"n":3,"q":"穀類や豆類の脱穀のため，竿の先の短い竿を回転させて打つ農具を何というか。","a":"からさお","t":"g"},{"n":4,"q":"扱箸にかわって登場した脱穀具で，非常に能率的であったため“後家倒し”の異名をとったものを何というか。","a":"千歯扱","t":"g"},{"n":5,"q":"穀類を金網の上に流して，穀粒の大きさによってふるいわける選別農具を何というか。","a":"千石簁","t":"g"},{"n":6,"q":"中国から伝えられた揚水機で，蛇腹のように水槽を重ねて上部へ水を送るものを何というか。","a":"龍骨車","t":"g"},{"n":7,"q":"17世紀半ばにおこった足踏みの小型水車を何というか。","a":"踏車","t":"g"},{"n":8,"q":"肥料は鎌倉時代以降，草葉を地中に埋めて腐敗させたものを主に使用したが何というか。","a":"刈敷","t":"g"},{"n":9,"q":"木綿などの商品作物の生産に用いられた肥料で，鰯を日光にさらして干し固めた速効性肥料を何というか。","a":"干鰯","t":"g"},{"n":10,"q":"油菜の種子である菜種や綿実から油をしぼったかすの肥料を何というか。","a":"油粕","t":"g"},{"n":11,"q":"鰯や鰊，胡麻や豆から油をしぼり取ったかすの肥料を何というか。","a":"〆粕","t":"g"},{"n":12,"q":"金銭で購入する肥料を総称して何というか。","a":"金肥","t":"g"},{"n":13,"q":"伊予国の戦国武将であった土居氏をめぐる軍物語の第７巻は農学書であるが，これは日本最古の農書といわれている。この書物を何というか。","a":"清良記","t":"g"},{"n":14,"q":"江戸時代前期の農学者で，中国の農書を学び，日本ではじめて本格的な農学書を著したのはだれか。","a":"宮崎安貞","t":"p"},{"n":15,"q":"1697（元禄10）年に刊行された宮崎安貞の農学書名をあげよ。","a":"農業全書","t":"g"},{"n":16,"q":"江戸時代後期の農学者で，商品作物加工による農家の利と国益を論じた人物はだれか。","a":"大蔵永常","t":"p"},{"n":17,"q":"16（＝大蔵永常）の人物の著書として，約60種の作物の栽培法を述べた農書と，数十種の農具を図示し用法を記した農書の名をそれぞれあげよ。","a":"広益国産考・農具便利論","t":"g"},{"n":18,"q":"四木三草の四木とは漆・桑・楮のほかに何か。","a":"茶","t":"g"},{"n":19,"q":"三草のうち，江戸時代には主に阿波国を主産地としたものは何か。","a":"藍","t":"g"},{"n":20,"q":"三草のうち，江戸時代には主に出羽国を主産地としたものは何か。","a":"紅花","t":"g"},{"n":21,"q":"茶・藍・木綿・たばこなど，販売することを目的として栽培された作物を何というか。","a":"商品作物","t":"g"},{"n":22,"q":"15世紀から国内栽培が始まり，河内や三河などを特産地とする代表的な商品作物は何か。","a":"木綿","t":"g"},{"n":23,"q":"越前名産の上質紙で，幕府などの公用紙として重用されたことからついた紙の名を何というか。","a":"奉書紙","t":"g"},{"n":24,"q":"現在の岐阜県を産地とした日用紙を何というか。","a":"美濃紙","t":"g"}]},{"t":"諸産業の発達","q":[{"n":1,"q":"江戸時代に土佐・志摩・薩摩・伊豆などで行われた釣漁は何か。","a":"鰹漁","t":"g"},{"n":2,"q":"江戸時代に紀伊・土佐・肥前・長門などで網や銛を駆使して行われた漁業は何か。","a":"捕鯨","t":"g"},{"n":3,"q":"江戸中期以降に蝦夷地の海産物として北前船で大坂に輸送されたものを２つあげよ。","a":"鰊・昆布","t":"g"},{"n":4,"q":"江戸時代には潮の干満を利用して，低い砂地に海水を引き入れる方式が発達したが，こうした塩田を何というか。","a":"入浜（式）塩田","t":"g"},{"n":5,"q":"綿織物生産は江戸中期から急速に各地に広まっていったが，当時の織機は低い腰かけに座り，足を前方に動かして操作するものであった。この織機を何というか。","a":"地機","t":"g"},{"n":6,"q":"江戸時代の絹織物の産地について，京都の絹織物の産地名をあげよ。","a":"西陣","t":"g"},{"n":7,"q":"6（＝西陣）では高い腰かけに座り，足を上下に踏む操作で織る織機が使用され，やがて江戸時代後期には綿織物でも使われるようになった。この織機を何というか。","a":"高機","t":"g"},{"n":8,"q":"江戸時代の絹織物の産地について，現在の群馬県の絹織物の産地名を１つあげよ。","a":"桐生（または伊勢崎）","t":"g"},{"n":9,"q":"綿織物の名産品のうち，久留米で考案された織物を何というか。","a":"久留米絣","t":"g"},{"n":10,"q":"小倉地方の織物で帯地や袴地に用いられたものを何というか。","a":"小倉織","t":"g"},{"n":11,"q":"麻織物のうち，小千谷地方でつくられたものを何というか。","a":"越後縮","t":"g"},{"n":12,"q":"奈良地方名産の麻布を何というか。","a":"奈良晒","t":"g"},{"n":13,"q":"摂津の灘・伊丹や山城の伏見などの名産品は何か。","a":"酒","t":"g"},{"n":14,"q":"醤油の名産地は房総地方に多いが，その産地名を２つあげよ。","a":"野田・銚子","t":"g"},{"n":15,"q":"漆器のうち，能登地方の名産で，堅牢な塗物を何というか。","a":"輪島塗","t":"g"},{"n":16,"q":"能代（現在の秋田県）と高山（現在の岐阜県）などを産地とする漆器を何というか。","a":"春慶塗","t":"g"}]},{"t":"交通の整備と発達","q":[{"n":1,"q":"江戸幕府は交通路の整備に力を入れたが，主要幹線路を総称して何というか。","a":"五街道","t":"g"},{"n":2,"q":"1などの交通路を管理する江戸幕府の役職を何というか。","a":"道中奉行","t":"g"},{"n":3,"q":"五街道のうち，江戸から白河までの街道を何というか。","a":"奥州道中","t":"g"},{"n":4,"q":"五街道の起点はどこであったか。","a":"江戸日本橋","t":"l"},{"n":5,"q":"江戸時代の主要街道に設けられた，約４kmごとの路程標を何というか。","a":"一里塚","t":"g"},{"n":6,"q":"五街道などの本街道に対して，それ以外の街道を何とよぶか。","a":"脇街道（脇往還）","t":"g"},{"n":7,"q":"江戸幕府は主要街道に関所を設けたが，小田原藩が管理した東海道の関所を何というか。","a":"箱根関","t":"g"},{"n":8,"q":"東海道の浜名湖口に設けられた関所名をあげよ。","a":"新居関（今切関）","t":"g"},{"n":9,"q":"関所は，江戸防衛上，特に取締りがきびしかったが，このことを表わす「入○○に出女」の○○にあてはまるのは何か。","a":"鉄砲","t":"g"},{"n":10,"q":"中山道の関所を２つあげよ。","a":"碓氷関・木曽福島関","t":"g"},{"n":11,"q":"日光・奥州道中の関所を１つあげよ。","a":"栗橋関","t":"g"},{"n":12,"q":"甲州道中の関所を１つあげよ。","a":"小仏関","t":"g"},{"n":13,"q":"江戸幕府が治安維持のために橋をかけることを禁じたため，川越人足によって渡らねばならなかった東海道の島田宿と金谷宿の間の河川を何というか。","a":"大井川","t":"g"},{"n":14,"q":"街道 ,"a":"寛永通宝","t":"g"},{"n":13,"q":"諸藩や旗本領内で発行・通用させた紙幣を総称して何というか。","a":"藩札","t":"g"},{"n":14,"q":"江戸時代に三貨の交換や預金・貸付・為替・手形などを扱った商人を総称して何というか。","a":"両替商","t":"g"},{"n":15,"q":"14（＝両替商）の商人のうち，金銀の交換を行い，為替・貸付業務をする大坂に多くいた商人を何というか。","a":"本両替","t":"g"},{"n":16,"q":"15（＝本両替）の商人の仲間より選ばれた天王寺屋・平野屋など10人の豪商を何というか。","a":"十人両替","t":"g"},{"n":17,"q":"銭屋ともいい，金銀貨と銭との少額貨幣交換を本業とする，江戸で多く見られた商人を何というか。","a":"銭両替","t":"g"},{"n":18,"q":"十人両替のうち，掛屋や海運業・大名貸などを行い巨富をなし，新田開発も行った大坂の商家をあげよ。","a":"鴻池屋（家）","t":"g"},{"n":19,"q":"越後屋という呉服商などで財をなし，両替商にも従事するようになった江戸の商家をあげよ。","a":"三井家","t":"g"}]},{"t":"三都の発展","q":[{"n":1,"q":"江戸時代，全国の物資の大集散地となったのは，江戸・大坂・京都であった。この三大都市を総称して何というか。","a":"三都","t":"g"},{"n":2,"q":"18世紀前半のころ，江戸の人口はどのくらいあったと推定されているか。","a":"約100万人","t":"g"},{"n":3,"q":"江戸時代，全国経済の中心となったのは大坂であった。このため大坂はどのようによばれたか。","a":"天下の台所","t":"g"},{"n":4,"q":"諸藩や旗本などが，年貢米や特産物を販売するために，大坂や江戸においた施設を何というか。","a":"蔵屋敷","t":"g"},{"n":5,"q":"4（＝蔵屋敷）の施設が集中していたのは大坂のどこか。","a":"中之島","t":"l"},{"n":6,"q":"4（＝蔵屋敷）の施設に集められた米や特産物を総称して何というか。","a":"蔵物","t":"g"},{"n":7,"q":"4（＝蔵屋敷）の施設に集められたものは米が中心であったが，この米を何とよんだか。","a":"蔵米","t":"g"},{"n":8,"q":"諸藩や旗本などが徴収した貢租や専売品ではなく，一般商人の手を経て市場に出まわる商品を何というか。","a":"納屋物","t":"g"},{"n":9,"q":"蔵屋敷で蔵物の取引にたずさわる者を何というか。","a":"蔵元","t":"g"},{"n":10,"q":"蔵物の売却代金の出納にあたる者を何というか。","a":"掛屋","t":"g"},{"n":11,"q":"下級旗本や御家人の禄米は浅草にあった幕府の米蔵から支給されたが，旗本・御家人の代理として，蔵米を受領して売却した商人で，のちに金融業も兼ねたものを何というか。","a":"札差（蔵宿）","t":"g"},{"n":12,"q":"11（＝札差）の商人は江戸幕府の御蔵の周辺に居住し，派手な生活をしたが，彼らの居住地を何というか。","a":"蔵前","t":"g"},{"n":13,"q":"陶器のなかで，京都におこった陶磁器を総称して何というか。","a":"京焼","t":"g"},{"n":14,"q":"清水寺付近で生産された陶磁器を何というか。","a":"清水焼","t":"g"}]},{"t":"商業の展開","q":[{"n":1,"q":"江戸の荷受問屋が商品別に組織した組合は何か。","a":"十組問屋","t":"g"},{"n":2,"q":"大坂の荷積問屋が商品別に組織した組合は何か。","a":"二十四組問屋","t":"g"},{"n":3,"q":"伊勢松坂の出身で江戸で呉服店を開き，「現金（銀）懸値なし」と「切売り商法」で財をなした三井家の屋号を何というか。","a":"越後屋","t":"g"},{"n":4,"q":"先祖以来蔵元で財をなし，店頭で米市が立つほどであったが，ぜいたくな生活が江戸幕府の目にとまり，町人の分限をこえるものとして全財産を没収された大坂商人はだれか。","a":"淀屋辰五郎","t":"p"},{"n":5,"q":"元禄のころの紀伊国熊野出身の商人で，材木・みかんで財をなしたといわれる江戸の豪商はだれか。","a":"紀伊国屋文左衛門","t":"p"},{"n":6,"q":"18世紀から広まった問屋商人が原料・器具を家内生産者に前貸し，その生産物を買い上げる生産形態を何というか。","a":"問屋制家内工業","t":"g"},{"n":7,"q":"江戸や大坂などには，特定商品のみを取り扱う市場が立つようになったが，全国の米の値段を左右した大坂の市場を何というか。所在地名をつけて答えよ。","a":"堂島米市場","t":"g"},{"n":8,"q":"大坂と江戸の野菜・果実卸売市場をそれぞれ何というか。所在地名をつけて答えよ。","a":"天満青物市場・神田青物市場","t":"g"},{"n":9,"q":"大坂と江戸の魚市場をそれぞれ何というか。所在地名をつけて答えよ。","a":"雑喉場魚市場・日本橋魚市場","t":"g"}]}]},{"t":"3　元禄文化","s":[{"t":"元禄文化","q":[{"n":1,"q":"５代将軍徳川綱吉の時代，幕政は安定し，経済発展を背景にはなやかで活気にあふれた町人文化が発達したが，この文化を何というか。","a":"元禄文化","t":"g"},{"n":2,"q":"元禄文化の担い手は，遊里の事情に通じた粋な気性を尊ぶ豪商たちが中心であったが，それはどの地方の人々であったか。","a":"上方","t":"g"},{"n":3,"q":"元禄文化では，現世の現実そのものを描こうとする町人文学が生まれたが，現世をどのようにとらえていたか。","a":"浮き世","t":"g"}]},{"t":"元禄期の文学","q":[{"n":1,"q":"式目を定めて古風を確立した貞門派に対し，漢語や俗語を用い，日常見聞するものを句につくることが新風として町人の間に普及した。この新しい俳風を確立したのはだれか。","a":"西山宗因","t":"p"},{"n":2,"q":"1（＝西山宗因）の人物が確立した新しい俳風の派を何というか。","a":"談林派","t":"g"},{"n":3,"q":"元禄のころ，さび・しおりなどを理念とする幽玄閑寂の俳諧を確立したのはだれか。","a":"松尾芭蕉","t":"p"},{"n":4,"q":"3（＝松尾芭蕉）の人物が確立した俳風を何というか。","a":"蕉風（正風）","t":"g"},{"n":5,"q":"3（＝松尾芭蕉）の人物が東北・北陸地方へ旅行した時の俳諧紀行文の傑作を何というか。","a":"奥の細道","t":"g"},{"n":6,"q":"3（＝松尾芭蕉）の人物が関西方面へ旅行した時の俳諧紀行文を何というか。","a":"笈の小文","t":"g"},{"n":7,"q":"3（＝松尾芭蕉）の人物の門人らによる『俳諧七部集』のうち，巻頭句に「初しぐれ猿も小蓑をほしげなり」とある俳諧集を何というか。","a":"猿蓑","t":"g"},{"n":8,"q":"元禄期に上方を中心に町人社会の生活・風俗・世相などを写実的に描写した小説を何というか。","a":"浮世草子","t":"g"},{"n":9,"q":"8（＝浮世草子）の小説の代表的作家をあげよ。","a":"井原西鶴","t":"g"},{"n":10,"q":"8（＝浮世草子）の小説は内容から３つに大別されるが，男女の愛欲を描写したものを何というか。","a":"好色物","t":"g"},{"n":11,"q":"8（＝浮世草子）の小説のジャンルで，町人生活の現実の姿を写実的に描いたものを何というか。","a":"町人物","t":"g"},{"n":12,"q":"8（＝浮世草子）の小説のジャンルで，武士の仇討や義理などを描いたものを何というか。","a":"武家物","t":"g"},{"n":13,"q":"井原西鶴の第一作で，主人公世之介と遊女との生活を描いたものを何というか。","a":"好色一代男","t":"g"},{"n":14,"q":"井原西鶴の作品で，愛欲で身を滅ぼす５つの恋物語を描いた作品名を何というか。","a":"好色五人女","t":"g"},{"n":15,"q":"井原西鶴の作品で，金銭を追求する町人の喜怒哀楽をリアルに描いた町人物を何というか。","a":"日本永代蔵","t":"g"},{"n":16,"q":"井原西鶴の作品で，「大晦日は一日千金」と副題された，大晦日の町人の悲喜劇をあらゆる角度から描いた町人物を何というか。","a":"世間胸算用","t":"g"},{"n":17,"q":"井原西鶴の作品で，32の仇討の説話集である武家物の作品をあげよ。","a":"武道伝来記","t":"g"},{"n":18,"q":"室町時代中期ころから始まった節付きの語りに，伴奏楽器としての三味線と，操り人形が加わった民衆劇を何というか。","a":"人形浄瑠璃","t":"g"},{"n":19,"q":"18（＝人形浄瑠璃）の民衆劇が元禄時代に最盛期を迎えたのは，諸流を集大成して新しい節付けの語りを行った語り手（音曲家）が出たことによる。この語り手はだれか。","a":"竹本義太夫","t":"p"},{"n":20,"q":"元禄期に，18（＝人形浄瑠璃）の民衆劇の脚本（戯曲）を書いたのはだれか。","a":"近松門左衛門","t":"p"},{"n":21,"q":"元禄期の人形遣いの名手で，竹本座で活躍し，のち江戸に下り人形芝居を興行した人物はだれか。","a":"辰松八郎兵衛","t":"p"},{"n":22,"q":"近松門左衛門の脚本（戯曲）は２つに大別されるが，歴史上の事実を脚本化したものを何というか。","a":"時代物","t":"g"},{"n":23,"q":"近松門左衛門の脚本の種類で，当時の世相に取材し，心中・殺人などをテーマとしたものを何というか。","a":"世話物","t":"g"},{"n":24,"q":"近松門左衛門の浄瑠璃作品のうち，明の遺臣とその子鄭成功が明の王室を再興する筋書きの時代物の作品を何というか。","a":"国性（姓）爺合戦","t":"g"},{"n":25,"q":"近松門左衛門の浄瑠璃作品のうち，徳兵衛が遊女お初と心中する義理と人情を描いた世話物の作品を何というか。","a":"曽根崎心中","t":"g"},{"n":26,"q":"近松門左衛門の浄瑠璃作品のうち，遊女小春を身請けできなかった治兵衛と小春の心中を描いた世話物の作品を何というか。","a":"心中天網島","t":"g"},{"n":27,"q":"出雲阿国に始まる女性の舞踊を中心とする歌舞伎を何というか。","a":"女歌舞伎","t":"g"},{"n":28,"q":"江戸幕府は，風俗を乱すとの理由から27（＝女歌舞伎）の歌舞伎を禁じたため，女性にかわり前髪姿の少年が演じるようになった。これを何というか。","a":"若衆歌舞伎","t":"g"},{"n":29,"q":"少年の舞踊が江戸幕府によって禁止されたのち，少年の象徴である前髪を落して演じることが許可された。このような歌舞伎を何というか。","a":"野郎歌舞伎","t":"g"},{"n":30,"q":"元禄期を中心に活躍した江戸の歌舞伎俳優で，立廻りを主とする荒事を得意芸としたのはだれか。","a":"市川団十郎","t":"p"},{"n":31,"q":"元禄期を中心に活躍した上方の歌舞伎俳優で，三都随一の名女形と称されたのはだれか。","a":"芳沢あやめ","t":"p"},{"n":32,"q":"元禄期を中心に活躍した上方の歌舞伎俳優で，恋愛を主とする和事の名人といわれたのはだれか。","a":"坂田藤十郎","t":"p"}]},{"t":"儒学の興隆","q":[{"n":1,"q":"幕命で林羅山・鵞峰父子が編集した，神武天皇から後陽成天皇までの編年体の歴史書を何というか。","a":"本朝通鑑","t":"g"},{"n":2,"q":"徳川光圀の時，江戸藩邸の彰考館で編集が開始され，水戸藩の一大事業としてつづけられ，1906（明治39）年に完成した歴史書を何というか。","a":"大日本史","t":"g"},{"n":3,"q":"藤原惺窩の弟子松永尺五に師事し，加賀藩主前田綱紀に仕え，のち５代将軍徳川綱吉の侍講（儒学の師）となった朱子学者はだれか。","a":"木下順庵","t":"p"},{"n":4,"q":"3（＝木下順庵）の人物の門下からは多くの俊才が輩出したが，６代・７代将軍の侍講となった人物はだれか。","a":"新井白石","t":"p"},{"n":5,"q":"3（＝木下順庵）の人物の門下から出て，８代将軍の侍講となった人物はだれか。","a":"室鳩巣","t":"p"},{"n":6,"q":"戦国時代の儒者南村梅軒が祖とされて，土佐におこった朱子学の一派を何というか。","a":"南学（海南学派）","t":"g"},{"n":7,"q":"学祖とされる南村梅軒に学び，その学風を継承し学派を隆盛に導いた土佐の学者はだれか。","a":"谷時中","t":"p"},{"n":8,"q":"土佐藩の家老として新田開発・殖産興業などの藩政改革を推進した，南学に属する朱子学者はだれか。","a":"野中兼山","t":"p"},{"n":9,"q":"南学派の儒者で，のちに吉川惟足の影響を受け，独自の神道を創始した人物はだれか。","a":"山崎闇斎","t":"p"},{"n":10,"q":"9（＝山崎闇斎）の人物が創始した神道を何というか。","a":"垂加神道","t":"g"},{"n":11,"q":"9（＝山崎闇斎）の人物の学派を何というか。","a":"崎門学派","t":"g"},{"n":12,"q":"南宋の陸象山に始まり，明の王陽明により大成された儒学を何というか。","a":"陽明学","t":"g"},{"n":13,"q":"12（＝陽明学）の儒学の主張の要点で，実践を重んじることを何というか。","a":"知行合一","t":"g"},{"n":14,"q":"日本で最初に12（＝陽明学）の儒学を説き，「近江聖人」といわれたのはだれか。","a":"中江藤樹","t":"p"},{"n":15,"q":"14（＝中江藤樹）の人物の弟子で，岡山藩主池田光政に招かれ治績をあげた陽明学者はだれか。","a":"熊沢蕃山","t":"p"},{"n":16,"q":"15（＝熊沢蕃山）の人物は，武士の帰農や参勤交代の緩和を説いた書物を著し，江戸幕府によって禁錮にされた。この書物名をあげよ。","a":"大学或問","t":"g"},{"n":17,"q":"孔子や孟子の教えを直接学ぶことを主張した儒学の一派を何というか。","a":"古学派","t":"g"},{"n":18,"q":"17（＝古学派）の儒学の一派をその著書で主張し，朱子学を批判して幕府によって赤穂に配流されたのはだれか。","a":"山鹿素行","t":"p"},{"n":19,"q":"18（＝山鹿素行）の人物が朱子学を批判し，古学を主張した書物を何というか。","a":"聖教要録","t":"g"},{"n":20,"q":"18（＝山鹿素行）の人物の著書で，武家政治の由来や武家の儀礼・戦略などを記したものは何か。","a":"武家事紀","t":"g"},{"n":21,"q":"18（＝山鹿素行）の人物が赤穂配流中に書いた，中国崇拝を廃し日本主義を主張する内容の著書名を何というか。","a":"中朝事実","t":"g"},{"n":22,"q":"京都の人で『論語』『孟子』などの原典にあたり，その批判を通じて直接聖人の道を正しく理解すべきであるとして，古義学を提唱したのはだれか。","a":"伊藤仁斎","t":"p"},{"n":23,"q":"古義学を提唱した22（＝伊藤仁斎）の人物の子で，この学問を継承・大成したのはだれか。","a":"伊藤東涯","t":"p"},{"n":24,"q":"22・23（＝伊藤東涯）の人物の学塾を何というか。","a":"古義堂","t":"g"},{"n":25,"q":"22・23（＝伊藤東涯）の人物の学派を何というか。","a":"堀川学派（古義学派）","t":"g"},{"n":26,"q":"古義学に対し，古典や聖賢の文辞に直接触れて，治国・礼楽の制を整えることを主張した江戸の学派を何というか。","a":"古文辞学派（蘐園学派）","t":"g"},{"n":27,"q":"26（＝古文辞学派）の学派の創始者はだれか。","a":"荻生徂徠","t":"p"},{"n":28,"q":"27（＝荻生徂徠）の人物が開いた塾を何というか。","a":"蘐園塾","t":"g"},{"n":29,"q":"27（＝荻生徂徠）の人物は将軍徳川吉宗の諮問に答えて，武士の土着のすすめや参勤交代制の弊害を説いた書物を著したが，これを何というか。","a":"政談","t":"g"},{"n":30,"q":"『経済録』を著し，経世済民の問題を考察し，藩営専売の必要を説いた古文辞学派の学者はだれか。","a":"太宰春台","t":"p"}]},{"t":"諸学問の発達","q":[{"n":1,"q":"新井白石が将軍徳川家宣に進講した日本通史の講義案で，独自の時代区分を行った歴史書を何というか。","a":"読史余論","t":"g"},{"n":2,"q":"新井白石が『日本書紀』の神代巻について，“神は人なり”と合理的解釈を行った歴史書を何というか。","a":"古史通","t":"g"},{"n":3,"q":"６代徳川家宣・７代徳川家継時代の幕政を知るうえで重要な史料となる，新井白石の自叙伝名を答えよ。","a":"折たく柴の記","t":"g"},{"n":4,"q":"江戸時代に盛んになった，動物・植物・鉱物の薬用について研究する学問を何というか。","a":"本草学","t":"g"},{"n":5,"q":"4（＝本草学）の学問の初期の学者で，朱子学者としても独自の哲学を持ち，教育面で a":"版画","t":"g"},{"n":11,"q":"浮世絵版画の祖といわれている絵師はだれか。","a":"菱川師宣","t":"p"},{"n":12,"q":"11（＝菱川師宣）の人物の代表的な肉筆美人画をあげよ。","a":"見返り美人図","t":"g"},{"n":13,"q":"上絵付の手法をもとに色絵を完成し，京焼の祖といわれるのはだれか。","a":"野々村仁清","t":"p"},{"n":14,"q":"13（＝野々村仁清）の人物に学び，装飾画的な美しい作品を残した陶工で，兄とともに画家でもあったのはだれか。","a":"尾形乾山","t":"p"},{"n":15,"q":"元禄のころ，京都の絵師が創始した花鳥山水模様の染物が大流行したが，この創始者はだれか。","a":"宮崎友禅","t":"p"},{"n":16,"q":"山伏修行ののち，蝦夷地を含む全国をめぐり，各地に鉈彫りの仏像彫刻を残した僧はだれか。","a":"円空","t":"p"}]}]}]},{"t":"第8章　幕藩体制の動揺","sec":[{"t":"1　幕政の改革","s":[{"t":"享保の改革","q":[{"n":1,"q":"1716（享保元）年に７代将軍徳川家継が８歳で死去したあと，紀州徳川家から迎えられた８代将軍はだれか。","a":"徳川吉宗","t":"p"},{"n":2,"q":"1（＝徳川吉宗）の将軍は「諸事権現様御掟の通り」と宣言して，家康時代への復古を掲げて改革政治を行ったが，この改革政治を何というか。","a":"享保の改革","t":"g"},{"n":3,"q":"1（＝徳川吉宗）の将軍は５代将軍徳川綱吉以来の側用人による側近政治をやめ，将軍の意志を幕政に反映させるために新設の側近をおいたが，これを何というか。","a":"御用取次","t":"g"},{"n":4,"q":"享保の改革で，幕領に対し，一定の年貢を確保する法を広く採用したが，これを何というか。","a":"定免法","t":"g"},{"n":5,"q":"将軍徳川吉宗は，旗本に対して役職の標準石高を定め，それ以下のものが就任する時，在職中のみ不足分を支給する制度を採用し，有能な人材の登用と支出の抑制をはかった。この制度を何というか。","a":"足高の制","t":"g"},{"n":6,"q":"将軍徳川吉宗に登用された人物で，山田奉行から江戸町奉行に抜擢され，すぐれた行政手腕を発揮し寺社奉行にまで栄進した人物はだれか。","a":"大岡忠相","t":"p"},{"n":7,"q":"川崎宿の名主であったが，将軍徳川吉宗に農政の手腕をかわれ，代官としてすぐれた民政を行ったのはだれか。","a":"田中丘隅","t":"p"},{"n":8,"q":"将軍徳川吉宗は増収策として「御恥辱をも顧りみられず」と諸大名に八木（米）の上納を命じたが，この政策を何というか。","a":"上げ米（の制）","t":"g"},{"n":9,"q":"8（＝上げ米）の政策の上納の割合はいくらであったか。","a":"石高1万石につき100石","t":"n"},{"n":10,"q":"8（＝上げ米）の政策の代償として諸大名に認めたことは何か。","a":"参勤交代の大名の在府を半減する","t":"g"},{"n":11,"q":"1722（享保７）年に幕府高札を受けて行われた新田開発で，下総国の農民によってつくられたものを何というか。","a":"飯沼新田","t":"g"},{"n":12,"q":"将軍徳川吉宗は，老中を主任に命じ，三奉行を中心に上下２巻の刑事・行政関係の法令や刑法・訴訟法に関する規定を編纂させた。これを何というか。","a":"公事方御定書","t":"g"},{"n":13,"q":"1744（延享元）年に完成した，1615（元和元）年以降の触れを類別に編纂した幕府評定所の法令集を何というか。","a":"御触書寛保集成","t":"g"},{"n":14,"q":"将軍徳川吉宗は，武士・町人間に激増する貸借訴訟に対し，評定所ではいっさい受理せず，すべて当事者間の和談で解決する法令を出した。これを何というか。","a":"相対済し令","t":"g"},{"n":15,"q":"将軍徳川吉宗が庶民の意見を求めるため，評定所前においた投書箱を何というか。","a":"目安箱","t":"g"},{"n":16,"q":"15（＝目安箱）の投書により，幕府の薬園内に医療施設を設けたが，これを何というか。","a":"小石川養生所","t":"g"},{"n":17,"q":"将軍徳川吉宗は江戸市街の防火にあたる組 ":"p"},{"n":2,"q":"11代将軍の初期に，老中首座として幕政を担当したのはだれか。","a":"松平定信","t":"p"},{"n":3,"q":"2（＝松平定信）の老中は，徳川吉宗の孫にあたるが，どこの藩主であったか。","a":"白河藩","t":"l"},{"n":4,"q":"2（＝松平定信）の老中による政治改革を何とよんでいるか。","a":"寛政の改革","t":"g"},{"n":5,"q":"2（＝松平定信）の老中は天明の飢饉の教訓を活かし，諸藩に対し１万石につき50石の貯蔵を命じたが，これを何というか。","a":"囲米","t":"g"},{"n":6,"q":"寛政の改革では，各地に倉を設け米穀をたくわえるように命じたが，この倉を何というか，２つあげよ。","a":"社倉・義倉","t":"g"},{"n":7,"q":"寛政の改革では，江戸の町人に町費を節約させ，その７割を積み立てさせて貧民救済にあてるよう指導したが，これを何というか。","a":"七分積金（七分金積立）","t":"g"},{"n":8,"q":"江戸時代の町費のことを何というか。","a":"町入用","t":"g"},{"n":9,"q":"七分積金では，節約させた７割をどこに運用させたか。","a":"江戸町会所","t":"l"},{"n":10,"q":"松平定信が旗本・御家人を救済するために，札差らに６年以前の債権を破棄させ，以後のものも返済利率を下げるよう命じた法令を何というか。","a":"棄捐令","t":"g"},{"n":11,"q":"10（＝棄捐令）の法令は西暦何年に出されたか。","a":"1789年","t":"d"},{"n":12,"q":"寛政の改革で，浮浪人や再犯のおそれのある罪人などを収容して職業技術を習得させる施設を江戸に設けた。これを何というか。","a":"人足寄場","t":"g"},{"n":13,"q":"12（＝人足寄場）の施設はどこに設けられたか。","a":"石川島","t":"l"},{"n":14,"q":"江戸時代に，都市で定職・住居を持たない人々は何とよばれたか。","a":"無宿人（者）","t":"g"},{"n":15,"q":"寛政の改革で，百姓の出稼ぎを制限し，正業を持たないものに対し資金を与えて農村へ帰ることを奨励した政策を何というか。","a":"旧里帰農令（帰農令）","t":"g"},{"n":16,"q":"1790（寛政２）年，松平定信は柴野栗山の建言をいれて，湯島聖堂の学問所で朱子学以外の学問を教授することを禁止した。これを何というか。","a":"寛政異学の禁","t":"g"},{"n":17,"q":"松平定信が老中を退いた後も，幕府は朱子学を奨励し，1797（寛政９）年に幕府が援助を与えていた林家の私塾を正式に幕府の統制下におき，名称も改めた。その名称をあげよ。","a":"昌平坂学問所（昌平黌）","t":"g"},{"n":18,"q":"朱子学の振興につとめた17（＝昌平坂学問所）の学問所の３人の教官を何というか。","a":"寛政の三博士","t":"g"},{"n":19,"q":"18（＝寛政の三博士）の人物のなかで，最後に学問所に登用されたのはだれか。","a":"古賀精里","t":"p"},{"n":20,"q":"松平定信は民間に対してはきびしい出版統制令を出したが，風俗を乱すとの理由で処罰を受けた洒落本作家はだれか。","a":"山東京伝","t":"p"},{"n":21,"q":"寛政の改革で処罰を受けた黄表紙作家はだれか。","a":"恋川春町","t":"p"},{"n":22,"q":"松平定信は，1792（寛政４）年に，ロシアに備えて海防の必要を説いた人物を禁錮刑に処し，著書を絶版・発売禁止にした。この弾圧された人物はだれか。","a":"林子平","t":"p"},{"n":23,"q":"22（＝林子平）の人物の絶版・発売禁止となった著書を何というか。","a":"海国兵談","t":"g"},{"n":24,"q":"22（＝林子平）の人物の蝦夷地・朝鮮・琉球を図示・解説した著書を何というか。","a":"三国通覧図説","t":"g"},{"n":25,"q":"1789（寛政元）年に朝廷は，光格天皇の実父閑院宮典仁親王に太上天皇の称号を宣下したいと幕府に同意を求めたが，松平定信はこれを拒否し，さらに武家伝奏らを処罰した。この事件を何というか。","a":"尊号一件","t":"g"},{"n":26,"q":"江戸時代中期以降，諸藩が財政再建を軸に改革を行ったが，これを何とよん 国船打払令）の法令は西暦何年に出されたか。","a":"1825年","t":"d"}]},{"t":"文化・文政時代","q":[{"n":1,"q":"11代将軍徳川家斉は，将軍職を退いたのちも実権を握りつづけた。この政治を何というか。","a":"大御所政治","t":"g"},{"n":2,"q":"百姓の階層分化が進行し，無宿人や博徒が横行するなかで，関東の治安維持強化を目的に，1805（文化２）年に創設された役職で，俗に八州廻りとよばれたものは何か。","a":"関東取締出役","t":"g"},{"n":3,"q":"1827（文政10）年に，農村秩序を維持するため，関東において幕領・私領を問わず40～50カ村をあわせて設定された組織は何か。","a":"寄場組合","t":"g"}]},{"t":"大塩の乱","q":[{"n":1,"q":"大御所時代の末期に洪水・冷害などにより東北地方を中心に全国的な飢饉がおこったが，この飢饉を何というか。","a":"天保の飢饉","t":"g"},{"n":2,"q":"1（＝天保の飢饉）の飢饉に際し，窮民の救済のために，門弟や同志とともに大坂市中で蜂起し，鎮圧され自殺した大坂町奉行元与力はだれか。","a":"大塩平八郎（中斎）","t":"p"},{"n":3,"q":"2（＝大塩平八郎）の人物は私塾を開いて子弟の教育にあたっていたが，どのような学問を教授していたか。","a":"陽明学","t":"g"},{"n":4,"q":"2（＝大塩平八郎）の人物の私塾を何というか。","a":"洗心洞","t":"g"},{"n":5,"q":"大塩の乱の影響を受けて越後柏崎でも国学者が蜂起したが，この人物を何というか。","a":"生田万","t":"g"},{"n":6,"q":"大塩の乱・生田万の乱は，西暦何年におこったか。","a":"1837年","t":"d"},{"n":7,"q":"異国船打払令（無二念打払令）によって，日本人漂流民を引渡すため来航したアメリカ商船が，相模の浦賀や薩摩の山川で砲撃された。この船を何というか。","a":"モリソン号","t":"g"},{"n":8,"q":"7（＝モリソン号）の外国船による事件は西暦何年におこったか。","a":"1837年","t":"d"},{"n":9,"q":"7（＝モリソン号）の外国船による事件を知り，幕府の方針を批判した江戸の蘭学者のグループが処罰される事件がおこったが，この事件を何というか。","a":"蛮社の獄","t":"g"},{"n":10,"q":"9（＝蛮社の獄）の事件で処罰された蘭学者が参加していた江戸の知識人の勉強会を何というか。","a":"尚歯会","t":"g"},{"n":11,"q":"9（＝蛮社の獄）の事件で処罰された人物で，三河田原藩家老で，文人画家としても著名であったのはだれか。","a":"渡辺崋山","t":"p"},{"n":12,"q":"11（＝渡辺崋山）の人物がモリソン号事件を批判した著書名をあげよ。","a":"慎機論","t":"g"},{"n":13,"q":"蛮社の獄で処罰された陸奥水沢出身の人物で，医学をシーボルトに学んだのはだれか。","a":"高野長英","t":"p"},{"n":14,"q":"13（＝高野長英）の人物がモリソン号事件を批判した著書名をあげよ。","a":"戊戌夢物語","t":"g"}]},{"t":"天保の改革","q":[{"n":1,"q":"19世紀前半の幕藩体制をゆるがす内憂外患に対処するために行われた幕政改革を何というか。","a":"天保の改革","t":"g"},{"n":2,"q":"1（＝天保の改革）の改革を推進した老中はだれか。","a":"水野忠邦","t":"p"},{"n":3,"q":"1（＝天保の改革）の改革は西暦何年に始まったか。","a":"1841年","t":"d"},{"n":4,"q":"1（＝天保の改革）の改革の時の将軍はだれか。","a":"徳川家慶","t":"p"},{"n":5,"q":"水野忠邦は，農村の荒廃を防ぐため，百姓に出稼ぎを禁じ，江戸に住む窮民を強制的に農村に返したが，この命令を何というか。","a":"人返しの法","t":"g"},{"n":6,"q":"天保の改革で，高騰した江戸の物価を抑制するために，商工業者に対してとった政策は何か。","a":"株仲間の解散","t":"g"},{"n":7,"q":"水野忠邦は幕府権力の強化のため，江戸・大坂周辺の大名・旗本領を直轄領にする命令を出して失敗した。この命令を何というか。","a":"上知令","t":"g"},{"n":8,"q":"江戸時代中期以降に，農村内で成長してきた商人を何というか。","a":"在郷商人（在方商人）","t":"g"}]},{"t":"経済の変化","q":[{"n":1,"q":"幕末の相模の農政家で，没落した一家を再興し，節約・貯蓄を説く報徳仕法で各地の農村の復興に尽力したのはだれか。","a":"二宮尊徳（金次郎）","t":"p"},{"n":2,"q":"幕末の農民指導者で，下総国に土着して農村復興や農業生産の合理化を説いたのはだれか。","a":"大原幽学","t":"p"},{"n":3,"q":"工場を設立し賃労働者を集めて，分業による協同作業を行う生産様式を何というか。","a":"工場制手工業（マニュファクチュア）","t":"g"},{"n":4,"q":"3（＝工場制手工業）の生産様式は，天保期には桐生・足利などで行われるようになったが，どのような業種で行われたか。","a":"絹織物業","t":"g"},{"n":5,"q":"3（＝工場制手工業）の生産様式で使用された織機で，もともと京都西陣の高級絹織物の生産などに広く用いられていたものは何か。","a":"高機","t":"g"}]},{"t":"朝廷と雄藩の浮上","q":[{"n":1,"q":"江戸時代後期に藩政改革を行い，財政を好転させ，軍事力を強化して幕政に大きな影響力を持った諸藩があった。これらを何とよぶか。","a":"雄藩","t":"g"},{"n":2,"q":"江戸時代後期，薩摩藩では莫大な借財を解消して藩財政の再建に成功したが，藩政改革を担当した家老はだれか。","a":"調所広郷","t":"p"},{"n":3,"q":"2（＝調所広郷）の人物による薩摩藩の改革で強化された専売品目をあげよ。","a":"黒砂糖","t":"g"},{"n":4,"q":"2（＝調所広郷）の人物による薩摩藩の改革で，拡大されたのは，どことの貿易か。","a":"琉球","t":"l"},{"n":5,"q":"将軍継嗣問題で徳川慶喜を推すなど，中央政界で活躍しながら，鹿児島に反射炉やガラス製造工場などを設けた薩摩藩主はだれか。","a":"島津斉彬","t":"p"},{"n":6,"q":"薩摩藩が鹿児島に設けた洋式工場群を総称して何というか。","a":"集成館","t":"g"},{"n":7,"q":"長州藩主毛利敬親が登用した人物で，負債の整理や専売制の改正など，藩政改革を担当したのはだれか。","a":"村田清風","t":"p"},{"n":8,"q":"長州藩が専売品としていた品目で，灯明に使用するものは何か。","a":"蝋","t":"g"},{"n":9,"q":"長州藩では他国の廻船の積荷を抵当に，資金の貸付や委託販売を行い利益を得た。このために下関に設けられた役所を何というか。","a":"越荷方","t":"g"},{"n":10,"q":"幕末に本百姓体制の再建など農村の復興につとめ，磁器の専売など殖産興業につとめた藩はどこか。","a":"肥前（佐賀）藩","t":"l"},{"n":11,"q":"10（＝肥前藩）の藩の改革を進めた藩主名をあげよ。","a":"鍋島直正","t":"g"},{"n":12,"q":"10（＝肥前藩）の藩では小作地を収公し，一部を地主に再給付し，残りは小作人に分けて本百姓にした。この土地制度を何というか。","a":"均田制","t":"g"},{"n":13,"q":"10（＝肥前藩）の藩で，1850（嘉永３）年に設立された施設では，何を製作したか。","a":"大砲","t":"g"},{"n":14,"q":"13（＝大砲）の鋳造のためにオランダから学んでつくられたもので，炉内で火炎を反射させて鉱石や金属を熱する炉を何というか。","a":"反射炉","t":"g"},{"n":15,"q":"おこぜ組とよばれる改革派を登用して，財政の緊縮を行い，藩権力の強化をはかった雄藩をあげよ。","a":"土佐（高知）藩","t":"g"},{"n":16,"q":"藩主徳川斉昭のもとで改革政治が推進されたが，藩内保守派の反対で藩論を統一できず，多くの志士を出すことになった藩は何か。","a":"水戸藩","t":"g"},{"n":17,"q":"長崎の町年寄で，オランダ人に砲術を学び，幕府にその採用を建議して水野忠邦に認められ，のち講武所砲術師範になった人物はだれか。","a":"高島秋帆","t":"p"},{"n":18,"q":"伊豆韮山の代官で，17（＝高島秋帆）の人物に砲術を学び，韮山に反射炉を築いたのはだれか。","a":"江川太郎左衛門（坦庵，英龍）","t":"p"},{"n":19,"q":"水戸藩は幕命により，江戸のどこに造船所を設立したか。","a":"石川島","t":"l"}]}]},{"t":"4　化政文化","s":[{"t":"化政文化","q":[{"n":1,"q":"文化・文政時代，江戸を中心に文学と美術を主として発達した町人文化を何というか。","a":"化政文化","t":"g"},{"n":2,"q":"1（＝化政文化）の文化の時代に好まれた滑稽・洒落の気風は何とよばれたか，２つあげよ。","a":"粋・通","t":"g"}]},{"t":"学問・思想の動き","q":[{"n":1,"q":"丹後宮津出身の儒学者・経済学者で，商品経済・貨幣経済への蔑視は誤りであると指摘し，専売制度による富国強兵，封建制の再建を主張したのはだれか。","a":"海保青陵","t":"p"},{"n":2,"q":"1（＝海保青陵）の人物の主著をあげよ。","a":"稽古談","t":"g"},{"n":3,"q":"越後出身の思想家で，開国の必要と貿易振興，植民地経営による富国策を主張したのはだれか。","a":"本多利明","t":"p"},{"n":4,"q":"3（＝本多利明）の人物の著書で，西洋諸国の国勢・風俗を記し，航海・貿易の必要を人口論とあわせて説いているものをあげよ。","a":"西域物語","t":"g"},{"n":5,"q":"3（＝本多利明）の人物の著書で，国内開発・金銀採掘・商業貿易の掌握・属島の開発など四大急務・三慮策による富国策を説いているものをあげよ。","a":"経世秘策","t":"g"},{"n":6,"q":"出羽出身の思想家・経済学者で，諸学を修め，生産の国営化・貿易振興のために海外経略論を展開したのはだれか。","a":"佐藤信淵","t":"p"},{"n":7,"q":"6（＝佐藤信淵）の人物の著書で，農政の沿革や農事を詳述したものを何というか。","a":"農政本論","t":"g"},{"n":8,"q":"6（＝佐藤信淵）の人物の著書で，産業の振興・官営商業・貿易展開などを主張したものを何というか。","a":"経済要録","t":"g"},{"n":9,"q":"水戸藩で『大日本史』の編纂事業を中心にして形成された学風を何というか。","a":"水戸学","t":"g"},{"n":10,"q":"尊王論は，幕末の水戸藩主徳川斉昭のころには，内外情勢の緊迫化のなかでどのような考え方に発展したか。","a":"尊王攘夷論","t":"g"},{"n":11,"q":"水戸藩の藩校（藩学）弘道館の設立に尽力し，『弘道館記述義』で新しい考え方を主張して水戸学の中心となったのはだれか。","a":"藤田東湖","t":"p"},{"n":12,"q":"『大日本史』の編纂事業推進の機関である水戸藩の彰考館の総裁で，『新論』を著し，新しい考え方を主張したのはだれか。","a":"会沢安（正志斎）","t":"p"},{"n":13,"q":"幕府の天文方となり，間重富らとともに西洋暦法を取り入れた暦をつくったのはだれか。","a":"高橋至時","t":"p"},{"n":14,"q":"13（＝高橋至時）の人物らがつくった暦を何というか。","a":"寛政暦","t":"g"},{"n":15,"q":"下総佐原の酒造家で，50歳で江戸に出て13（＝高橋至時）の人物に測地・暦法を学び，幕命で蝦夷地をはじめ全国を測量したのはだれか。","a":"伊能忠敬","t":"p"},{"n":16,"q":"15（＝伊能忠敬）の人物の死後に完成された日本の実測図を何というか。","a":"大日本沿海輿地全図","t":"g"},{"n":17,"q":"1811（文化８）年に，幕府の天文方に蘭書翻訳局が設置されたが，これを何というか。","a":"蛮書和解御用","t":"g"},{"n":18,"q":"17（＝蛮書和解御用）の設置を建言したのはだれか。","a":"高橋景保","t":"p"},{"n":19,"q":"本木良永に学び，天文・物理学の入門書を翻訳し，地動説を紹介した蘭学者で，長崎のオランダ通詞でもあった人物はだれか。","a":"志筑忠雄","t":"p"},{"n":20,"q":"地動説・引力説などニュートン力学を紹介した19（＝志筑忠雄）の人物の著書名をあげよ。","a":"暦象新書","t":"g"},{"n":21,"q":"イギリス人が著した化学書を『舎密開宗』として訳述し，また『菩多尼訶経』で西洋植物学を紹介したのはだれか。","a":"宇田川榕庵"," は西暦何年に出されたか。","a":"1860年","t":"d"},{"n":33,"q":"31（＝五品江戸廻送令）の法令で，開港場への直送が禁じられた５品目をあげよ。","a":"雑穀・水油・蠟・呉服・生糸","t":"g"}]},{"t":"公武合体と尊攘運動","q":[{"n":1,"q":"1853（嘉永６）年のペリー来航直後に13代将軍になったのはだれか。","a":"徳川家定","t":"p"},{"n":2,"q":"1（＝徳川家定）の人物は生来病弱で嗣子もなかったため，次期将軍の問題が1857（安政４）年から公然化したが，これを何というか。","a":"将軍継嗣問題","t":"g"},{"n":3,"q":"14代将軍に賢明な人物を迎え，幕政改革を行って難局を乗り切ろうと考えた人たちが推したのはだれか。","a":"徳川（一橋）慶喜","t":"p"},{"n":4,"q":"14代将軍に3（＝徳川慶喜）の人物を推した人たちは何派とよばれたか。","a":"一橋派","t":"g"},{"n":5,"q":"14代将軍に，譜代大名らは血筋を重んじて幼少の紀伊藩主を推したが，この紀伊藩主とはだれか。","a":"徳川慶福","t":"p"},{"n":6,"q":"14代将軍に5（＝徳川慶福）の人物を推した譜代大名らは何派とよばれたか。","a":"南紀派","t":"g"},{"n":7,"q":"薩摩藩主で，一橋派の中心人物の一人はだれか。","a":"島津斉彬","t":"p"},{"n":8,"q":"越前藩主で，一橋派の中心人物の一人はだれか。","a":"松平慶永（春嶽）","t":"p"},{"n":9,"q":"南紀派とよばれた譜代大名らの中心となっていたのはだれか。また，その人物はどこの藩主であったか。","a":"井伊直弼・彦根藩","t":"p"},{"n":10,"q":"1858（安政５）年に9（＝井伊直弼・彦根藩）の人物は大老に就任し，将軍継嗣をだれと定めたか。","a":"徳川慶福（家茂）","t":"p"},{"n":11,"q":"9（＝井伊直弼・彦根藩）の人物は批判勢力に対して徹底的に弾圧を加え，処罰したが，これを何とよんでいるか。","a":"安政の大獄","t":"g"},{"n":12,"q":"11（＝安政の大獄）の弾圧で蟄居を命じられた前水戸藩主はだれか。","a":"徳川斉昭","t":"p"},{"n":13,"q":"11（＝安政の大獄）の弾圧で刑死した長州藩出身の尊王論者で，萩の塾で幕末の志士を育成したのはだれか。","a":"吉田松陰","t":"p"},{"n":14,"q":"13（＝吉田松陰）の人物が志士を育成した萩の塾を何というか。","a":"松下村塾","t":"g"},{"n":15,"q":"安政の大獄で処刑された越前藩士で，緒方洪庵の適塾に学び，藩主松平慶永を助けて活躍していたのはだれか。","a":"橋本左内","t":"p"},{"n":16,"q":"安政の大獄に反発した志士たちが，大老井伊直弼を登城途中に暗殺した事件を何というか。","a":"桜田門外の変","t":"g"},{"n":17,"q":"16（＝桜田門外の変）の事件は西暦何年におこったか。","a":"1860年","t":"d"},{"n":18,"q":"16（＝桜田門外の変）の事件をおこしたのは，主に何藩の脱藩志士たちであったか。","a":"水戸藩","t":"g"},{"n":19,"q":"18世紀の中頃から，天皇（皇室）を尊ぶべきであるという主張がおこってきたが，これとペリー以来の外圧によりおこってきた外国人排斥思想とが結合して，反幕政治運動の潮流となった。この思想を何というか。","a":"尊王攘夷論","t":"g"},{"n":20,"q":"井伊直弼の独裁政治が否定されたことから，幕府では朝廷の伝統的権威と結びつくことで幕政を維持しようとした。この考え方を何というか。","a":"公武合体論","t":"g"},{"n":21,"q":"20（＝公武合体論）の政策を推進した老中はだれか。","a":"安藤信正","t":"p"},{"n":22,"q":"21（＝安藤信正）の人物が，公武合体の政策を進めるために，朝廷に申し入れたことは何か。","a":"和宮の将軍家茂への降嫁","t":"g"},{"n":23,"q":"22（＝和宮の将軍家茂への降嫁）の申し入れを受け入れた天皇はだれか。","a":"孝明天皇","t":"p"},{"n":24,"q":"22（＝和宮の将軍家茂への降嫁）の政策に憤激した尊攘派の志士たちにより，老中安藤信正が傷つけられる事件がおこった。この事件を何というか。","a":"坂下門外の変","t":"g"},{"n":25,"q":"24（＝坂下門外の変）の事件は西暦何年におこったか。","a":"1862年","t":"d"},{"n":26,"q":"独自の公武合体論をもって幕政改革にのり出し，国父と称された薩摩藩の実力者（藩主の実父）はだれか。","a":"島津久光","t":"p"},{"n":27,"q":"26（＝島津久光）の人物は藩兵を率いて上京した折，倒幕挙兵を計画していた薩摩藩士の有馬新七らを斬り殺す事件をおこした。この事件を何というか。","a":"寺田屋事件","t":"g"},{"n":28,"q":"26（＝島津久光）の人物は勅使大原重徳とともに江戸に下り，幕政改革を要求したが，この時に幕府が行った改革を何というか。","a":"文久の改革","t":"g"},{"n":29,"q":"28（＝文久の改革）の改革で新設された将軍を補佐する役職を何というか。また，だれが任命されたか。","a":"将軍後見職・徳川（一橋）慶喜","t":"p"},{"n":30,"q":"28（＝文久の改革）の改革で新設された幕政を統轄する職を何というか。また，だれが任命されたか。","a":"政事総裁職・松平慶永","t":"p"},{"n":31,"q":"28（＝文久の改革）の改革で京都所司代の上に，京都の治安を維持するための職を設けたが，これを何というか。また，だれが任命されたか。","a":"京都守護職・松平容保","t":"p"},{"n":32,"q":"28（＝文久の改革）の改革で大名に対し緩和された制度とは何か。","a":"参勤交代","t":"g"},{"n":33,"q":"幕末の尊攘事件として，1860（万延元）年に駐日アメリカ総領事ハリスの通訳であったオランダ人が赤羽橋で薩摩藩の浪士に殺される事件が発生した。このオランダ人の名をあげよ。","a":"ヒュースケン","t":"g"},{"n":34,"q":"1862（文久２）年に，江戸から京都に帰国する途中の島津久光の行列を横切ったため，イギリス人が殺傷された。この事件を何というか。","a":"生麦事件","t":"g"},{"n":35,"q":"34（＝生麦事件）の事件が原因となっておこった戦いを何というか。また，それは西暦何年におこったか。","a":"薩英戦争・1863年","t":"d"},{"n":36,"q":"水戸藩の浪士が1861（文久元）年に，江戸高輪のイギリス仮公使館である寺院を襲撃した。この事件を何というか。","a":"東禅寺事件","t":"g"},{"n":37,"q":"1862年に，品川御殿山のイギリス公使館が高杉晋作らによって襲撃され全焼した。この事件を何というか。","a":"イギリス公使館焼打ち事件","t":"g"},{"n":38,"q":"1862年の後半になると，長州藩を中心とする尊攘派の志士と尊攘派公卿が結びついて朝廷を動かすようになった。同年末に，朝廷は幕府に対して攘夷の実行を命ずる勅使を派遣したが，この時の勅使はだれか。","a":"三条実美","t":"p"},{"n":39,"q":"攘夷が不可能なことを知りながら幕府は勅命を受け，1863（文久３）年３月に将軍が上洛したが，この将軍はだれか。","a":"徳川家茂","t":"p"},{"n":40,"q":"幕府は1863年５月10日を攘夷決行の日と定めて，諸藩にその実行を命じたが，これに応じて攘夷を実行した藩はどこか。","a":"長州藩","t":"l"},{"n":41,"q":"1863年に40（＝長州藩）の藩が実行した攘夷事件を何というか。","a":"長州藩外国船砲撃事件","t":"g"},{"n":42,"q":"1863年８月，公武合体派が朝廷から尊攘派を一掃し，京都から追放する政変がおこったが，これを何というか。","a":"八月十八日の政変（文久3年の政変）","t":"g"},{"n":43,"q":"42（＝八月十八日の政変）の政変で公武合体派の中心になった藩を２つあげよ。","a":"薩摩藩・会津藩","t":"g"},{"n":44,"q":"42（＝八月十八日の政変）の政変で，急進派公卿の参内が禁止されたため，７人の公卿が長州に逃れた（七卿落ち）。その中心人物で，のちに明治政府の太政大臣に就任したのはだれか。","a":"三条実美","t":"p"},{"n":45,"q":"42（＝八月十八日の政変）の政変の前後に尊攘派が挙兵し，大和五条の代官所を襲撃した事件を何というか。","a":"天誅組の変","t":"g"},{"n":46,"q":"45（＝天誅組の変）の事件の中心となった尊攘派の公卿はだれか。","a":"中山忠光","t":"p"},{"n":47,"q":"46（＝中山忠光）の人物とともに，天誅組の変の中心となった土佐藩出身の浪士はだれか。","a":"吉村寅太郎（虎太郎）","t":"p"},{"n":48,"q":"尊攘派が公卿の沢宣嘉を擁して，但馬の百姓とともに代官所を襲撃した事件を何というか。","a":"生野の変","t":"g"},{"n":49,"q":"48（＝生野の変）の事件の中心人物で，福岡藩出身の浪士はだれか。","a":"平野国臣","t":"p"},{"n":50,"q":"1863年に幕府の浪士政策で結成され，京都守護職の指揮下で尊攘派の弾圧に活動した組織を何というか。","a":"新選（撰）組","t":"g"},{"n":51,"q":"50（＝新選組）の組織の隊長として尊攘派の取締りに活躍した人物はだれか。","a":"近藤勇","t":"p"},{"n":52,"q":"勢力挽回をはかった尊攘派の志士たちが，京都三条の旅籠屋で新選組に襲撃され，斬殺・逮捕された事件を何というか。","a":"池田屋事件","t":"g"},{"n":53,"q":"52（＝池田屋事件）の事件ののち，長州藩は，その勢力回復のため藩兵や各地の志士を率いて京都に攻め上り，御所を中心に公武合体派と激しく戦った。この戦いを何というか。","a":"禁門の変（蛤御門の変）","t":"g"},{"n":54,"q":"53（＝禁門の変）の戦いは西暦何年のことか。","a":"1864年","t":"d"},{"n":55,"q":"53（＝禁門の変）の戦いを指導した，吉田松陰門下の長州藩士はだれか。","a":"久坂玄瑞","t":"p"},{"n":56,"q":"53（＝禁門の変）の戦いの罪を問うため，幕府は尾張藩主の徳川慶勝を総督にして長州藩を包囲して屈服させたが，これを何というか。","a":"第1次長州征討（伐）","t":"g"},{"n":57,"q":"56（＝第1次長州征討）の戦いで，長州藩が恭順の意を表わしたのは，長州藩が外国勢力により砲撃を受けたことが影響している。この外国勢力の砲撃事件を何とよんでいるか。","a":"四国艦隊下関砲撃事件","t":"g"},{"n":58,"q":"1865（慶応元）年に，列国が兵庫沖まで艦隊を送って圧力をかけたため，孝明天皇は正式に通商条約に承認した。これを何とよんでいるか。","a":"条約勅許","t":"g"},{"n":59,"q":"58（＝条約勅許）の承認後も兵庫開港については勅許を得ることのできない幕府は，列強の圧力をかわすために，輸入税を一律に５％に引き下げた。この時に列強と締結した協約を何というか。","a":"改税約書","t":"g"}]},{"t":"倒幕運動の展開","q":[{"n":1,"q":"第１次長州征討の結果，長州藩では保守政権が成立したが，1864（元治元）年12月の下関挙兵により倒幕派が政権を掌握した。この中心となったのはだれか。","a":"高杉晋作","t":"p"},{"n":2,"q":"長州藩では，1863（文久３）年から正規兵以外に，農工商その他の人々で諸隊が編成されたが，1（＝高杉晋作）の人物が中心になって組織した軍隊は何か。","a":"奇兵隊","t":"g"},{"n":3,"q":"対立していた薩摩藩・長州藩が倒幕で一致し，提携したが，この提携を何とよんでいるか。","a":"薩長連合（薩長同盟）","t":"g"},{"n":4,"q":"3（＝薩長連合）の提携は西暦何年に成立したか。","a":"1866年","t":"d"},{"n":5,"q":"3（＝薩長連合）の提携を仲立ちした土佐藩出身の人物を２人あげよ。","a":"坂本龍馬・中岡慎太郎","t":"g"},{"n":6,"q":"3（＝薩長連合）の提携は京都で成立したが，薩摩藩・長州藩の代表者を１人ずつあげよ。","a":"西郷隆盛・桂小五郎（木戸孝允）","t":"g"},{"n":7,"q":"3（＝薩長連合）の提携に関係した薩摩藩士で，のちに明治政府の参議兼内務卿として殖産興業に尽力した人物はだれか。","a":"大久保利通","t":"p"},{"n":8,"q":"長州藩で倒幕派が権力を握ったことに対し，幕府は武力討伐を行うことにしたが，これを何というか。","a":"第2次長州征討（伐）","t":"g"},{"n":9,"q":"8（＝第2次長州征討）の戦いで，幕府軍は各地で敗れ，将軍徳川家茂の死を機に中止されたが，これは西暦何年のことか。","a":"1866年","t":"d"},{"n":10,"q":"徳川家茂にかわって15代将軍に就任したのはだれか。","a":"徳川慶喜","t":"p"},{"n":11,"q":"10（＝徳川慶喜）の人物はフランスの援助で幕政改革を行ったが，この時のフランスの公使はだれか。","a":"ロッシュ","t":"p"},{"n":12,"q":"1865（慶応元）年に駐日イギリス公使になり，薩長倒幕派に接近した人物はだれか。","a":"パークス","t":"p"},{"n":13,"q":"12（＝パークス）の人物の前任のイギリス公使で，1864年の四国艦隊下関砲撃事件を指導した人物はだれか。","a":"オールコック","t":"p"},{"n":14,"q":"幕末に頻発した一揆のなかには，貧農らが中心となって村役人や地主・特権商人を攻撃して社会革新を求めたものもあった。このような一揆を何というか。","a":"世直し一揆","t":"g"},{"n":15,"q":"1867（慶応３）年８月ころから翌年にかけて，京坂地方を中心に伊勢神宮その他諸宮の御札が降ったとして，大衆の乱舞がおこり，倒幕派もこれを利用したといわれている。この現象を何とよんでいるか。","a":"ええじゃないか","t":"g"},{"n":16,"q":"幕末から明治時代初期に創始された民衆宗教で，のちに明治政府により公認された13派の神道を何というか。","a":"教派神道","t":"g"},{"n":17,"q":"16（＝教派神道）の神道のうち，大和で創始されたものを何というか。","a":"天理教","t":"g"},{"n":18,"q":"17（＝天理教）の宗教の創始者はだれか。","a":"中山みき","t":"p"},{"n":19,"q":"教派神道のうち，岡山で創始され，天地金乃神を尊信するものを何というか。","a":"金光教","t":"g"},{"n":20,"q":"19（＝金光教）の宗教の創始者はだれか。","a":"川手文治郎（赤沢文治）","t":"p"},{"n":21,"q":"教派神道のうち，岡山で創始され，瀕死の病のなかに神人合一の境地を悟ることができるとしたものを何というか。","a":"黒住教","t":"g"},{"n":22,"q":"21（＝黒住教）の宗教の創始者はだれか。","a":"黒住宗忠","t":"p"}]},{"t":"幕府の滅亡","q":[{"n":1,"q":"武力倒幕をめざす薩長連合に対し，土佐藩はあくまで公武合体の立場をとり，大政奉還をすすめたが，これをすすめた前土佐藩主はだれか。","a":"山内豊信（容堂）","t":"p"},{"n":2,"q":"土佐藩が主唱した，衆議による政治を主張する考え方を何というか。","a":"公議政体論","t":"g"},{"n":3,"q":"土佐藩のすすめに従い，将軍徳川慶喜は，朝廷に政権返上の上表を提出した。これを何というか。","a":"大政奉還","t":"g"},{"n":4,"q":"3（＝大政奉還）の上表提出は，西暦何年何月何日のことか。","a":"1867年10月14日","t":"d"},{"n":5,"q":"3（＝大政奉還）の上表提出と同じ日に，朝廷から武力倒幕の命令が薩長両藩に出されたが，これを何とよんでいるか。","a":"討幕の密勅","t":"g"},{"n":6,"q":"5（＝討幕の密勅）の命令発布に尽力した公家はだれか。","a":"岩倉具視","t":"p"},{"n":7,"q":"徳川慶喜による政権返上の上奏が許可され，一時後退を余儀なくされた倒幕派はまき返しをはかって，1867（慶応３）年12月９日に摂関・幕府の廃絶などを定めた宣言を発した。これを何というか。","a":"王政復古の大号令","t":"g"},{"n":8,"q":"7（＝王政復古の大号令）の宣言で新しい政府の役職が設けられたが，その総称を何というか。","a":"三職","t":"g"},{"n":9,"q":"8（＝三職）の役職のうち，最高の官職で有栖川宮熾仁親王が任命されたのは何か。","a":"総裁","t":"g"},{"n":10,"q":"8（＝三職）の役職のうち，皇族・公卿・諸侯が任命されたのは何か。","a":"議定","t":"g"},{"n":11,"q":"8（＝三職）の役職のうち，倒幕勢力の藩士が任命され，実質的な権力を握ったのは何か。","a":"参与","t":"g"},{"n":12,"q":"王政復古の大号令が発せられた日の夜に，三職による最初の会議が開かれた。この会議を何というか。","a":"小御所会議","t":"g"},{"n":13,"q":"12（＝小御所会議）の会議では徳川慶喜の扱いをめぐって，倒幕派と公武合体派の間で激論がたたかわされたが，その結果，徳川慶喜に命じられたこととは何か。","a":"辞官納地","t":"g"}]},{"t":"幕末の科学技術と文化","q":[{"n":1,"q":"国防強化のため幕府は1854（安政元）年に講武場を設け，砲術・洋式軍事訓練を行ったが，この訓練所は1856（安政３）年に何と改称されたか。","a":"講武所","t":"g"},{"n":2,"q":"1855（安政２）年，オランダから軍艦が贈られたのを機に，幕府は長崎に海軍の教育・訓練の機関を設けたが，これを何というか。","a":"海軍伝習所","t":"g"},{"n":3,"q":"2（＝海軍伝習所）の機関に学んだ幕臣で，のちに咸臨丸の艦長となった人物と，五稜郭の戦いで敗北した人物をあげよ。","a":"勝義邦（海舟）・榎本武揚","t":"g"},{"n":4,"q":"ペリー来航後，洋学の摂取にも力をそそぎ，それまで洋書の翻訳を中心としていた蛮書和解御用（掛）を拡充し，語学や科学を教授する機関とした。洋学所を経て1856年に設置されたこの機関を何というか。","a":"蕃書調所","t":"g"},{"n":5,"q":"1859（安政６）年に来日し，医療・伝道に従事し，ローマ字を考案して聖書の和訳を完成させたアメリカ人宣教師はだれか。","a":"ヘボン","t":"p"}]}]},{"t":"2　明治維新と富国強兵","s":[{"t":"戊辰戦争と新政府の発足","q":[{"n":1,"q":"徳川慶喜に対して出された辞官納地の命令に刺激された旧幕府側は，1868（明治元）年１月に京都で薩長両藩と戦ったが，この戦いを何というか。","a":"鳥羽・伏見の戦い","t":"g"},{"n":2,"q":"1（＝鳥羽・伏見の戦い）の戦いに敗れた徳川慶喜は江戸に逃れ，新政府はただちに江戸征討の軍を発し，４月には戦うことなく江戸を支配下においた。これを何とよんでいるか。","a":"江戸（無血）開城","t":"g"},{"n":3,"q":"2（＝江戸開城）は，政府軍の参謀と旧幕臣との会談の成果であったが，政府軍の参謀とはだれか。","a":"西郷隆盛","t":"p"},{"n":4,"q":"2（＝江戸開城）は，政府軍の参謀と旧幕臣との会談の成果であったが，旧幕臣とはだれか。","a":"勝義邦（海舟）","t":"p"},{"n":5,"q":"2（＝江戸開城）に不満を持つ旧幕臣は，上野の寛永寺に拠って抗戦したが，この約1000人からなる旧幕臣の有志隊を何というか。","a":"彰義隊","t":"g"},{"n":6,"q":"仙台・米沢両藩の提唱で，東北25藩と越後６藩とが会津藩を救済するため同盟を結んだが，この同盟を何というか。","a":"奥羽越列藩同盟","t":"g"},{"n":7,"q":"会津藩が敗北し，6（＝奥羽越列藩同盟）の同盟が崩壊したのは西暦何年か。","a":"1868年","t":"d"},{"n":8,"q":"旧幕府海軍副総裁が，軍艦を率い蝦夷地で抗戦した戦いを何というか。","a":"五稜郭の戦い（箱館戦争）","t":"g"},{"n":9,"q":"8（＝五稜郭の戦い）の戦いで降伏した旧幕府海軍副総裁はだれか。","a":"榎本武揚","t":"p"},{"n":10,"q":"鳥羽・伏見の戦いから五稜郭の戦いまでを，総称して何というか。","a":"戊辰戦争","t":"g"},{"n":11,"q":"1868年１月に倒幕のため，関東・東北の脱藩士・豪農商を組織し，年貢半減を布告しながら進撃した草莽の志士はだれか。","a":"相楽総三","t":"p"},{"n":12,"q":"11（＝相楽総三）の志士が組織した草莽隊（義勇軍）を何というか。","a":"赤報隊","t":"g"},{"n":13,"q":"12（＝赤報隊）の隊は政府軍の先鋒と称して進撃したものの，途中で弾圧されたが，政府軍からはどのように扱われたか。","a":"偽官軍","t":"g"},{"n":14,"q":"薩摩・長州など西南雄藩の下級武士たちが中心となって進めたもので，幕府体制を崩壊させ，近代天皇制国家を創出していく一連の大改革を総称して何というか。","a":"明治維新","t":"g"},{"n":15,"q":"明治政府の基本方針は天皇が天地神明に誓うという形式で発表されたが，これを何というか。","a":"五箇条の誓文","t":"g"},{"n":16,"q":"15（＝五箇条の誓文）の基本方針は西暦何年の何月に発布されたか。","a":"1868年3月","t":"d"},{"n":17,"q":"15（＝五箇条の誓文）の基本方針の要点を２つあげよ。","a":"公議世論の尊重・開国和親","t":"g"},{"n":18,"q":"15（＝五箇条の誓文）の基本方針の原案作成者はだれか。","a":"由利公正","t":"p"},{"n":19,"q":"15（＝五箇条の誓文）の基本方針の加筆修正者を２人あげよ。","a":"福岡孝弟・木戸孝允","t":"g"},{"n":20,"q":"1868年閏４月に，新政府の基本的政治組織を定めた法令が発表されたが，これを何というか。","a":"政体書","t":"g"},{"n":21,"q":"20（＝政体書）の法令の起草に関係した人物を２人あげよ。","a":"福岡孝弟・副島種臣","t":"g"},{"n":22,"q":"20（＝政体書）の法令に示された三権分立制はどこの国のものをモデルとしたものか。","a":"アメリカ","t":"l"},{"n":23,"q":"20（＝政体書）の法令で示された政治制度で，古代の律令において採用されていたものは何か。","a":"太政官制","t":"g"},{"n":24,"q":"明治時代の23（＝太政官制）の政治制度は西暦何年までつづいたか。","a":"1885年","t":"d"},{"n":25,"q":"明治政府が五箇条の誓文公布の翌日に出した，民衆統制のための高札を何というか。","a":"五榜の掲示","t":"g"},{"n":26,"q":"25（＝五榜の掲示）の高札で永世の定法とされたのは，五倫の道の遵守，徒党・強訴・逃散の禁止のほかに何があったか。","a":"キリスト教の禁止","t":"g"},{"n":27,"q":"明治政府は，天皇一代の間は，元号（年号）は１つのみと定めたが，この制度を何というか。","a":"一世一元の制","t":"g"},{"n":28,"q":"1868年７月に江戸を東京と改め，翌年３月に天皇も行幸し，東京に首都を移した。これを何というか。","a":"東京遷都","t":"g"}]},{"t":"廃藩置県","q":[{"n":1,"q":"木戸孝允・大久保利通らの画策で，４藩主が連名で領地や領民を奉還する上表を提出したが，これを何といっているか。","a":"版籍奉還","t":"g"},{"n":2,"q":"1（＝版籍奉還）の上表は西暦何年のことか。","a":"1869年","t":"d"},{"n":3,"q":"1（＝版籍奉還）の上表を提出した４藩とはどこか。","a":"薩摩・長州・土佐・肥前","t":"l"},{"n":4,"q":"1（＝版籍奉還）の上表により，旧藩主は明治政府からあらためて地方官に任命されたが，その地方官名をあげよ。","a":"知藩事","t":"g"},{"n":5,"q":"政府は中央集権体制を確立するため，薩長土３藩から募集した兵力を背景にして，従来の府・藩・県の三治体制を改める改革を断行したが，この改革を何というか。","a":"廃藩置県","t":"g"},{"n":6,"q":"5（＝廃藩置県）の制度は西暦何年に行われたか。","a":"1871年","t":"d"},{"n":7,"q":"5（＝廃藩置県）の制度により知藩事が廃され，新たに中央から官僚が地方官に任じられた。この地方官を２つあげよ。","a":"府知事・県令","t":"g"},{"n":8,"q":"5（＝廃藩置県）の制度実施に備え，政府が薩長土３藩から募集して編成した兵力を何というか。","a":"（御）親兵","t":"g"},{"n":9,"q":"5（＝廃藩置県）の制度実施の直前に編成された新政府直属軍は，翌1872（明治５）年に何と改称されたか。","a":"近衛兵","t":"g"},{"n":10,"q":"政体書にもとづいて，太政官は七官から構成されていたが，行政機関を何というか。","a":"行政官","t":"g"},{"n":11,"q":"太政官七官制で，財政統轄機関を何というか。","a":"会計官","t":"g"},{"n":12,"q":"太政官七官制で，祭祀をつかさどる機関を何というか。","a":"神祇官","t":"g"},{"n":13,"q":"太政官七官制で，軍政処理機関を何というか。","a":"軍務官","t":"g"},{"n":14,"q":"太政官七官制で，外務行政機関を何というか。 :"明治新政府の樹立に貢献した薩長土肥，特に薩長出身の指導者が大きな勢力をつくり要職を独占した。こうした勢力を漢字２文字で何というか。","a":"藩閥","t":"g"},{"n":44,"q":"政府は強力な近代的兵制を樹立するため，国民皆兵主義にもとづく太政官布告を出したが，これを何というか。","a":"徴兵告諭","t":"g"},{"n":45,"q":"徴兵制度の構想を立てた長州藩出身の人物はだれか。","a":"大村益次郎","t":"p"},{"n":46,"q":"徴兵制度を実現させた長州藩出身の人物はだれか。","a":"山県有朋","t":"p"},{"n":47,"q":"徴兵告諭は西暦何年に出されたか。","a":"1872年","t":"d"},{"n":48,"q":"徴兵告諭にもとづき，満20歳以上の男性を兵籍に編入し，３カ年の軍役に服させる法令が出されたが，これを何というか。","a":"徴兵令","t":"g"},{"n":49,"q":"48（＝徴兵令）の法令は西暦何年に制定されたか。","a":"1873年","t":"d"},{"n":50,"q":"48（＝徴兵令）の法令で整備された政府の常備軍は重要地に配備されたが，この軍団を何というか。","a":"鎮台","t":"g"},{"n":51,"q":"1874年に警察制度の整備・拡充策の一環として，東京の警察行政を担うために新設された官庁を何というか。","a":"警視庁","t":"g"}]},{"t":"四民平等","q":[{"n":1,"q":"1869（明治２）年に明治政府は封建的身分制度を撤廃したが，これを何というか。","a":"四民平等","t":"g"},{"n":2,"q":"1（＝四民平等）の制度にともない公家・大名は何とよばれるようになったか。","a":"華族","t":"g"},{"n":3,"q":"1（＝四民平等）の制度にともない旧幕臣・旧藩士は何とよばれるようになったか。","a":"士族","t":"g"},{"n":4,"q":"1（＝四民平等）の制度にともない農工商に属する庶民は何とよばれるようになったか。","a":"平民","t":"g"},{"n":5,"q":"1（＝四民平等）の制度にともない足軽など最下層の武士は何とよばれるようになったか。","a":"卒（卒族）","t":"g"},{"n":6,"q":"全国統一の戸籍作成法規として1871年に制定されたものを何というか。","a":"戸籍法","t":"g"},{"n":7,"q":"6（＝戸籍法）の法規にもとづき，1872年に最初の近代的戸籍がつくられたが，これを何というか。","a":"壬申戸籍","t":"g"},{"n":8,"q":"1871年にえた・非人の称を廃し，身分・職業とも平民同様とする太政官布告が出されたが，これを何というか。","a":"（身分）解放令","t":"g"},{"n":9,"q":"1870年から1875年にかけて出された平民の身分にかかわる諸法令によって，全国民が名乗ることになったものは何か。","a":"苗字","t":"g"},{"n":10,"q":"1876年に出された，軍人・警官以外が帯刀することを禁止した法令を何というか。","a":"廃刀令","t":"g"},{"n":11,"q":"華士族への秩禄の支給は，国家財政上大きな負担であったため，その支給を打ち切ることにしたが，秩禄とは具体的に何と何であったか。","a":"家禄・賞典禄","t":"g"},{"n":12,"q":"1873年に秩禄奉還の法によって，公債と現金を一括支給することによりその一部を整理したが，ついに1876年に公債のみを与えて，その支給を打ち切った。この公債の証書を何というか。","a":"金禄公債証書","t":"g"},{"n":13,"q":"明治政府の一連の俸禄支給制度の廃止を，何とよんでいるか。","a":"秩禄処分","t":"g"},{"n":14,"q":"俸禄支給制度廃止により，収入を失った士族たちは急激に没落し始めた。そこで，政府は士族救済のために農工商への就業奨励を行ったがこの方策を何というか。","a":"士族授産","t":"g"},{"n":15,"q":"明治維新後，なれない商業に手を出して失敗する士族が多かった。これを何とよんだか。","a":"士族の商法","t":"g"}]},{"t":"地租改正","q":[{"n":1,"q":"明治政府は1871（明治４）年に田畑に自由に作物をつくることを認めたが，江戸時代の作付制限令を何といったか。","a":"田畑勝手
