る事件がおこった。この事件を何というか。","a":"西安事件","t":"g"},{"n":3,"q":"2（＝西安事件）の事件の結果，1937年に中国共産党と国民党の提携が実現したが，これを何というか。","a":"第2次国共合作","t":"g"},{"n":4,"q":"1937年９月，中国で抗日運動のための組織が結成されたが，これを何というか。","a":"抗日民族統一戦線","t":"g"},{"n":5,"q":"1937年６月に広い階層から期待を受けて，貴族院議長であった人物が組閣した内閣名をあげよ。","a":"第1次近衛文麿内閣","t":"g"},{"n":6,"q":"5（＝第1次近衛文麿内閣）の内閣が成立して１カ月後の1937年７月７日，北京郊外で日中両国軍による武力衝突事件がおこったが，これを何というか。","a":"盧溝橋事件","t":"g"},{"n":7,"q":"6（＝盧溝橋事件）の事件に対し，内閣は最初不拡大方針をとったが，軍部強硬派の圧力もあり，中国との全面戦争に突入することになった。この戦争を何というか。","a":"日中戦争","t":"g"},{"n":8,"q":"7（＝日中戦争）の戦争は戦前の日本では何とよばれたか。はじめの呼称と，戦火が拡大した後の呼称と２つあげよ。","a":"北支事変・支那事変","t":"g"},{"n":9,"q":"1937年12月に日本軍が中国の首都を占領し，おびただしい数の中国人難民・婦女子や武器を捨てた兵士たちを殺害した。これを何とよんでいるか。","a":"南京事件","t":"g"},{"n":10,"q":"首都を占領しても，日中戦争を収拾する機会をつかむことができなかった日本は，1938年１月，政府が「国民政府を対手とせず」の声明を発表し，事態をさらに悪化させた。この声明を何というか。","a":"第1次近衛声明","t":"g"},{"n":11,"q":"1938年11月の第２次近衛声明では，日中戦争を日満華３国提携による経済的・政治的結束と繁栄・防共の体制をつくり出すためのものと発表したが，この体制を何とよんだか。","a":"東亜新秩序","t":"g"},{"n":12,"q":"第２次近衛声明に応じて，重慶から脱出した中国国民政府の要人はだれか。","a":"汪兆銘（汪精衛）","t":"p"},{"n":13,"q":"日本政府は1940年に，12（＝汪兆銘）の人物に傀儡政権を樹立させたが，この政府を何というか。","a":"新国民政府（南京政府）","t":"g"}]},{"t":"戦時統制と生活","q":[{"n":1,"q":"日中戦争にともない，戦争遂行の物資動員計画や経済統制を行うため，1937（昭和12）年に設置された機関は何か。","a":"企画院","t":"g"},{"n":2,"q":"日中戦争にともない，軍需産業に資金や輸入資材を集中的に割り当てるために，1937年に制定された法律を２つあげよ。","a":"臨時資金調整法・輸出入品等臨時措置法","t":"g"},{"n":3,"q":"中国との戦争が長期化するのにともない，政府は議会の承認なしに，勅令によって人的・物的資源を統制・運用できる法律を制定したが，これを何というか。","a":"国家総動員法","t":"g"},{"n":4,"q":"3（＝国家総動員法）の法律は西暦何年，何内閣の時に成立したか。","a":"1938年・第1次近衛文麿内閣","t":"d"},{"n":5,"q":"3（＝国家総動員法）の法律にもとづき，翌年，一般国民を軍需産業に動員することができる勅令が出されたが，これを何というか。","a":"国民徴用令","t":"g"},{"n":6,"q":"3（＝国家総動員法）の法律にもとづき，原則として1939年９月18日の価格から物価値上げを禁止し，戦時適正価格（公定価格）制を実施する勅令が出されたが，これを何というか。","a":"価格等統制令","t":"g"},{"n":7,"q":"電力会社を単一の国策会社（日本発送電会社）に統合し，電力の国家管理を行う目的で，国家総動員法と同時に制定された法律を何というか。","a":"電力（国家）管理法","t":"g"},{"n":8,"q":"戦時体制が強化されるなかで，日用品の統制のために，1941年に米に適用された制度を何というか。","a":"配給制","t":"g"},{"n":9,"q":"1940年に出された，高級衣料や装飾品など贅沢品の製造・販売を禁止した制限規則を何というか。","a":"七・七禁令","t":"g"},{"n":10,"q":"1938年に，資本家や労働者が一体となって各職場につくった組織を何というか。","a":"産業報国会","t":"g"},{"n":11,"q":"すべての国民諸組織を戦時体制に動員し，日本精神の高揚をはかった第１次近衛文麿内閣による運動を何というか。","a":"国民精神総動員運動","t":"g"},{"n":12,"q":"1937年，日本は天皇を中心とする家族国家であるというような思想を広めるために，文部省が発行したテキストを何というか。","a":"国体の本義","t":"g"},{"n":13,"q":"植民地経済政策の研究者で，大陸政策を批判し，1937年，その論説「国家の理想」が反戦思想と攻撃されて東京帝国大学を追われた学者はだれか。","a":"矢内原忠雄","t":"p"},{"n":14,"q":"1938年に，『ファシズム批判』などが発禁となり，東京帝国大学を休職させられた自由主義経済学者はだれか。","a":"河合栄治郎","t":"p"},{"n":15,"q":"1937年12月，戦争反対・ファシズム反対をよびかけていた日本無産党・日本労働組合全国評議会が突如解散させられ，関係者400人余りが検挙された。さらに翌年２月には東京帝国大学教授らが検挙されたが，この事件を何というか。","a":"人民戦線事件","t":"g"},{"n":16,"q":"15（＝人民戦線事件）の事件で検挙された東京帝国大学教授で，労農派の指導的理論家として活躍していたのはだれか。","a":"大内兵衛","t":"p"}]},{"t":"戦時下の文化","q":[{"n":1,"q":"1930年代後半には日本の伝統文化を重視する傾向が強まったが，仏教美術や思想に傾倒した亀井勝一郎や，古典に関心を持った保田与重郎らが刊行した雑誌は何か。","a":"日本浪曼派","t":"g"},{"n":2,"q":"徐州作戦を描きベストセラーとなった戦争文学『麦と兵隊』の作者はだれか。","a":"火野葦平","t":"p"},{"n":3,"q":"日本軍の残虐行為の描写で発禁処分となった『生きてゐる兵隊』の作者はだれか。","a":"石川達三","t":"p"},{"n":4,"q":"1942年，政府の外郭団体として結成された小説家による戦争協力のための組織を何というか。","a":"日本文学報国会","t":"g"}]},{"t":"第二次世界大戦の勃発","q":[{"n":1,"q":"1939（昭和14）年に，枢密院議長を首班として成立した内閣は，ドイツが防共協定の仮想敵国であるソ連と条約を結ぶという世界情勢の激変に対応できず，「欧州情勢は複雑怪奇」として総辞職したが，この内閣を何というか。","a":"平沼騏一郎内閣","t":"g"},{"n":2,"q":"1939年に，1（＝平沼騏一郎内閣）の内閣が総辞職したが，その原因となった，国際条約を何というか。","a":"独ソ不可侵条約","t":"g"},{"n":3,"q":"日本は仮想敵国であるソ連と，1938年から1939年にかけて紛争をひきおこした。ソ満国境の東部での紛争と，満州西北部の満蒙国境での紛争名をそれぞれあげよ。","a":"張鼓峰事件・ノモンハン事件","t":"g"},{"n":4,"q":"1939年に，日本が南シナ海の中国の海南島を占領し南方進出の姿勢を示すと，アメリカは日本との条約を破棄する通告をした。この条約を何というか。","a":"日米通商航海条約","t":"g"},{"n":5,"q":"1939年９月に，ドイツのポーランド侵入に対する英・仏の対独宣戦布告で開始された戦争を何というか。","a":"第二次世界大戦","t":"g"},{"n":6,"q":"1939年に，欧州戦争に不介入，日中戦争解決に邁進する旨の声明を発表した内閣名をあげよ。","a":"阿部信行内閣","t":"g"},{"n":7,"q":"1940年７月に，日独伊三国軍事同盟締結に反対したため，陸軍の協力が得られず，総辞職した内閣名をあげよ。","a":"米内光政内閣","t":"g"},{"n":8,"q":"第二次世界大戦勃発後，ヨーロッパでのドイツ優位のなかで，欧米列強の植民地支配からアジアを開放し，日本を盟主とする共存共栄の秩序の確立がとなえられた。この構想は何か。","a":"大東亜共栄圏","t":"g"},{"n":9,"q":"議会において，軍・政府の中国での戦争政策を批判する反軍演説を行い，衆議院議員を除名された立憲民政党所属の議員はだれか。","a":"斎藤隆夫","t":"p"}]},{"t":"新体制と三国同盟","q":[{"n":1,"q":"1940（昭和15）年，枢密院議長を辞した人物が新しい国民組織をつくるための運動を始めると，軍部もこれを支持し，この人物が組閣した。この内閣名をあげよ。","a":"第2次近衛文麿内閣","t":"g"},{"n":2,"q":"1（＝第2次近衛文麿内閣）の内閣が推進した新しい国民組織をつくる運動を何というか。","a":"新体制運動","t":"g"},{"n":3,"q":"2（＝新体制運動）の運動の結果，首相を総裁，道府県知事を支部長とする官製の全国組織が成立したが，この組織を何というか。","a":"大政翼賛会","t":"g"},{"n":4,"q":"５～10戸ほどで構成される，3（＝大政翼賛会）の組織の最末端組織を何というか。","a":"隣組","t":"g"},{"n":5,"q":"都市や村において，4（＝隣組）の上部におかれた組織を何というか，２つあげよ。","a":"町内会・部落会","t":"g"},{"n":6,"q":"大政翼賛会の傘下におさめられた婦人団体の統合組織を何というか。","a":"大日本婦人会","t":"g"},{"n":7,"q":"労働組合や労働団体が解散して，工場ごとに新たな組織を結成し，その全国連合体が1940年に成立した。大政翼賛会傘下のこの団体を何というか。","a":"大日本産業報国会","t":"g"},{"n":8,"q":"1941年に，小学校はナチ党の教育制度を模倣して８年制の義務教育となり，何と改称されたか。","a":"国民学校","t":"g"},{"n":9,"q":"1939年に，朝鮮では姓名を日本風に改名することが強制されたが，このことを何というか。","a":"創氏改名","t":"g"},{"n":10,"q":"戦時体制が強まるなかで，朝鮮や台湾で，9（＝創氏改名）の強制や，日本語使用や宮城遙拝・神社参拝などが強制されたが，この政策を何というか。","a":"皇民化政策","t":"g"},{"n":11,"q":"第２次近衛文麿内閣は懸案の枢軸国との相互援助の協定を締結したが，これを何というか。また，西暦何年に結ばれたか。","a":"日独伊三国同盟・1940年","t":"d"},{"n":12,"q":"11（＝日独伊三国同盟・1940年）の同盟締結の直前に，日本は英・米が行っていた重慶の蔣介石政権への援助阻止と南方進出を目的として，ハノイへ軍を進めたが，これを何というか。","a":"北部仏印進駐","t":"g"},{"n":13,"q":"日中戦争で英・米が行っていた中国の重慶への援助ルートを何とよぶか。","a":"援蔣ルート","t":"g"}]},{"t":"太平洋戦争の始まり","q":[{"n":1,"q":"対米開戦を避けようとした第２次近衛文麿内閣は，1941（昭和16）年４月から駐米特命全権大使に日米交渉を開始させたが，この大使名とアメリカ側代表名をあげよ。","a":"野村吉三郎・ハル","t":"g"},{"n":2,"q":"日米交渉に強く反対した第２次近衛文麿内閣の外務大臣はだれか。","a":"松岡洋右","t":"p"},{"n":3,"q":"第２次近衛文麿内閣は，ソ連との間で中立友好と領土保全・不可侵を約した条約を締結したが，この条約を何というか。","a":"日ソ中立条約","t":"g"},{"n":4,"q":"3（＝日ソ中立条約）の条約は西暦何年に締結されたか。","a":"1941年","t":"d"},{"n":5,"q":"独ソ開戦に刺激された陸軍は，対ソ武力行使を予想して，1941年７月に，満州に兵力を集結し演習を行ったが，これを何とよんでいるか。","a":"関東軍特種演習（関特演）","t":"g"},{"n":6,"q":"陸海軍の代表や首相をはじめ，政府代表が参加する大本営政府連絡会議に天皇が臨席する場合，この会議は何とよばれたか。","a":"御前会議","t":"g"},{"n":7,"q":"1941年に行われた，現在のベトナム南部への軍事進出を何というか。","a":"南部仏印進駐","t":"g"},{"n":8,"q":"日本による7（＝南部仏印進駐）の軍事行動に対して，アメリカは在米日本人の資産を凍結するとともに，あるものの対日輸出を禁止した。それは何か。","a":"石油","t":"g"},{"n":9,"q":"7などの日本による南進政策に対し，1941年以降に強化された米・英・中・蘭の対日包囲網を何とよんだか。","a":"ABCD包囲陣","t":"g"},{"n":10,"q":"1941年９月６日の御前会議では，10月上旬までに対米交渉がまとまらない場合に対米・英・蘭開戦を決定したが，この御前会議での決定を何というか。","a":"帝国国策遂行要領","t":"g"},{"n":11,"q":"日米交渉は失敗に終わり，1941年10月に新内閣が成立したが，この内閣の首相はだれか。","a":"東条英機","t":"p"},{"n":12,"q":"アメリカの国務長官が提出した，満州事変以前の状態への復帰を求める米国側最終提案を，何とよんでいるか。","a":"ハル＝ノート","t":"g"},{"n":13,"q":"1941年12月８日に，日本が米・英に宣戦を布告して始まった戦争を何というか。","a":"太平洋戦争","t":"g"},{"n":14,"q":"1941年12月８日に，日本海軍機動部隊はアメリカに対し奇襲攻撃を敢行したが，これを何とよんでいるか。","a":"真珠湾攻撃","t":"g"}]},{"t":"戦局の展開","q":[{"n":1,"q":"第二次世界大戦で日・独・伊を中心とする国に対し，米・英・ソを中心とする国を何というか。","a":"連合国","t":"g"},{"n":2,"q":"1942（昭和17）年の選挙に際して，東条英機内閣は大政翼賛会・財界などの代表を招いて協議会を結成し，候補者を推薦して選挙に臨んだが，この選挙を何というか。","a":"翼賛選挙","t":"g"},{"n":3,"q":"1942年の選挙で推薦を受けて当選した議員（翼賛議員）を中心に，東条英機首相の指示で結成された政治結社を何というか。","a":"翼賛政治会","t":"g"},{"n":4,"q":"太平洋戦争の戦局は，1942年６月に行われた海戦で日本が大敗北を喫して制空・制海権を失うと，大きく転換した。この戦いを何というか。","a":"ミッドウェー海戦","t":"g"},{"n":5,"q":"マリアナ諸島のある島が，アメリカ軍に占領され，アメリカ軍機の日本爆撃の基地となったが，この島を何というか。","a":"サイパン島","t":"g"},{"n":6,"q":"5（＝サイパン島）の島が陥落したあと，東条英機内閣は総辞職したが，そのあとに首相になった人物はだれか。","a":"小磯国昭","t":"p"},{"n":7,"q":"日本は，太平洋戦争中の1943年にアジア諸国の代表者を集めて東京で会議を開いたが，この会議を何というか。","a":"大東亜会議","t":"g"},{"n":8,"q":"日中戦争において，中国共産党が華北の農村地帯に解放区を設定してゲリラ戦を展開したが，日本軍の抗日ゲリラ掃討作戦を中国側では何とよんだか。","a":"三光作戦","t":"g"},{"n":9,"q":"日中戦争では毒ガスも使用され，細菌兵器の研究も行われたが，ハルビン郊外におかれた細菌戦研究の特殊部隊は一般に何とよばれるか。","a":"731部隊","t":"g"}]},{"t":"国民生活の崩壊","q":[{"n":1,"q":"戦線の拡大と戦争の長期化にともない，戦力・労働力の不足が生じ，学生・生徒や女性を軍需工場などへ動員したが，これを何というか。","a":"勤労動員","t":"g"},{"n":2,"q":"1943（昭和18）年以降，未婚の女性たちを軍需工場に動員したが，これを何というか。","a":"女子挺身隊","t":"g"},{"n":3,"q":"1943年９月には，文科系大学生の徴兵猶予が停止され，戦場へ送られることになったが，これを何というか。","a":"学徒出陣","t":"g"},{"n":4,"q":"空襲被害を避けるために大都市の学童は地方へ集団で移動させられたが，これを何というか。","a":"学童疎開","t":"g"},{"n":5,"q":"1944年６月にマリアナ群島中にあった日本の拠点サイパン島が陥落したため，日本の主要都市が米軍のＢ29爆撃機により空襲を受けるようになった。この空襲を何とよんだか。","a":"本土空襲","t":"g"},{"n":6,"q":"1945年３月10日，米軍機の首都圏への爆撃は，10万人以上の死者と11万人以上の負傷者を出した。この爆撃を何とよんでいるか。","a":"東京大空襲","t":"g"}]},{"t":"敗戦","q":[{"n":1,"q":"1945（昭和20）年４月に米軍が上陸を開始し，激しい地上戦が展開され，軍人・民間人18万人余りが犠牲となり，６月末には占領されたのはどこか。","a":"沖縄本島","t":"l"},{"n":2,"q":"1945年４月に成立した内閣の総理大臣で，主戦派をおさえてポツダム宣言の受諾を決定したのはだれか。","a":"鈴木貫太郎","t":"p"},{"n":3,"q":"1943年11月に，米・英・中の首脳が会談して対日戦争の遂行・処理案を決定・発表したが，これを何というか。","a":"カイロ宣言","t":"g"},{"n":4,"q":"3（＝カイロ宣言）の宣言について話し合った会談に参加した米・英・中の首脳の名をあげよ。","a":"ローズヴェルト・チャーチル・蔣介石","t":"g"},{"n":5,"q":"1945年２月，米・英・ソ連の首脳がクリミア半島で会談し，ソ連の対日参戦を決定する秘密協定を結んだが，これを何というか。","a":"ヤルタ協定","t":"g"},{"n":6,"q":"1945年７月，米・英・ソ連の首脳がベルリン郊外で会談し，米・英・中の３国の名で日本の戦後処理方針と日本軍隊の無条件降伏を勧告する宣言を発表したが，これを何というか。","a":"ポツダム宣言","t":"g"},{"n":7,"q":"ヤルタ・ポツダムの会談に参加したソ連の首脳はだれか。","a":"スターリン","t":"p"},{"n":8,"q":"ポツダム会談に参加したアメリカの大統領はだれか。","a":"トルーマン","t":"p"},{"n":9,"q":"原子爆弾がはじめて投下された都市はどこか。","a":"広島","t":"l"},{"n":10,"q":"9（＝広島）に原子爆弾が投下されたのは西暦何年何月何日か。","a":"16655","t":"d"},{"n":11,"q":"２つ目の原子爆弾が投下された都市はどこか。","a":"長崎","t":"l"},{"n":12,"q":"1945年８月に中立条約を破棄して日本に宣戦布告し，満州・朝鮮に侵攻した国はどこか。","a":"ソ連","t":"l"},{"n":13,"q":"ポツダム宣言を受諾したことは，1945年８月15日正午に，国民に対してどのような方法で伝えられたか。","a":"天皇のラジオ放送（玉音放送）","t":"g"},{"n":14,"q":"1945年９月２日には，アメリカ軍の戦艦上で，降伏文書の調印が行われたが，この戦艦名を何というか。","a":"ミズーリ号","t":"g"},{"n":15,"q":"降伏文書に署名した政府代表で，東久邇宮稔彦内閣の外務大臣はだれか。","a":"重光葵","t":"p"}]}]}]},{"t":"第11章　占領下の日本","sec":[{"t":"1　占領と改革","s":[{"t":"戦後世界秩序の形成","q":[{"n":1,"q":"1945（昭和20）年に，連合国50カ国が国際平和確立のためにサンフランシスコ会議を開いたが，その席上採択された憲章を何というか。","a":"国際連合憲章","t":"g"},{"n":2,"q":"1（＝国際連合憲章）を批准した51カ国で発足した，国際機構を何というか。","a":"国際連合","t":"g"},{"n":3,"q":"2（＝国際連合）の国際機構の中心的機関で，平和の破壊や侵略に対し，軍事的制裁措置を決定できる機関を何というか。","a":"安全保障理事会","t":"g"},{"n":4,"q":"第二次世界大戦後の世界は，軍事力と経済力を有する２大国を軸に展開することになったが，その２国をあげよ。","a":"アメリカ・ソ連","t":"g"},{"n":5,"q":"日本の占領地域で，大戦後にスカルノを中心に独立を宣言し，オランダとの間で独立戦争を戦った国はどこか。","a":"インドネシア","t":"l"},{"n":6,"q":"日本の占領地域で，大戦後に独立を宣言し，フランスとの間で独立戦争を戦った国はどこか。","a":"ベトナム","t":"l"},{"n":7,"q":"日本の降伏とともに北緯38度線で米・ソに分割占領され，統一的な独立ができなかったのはどこか。","a":"朝鮮","t":"l"}]},{"t":"初期の占領政策","q":[{"n":1,"q":"ポツダム宣言の受諾によって，日本は連合国軍の占領下におかれたが，連合国軍最高司令官総司令部の略称をあげよ。","a":"GHQ／SCAP","t":"g"},{"n":2,"q":"連合国軍最高司令官総司令部の最高司令官に就任したのはだれか。","a":"マッカーサー","t":"p"},{"n":3,"q":"ワシントンに設置された，連合国11カ国（のち13カ国）からなる占領政策の最高決定機関を何というか。","a":"極東委員会","t":"g"},{"n":4,"q":"東京に設置された，米英中ソ４カ国からなるGHQの諮問機関を何というか。","a":"対日理事会","t":"g"},{"n":5,"q":"降伏直後に成立した内閣は，治安維持法の廃止や内務省の解体（人権指令）をためらったため，GHQの圧力で総辞職に追い込まれたが，この内閣の総理大臣はだれか。","a":"東久邇宮稔彦","t":"p"},{"n":6,"q":"戦前に外務大臣として協調外交を推進し，5（＝東久邇宮稔彦）の内閣にかわって内閣を組織したのはだれか。","a":"幣原喜重郎","t":"p"},{"n":7,"q":"GHQは6（＝幣原喜重郎）の内閣に対して，婦人の解放や労働組合の結成奨励・教育の自由主義化・圧政的諸制度の廃止・経済の民主化についての指令を発したが，これを何というか。","a":"五大改革指令","t":"g"},{"n":8,"q":"戦後，思想・言論など市民的自由が保障されたものの，占領軍に対する批判は禁止された。GHQによる新聞・出版に対する検閲の基準を何というか。","a":"プレス＝コード","t":"g"},{"n":9,"q":"戦争犯罪人（戦犯）とされた者のうち，「平和に対する罪」を問われた人々を何というか。","a":"Ａ級戦犯","t":"g"},{"n":10,"q":"9（＝Ａ級戦犯）の戦犯に対する連合国の裁判を何というか。","a":"極東国際軍事裁判（東京裁判）","t":"g"},{"n":11,"q":"GHQの指令で，戦争協力者・職業軍人・国家主義者などが政界・官界・財界・言論界などから排除されたが，これを何というか。","a":"公職追放","t":"g"},{"n":12,"q":"戦後，天皇が神格を否定した宣言を行ったが，これを何というか。","a":"天皇の人間宣言","t":"g"},{"n":13,"q":"12（＝天皇の人間宣言）は西暦何年に出されたか。","a":"1946年","t":"d"}]},{"t":"民主化政策","q":[{"n":1,"q":"GHQが軍国主義の基盤になっていたと考えたもののうち，経済を民主化するためにその解体をはかったものがあるが，２つあげよ。","a":"寄生地主制・財閥","t":"g"},{"n":2,"q":"GHQの指令により，1945（昭和20）年に三井・三菱・住友・安田などの資産が凍結され，翌年にそれらの持株を管理・公売する改革が行われたが，これを何というか。","a":"財閥解体","t":"g"},{"n":3,"q":"2（＝財閥解体）を行う際，持株を管理・公売した機関を何というか。","a":"持株会社整理委員会","t":"g"},{"n":4,"q":"カルテル・トラストなどの企業結合や，不公正な取引を禁止した法律を何というか。","a":"独占禁止法","t":"g"},{"n":5,"q":"4（＝独占禁止法）の法は，西暦何年に出されたか。","a":"1947年","t":"d"},{"n":6,"q":"1947年に公布された経済民主化のための法律に，各産業部門の巨大独占企業を分割させる目的を持ったものがあるが，この法律を何というか。","a":"過度経済力集中排除法","t":"g"},{"n":7,"q":"寄生地主と高率小作料から農民を解放し，自作農創設を目的として２次にわたり実施されたものを何というか。","a":"農地改革","t":"g"},{"n":8,"q":"第一次の7（＝農地改革）にあたって改正された法律を何というか。","a":"農地調整法","t":"g"},{"n":9,"q":"第二次の7（＝農地改革）を実施するための基本的な法律を何というか。","a":"自作農創設特別措置法","t":"g"},{"n":10,"q":"第二次の7（＝農地改革）で，国家によって全貸付地を強制的に買収されたのはどのような人々か。","a":"不在地主","t":"g"},{"n":11,"q":"第二次の7（＝農地改革）で，国家によって１町歩（北海道は４町歩）をこえる貸付地を強制的に買収されたのはどのような人々か。","a":"在村地主","t":"g"},{"n":12,"q":"7（＝農地改革）の改革で，農地の買収や売渡しなどを実施するため，各市町村に設けられた機関を何というか。","a":"農地委員会","t":"g"},{"n":13,"q":"1945年12月に制定され，労働者の団結権・団体交渉権・争議権の保障などを定めた法律を何というか。","a":"労働組合法","t":"g"},{"n":14,"q":"1946年に制定され，労働争議の調整方法や争議行為の制限を内容とする法律を何というか。","a":"労働関係調整法","t":"g"},{"n":15,"q":"1947年に制定され，週48時間労働や年次有給休暇など，労働条件の最低基準を規定した法律を何というか。","a":"労働基準法","t":"g"},{"n":16,"q":"1945年から1947年にかけて，労働者の保護のため制定された３つの法律を総称して何とよんでいるか。","a":"労働三法","t":"g"},{"n":17,"q":"1946年に，産業別に統合された労働組合の全国組織を何というか。","a":"全日本産業別労働組合会議（産別）","t":"g"},{"n":18,"q":"1946年に成立した，都道府県別に連合した労働組合の全国的組織を何というか。","a":"日本労働組合総同盟（総同盟）","t":"g"},{"n":19,"q":"1950年に，産別を脱退した組合や中立組合などが反共民主労組として結成した全国組織を何というか。","a":"日本労働組合総評議会（総評）","t":"g"},{"n":20,"q":"1946年に，GHQの招請で，教育の民主化を勧告するために来日した使節団を何というか。","a":"アメリカ教育使節団","t":"g"},{"n":21,"q":"1947年３月に制定され，教育勅語にかわって教育の機会均等や男女共学の原則をうたった，教育に関する法律を何というか。","a":"教育基本法","t":"g"},{"n":22,"q":"1947年３月に，六・三・三・四の新学制を定めた法律を何というか。","a":"学校教育法","t":"g"},{"n":23,"q":"教育基本法によって義務教育は何年に延長されたか。","a":"9年","t":"d"},{"n":24,"q":"教育行政の地方分権化をはかるため，1948年に設置された機関を何というか。","a":"教育委員会","t":"g"},{"n":25,"q":"24（＝教育委員会）の機関の委員の選出方法は，1956年の改正により大きく変化したが，どのように改正されたか。","a":"公選制から任命制へ","t":"g"}]},{"t":"政党政治の復活","q":[{"n":1,"q":"1945（昭和20）年に，徳田球一・志賀義雄らを中心に，はじめて合法政党として活動を開始したのは何党か。","a":"日本共産党","t":"g"},{"n":2,"q":"1945年に，翼賛選挙の非推薦議員が旧無産政党各派を統合し，片山哲を書記長として結成された政党を何というか。","a":"日本社会党","t":"g"},{"n":3,"q":"1945年に，翼賛選挙の非推薦議員が旧立憲政友会系を統合して結成された政党を何というか。","a":"日本自由党","t":"g"},{"n":4,"q":"3（＝日本自由党）の党の初代総裁に就任したのはだれか。","a":"鳩山一郎","t":"p"},{"n":5,"q":"1945年に，旧立憲民政党系の翼賛選挙の推薦議員を中心に結成された政党を何というか。","a":"日本進歩党","t":"g"},{"n":6,"q":"1945年結成の政党で，協同組合主義・労使協調を主張した中間的保守政党を何というか。","a":"日本協同党","t":"g"},{"n":7,"q":"戦後，民主化政策の推進にともなって，女性参政権を認めるなど，議会の議員選挙も新しくなったが，この時に改正された法律を何というか。","a":"衆議院議員選挙法","t":"g"},{"n":8,"q":"女性参政権を認めた7（＝衆議院議員選挙法）の選挙法の公布は西暦何年に公布されたか。","a":"1945年","t":"d"},{"n":9,"q":"7（＝衆議院議員選挙法）の選挙法改正で，有権者は何歳以上とされたか。","a":"20歳以上","t":"n"},{"n":10,"q":"1946年，新選挙法による総選挙の結果，第１党になった政党名をあげよ。","a":"日本自由党","t":"g"},{"n":11,"q":"前総裁が公職追放を受けたあと日本自由党総裁となり，５次にわたって内閣を組織した人物はだれか。","a":"吉田茂","t":"p"}]},{"t":"日本国憲法の制定","q":[{"n":1,"q":"GHQによる憲法改正の指示を受け，幣原喜重郎内閣が松本烝治国務大臣を長として設置した組織を何というか。","a":"憲法問題調査委員会","t":"g"},{"n":2,"q":"森戸辰男や高野岩三郎ら学識経験者７名で結成された民間組織で，「憲法草案要綱」を作成したのは何という組織か。","a":"憲法研究会","t":"g"},{"n":3,"q":"マッカーサー草案をもとに政府は帝国憲法改正草案要綱を発表し，衆議院・貴族院で修正可決されたが，この新憲法の正式名称を何というか。","a":"日本国憲法","t":"g"},{"n":4,"q":"3（＝日本国憲法）の憲法の公布は西暦何年何月何日であったか。","a":"17109","t":"d"},{"n":5,"q":"新憲法の３原則は何か。","a":"主権在民・平和主義・基本的人権の尊重","t":"g"},{"n":6,"q":"新憲法第９条は何についての条文か。","a":"戦争放棄","t":"g"},{"n":7,"q":"新憲法では，天皇のあり方はどのように定められたか。","a":"国民統合の象徴","t":"g"},{"n":8,"q":"新憲法により，国権の最高機関と規定されたのは何か。","a":"国会","t":"g"},{"n":9,"q":"8（＝国会）の機関は，国民の選挙による議員で構成される２院からなるが，それぞれ何というか。","a":"衆議院・参議院","t":"g"},{"n":10,"q":"新憲法で，最高司法機関として設けられたものを何というか。","a":"最高裁判所","t":"g"},{"n":11,"q":"新憲法の精神にもとづいて，男女同権や相続など個人尊重の理念に従って大改正された法律を何というか。","a":"（新）民法","t":"g"},{"n":12,"q":"11（＝民法）の改正により，戸主が家族を統率・支配する権限が否定されたが，旧民法において戸主が家族についての権利を独占的に相続することを何というか。","a":"家督相続","t":"g"},{"n":13,"q":"戦後，地方公共団体の権限が強化され，地方公共団体の首長も公選されることになったが，これらの基本となった法律を何というか。","a":"地方自治法","t":"g"},{"n":14,"q":"人口5000人以上の市町村長の所轄とし，市町村公安委員会によって運営された警察を何というか。","a":"自治体警察","t":"g"},{"n":15,"q":"首相に直属し国家公安委員会によって運営され，14（＝自治体警察）が設置されない地域を所轄した警察を何というか。","a":"国家地方警察","t":"g"},{"n":16,"q":"戦前に地方行政や警察に権力をふるってきたが，GHQの命令で廃止された省庁は何か。","a":"内務省","t":"g"}]},{"t":"生活の混乱と大衆運動の高揚","q":[{"n":1,"q":"武装解除された日本軍人や兵隊が各自の家庭に帰り，平時の生活に戻ることを何とよんだか。","a":"復員","t":"g"},{"n":2,"q":"敗戦時にアジア諸地域に在留した民間人は，敗戦によって日本本土へ帰国することになったが，この海外在留日本人の帰国を何というか。","a":"引揚げ","t":"g"},{"n":3,"q":"敗戦の混乱のなかで，各地に生まれた露店形式で，公定価格外の自由取引市場のことを何というか。","a":"闇市","t":"g"},{"n":4,"q":"敗戦の混乱のなかで，深刻な食料不足から，人々は農村へ食料購入に出かけたが，これを何というか。","a":"買出し","t":"g"},{"n":5,"q":"敗戦後のインフレ阻止のため1946（昭和21）年２月に公布され，預金を封鎖して新銀行券と旧円を交換した法律を何というか。","a":"金融緊急措置令","t":"g"},{"n":6,"q":"戦後，鉄鋼・石炭などの基礎資材を増産するため，これらに資金・労働力などを優先的に集中投入した政策を何というか。","a":"傾斜生産方式","t":"g"},{"n":7,"q":"1947年に設立され，石炭・鉄鋼・電力などの基幹産業に資金を提供した政府の金融機関を何というか。","a":"復興金融金庫","t":"g"},{"n":8,"q":"戦後の労働運動の高まりのなかで，官公庁の組合を中心に大規模なゼネストが計画されたが，決行前日に中止された。これを何というか。","a":"二・一ゼネスト計画","t":"g"},{"n":9,"q":"8（＝二・一ゼネスト計画）の計画を進めた組織名をあげよ。","a":"全官公庁共同闘争委員会","t":"g"},{"n":10,"q":"8（＝二・一ゼネスト計画）が計画されたのは西暦何年のことか。","a":"1947年","t":"d"},{"n":11,"q":"8（＝二・一ゼネスト計画）に対し中止を命じた機関は何か。","a":"GHQ","t":"g"},{"n":12,"q":"強権的な農産物の供出や地主の土地取上げの反対などのために，1946年に結成された，戦後の農民運動の中心的組織を何というか。","a":"日本農民組合","t":"g"},{"n":13,"q":"1947年に，農民の農業経営や生活擁護の活動のために，各地に設立された組織を何というか。","a":"農業協同組合","t":"g"},{"n":14,"q":"日本社会党は，新憲法公布後の総選挙で第１党となり，1947年に同党を中心とする連立内閣をつくったが，その首班はだれか。","a":"片山哲","t":"p"},{"n":15,"q":"日本進歩党は1947年に民主党となり，翌年連立内閣を成立させたが，昭和電工事件で倒れた。この内閣の首班はだれであったか。","a":"芦田均","t":"p"},{"n":16,"q":"片山哲内閣・芦田均内閣で，与党となって労使協調を主張した政党を何というか。","a":"国民協同党","t":"g"}]}]},{"t":"2　冷戦の開始と講和","s":[{"t":"冷戦体制の形成と東アジア","q":[{"n":1,"q":"第二次世界大戦後，資本主義陣営（西側）と社会主義陣営（東側）とが国際間の重要問題について鋭く対立した状態を，実際の戦争に対して何とよんだか。","a":"冷戦（冷たい戦争）","t":"g"},{"n":2,"q":"1947（昭和22）年に，アメリカ大統領がアメリカの安全のため，ソ連「封じ込め」政策の必要を宣言したが，これを何というか。","a":"トルーマン＝ドクトリン","t":"g"},{"n":3,"q":"1947年に，アメリカは共産主義勢力の国際的進出に対抗して，西欧諸国の経済再建を援助する方針をとったが，これを何というか。","a":"マーシャル＝プラン","t":"g"},{"n":4,"q":"1949年に，アメリカは西欧諸国とともに，ソ連「封じ込め」の一環として共同防衛組織を結成したが，これを何というか。","a":"北大西洋条約機構（NATO）","t":"g"},{"n":5,"q":"1947年に，ソ連が中心となって西欧陣営に対抗して結成された，ヨーロッパ諸国の共産党・労働者党情報局の略称を何というか。","a":"コミンフォルム","t":"g"},{"n":6,"q":"ソ連は1949年に原爆を開発し，1955年には東ヨーロッパ８カ国で東欧８カ国友好協力相互援助条約を締結した。この条約による集団安全保障機構を何というか。","a":"ワルシャワ条約機構","t":"g"},{"n":7,"q":"東西二大陣営の対立が頂点に達した1948年から1949年にかけて，ドイツでおきた事件名をあげよ。","a":"ベルリン封鎖事件","t":"g"},{"n":8,"q":"7（＝ベルリン封鎖事件）の事件が契機となって，1949年にドイツは西ドイツと東ドイツに分立することになった。それぞれの正式国名を順にあげよ。","a":"ドイツ連邦共和国・ドイツ民主共和国","t":"g"},{"n":9,"q":"日中戦争終了後，中国で1945年11月から内戦を再開した２つの勢力をあげよ。","a":"国民党（国民政府）・共産党","t":"g"},{"n":10,"q":"9（＝国民党・共産党）の勢力のうち，中国内戦でアメリカの援助を受けた勢力の主席はだれか。","a":"蔣介石","t":"p"},{"n":11,"q":"1949年に，中国共産党によって樹立された国を何というか。","a":"中華人民共和国","t":"g"},{"n":12,"q":"1949年に，11（＝中華人民共和国）の国の国家主席に就任したのはだれか。","a":"毛沢東","t":"p"},{"n":13,"q":"1948年に，朝鮮半島南部の米軍占領地に成立した国を何というか。","a":"大韓民国","t":"g"},{"n":14,"q":"1948年に，朝鮮半島北部のソ連占領地に成立した国を何というか。","a":"朝鮮民主主義人民共和国","t":"g"},{"n":15,"q":"1948年に朝鮮半島に成立した，２つの国の境界線はどこか。","a":"北緯38度線","t":"l"}]},{"t":"占領政策の転換","q":[{"n":1,"q":"1948（昭和23）年に，GHQの指令を受け芦田均内閣は，労働運動の是正のため，国家公務員のスト（争議）を禁止する政令を出したが，この政令を何というか。","a":"政令201号","t":"g"},{"n":2,"q":"1（＝政令201号）の政令にもとづき改正された，公務員の争議権を否定することを明記した法律を何というか。","a":"国家公務員法","t":"g"},{"n":3,"q":"日本経済自立のため，1948年12月に，GHQが予算の均衡・徴税強化・賃金安定などの指示を行ったが，これを何というか。","a":"経済安定九原則","t":"g"},{"n":4,"q":"GHQの招きで1949年に来日したアメリカの特別公使が示した経済政策を何というか。","a":"ドッジ＝ライン","t":"g"},{"n":5,"q":"4（＝ドッジ＝ライン）の政策で，円とドルの換算について単一為替レートが採用されたが，１ドルは何円に固定されたか。","a":"360円","t":"g"},{"n":6,"q":"日本経済の自立のために，アメリカが派遣した使節団による税制改革の勧告を何というか。","a":"シャウプ勧告","t":"g"},{"n":7,"q":"ドッジ＝ラインが強行されるなかで不況が深刻化し，労働運動が激化した。そのような情勢のなか，国鉄の人員整理の発表直後に，国鉄総裁が轢死体で発見されたが，この事件を何というか。","a":"下山事件","t":"g"},{"n":8,"q":"国鉄の人員整理が進むなかで，東京都のある駅構内で無人電車が暴走した事件を何というか。","a":"三鷹事件","t":"g"},{"n":9,"q":"国鉄の人員整理が進むなかで，福島県のある駅付近でおこった列車転覆事件を何というか。","a":"松川事件","t":"g"},{"n":10,"q":"7・8・9など国鉄をめぐる真相不明の事件は，西暦何年におこったか。","a":"1949年","t":"d"}]},{"t":"朝鮮戦争と日本","q":[{"n":1,"q":"北緯38度線を境に南北に分立した国家の間で発生した戦争を何というか。","a":"朝鮮戦争","t":"g"},{"n":2,"q":"1（＝朝鮮戦争）の戦争が発生したのは西暦何年か。","a":"1950年","t":"d"},{"n":3,"q":"1（＝朝鮮戦争）の戦争で韓国を援助した軍事力を何というか。その主力となった国も答えよ。","a":"国連軍・アメリカ","t":"g"},{"n":4,"q":"朝鮮民主主義人民共和国を援助した軍事力を何というか。","a":"中国人民義勇軍","t":"g"},{"n":5,"q":"朝鮮戦争は1953（昭和28）年７月に休戦したが，この交渉地となった北緯38度線上の地名をあげよ。","a":"板門店","t":"g"},{"n":6,"q":"1953年に締結した，朝鮮戦争を一時停止することを約束した取り決めを何というか。","a":"朝鮮休戦協定","t":"g"},{"n":7,"q":"二大陣営の対立激化や中国革命の進展にともない，アメリカは対日政策を転換して，日本を「反共の防壁」とするようになった。このためGHQの指令で朝鮮戦争直前に共産党幹部の追放や，官公庁その他で共産主義者が追放されたが，これを何というか。","a":"レッド＝パージ","t":"g"},{"n":8,"q":"朝鮮戦争の勃発直後，在日米軍の朝鮮出動の軍事的空白をうめる目的で，第３次吉田茂内閣に対するマッカーサーの指令により新設されたものを何というか。","a":"警察予備隊","t":"g"}]},{"t":"講和と安保条約","q":[{"n":1,"q":"日本の独立を認めるための連合国との間の講和会議はどこで開催されたか。","a":"サンフランシスコ","t":"l"},{"n":2,"q":"1（＝サンフランシスコ）の講和会議は西暦何年に開かれたか。","a":"1951年","t":"d"},{"n":3,"q":"1（＝サンフランシスコ）の講和会議における日本の主席全権はだれか。","a":"吉田茂","t":"p"},{"n":4,"q":"日本と連合国48カ国との間で調印された平和条約を何というか。","a":"サンフランシスコ平和条約","t":"g"},{"n":5,"q":"アメリカを中心とする対日平和条約に反対し，調印しなかった参戦国で社会主義国はどこか。３つあげよ。","a":"ソ連・チェコスロヴァキア・ポーランド","t":"l"},{"n":6,"q":"代表権問題で米・英が対立したために，サンフランシスコ講和会議に招かれなかったアジアの主要参戦国を２つあげよ。","a":"中華民国・中華人民共和国","t":"g"},{"n":7,"q":"米・英を中心として進められた講和に反対し，交戦国すべての国との講和と厳正中立を要求する日本国内の主張を何というか ,"a":"1965年","t":"d"},{"n":6,"q":"1945年４月以降米軍の軍政下にあり，その後，アメリカの施政権下となっていた日本領が，1972年に正式に返還され本土に復帰した。それはどこか。","a":"沖縄","t":"l"},{"n":7,"q":"1971年に，佐藤栄作内閣とアメリカ政府間で，6（＝沖縄）の返還に関する正式協定書が調印されたが，これを何というか。","a":"沖縄返還協定","t":"g"},{"n":8,"q":"沖縄や小笠原諸島の返還にあたり，佐藤栄作内閣がアメリカとの交渉のなかで明確にした「（核兵器を）もたず，つくらず，もち込ませず」という原則があるが，それを何というか。","a":"非核三原則","t":"g"},{"n":9,"q":"1960年に，社会党右派が脱退して西尾末広を党首として結成された政党を何というか。","a":"民主社会党","t":"g"},{"n":10,"q":"1964年に，創価学会を支持母体として結成された新党を何というか。","a":"公明党","t":"g"}]}]},{"t":"2　経済復興から高度成長へ","s":[{"t":"朝鮮特需と経済復興","q":[{"n":1,"q":"不況に苦しんでいた日本経済に，朝鮮戦争によって好景気がもたらされたが，この好景気を何とよんだか。","a":"特需景気","t":"g"},{"n":2,"q":"1（＝特需景気）の好景気のなかで日本は，1952（昭和27）年にあいついで２つの国際金融機関に加盟したが，この２つをあげよ。","a":"国際通貨基金（IMF）・世界銀行（国際復興開発銀行，IBRD）","t":"d"},{"n":3,"q":"MSA協定や朝鮮復興資材の輸出などによってもたらされた，1955年から1957年の好景気を何というか。","a":"神武景気","t":"g"},{"n":4,"q":"1958年から1961年にかけて，従来以上の大型の好景気がおとずれたが，これを何というか。","a":"岩戸景気","t":"g"},{"n":5,"q":"戦後，不足していた食料は，アメリカの資金援助による緊急輸入で確保されたが，占領地行政救済資金を何というか。","a":"ガリオア資金","t":"g"},{"n":6,"q":"戦後のアメリカの資金援助で，占領地域経済復興援助資金を何というか。","a":"エロア資金","t":"g"}]},{"t":"高度経済成長","q":[{"n":1,"q":"食料事情・経済情勢も好転し，生活水準も回復したことを受けて，1956（昭和31）年の『経済白書』に記された有名な言葉をあげよ。","a":"「もはや戦後ではない」","t":"g"},{"n":2,"q":"1955年から1973年にかけての日本経済は，年平均10％以上の成長率を示したが，このような状況をどうよんでいるか。","a":"高度経済成長","t":"g"},{"n":3,"q":"1965年から1970年にかけての好景気を何というか。","a":"いざなぎ景気","t":"g"},{"n":4,"q":"1968年に，日本はアメリカについでGNP第２位に達したが，GNPとは何か。","a":"国民総生産","t":"g"},{"n":5,"q":"高度経済成長を支えたのは，産業・経済上の画期的な進歩や，それを導入するための工場などの近代化であったが，この技術の進歩と近代化のための投資を何というか。","a":"技術革新と設備投資","t":"g"},{"n":6,"q":"高度経済成長期には，新しいエネルギーへの転換が急速に進んだが，新しいエネルギーとは何か。","a":"石油","t":"g"},{"n":7,"q":"第２次池田勇人内閣のもとで，1961年に農産物の需要調整と農業所得安定をめざして農業の近代化と構造改革をはかるために制定された法は何か。","a":"農業基本法","t":"g"},{"n":8,"q":"政府が米や麦などの主要食料を統制・管理する制度とは何か。","a":"食糧管理制度","t":"g"},{"n":9,"q":"高度成長期に，日本は欧米諸国の要求に応じて1960年と1964年に，日本経済開放のための自由化にふみきった。それぞれ何の自由化か。","a":"貿易・為替の自由化と資本の自由化","t":"g"},{"n":10,"q":"日本は1964年から国際収支を理由に為替管理を行えない国となったが，このような国を何というか。","a":"IMF8条国","t":"g"},{"n":11,"q":"日本は1964年にはOECDに加盟し，資本の自由化を実現したが，OECDの正式名をあげよ。","a":"経済協力開発機構","t":"g"},{"n":12,"q":"開放経済体制のもと，大型企業の合併が進み，終身雇用・年功序列型賃金の日本的経営が成立したが，三井・三菱など六大都市銀行が，系列企業への融資を通じて６つのグループを形成した。これらのグループを何というか。","a":"企業集団","t":"g"}]},{"t":"大衆消費社会の誕生","q":[{"n":1,"q":"高度経済成長にともない人口の都市部への集中が進み，周辺部に高層アパート群が建設された。それにともない，一世帯の平均人数も低下し，夫婦と少人数の子どもで構成される家族が多くなったが，そのような家族を何というか。","a":"核家族","t":"g"},{"n":2,"q":"高度経済成長にともない，衣・食・住をはじめ電気器具・自動車などの保持率が急激に高まったが，このような消費生活水準の向上を何というか。","a":"消費革命","t":"g"},{"n":3,"q":"「電化元年」といわれた1953（昭和28）年以降，家庭電化製品が急速に普及したが，当時，白黒テレビ・洗濯機・冷蔵庫の３つを何と総称したか。","a":"三種の神器","t":"g"},{"n":4,"q":"1960年代後半から70年代にかけて普及した新三種の神器（３Ｃ）とは，自動車と何か。２つあげよ。","a":"カラーテレビ・クーラー","t":"g"},{"n":5,"q":"1965年，最初に全通した自動車専用高速道路の名称をあげよ。","a":"名神高速道路","t":"g"},{"n":6,"q":"1964年に自動列車制御装置など最新の技術を導入し，東京・新大阪間に開通したのは何か。","a":"東海道新幹線","t":"g"},{"n":7,"q":"自家用車が急速に普及し，交通手段の主力となったことを何というか。","a":"モータリゼーション","t":"g"},{"n":8,"q":"1953年に放送が始まり，1960年代に多くの家庭に普及し，日常生活に欠かせないものになったメディアは何か。","a":"テレビ","t":"g"},{"n":9,"q":"『点と線』で有名な社会派推理作家はだれか。","a":"松本清張","t":"p"},{"n":10,"q":"『坂の上の雲』など多くの歴史小説を著したのはだれか。","a":"司馬遼太郎","t":"p"},{"n":11,"q":"日本人のなかに広がった，人並みの生活階層に属しているという意識を何というか。","a":"中流意識","t":"g"},{"n":12,"q":"伝統ある文化財を保護し，文化を振興するために1968年に設立された官庁を何というか。","a":"文化庁","t":"g"},{"n":13,"q":"湯川秀樹についで，1965年にノーベル物理学賞を受賞したのはだれか。","a":"朝永振一郎","t":"p"},{"n":14,"q":"新感覚派の代表的作家で，1968年にノーベル文学賞を受賞したのはだれか。","a":"川端康成","t":"p"},{"n":15,"q":"半導体の理論をもとに，エサキダイオードを開発し，1973年にノーベル物理学賞を受賞したのはだれか。","a":"江崎玲於奈","t":"p"},{"n":16,"q":"フロンティア電子論で注目され，1981年にノーベル化学賞を受賞したのはだれか。","a":"福井謙一","t":"p"},{"n":17,"q":"免疫グロブリン可変部の遺伝子の単離に成功し，1987年にノーベル生理学・医学賞を受賞したのはだれか。","a":"利根川進","t":"p"},{"n":18,"q":"1994（平成６）年に，日本人として２人目のノーベル文学賞を受賞したのはだれか。","a":"大江健三郎","t":"p"},{"n":19,"q":"1964年に，アジアではじめての世界的スポーツ大会が日本で開催されたが，これを何というか。","a":"東京オリンピック（オリンピック東京大会）","t":"g"},{"n":20,"q":"1970年に，「人類の進歩と調和」というテーマで大阪で開かれた世界的な文化事業を何というか。","a":"日本万国博覧会","t":"g"}]},{"t":"高度成長のひずみ","q":[{"n":1,"q":"高度経済成長がひきおこしたさまざまな問題のなかで，都市への人口集中現象と農山村の人口流出現象があるが，それぞれ何とよばれるか。","a":"過密化・過疎化","t":"g"},{"n":2,"q":"公害対策のために，1967（昭和42）年に制定された法律を何というか。","a":"公害対策基本法","t":"g"},{"n":3,"q":"1971年に新設された公害行政のための官庁を何というか。","a":"環境庁","t":"g"},{"n":4,"q":"四大公害訴訟のうち，水俣病の被害者がおこした訴訟は何県のものか，２つあげよ。","a":"熊本県・新潟県","t":"l"},{"n":5,"q":"四大公害訴訟のうち，富山県と三重県で発生した公害病はそれぞれ何か。","a":"イタイイタイ病・四日市ぜんそく","t":"g"},{"n":6,"q":"1946年に，被差別部落の差別解消運動が再出発したが，何という組織の結成により進められたか。","a":"部落解放全国委員会","t":"g"},{"n":7,"q":"1955年に，6（＝部落解放全国委員会）の組織は何と改称されたか。","a":"部落解放同盟","t":"g"},{"n":8,"q":"1969年に，同和対策審議会の答申により，同和地区の生活環境の改善・社会福祉の向上などを内容とする法律が定められたが，その法律名は何か。","a":"同和対策事業特別措置法","t":"g"},{"n":9,"q":"1982年に制定された，同和地区の生活改善をめざす法律を何というか。","a":"地域改善対策特別措置法","t":"g"},{"n":10,"q":"高度経済成長のひずみへの住民の反発は，大都市に社会党・共産党系の首長を登場させたが，このような首長を何というか。","a":"革新首長","t":"g"},{"n":11,"q":"10（＝革新首長）のような首長のうち，1967年に東京都知事に当選したのはだれか。","a":"美濃部亮吉","t":"p"}]}]}]},{"t":"第13章　激動する世界と日本","sec":[{"t":"1　経済大国への道","s":[{"t":"ドル危機と石油危機","q":[{"n":1,"q":"1972（昭和47）年に，中国を突然に訪問し，米中国交の正常化をはたしたアメリカ大統領はだれか。","a":"ニクソン","t":"p"},{"n":2,"q":"1（＝ニクソン）の大統領は，1971年に金・ドルの交換を停止する政策を発表したが，この政策による衝撃をどう表現しているか。","a":"ニクソン＝ショック","t":"g"},{"n":3,"q":"1（＝ニクソン）の大統領の政策に対して，先進10カ国蔵相会議は通貨調整を行い，日本も従来１ドル＝360円の為替レートを308円に改めた。これを何とよんでいるか。","a":"円切上げ（ドル切下げ）","t":"g"},{"n":4,"q":"1973年２月から日本も為替レートが実勢に応じて変動する体制に入った。この体制を何というか。","a":"変動為替相場制","t":"g"},{"n":5,"q":"1973年に，米大統領はアメリカ経済を圧迫したベトナム戦争を終わらせるための協定を結び，戦争を終結させた。この協定を何というか。","a":"ベトナム和平協定","t":"g"},{"n":6,"q":"1973年10月，第４次中東戦争が勃発すると，OAPECはイスラエル支援国に対する石油輸出の制限と価格の引上げを実施し，石油不足と価格の高騰は，世界経済に深刻な影響を与えた。この事態を何というか。","a":"第1次石油危機（石油ショック）","t":"g"},{"n":7,"q":"6や変動為替相場制を契機とした世界不況打開のため，1975年以来，米・英・仏・独・伊・日の６カ国（翌1976年からカナダが加わる）首脳が毎年会議を開催しているが，この会議を何というか。","a":"先進国首脳会議（サミット）","t":"g"}]},{"t":"高度経済成長の終焉","q":[{"n":1,"q":"佐藤栄作内閣の退陣後，列島改造論を掲げて成立した内閣を何というか。","a":"田中角栄内閣","t":"g"},{"n":2,"q":"1（＝田中角栄内閣）の内閣の首相はみずから北京におもむき，不正常な状態にあった両国の関係を正常化したが，この時，発表されたものを何というか。","a":"日中共同声明","t":"g"},{"n":3,"q":"2（＝日中共同声明）の声明は，西暦何年に調印されたか。","a":"1972年","t":"d"},{"n":4,"q":"田中角栄首相は，太平洋ベルト地帯に集中した産業を全国に分散させ，新幹線や高速道路で結ぶという考え方を打ち出したが，これを何というか。","a":"日本列島改造論","t":"g"},{"n":5,"q":"第１次石油危機による原油価格暴騰で，激しいインフレが発生し，人々は異常な物価上昇に苦しんだが，これを何というか。","a":"狂乱物価","t":"g"},{"n":6,"q":"田中角栄内閣の時の経済混乱のなかで，日本の経済成長率は戦後はじめてマイナスとなり，以後低成長がつづいたが，マイナス成長になったのは西暦何年か。","a":"1974年","t":"d"},{"n":7,"q":"田中角栄首相が金脈問題で退陣したあと，「クリーン政治」をスローガンとして組閣したのはだれか。","a":"三木武夫","t":"p"},{"n":8,"q":"7（＝三木武夫）の内閣の時，田中角栄元首相と航空業界をめぐる汚職事件が暴露されたが，この事件を何というか。","a":"ロッキード事件","t":"g"},{"n":9,"q":"自民党内の抗争激化と総選挙敗北の責任をとって，退陣した前内閣のあとを受けて1976（昭和51）年に組閣したのはだれか。","a":"福田赳夫","t":"p"},{"n":10,"q":"1978年に，第２条でアジア・太平洋地域での覇権反対を表明した条約が，日本の園田直外相と中国の黄華外相との間で調印されたが，この条約を何というか。","a":"日中平和友好条約","t":"g"},{"n":11,"q":"1978年に自由民主党の総裁選挙で勝利した後，組閣し，1980年の総選挙中に急死したのはだれか。","a":"大平正芳","t":"p"},{"n":12,"q":"11（＝大平正芳）の首相の急死後，1980年に組閣したのはだれか。","a":"鈴木善幸","t":"p"}]},{"t":"経済大国の実現","q":[{"n":1,"q":"世界不況からいち早く脱出した日本は，1979（昭和54）年のイラン革命による第２次石油危機を乗り切り，低い成長率であったが確実な伸びを示した。この時期の経済成長をどうよんでいるか。","a":"安定成長","t":"g"},{"n":2,"q":"低い経済成長のなかで利益をあげるため，企業は省エネルギー・人員削減・ＭＥ技術の導入でコスト削減をはかった。このような経営手法を何というか。","a":"減量経営","t":"g"},{"n":3,"q":"「スト権スト」の敗北以降，労働運動は後退し，1989（平成元）年に労使協調的な全国組織が結成された。この全国組織を何というか。","a":"日本労働組合総連合会（連合）","t":"g"},{"n":4,"q":"安定成長下の産業では自動車・電気機械のほか，半導体・ＩＣ（集積回路）・コンピュータなどが生産を伸ばし，貿易黒字を拡大した。このような産業分野を何というか。","a":"ハイテク（先端技術）分野","t":"g"},{"n":5,"q":"貿易黒字の拡大は，欧米諸国との間に経済問題を発生させたが，これを何というか。","a":"貿易摩擦","t":"g"},{"n":6,"q":"貿易黒字の拡大により円為替相場も大きくかわったが，どのようになったか。","a":"円高","t":"g"},{"n":7,"q":"経済大国化した日本は，発展途上国に対する政府の資金供与も1989年に世界第１位となったが，その供与を何というか。","a":"政府開発援助（ODA）","t":"g"},{"n":8,"q":"1988年，すでに結ばれていた九州に加え，北海道・本州・四国が陸路で結ばれた。北海道と本州を結んだ陸路の名称をあげよ。","a":"青函トンネル","t":"g"},{"n":9,"q":"1978年に，新たに開港した空港名をあげよ。","a":"新東京国際空港","t":"g"}]},{"t":"バブル経済と市民生活","q":[{"n":1,"q":"アメリカからの農産物輸入自由化の要求を受け，1988（昭和63）年に輸入自由化を受け入れた産物は何か，２つあげよ。","a":"牛肉・オレンジ","t":"g"},{"n":2,"q":"経済摩擦に不満をもつアメリカが，自由な貿易をはばむ日本の構造障壁撤廃をめざして，1989（平成元）年より開始した日米協議を何というか。","a":"日米構造協議","t":"g"},{"n":3,"q":"発展途上国のうち1970年代に急速な経済成長をとげた国・地域を，どのようによんでいるか。","a":"NIES（新興工業経済地域）","t":"g"},{"n":4,"q":"1985年に，ニューヨークで開かれた５カ国蔵相会議で，ドル高是正のための協調介入の合意がなされ，以後，急速に円高が進んだが，その合意を何というか。","a":"プラザ合意","t":"g"},{"n":5,"q":"1987年ころから，金融機関や企業にだぶついた資金の流入から，地価や株価が投機的高騰を始めたが，このような経済を何とよんでいるか。","a":"バブル経済","t":"g"},{"n":6,"q":"1982年に，「戦後政治の総決算」をとなえて行財政改革・教育改革・税政改革を推進した内閣を何というか。","a":"中曽根康弘内閣","t":"g"},{"n":7,"q":"6（＝中曽根康弘内閣）の内閣は電電公社・専売公社・国鉄の民営化を実現したが，それぞれ現在の会社を略称で順にあげよ。","a":"NTT・JT・JR","t":"g"},{"n":8,"q":"1988年に，新しい税制度を導入したが，これに対する反発やリクルート事件により退陣した内閣を何というか。","a":"竹下登内閣","t":"g"},{"n":9,"q":"1989年に，8（＝竹下登内閣）の内閣が実施した新しい税を何というか。","a":"消費税","t":"g"}]}]},{"t":"2　冷戦の終結と日本社会の変容","s":[{"t":"冷戦から地域紛争へ","q":[{"n":1,"q":"アメリカのレーガン大統領やイギリスのサッチャー首相らは，ケインズ政策を批判して，政府支出を抑制し「小さな政府」の実現をめざした。このような主義を何というか。","a":"新自由（新保守）主義","t":"g"},{"n":2,"q":"1985（昭和60）年にソ連共産党書記長となり，ペレストロイカ（改革）・グラスノスチ（情報公開）などの改革を実施し，新思考外交を展開した人物はだれか。","a":"ゴルバチョフ","t":"p"},{"n":3,"q":"2（＝ゴルバチョフ）の人物とレーガン米大統領との首脳会談のあと，1987年に，ある核兵器の全廃条約が締結されたが，この条約名をあげよ。","a":"中距離核戦力（INF）全廃条約","t":"g"},{"n":4,"q":"ゴルバチョフソ連共産党書記長のもとで，ソ連は1979年以来，親ソ政権擁護のため侵攻していたある国から撤兵したが，その国はどこか。","a":"アフガニスタン","t":"l"},{"n":5,"q":"1989年12月には，ゴルバチョフソ連共産党書記長とブッシュ米大統領が地中海のマルタ島で会談を持ち，画期的なことが宣言されたが，その内容は何か。","a":"冷戦終結","t":"g"},{"n":6,"q":"5（＝冷戦終結）が宣言された後，東西ドイツの統一が実現するが，西暦何年のことか。","a":"1990年","t":"d"},{"n":7,"q":"冷戦終結後，ソ連の経済再建・政治改革はうまく進まず，ソ連邦・ソ連共産党は崩壊したが，これは西暦何年のことか。","a":"1991年","t":"d"},{"n":8,"q":"1990年に，イラクがクウェートに侵攻し，国連決議を背景にアメリカ軍を中心とする多国籍軍がイラク軍を攻撃して，クウェートの占領を解除した。この戦争を何というか。","a":"湾岸戦争","t":"g"},{"n":9,"q":"8（＝湾岸戦争）の戦争に際して，アメリカから「国際貢献」を求められた日本は，国連平和維持活動に協力し，自衛隊の海外派兵を可能とする法律を1992（平成４）年に制定した。国連平和維持活動をアルファベット３文字で何というか。","a":"PKO","t":"g"}]},{"t":"55年体制の崩壊／平成不況下の日本経済","q":[{"n":1,"q":"1989（平成元）年に，リクルート事件で退陣した竹下登内閣のあとに成立したが，参議院議員選挙で自民党が過半数を割るという大敗で辞職した内閣を何というか。","a":"宇野宗佑内閣","t":"g"},{"n":2,"q":"1989年に組閣し，湾岸戦争の際に多国籍軍に90億ドルの支出を行った内閣を何というか。","a":"海部俊樹内閣","t":"g"},{"n":3,"q":"1992年に，国連平和維持活動（PKO）協力法を成立させ，カンボジアに自衛隊を派遣したが，1993年の総選挙で与党自民党が分裂して過半数を失い，総辞職した内閣を何というか。","a":"宮沢喜一内閣","t":"g"},{"n":4,"q":"1992年に，日本新党を結党し，政治改革を旗印に1993年，非自民８党派連立内閣で首相となり，55年体制を崩壊させたのはだれか。","a":"細川護熙","t":"p"},{"n":5,"q":"1994年６月に，羽田孜内閣の総辞職後，自民党・社会党の連合で総理に指名された日本社会党の委員長はだれか。","a":"村山富市","t":"p"},{"n":6,"q":"1996年に，自社連立で，自民党総裁を総理とする内閣が成立したが，総理大臣になったのはだれか。","a":"橋本龍太郎","t":"p"},{"n":7,"q":"1994年に二大政党制をめざし，野党４党によって結党され，その後1997年には６党に分裂した政党を何というか。","a":"新進党","t":"g"},{"n":8,"q":"バブル経済は，まず株価が，つづいて地価が下落して，出口の見えない深刻な複合不況に突入したが，それは西暦何年のことか。","a":"1991年","t":"d"},{"n":9,"q":"複合不況下で企業は事業の整理，人員削減により大胆な経営の効率化をはかり，大量の失業者が生まれたが，この経営の効率化を何というか。","a":"リストラ","t":"g"}]},{"t":"現代の諸課題","q":[{"n":1,"q":"1995（平成７）年１月に，神戸市やその南部で発生し，約6400人の死者を出した災害は何か。","a":"阪神・淡路大震災","t":"g"},{"n":2,"q":"1995年，オウム真理教が東京でおこしたテロ事件を何とよぶか。","a":"地下鉄サリン事件","t":"g"},{"n":3,"q":"橋本龍太郎内閣がクリントン米大統領との間で，アジア・太平洋地域安定のため米軍兵力の維持を確認する宣言が出され，これにより「日米防衛協力のための指針」（ガイドライン）の見直しが行われた。この宣言を何というか。","a":"日米安保共同宣言","t":"g"},{"n":4,"q":"橋本龍太郎内閣により消費税は何％から何％に定められたか。","a":"3％から5％に","t":"n"},{"n":5,"q":"1997年，地球温暖化を防止することを目的に，温室効果ガス排出削減目標を定めた議定書を何というか。","a":"京都議定書","t":"g"},{"n":6,"q":"橋本龍太郎内閣のあとを受け，自民党単独内閣をスタートさせた人物はだれか。","a":"小渕恵三","t":"p"},{"n":7,"q":"6（＝小渕恵三）の内閣は野党の反対を押し切り，３つの法案を制定し，日本がアメリカ軍を支援する体制を整えたが，その３法を何と総称するか。","a":"新ガイドライン関連法","t":"g"},{"n":8,"q":"「日の丸」を国旗，「君が代」を国歌とする国旗・国歌法を制定した内閣を何というか。","a":"小渕恵三内閣","t":"g"},{"n":9,"q":"森喜朗内閣が低支持率のなかで退陣に追い込まれ，構造改革や郵政民営化をとなえる人物が2001年４月に内閣を組織したが，だれか。","a":"小泉純一郎","t":"p"},{"n":10,"q":"9（＝小泉純一郎）の首相が国交正常化交渉のため2002年９月に訪問し，日本人拉致問題について話し合った国はどこか。","a":"朝鮮民主主義人民共和国（北朝鮮）","t":"l"},{"n":11,"q":"2001年９月に，アメリカで世界貿易センタービルや国防総省などに対する同時多発テロがおきたが，この時のアメリカ大統領はだれか。","a":"ブッシュ","t":"p"},{"n":12,"q":"アメリカは同時多発テロ事件の報復としてテロ組織アルカイダの本拠を攻撃したが，それはどこの国か。","a":"アフガニスタン","t":"l"},{"n":13,"q":"2009年，衆議院総選挙で民主党が圧勝し，民主党政権が誕生したが，組閣した首相はだれか。","a":"鳩山由紀夫","t":"p"},{"n":14,"q":"2011年３月11日に東北地方の太平洋沖を震源とする大地震が発生し，地震による巨大な津波で深刻な被害をもたらした災害を何というか。","a":"東日本大震災","t":"g"}]}]}]}];

/* ---------- utilities ---------- */
const el = (tag, attrs = {}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else if (k === "text") n.textContent = v;
    else n.setAttribute(k, v);
  }
  for (const kid of kids) if (kid != null) n.append(kid);
  return n;
};
const shuffle = a => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const KAN = ["一","二","三","四","五","六","七","八","九","十","十一","十二","十三"];

/* storage (フォールバック付き) */
const mem = {};
const store = {
  get(k){ try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return mem[k] ?? null; } },
  set(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){ mem[k]=v; } }
};

/* ---------- 学籍番号ごとの記録 ---------- */
let SID = store.get("jh_sid") || null;
const recKey = () => "jh_rec_" + SID;
const getRec = () => { const r = store.get(recKey()); return (r && typeof r==="object") ? {weak:r.weak||[], hist:r.hist||[]} : {weak:[], hist:[]}; };
const setRec = r => store.set(recKey(), r);
const getWeak = () => getRec().weak;
const addWeak = id => { const r=getRec(); if(!r.weak.includes(id)){r.weak.push(id); setRec(r);} };
const delWeak = id => { const r=getRec(); r.weak=r.weak.filter(x=>x!==id); setRec(r); };
const addHist = h => { const r=getRec(); r.hist.push(h); if(r.hist.length>300) r.hist=r.hist.slice(-300); setRec(r); };

/* 全問にIDを付与し索引を作る */
const INDEX = {};
DATA.forEach((ch, ci) => ch.sec.forEach((se, si) => se.s.forEach((su, ui) => su.q.forEach(q => {
  const id = `${ci}-${si}-${ui}-${q.n}`;
  INDEX[id] = { ...q, ci, si, ui, id, path: `${ch.t.split("　")[0]}／${se.t}／${su.t}` };
}))));
const subCount = su => su.q.length;
const secCount = se => se.s.reduce((b,u)=>b+u.q.length,0);
const chCount = ch => ch.sec.reduce((a,s)=>a+secCount(s),0);
const MODE_NAME = {flash:"一問一答", mc:"四択", hand:"手書き"};

/* ---------- 画面骨格 ---------- */
const app = document.querySelector("#app");
function render(...nodes){ app.replaceChildren(headerEl(), ...nodes, footerEl()); window.scrollTo(0,0); }
function headerEl(){
  const h = el("header",{},
    el("h1",{text:"日本史一問一答"}),
    el("span",{class:"sub",text:"山川準拠・全"+Object.keys(INDEX).length.toLocaleString()+"問"})
  );
  if(SID){
    h.append(el("div",{class:"idline"},
      el("span",{},"学籍番号 ",el("b",{text:SID})),
      el("button",{onclick:()=>login(true)},"変更")
    ));
  }
  return h;
}
function footerEl(){ return el("footer",{text:"出典：山川出版社『日本史一問一答』構成に基づく学習用アプリ"}); }

/* ---------- 学籍番号入力 ---------- */
function login(changing){
  const input = el("input",{type:"text",inputmode:"text",autocomplete:"off",placeholder:"例：2301",value:changing&&SID?SID:""});
  const go = ()=>{
    const v = input.value.trim();
    if(!v){ input.focus(); return; }
    SID = v; store.set("jh_sid", v); home();
  };
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
  app.replaceChildren(
    headerEl(),
    el("div",{class:"login"},
      el("h2",{text:"学籍番号を入力してください"}),
      el("p",{text:"成績や苦手問題は、この端末に学籍番号ごとに保存されます。"}),
      input,
      el("div",{class:"startrow"},el("button",{class:"btn-primary",onclick:go},"はじめる"))
    ),
    footerEl()
  );
  input.focus();
}

/* ---------- ホーム ---------- */
function home(){
  const weak = getWeak();
  const list = el("ul",{class:"chapters"});
  DATA.forEach((ch,ci)=>{
    const [num,...rest] = ch.t.split("　");
    list.append(el("li",{},el("button",{onclick:()=>setup(ci)},
      el("span",{class:"ch-num"},el("small",{text:"第"}),KAN[ci]),
      el("span",{class:"ch-title",text:rest.join("　")||num}),
      el("span",{class:"ch-count",text:chCount(ch)+"問"})
    )));
  });
  const weakBtn = weak.length
    ? el("button",{class:"weak",onclick:()=>startQuiz(weak.map(id=>INDEX[id]).filter(Boolean),{mode:null,label:"苦手問題",fromWeak:true})},
        `✕ 苦手問題に再挑戦（${weak.length}問）`)
    : el("button",{class:"weak none",disabled:"",text:"苦手問題はまだありません — 演習で「まだ」や誤答になった問題がここに貯まります"});
  render(
    el("p",{class:"lead",text:"章を選んで演習を始めましょう。"}),
    list,
    el("div",{class:"homebar"},
      weakBtn,
      el("button",{class:"grades",onclick:grades},"成績の推移を見る")
    )
  );
}

/* ---------- 出題設定（節・項単位） ---------- */
function setup(ci){
  const ch = DATA[ci];
  const subKey = (si,ui)=>si+"-"+ui;
  const state = { mode:"flash", order:"seq", count:"20", subs:new Set() };
  ch.sec.forEach((se,si)=>se.s.forEach((_,ui)=>state.subs.add(subKey(si,ui))));

  const segRow = (options, cur, onpick) => {
    const row = el("div",{class:"seglist"});
    options.forEach(([val,label])=>{
      row.append(el("button",{class:"seg","aria-pressed":String(val===cur()),onclick:()=>{
        onpick(val);
        row.querySelectorAll(".seg").forEach((x,i)=>x.setAttribute("aria-pressed",String(options[i][0]===cur())));
        update();
      }},label));
    });
    return row;
  };

  /* 節ブロック（開閉で項が出る） */
  const secList = el("div",{class:"seclist"});
  const secCbs = [], subCbs = {};
  ch.sec.forEach((se,si)=>{
    const secCb = el("input",{type:"checkbox",checked:""});
    secCbs[si] = secCb;
    const subWrap = el("div",{class:"sublist"});
    se.s.forEach((su,ui)=>{
      const cb = el("input",{type:"checkbox",checked:""});
      subCbs[subKey(si,ui)] = cb;
      cb.addEventListener("change",()=>{
        cb.checked ? state.subs.add(subKey(si,ui)) : state.subs.delete(subKey(si,ui));
        syncSec(si); update();
      });
      subWrap.append(el("label",{class:"sub-check"},cb,el("span",{text:su.t}),el("span",{class:"cnt",text:subCount(su)+"問"})));
    });
    secCb.addEventListener("change",()=>{
      se.s.forEach((_,ui)=>{
        subCbs[subKey(si,ui)].checked = secCb.checked;
        secCb.checked ? state.subs.add(subKey(si,ui)) : state.subs.delete(subKey(si,ui));
      });
      secCb.indeterminate = false; update();
    });
    const tgl = el("button",{class:"tgl","aria-expanded":"false",onclick:e=>{
      e.preventDefault();
      const open = subWrap.classList.toggle("open");
      tgl.setAttribute("aria-expanded",String(open));
      tgl.textContent = open ? "▲ 項をとじる" : "▼ 項を選ぶ";
    }},"▼ 項を選ぶ");
    secList.append(el("div",{class:"secblock"},
      el("label",{class:"sec-head"},secCb,el("span",{text:se.t}),el("span",{class:"cnt",text:secCount(se)+"問"}),tgl),
      subWrap
    ));
  });
  function syncSec(si){
    const total = ch.sec[si].s.length;
    let on=0; ch.sec[si].s.forEach((_,ui)=>{ if(state.subs.has(subKey(si,ui))) on++; });
    secCbs[si].checked = on===total;
    secCbs[si].indeterminate = on>0 && on<total;
  }

  const startBtn = el("button",{class:"btn-primary",onclick:()=>{
    let pool=[];
    ch.sec.forEach((se,si)=>se.s.forEach((su,ui)=>{
      if(state.subs.has(subKey(si,ui))) su.q.forEach(q=>pool.push(INDEX[`${ci}-${si}-${ui}-${q.n}`]));
    }));
    if(state.order==="shuf") pool=shuffle(pool);
    if(state.count!=="all") pool=pool.slice(0,+state.count);
    startQuiz(pool,{mode:state.mode,label:ch.t.split("　").slice(1).join("　")||ch.t});
  }},"演習を始める");

  const totalLine = el("p",{class:"total"});
  function update(){
    let n=0;
    ch.sec.forEach((se,si)=>se.s.forEach((su,ui)=>{ if(state.subs.has(subKey(si,ui))) n+=subCount(su); }));
    const take = state.count==="all"? n : Math.min(+state.count,n);
    totalLine.textContent = `選択範囲 ${n}問 ／ 出題 ${take}問`;
    startBtn.disabled = n===0;
  }

  render(
    el("div",{class:"crumb"},el("button",{onclick:home},"← 章一覧に戻る")),
    el("div",{class:"setup"},
      el("h2",{text:ch.t}),
      totalLine,
      el("fieldset",{},el("legend",{text:"形式"}),
        segRow([["flash","一問一答"],["mc","四択"],["hand","手書き"]],()=>state.mode,v=>state.mode=v)),
      el("fieldset",{},el("legend",{text:"出題順"}),
        segRow([["seq","順番どおり"],["shuf","シャッフル"]],()=>state.order,v=>state.order=v)),
      el("fieldset",{},el("legend",{text:"問題数"}),
        segRow([["10","10問"],["20","20問"],["50","50問"],["all","全問"]],()=>state.count,v=>state.count=v)),
      el("fieldset",{},el("legend",{text:"範囲（節・項）"}),secList),
      el("p",{class:"hint",text:"※ 問題文中の「2（＝更新世）」のような表記は、元の問題集で前の問題を指していた番号に答えを補ったものです。手書きは指やタッチペンで書き、答えを見て自分で採点します。"}),
      el("div",{class:"startrow"},startBtn)
    )
  );
  update();
}

/* ---------- 四択の誤答生成 ----------
   答えの「種類」（p:人名 d:年代 n:数量 l:地名 g:用語）が同じ問題からのみ誤答を取り、
   さらに語尾の一致（〜遺跡、〜条約、〜天皇 など）と出題範囲の近さをスコアで優先する。
   丸括弧を除いた正規化で、表記違いの同一答（石包丁／石包（庖）丁）が誤答に紛れるのを防ぐ。*/
const BYTYPE = {p:[],d:[],n:[],l:[],g:[]};
Object.values(INDEX).forEach(q=>(BYTYPE[q.t]||BYTYPE.g).push(q));
const normA = s => s.replace(/（[^）]*）/g,"").replace(/[\s　]/g,"");
function sufLen(a,b){ let n=0; while(n<3 && n<a.length && n<b.length && a[a.length-1-n]===b[b.length-1-n]) n++; return n; }

function makeChoices(q){
  const na = normA(q.a);
  const tier = c => c.ci!==q.ci ? 3 : c.si!==q.si ? 2 : c.ui!==q.ui ? 1 : 0;
  const valid = c => {
    if(c.id===q.id) return false;
    const nc = normA(c.a);
    return !!nc && nc!==na && !nc.includes(na) && !na.includes(nc);
  };
  /* 同種プールをスコア順に: 語尾一致(0〜3)×2 ＋ 近さ(0〜3) */
  const scored = (BYTYPE[q.t]||BYTYPE.g).filter(valid)
    .map(c=>({c, s: sufLen(normA(c.a),na)*2 + (3-tier(c)), r: Math.random()}))
    .sort((x,y)=> y.s-x.s || x.r-y.r);
  const used = new Set([na]);
  const out = [];
  const take = list => {
    for(const w of list){
      const a = w.c ? w.c.a : w.a;
      const nc = normA(a);
      if(used.has(nc)) continue;
      used.add(nc); out.push(a);
      if(out.length===3) return true;
    }
    return false;
  };
  /* 上位候補に幅を持たせてランダムに3つ（毎回同じ選択肢の並びにならないように） */
  take(shuffle(scored.slice(0,12))) || take(scored) ||
    take(shuffle(Object.values(INDEX).filter(valid)));
  return shuffle([q.a, ...out]);
}

/* ---------- 手書きキャンバス ---------- */
function makePad(){
  const c = el("canvas",{class:"pad"});
  let ctx=null, drawing=false, hasInk=false;
  function fit(){
    const dpr = window.devicePixelRatio||1;
    const w = c.clientWidth, h = c.clientHeight;
    if(!w) return;
    c.width = w*dpr; c.height = h*dpr;
    ctx = c.getContext("2d");
    ctx.scale(dpr,dpr);
    ctx.lineWidth=4; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#26262B";
  }
  const pos = e => { const r=c.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; };
  c.addEventListener("pointerdown",e=>{ if(!ctx)fit(); drawing=true; hasInk=true; c.setPointerCapture(e.pointerId); ctx.beginPath(); ctx.moveTo(...pos(e)); });
  c.addEventListener("pointermove",e=>{ if(!drawing)return; ctx.lineTo(...pos(e)); ctx.stroke(); });
  const up = ()=>{ drawing=false; };
  c.addEventListener("pointerup",up); c.addEventListener("pointercancel",up);
  requestAnimationFrame(fit);
  return { canvas:c, clear(){ if(ctx){ ctx.clearRect(0,0,c.clientWidth,c.clientHeight); hasInk=false; } }, inked:()=>hasInk };
}

/* ---------- 演習 ---------- */
function startQuiz(pool, opts){
  if(!pool.length){ home(); return; }
  let mode = opts.mode;
  if(mode===null){
    render(
      el("div",{class:"crumb"},el("button",{onclick:home},"← 章一覧に戻る")),
      el("div",{class:"setup"},
        el("h2",{text:"苦手問題（"+pool.length+"問）"}),
        el("fieldset",{},el("legend",{text:"形式を選んでください"}),
          el("div",{class:"startrow"},
            el("button",{class:"btn-primary",onclick:()=>startQuiz(shuffle(pool),{...opts,mode:"flash"})},"一問一答で挑戦"),
            el("button",{class:"btn-primary",onclick:()=>startQuiz(shuffle(pool),{...opts,mode:"mc"})},"四択で挑戦"),
            el("button",{class:"btn-primary",onclick:()=>startQuiz(shuffle(pool),{...opts,mode:"hand"})},"手書きで挑戦")
          ))
      )
    );
    return;
  }

  let i=0; const wrong=[]; let correct=0;

  function screen(){
    const q = pool[i];
    const prog = el("div",{class:"progress"},
      el("div",{class:"nums"},el("span",{text:opts.label}),el("span",{text:`${i+1} / ${pool.length}`})),
      el("div",{class:"bar"},el("i",{style:`width:${(i)/pool.length*100}%`}))
    );
    const stamp = el("div",{class:"stamp","aria-hidden":"true"});
    const card = el("div",{class:"qcard"},
      stamp,
      el("div",{class:"qnum",text:"第"+(i+1)+"問"}),
      el("p",{class:"qmeta",text:q.path}),
      el("p",{class:"qtext",text:q.q})
    );
    const below = el("div",{});

    function judge(ok){
      stamp.textContent = ok?"正":"誤";
      stamp.className = "stamp on "+(ok?"ok":"ng");
      if(ok){ correct++; if(opts.fromWeak) delWeak(q.id); }
      else { wrong.push(q); addWeak(q.id); }
    }
    function next(){ i++; i<pool.length ? screen() : result(); }
    const selfGradeRow = () => el("div",{class:"acts"},
      el("button",{class:"btn-know",onclick:()=>{judge(true);setTimeout(next,420);}},"○ 正解した"),
      el("button",{class:"btn-notyet",onclick:()=>{judge(false);setTimeout(next,420);}},"✕ まちがえた")
    );

    if(mode==="flash"){
      below.append(el("div",{class:"acts"},el("button",{class:"btn-primary",onclick:()=>{
        card.append(el("div",{class:"answerbox"},el("div",{class:"lbl",text:"答え"}),el("div",{class:"ans",text:q.a})));
        below.replaceChildren(selfGradeRow());
      }},"答えを見る")));
    } else if(mode==="hand"){
      const pad = makePad();
      card.append(el("div",{class:"padwrap"},
        el("div",{class:"lbl",text:"ここに答えを書く"}),
        pad.canvas,
        el("div",{class:"padtools"},el("button",{onclick:()=>pad.clear()},"書き直す"))
      ));
      below.append(el("div",{class:"acts"},el("button",{class:"btn-primary",onclick:()=>{
        card.append(el("div",{class:"answerbox"},el("div",{class:"lbl",text:"答え — 自分の字と見くらべよう"}),el("div",{class:"ans",text:q.a})));
        below.replaceChildren(selfGradeRow());
      }},"答え合わせ")));
    } else {
      const choices = makeChoices(q);
      const box = el("div",{class:"choices"});
      const keys = ["ア","イ","ウ","エ"];
      choices.forEach((c,k)=>{
        box.append(el("button",{class:"choice",onclick:()=>{
          judge(c===q.a);
          box.querySelectorAll(".choice").forEach((x,m)=>{
            x.disabled=true;
            if(choices[m]===q.a) x.classList.add("correct");
            else if(m===k) x.classList.add("wrong");
            else x.classList.add("dim");
          });
          below.append(el("div",{class:"nextrow"},el("button",{class:"btn-primary",onclick:next},i+1<pool.length?"次の問題へ":"結果を見る")));
        }},el("span",{class:"key",text:keys[k]}),el("span",{text:c})));
      });
      card.append(box);
    }

    render(
      el("div",{class:"crumb"},el("button",{onclick:()=>{if(confirm("演習を中断して章一覧に戻りますか？（途中までの成績は記録されません）"))home();}},"← 中断する")),
      prog, card, below
    );
  }

  function result(){
    const rate = Math.round(correct/pool.length*100);
    addHist({d:Date.now(), label:opts.label, mode, ok:correct, total:pool.length});
    const msg = rate===100?"全問正解、見事！":rate>=80?"よく覚えています":rate>=50?"あと一歩":"繰り返しが力になる";
    const nodes = [
      el("div",{class:"result"},
        el("div",{class:"rate"},String(rate),el("small",{text:"%"})),
        el("p",{class:"msg",text:msg}),
        el("p",{class:"detail",text:`${pool.length}問中 ${correct}問正解（${opts.label}・${MODE_NAME[mode]}）`})
      )
    ];
    if(wrong.length){
      const ul = el("ul",{});
      wrong.forEach(q=>ul.append(el("li",{},el("div",{text:q.q}),el("div",{class:"a",text:"答："+q.a}))));
      nodes.push(el("div",{class:"review"},
        el("h3",{text:"間違えた問題 "+wrong.length+"問（苦手問題に記録しました）"}),
        el("div",{class:"startrow"},el("button",{class:"btn-primary",onclick:()=>startQuiz(shuffle(wrong),{...opts})},"間違えた問題だけもう一度")),
        ul
      ));
    }
    nodes.push(el("div",{class:"startrow"},
      el("button",{class:"btn-second",onclick:grades},"成績の推移を見る"),
      el("button",{class:"btn-ghost",onclick:home},"章一覧に戻る")
    ));
    render(...nodes);
  }

  screen();
}

/* ---------- 成績の推移 ---------- */
function chartSVG(hist){
  const NS = "http://www.w3.org/2000/svg";
  const W=560, H=200, PL=38, PR=14, PT=14, PB=26;
  const svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width","100%");
  svg.setAttribute("role","img");
  svg.setAttribute("aria-label","正答率の推移グラフ");
  const mk = (t,at)=>{ const n=document.createElementNS(NS,t); for(const[k,v]of Object.entries(at))n.setAttribute(k,v); return n; };
  /* 罫線とY軸 */
  [0,25,50,75,100].forEach(v=>{
    const y = PT + (H-PT-PB)*(1-v/100);
    svg.append(mk("line",{x1:PL,y1:y,x2:W-PR,y2:y,stroke:"#E8EEF4","stroke-width":v%50===0?1.5:1}));
    const t = mk("text",{x:PL-6,y:y+4,"text-anchor":"end","font-size":"11",fill:"#6E6E76"});
    t.textContent=v; svg.append(t);
  });
  const pts = hist.slice(-30);
  const x = k => pts.length===1 ? (PL+W-PR)/2 : PL + (W-PL-PR)*k/(pts.length-1);
  const y = r => PT + (H-PT-PB)*(1-r/100);
  if(pts.length>1){
    const d = pts.map((h,k)=>`${k?"L":"M"}${x(k).toFixed(1)},${y(h.ok/h.total*100).toFixed(1)}`).join(" ");
    svg.append(mk("path",{d,fill:"none",stroke:"#2E5C8A","stroke-width":2.5,"stroke-linejoin":"round"}));
  }
  pts.forEach((h,k)=>{
    const r = h.ok/h.total*100;
    svg.append(mk("circle",{cx:x(k),cy:y(r),r:4.5,fill:r>=80?"#2F6E4E":r>=50?"#2E5C8A":"#B33A3A",stroke:"#fff","stroke-width":1.5}));
  });
  /* X軸の日付（最初・中央・最後） */
  const lbl=(k,anchor)=>{ const h=pts[k]; if(!h)return;
    const t=mk("text",{x:x(k),y:H-8,"text-anchor":anchor,"font-size":"11",fill:"#6E6E76"});
    t.textContent=new Date(h.d).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"}); svg.append(t); };
  lbl(0,"start"); if(pts.length>4)lbl(Math.floor((pts.length-1)/2),"middle"); if(pts.length>1)lbl(pts.length-1,"end");
  return svg;
}

function grades(){
  const rec = getRec();
  const hist = rec.hist;
  const nodes = [el("div",{class:"crumb"},el("button",{onclick:home},"← 章一覧に戻る")),
    el("div",{class:"setup"},el("h2",{text:"成績の推移"}))];

  if(!hist.length){
    nodes.push(el("p",{class:"lead",text:"まだ記録がありません。演習を終えると、ここに正答率のグラフが表示されます。"}));
  } else {
    const totalQ = hist.reduce((a,h)=>a+h.total,0);
    const totalOk = hist.reduce((a,h)=>a+h.ok,0);
    nodes.push(
      el("div",{class:"stats"},
        el("div",{class:"stat"},el("div",{class:"v",text:String(hist.length)}),el("div",{class:"k",text:"演習回数"})),
        el("div",{class:"stat"},el("div",{class:"v",text:Math.round(totalOk/totalQ*100)+"%"}),el("div",{class:"k",text:"平均正答率"})),
        el("div",{class:"stat"},el("div",{class:"v",text:totalQ.toLocaleString()}),el("div",{class:"k",text:"累計解答数"}))
      ),
      el("div",{class:"chartcard"},
        el("h3",{text:"正答率の推移（直近30回）"}),
        chartSVG(hist)
      )
    );
    const ul = el("ul",{class:"histlist"});
    hist.slice(-15).reverse().forEach(h=>{
      ul.append(el("li",{},
        el("span",{class:"d",text:new Date(h.d).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}),
        el("span",{class:"m",text:MODE_NAME[h.mode]||h.mode}),
        el("span",{class:"l",text:h.label}),
        el("span",{class:"r",text:`${h.ok}/${h.total}（${Math.round(h.ok/h.total*100)}%）`})
      ));
    });
    nodes.push(ul);
  }

  /* 引き継ぎ */
  const ta = el("textarea",{placeholder:"引き継ぎコードをここに貼り付け → 「読み込む」",spellcheck:"false"});
  const enc = ()=>{ 
    const payload = JSON.stringify({sid:SID, rec:getRec()});
    return btoa(unescape(encodeURIComponent(payload)));
  };
  nodes.push(el("div",{class:"transfer"},
    el("h3",{text:"別の端末への引き継ぎ"}),
    el("p",{text:"記録はこの端末のブラウザ内に保存されます。別の端末に移すには、「コードを表示」で出た文字列をコピーし、移動先の端末でこの欄に貼り付けて「読み込む」を押してください。"}),
    ta,
    el("div",{class:"row"},
      el("button",{onclick:async()=>{
        ta.value = enc();
        ta.select();
        try{ await navigator.clipboard.writeText(ta.value); alert("引き継ぎコードをコピーしました。移動先の端末で貼り付けてください。"); }
        catch(e){ alert("コードを表示しました。長押し（または Ctrl+C）でコピーしてください。"); }
      }},"コードを表示・コピー"),
      el("button",{onclick:()=>{
        const v = ta.value.trim();
        if(!v){ alert("コードを貼り付けてから押してください。"); return; }
        try{
          const obj = JSON.parse(decodeURIComponent(escape(atob(v))));
          if(!obj || !obj.rec) throw 0;
          if(!confirm(`学籍番号 ${obj.sid} の記録（演習${(obj.rec.hist||[]).length}回・苦手${(obj.rec.weak||[]).length}問）を読み込みます。この端末の現在の記録は上書きされます。よろしいですか？`)) return;
          SID = obj.sid; store.set("jh_sid",SID);
          setRec({weak:obj.rec.weak||[], hist:obj.rec.hist||[]});
          alert("読み込みました。");
          grades();
        }catch(e){ alert("コードを読み取れませんでした。コピーの抜けがないか確認してください。"); }
      }},"読み込む")
    )
  ));
  render(...nodes);
}

SID ? home() : login(false);
