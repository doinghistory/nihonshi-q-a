<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日本史一問一答 — 山川準拠</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ai:#1E3A5F;        /* 深藍 */
  --hanada:#2E5C8A;    /* 縹 */
  --mizu:#E8EEF4;
  --paper:#FAFAF8;
  --sumi:#26262B;
  --usuzumi:#6E6E76;
  --shu:#B33A3A;       /* 朱 */
  --matsuba:#2F6E4E;   /* 松葉 */
  --line:#D9DDE3;
  --radius:14px;
  --serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:var(--sans);color:var(--sumi);background:var(--paper);
  min-height:100dvh;line-height:1.7;
  background-image:linear-gradient(rgba(30,58,95,.035) 1px,transparent 1px);
  background-size:100% 28px;
}
#app{max-width:640px;margin:0 auto;padding:0 16px 48px;min-height:100dvh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--hanada);outline-offset:2px;border-radius:6px}

header{padding:22px 0 14px;border-bottom:3px double var(--ai);display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
header h1{font-family:var(--serif);font-weight:800;font-size:1.35rem;color:var(--ai);letter-spacing:.14em}
header .sub{font-size:.72rem;color:var(--usuzumi);letter-spacing:.08em}
.idline{width:100%;display:flex;justify-content:flex-end;gap:12px;font-size:.74rem;color:var(--usuzumi)}
.idline b{color:var(--hanada)}
.idline button{color:var(--hanada);text-decoration:underline;text-underline-offset:2px;font-size:.74rem}
.crumb{font-size:.8rem;color:var(--usuzumi);padding:10px 0 0}
.crumb button{color:var(--hanada);text-decoration:underline;text-underline-offset:3px;font-size:.8rem}

/* ---- home ---- */
.lead{margin:18px 0 6px;font-size:.9rem;color:var(--usuzumi)}
.chapters{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:10px}
.chapters button{
  width:100%;display:flex;align-items:center;gap:14px;text-align:left;
  background:#fff;border:1px solid var(--line);border-left:6px solid var(--ai);
  border-radius:var(--radius);padding:14px 16px;transition:transform .12s,box-shadow .12s;
}
.chapters button:hover{transform:translateX(3px);box-shadow:0 2px 10px rgba(30,58,95,.12)}
.ch-num{font-family:var(--serif);font-weight:700;font-size:1.15rem;color:var(--ai);min-width:2.4em;text-align:center;line-height:1.3}
.ch-num small{display:block;font-size:.6rem;color:var(--usuzumi);letter-spacing:.2em;font-weight:500}
.ch-title{flex:1;font-weight:700;font-size:.95rem}
.ch-count{font-size:.72rem;color:var(--usuzumi);white-space:nowrap}
.homebar{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.homebar .weak{background:#fff;border:1.5px dashed var(--shu);color:var(--shu);border-radius:var(--radius);padding:12px 16px;font-weight:700;font-size:.92rem}
.homebar .weak.none{border-style:solid;border-color:var(--line);color:var(--usuzumi);font-weight:500;cursor:default}
.homebar .grades{background:#fff;border:1.5px solid var(--hanada);color:var(--hanada);border-radius:var(--radius);padding:12px 16px;font-weight:700;font-size:.92rem}

/* ---- setup ---- */
.setup h2{font-family:var(--serif);font-size:1.1rem;color:var(--ai);margin:20px 0 4px;letter-spacing:.06em}
.setup .total{font-size:.8rem;color:var(--usuzumi);margin-bottom:12px}
fieldset{border:none;margin:16px 0}
legend{font-size:.8rem;font-weight:700;color:var(--hanada);letter-spacing:.12em;margin-bottom:8px}
.seglist{display:flex;flex-wrap:wrap;gap:8px}
.seg{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 16px;font-size:.88rem;transition:all .12s}
.seg[aria-pressed="true"]{background:var(--ai);border-color:var(--ai);color:#fff;font-weight:700}
.seclist{display:flex;flex-direction:column;gap:8px}
.secblock{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.sec-head{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:.88rem;font-weight:700}
.sec-head input{width:18px;height:18px;accent-color:var(--ai);flex-shrink:0}
.sec-head .cnt{margin-left:auto;font-size:.72rem;color:var(--usuzumi);font-weight:400;white-space:nowrap}
.sec-head .tgl{font-size:.8rem;color:var(--hanada);padding:2px 6px;flex-shrink:0}
.sublist{display:none;flex-direction:column;border-top:1px dashed var(--line);padding:6px 0}
.sublist.open{display:flex}
.sub-check{display:flex;align-items:center;gap:10px;padding:6px 14px 6px 34px;font-size:.83rem;cursor:pointer}
.sub-check input{width:16px;height:16px;accent-color:var(--hanada);flex-shrink:0}
.sub-check .cnt{margin-left:auto;font-size:.7rem;color:var(--usuzumi);white-space:nowrap}
.startrow{margin-top:26px;display:flex;flex-direction:column;gap:10px}
.btn-primary{
  background:var(--ai);color:#fff;font-weight:700;font-size:1.02rem;letter-spacing:.1em;
  border-radius:var(--radius);padding:15px;box-shadow:0 3px 0 #14283F;transition:transform .1s;
}
.btn-primary:active{transform:translateY(2px);box-shadow:0 1px 0 #14283F}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-second{background:#fff;border:1.5px solid var(--ai);color:var(--ai);font-weight:700;border-radius:var(--radius);padding:13px;font-size:.95rem}
.btn-ghost{color:var(--hanada);font-size:.88rem;padding:8px;text-decoration:underline;text-underline-offset:3px}
.hint{font-size:.75rem;color:var(--usuzumi);margin-top:6px}

/* ---- quiz ---- */
.progress{margin:18px 0 8px}
.progress .nums{display:flex;justify-content:space-between;font-size:.78rem;color:var(--usuzumi);margin-bottom:5px}
.bar{height:6px;background:var(--mizu);border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--hanada),var(--ai));border-radius:3px;transition:width .3s}
.qcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:24px 20px;box-shadow:0 2px 12px rgba(30,58,95,.07)}
.qcard .qnum{font-family:var(--serif);color:var(--hanada);font-weight:700;font-size:.85rem;letter-spacing:.15em;margin-bottom:8px}
.qmeta{font-size:.72rem;color:var(--usuzumi);letter-spacing:.04em;margin-bottom:8px}
.qtext{font-size:1.02rem;font-weight:500;line-height:1.9}
.answerbox{margin-top:18px;padding:16px 18px;border-radius:10px;background:var(--mizu);border-left:5px solid var(--ai)}
.answerbox .lbl{font-size:.7rem;letter-spacing:.2em;color:var(--hanada);font-weight:700}
.answerbox .ans{font-family:var(--serif);font-size:1.25rem;font-weight:700;color:var(--ai);margin-top:2px}
.acts{margin-top:22px;display:flex;gap:10px}
.acts .btn-primary{flex:1}
.btn-know,.btn-notyet{flex:1;border-radius:var(--radius);padding:14px;font-weight:700;font-size:1rem;background:#fff;transition:transform .1s}
.btn-know{border:2px solid var(--matsuba);color:var(--matsuba)}
.btn-notyet{border:2px solid var(--shu);color:var(--shu)}
.btn-know:active,.btn-notyet:active{transform:scale(.97)}

.choices{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.choice{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 16px;font-size:.95rem;display:flex;gap:12px;align-items:center;transition:border-color .12s,background .12s}
.choice .key{font-family:var(--serif);font-weight:700;color:var(--hanada);border:1.5px solid var(--mizu);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.82rem}
.choice:not(:disabled):hover{border-color:var(--hanada)}
.choice.correct{border-color:var(--matsuba);background:#EDF6F0;font-weight:700}
.choice.correct .key{background:var(--matsuba);border-color:var(--matsuba);color:#fff}
.choice.wrong{border-color:var(--shu);background:#FBF0F0}
.choice.wrong .key{background:var(--shu);border-color:var(--shu);color:#fff}
.choice.dim{opacity:.45}
.nextrow{margin-top:20px}
.nextrow .btn-primary{width:100%}

/* 手書き */
.padwrap{margin-top:18px}
.padwrap .lbl{font-size:.7rem;letter-spacing:.2em;color:var(--hanada);font-weight:700;margin-bottom:6px}
canvas.pad{
  width:100%;height:190px;display:block;background:#fff;border:1.5px solid var(--hanada);
  border-radius:10px;touch-action:none;cursor:crosshair;
  background-image:linear-gradient(var(--mizu) 1px,transparent 1px);background-size:100% 47px;background-position:0 46px;
}
.padtools{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
.padtools button{font-size:.78rem;color:var(--hanada);border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 12px}

/* stamp */
.stamp{position:absolute;top:8px;right:12px;font-family:var(--serif);font-weight:800;border:4px solid;border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;transform:rotate(-12deg) scale(0);opacity:0;pointer-events:none}
.stamp.on{animation:stamp .35s cubic-bezier(.2,1.6,.4,1) forwards}
.stamp.ok{color:var(--matsuba);border-color:var(--matsuba)}
.stamp.ng{color:var(--shu);border-color:var(--shu)}
@keyframes stamp{from{transform:rotate(-25deg) scale(2.2);opacity:0}to{transform:rotate(-12deg) scale(1);opacity:.9}}
@media (prefers-reduced-motion:reduce){
  .stamp.on{animation:none;transform:rotate(-12deg) scale(1);opacity:.9}
  .chapters button,.btn-primary,.choice{transition:none}
}

/* ---- result ---- */
.result{text-align:center;margin-top:30px}
.result .rate{font-family:var(--serif);font-size:3.4rem;font-weight:800;color:var(--ai);line-height:1.1}
.result .rate small{font-size:1.2rem}
.result .msg{font-family:var(--serif);font-size:1.05rem;color:var(--hanada);margin:6px 0 4px;letter-spacing:.1em}
.result .detail{font-size:.85rem;color:var(--usuzumi)}
.review{margin-top:24px;text-align:left}
.review h3{font-size:.85rem;color:var(--shu);letter-spacing:.12em;margin-bottom:10px;font-weight:700}
.review ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.review li{background:#fff;border:1px solid var(--line);border-left:4px solid var(--shu);border-radius:10px;padding:12px 14px;font-size:.85rem}
.review li .a{font-family:var(--serif);color:var(--ai);font-weight:700;margin-top:4px}

/* ---- 成績 ---- */
.stats{display:flex;gap:10px;margin:18px 0}
.stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 8px;text-align:center}
.stat .v{font-family:var(--serif);font-weight:800;font-size:1.4rem;color:var(--ai)}
.stat .k{font-size:.68rem;color:var(--usuzumi);letter-spacing:.08em}
.chartcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.chartcard h3{font-size:.8rem;color:var(--hanada);letter-spacing:.12em;margin-bottom:8px}
.histlist{list-style:none;margin-top:16px;display:flex;flex-direction:column;gap:6px}
.histlist li{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:.8rem;display:flex;gap:10px;align-items:center}
.histlist .d{color:var(--usuzumi);white-space:nowrap}
.histlist .l{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.histlist .r{font-family:var(--serif);font-weight:700;color:var(--ai);white-space:nowrap}
.histlist .m{font-size:.68rem;color:#fff;background:var(--hanada);border-radius:6px;padding:1px 7px;white-space:nowrap}
.transfer{margin-top:24px;background:#fff;border:1px dashed var(--line);border-radius:var(--radius);padding:16px}
.transfer h3{font-size:.8rem;color:var(--hanada);letter-spacing:.12em;margin-bottom:6px}
.transfer p{font-size:.78rem;color:var(--usuzumi);margin-bottom:10px}
.transfer textarea{width:100%;height:84px;font-size:.72rem;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:monospace;resize:vertical}
.transfer .row{display:flex;gap:8px;margin-top:8px}
.transfer .row button{flex:1;border:1.5px solid var(--ai);color:var(--ai);border-radius:10px;padding:9px;font-weight:700;font-size:.85rem;background:#fff}

/* ---- 学籍番号入力 ---- */
.login{margin-top:48px;text-align:center}
.login h2{font-family:var(--serif);color:var(--ai);font-size:1.2rem;letter-spacing:.1em;margin-bottom:8px}
.login p{font-size:.82rem;color:var(--usuzumi);margin-bottom:18px}
.login input{
  width:min(320px,100%);font-size:1.3rem;text-align:center;font-family:var(--serif);
  border:2px solid var(--hanada);border-radius:var(--radius);padding:12px;background:#fff;letter-spacing:.2em;
}
.login .startrow{max-width:320px;margin:20px auto 0}
footer{margin-top:auto;padding-top:36px;text-align:center;font-size:.68rem;color:var(--usuzumi);letter-spacing:.06em}
</style>
</head>
<body>
<div id="app" role="main"></div>
<script>
const DATA = [{"t":"第1章　日本文化のあけぼの","sec":[{"t":"1　文化の始まり","s":[{"t":"日本列島と日本人","q":[{"n":1,"q":"地球上に人類があらわれたのは，地質学でいう新第三紀の中新世後期ころと考えられているが，今から約何百万年前のことか。","a":"約700万年前","t":"g"},{"n":2,"q":"第四紀に日本列島でも人類が生活を始めた。この時期の大半を占める，およそ１万年前までの期間を地質学では何というか。","a":"更新世（洪積世）","t":"g"},{"n":3,"q":"2（＝更新世）の期間は，寒冷な時期と比較的温暖な時期とが交互におとずれたが，これを何時代というか。","a":"氷河時代","t":"g"},{"n":4,"q":"3（＝氷河時代）の時代には寒冷な時期が数回おとずれたが，これを何とよぶか。","a":"氷期","t":"g"},{"n":5,"q":"3（＝氷河時代）の時代には寒冷な時期の間に比較的温暖な時期があったが，これを何とよぶか。","a":"間氷期","t":"g"},{"n":6,"q":"更新世の日本列島はまだ大陸と陸つづきで，大型動物が往来していたが，長野県野尻湖の湖底から発見されているのは何の化石か。","a":"ナウマンゾウ","t":"g"},{"n":7,"q":"人類は進化の段階で４つに分けられるが，古い順にあげよ。","a":"猿人・原人・旧人・新人","t":"g"},{"n":8,"q":"日本列島で発見された更新世の化石人骨は，いずれも新人段階のものとされるが，更新世の化石人骨が発見されたのは静岡県のどこか。","a":"浜北（現，浜松市）","t":"l"},{"n":9,"q":"沖縄県で発見された更新世の化石人骨を何というか。２つあげよ。","a":"港川人骨・山下人骨など","t":"g"},{"n":10,"q":"東アジアに分布する黄色人種をモンゴロイドというが，そのうち，日本人の原型と考えられる南方系のものを何というか。","a":"古モンゴロイド","t":"g"},{"n":11,"q":"モンゴロイドのうち，弥生時代以降に日本列島に渡来してきた北方系のものを何というか。","a":"新モンゴロイド","t":"g"},{"n":12,"q":"日本語の語法は，朝鮮語やモンゴル語などと同じアジア大陸北方の語系に属するが，この語系とは何か。","a":"アルタイ語系","t":"g"}]},{"t":"旧石器時代人の生活","q":[{"n":1,"q":"人類の文化は使用する道具，特に利器の材質で３段階に分けられるが，その最初の時代を何というか。","a":"石器時代","t":"g"},{"n":2,"q":"更新世の時期に人類が使用した，石を打ち欠いただけの道具を何というか。","a":"打製石器","t":"g"},{"n":3,"q":"狩猟・採取を主な生活手段とする時代を，文化区分の上で何というか。","a":"旧石器時代","t":"g"},{"n":4,"q":"相沢忠洋による赤土層中の石器発見と1949（昭和24）年の学術調査で，日本の旧石器文化解明の端緒となった遺跡は，何県の何という遺跡か。","a":"群馬県岩宿遺跡","t":"l"},{"n":5,"q":"相沢忠洋によって石器が発見された更新世の赤土層を何というか。","a":"関東ローム層","t":"g"},{"n":6,"q":"旧石器時代の石器で，打撃用の楕円形石器を何というか。","a":"ハンド＝アックス（握槌）","t":"g"},{"n":7,"q":"旧石器時代の石器で，獲物の肉・皮の切り取りなどに用いた石器を何というか。","a":"ナイフ形石器（石刃，ブレイド）","t":"g"},{"n":8,"q":"旧石器時代の石器で，槍先など刺突用の石器を何というか。","a":"尖頭器（ポイント）","t":"g"},{"n":9,"q":"旧石器時代の末期に，木や骨の柄にはめこんで使われた小形の剥片石器を何というか。","a":"細石器（マイクロリス）","t":"g"},{"n":10,"q":"細石器文化の遺跡として知られているのは北海道の何という遺跡か。","a":"白滝遺跡・置戸安住遺跡","t":"g"}]},{"t":"縄文文化の成立","q":[{"n":1,"q":"氷河時代は，今から約何年前に終わったか。","a":"約1万年前","t":"d"},{"n":2,"q":"氷河時代が終わると，温暖な気候による海面の上昇で日本列島が形成され，今日とほぼ同じ自然環境になった。この時期を地質学では何とよぶか。","a":"完新世（沖積世）","t":"g"},{"n":3,"q":"磨くことによって整形された石器を何というか。","a":"磨製石器","t":"g"},{"n":4,"q":"完新世の時期で3（＝磨製石器）の石器・土器の使用，家畜の飼育，農耕を特徴とする人類の新しい文化が展開した時代を何というか。","a":"新石器時代","t":"g"},{"n":5,"q":"4（＝新石器時代）の時代の文化を特色づける新しい生産技術は何か。","a":"農耕","t":"g"},{"n":6,"q":"今から約１万3000年前に日本で展開した，磨製石器の出現や土器の使用などを特徴とする文化を何というか。","a":"縄文文化","t":"g"},{"n":7,"q":"遺物の絶対年代測定法の１つで，樹木の年輪の幅が気候の変化に応じて異なることを利用して測定する方法を何というか。","a":"年輪年代法","t":"g"},{"n":8,"q":"生物遺体に残存する放射性炭素14の量を測定し，死後経過した年数を算出する年代測定法を何というか。","a":"炭素14年代法（放射性炭素年代測定法）","t":"g"},{"n":9,"q":"縄文文化の生活で，食料を確保するための方法をあげよ。","a":"狩猟・漁労・採取","t":"g"},{"n":10,"q":"約１万3000年前から紀元前４世紀ころまでの期間にわたった縄文時代を，時期区分するための基準は何か。","a":"縄文土器の変化","t":"g"},{"n":11,"q":"縄文文化の６区分のうち最初と最後の時期を何というか。","a":"草創期・晩期","t":"g"},{"n":12,"q":"縄文時代晩期の東日本を代表する土器は，青森県の遺跡名をつけてよばれるが，この遺跡名を答えよ。","a":"亀ヶ岡遺跡","t":"g"}]},{"t":"縄文人の生活と信仰","q":[{"n":1,"q":"縄文時代にあらわれた新しい狩猟具は何か。","a":"弓矢","t":"g"},{"n":2,"q":"縄文時代の狩猟用具として，矢の先端につけたものを何というか。","a":"石鏃","t":"g"},{"n":3,"q":"打製と磨製があり，縄文・弥生両時代を通じて木の伐採や土掘り具として最も多く使用された石器は何か。","a":"石斧","t":"g"},{"n":4,"q":"縄文時代に，動物の皮などをはぐのに用いられた石器を何というか。","a":"石匙","t":"g"},{"n":5,"q":"縄文時代に，木の実や球根類をすりつぶすことなどに用いた石器は何か，２つあげよ。","a":"石皿・すり石","t":"g"},{"n":6,"q":"縄文時代に，貝などの食物を捨てた場で，埋葬の場でもあった遺跡は何か。","a":"貝塚","t":"g"},{"n":7,"q":"1877（明治10）年に日本ではじめて貝塚の発掘調査を行った，アメリカ人の動物学者はだれか。","a":"モース","t":"p"},{"n":8,"q":"7（＝モース）の人物が1877年に発掘した遺跡を何というか。","a":"大森貝塚","t":"g"},{"n":9,"q":"動物の骨や角でつくる釣針や銛などの道具を何というか。","a":"骨角器","t":"g"},{"n":10,"q":"縄文時代の一般的な住居は，地面を掘りくぼめ，その上に屋根をかけた住居で，集落の広場を囲んで環状に営まれることが多かった。この住居のことを何というか。","a":"竪穴住居","t":"g"},{"n":11,"q":"縄文時代前期から中期の大集落遺跡で，多数の竪穴住居，大型掘立柱建物，国内最多の土偶の出土，クリ林の管理などで知られるのは何県の何という遺跡か。","a":"青森県三内丸山遺跡","t":"l"},{"n":12,"q":"縄文時代の交易を示すものとして，特定の場所を産地とするガラス質の石器の広範囲な分布がある。北海道の十勝岳，長野県の和田峠を産地とするものは何か。","a":"黒曜石","t":"g"},{"n":13,"q":"まじないなどの超自然的な力で災いを防いだり，豊かな収穫を祈る行為を何というか。","a":"呪術","t":"g"},{"n":14,"q":"あらゆる自然物や自然現象に精霊があるとする信仰を何というか。","a":"アニミズム（精霊崇拝）","t":"g"},{"n":15,"q":"縄文時代の精神生活を知ることができる遺物とされ，女性をかたどったものが多い土製品を何というか。","a":"土偶","t":"g"},{"n":16,"q":"縄文時代の精神生活を知ることができる遺物とされ，男性を表現したと思われる石製品は何か。","a":"石棒","t":"g"},{"n":17,"q":"縄文時代の人骨に見られ，当時の成人になるための通過儀礼と考えられている風習は何か。","a":"抜歯","t":"g"},{"n":18,"q":"死者の手足を折り曲げた，縄文時代に見られる埋葬方法を何というか。","a":"屈葬","t":"g"}]}]},{"t":"2　農耕社会の成立","s":[{"t":"弥生文化の成立","q":[{"n":1,"q":"紀元前４世紀初めころに西日本で成立し，その後北海道と南西諸島を除く日本列島の大部分の地域に，紀元３世紀ころまで展開した文化を何というか。","a":"弥生文化","t":"g"},{"n":2,"q":"生産面での弥生文化の特徴は何か。","a":"水稲耕作の普及","t":"g"},{"n":3,"q":"縄文時代晩期の水田や水路が発見され，この時期からすでに水稲耕作が始まっていたことが知られるようになった，福岡県で発見された遺跡をあげよ。","a":"板付遺跡","t":"g"},{"n":4,"q":"縄文時代晩期の水田や水路が発見された佐賀県の遺跡をあげよ。","a":"菜畑遺跡","t":"g"},{"n":5,"q":"弥生文化は北海道にはおよばず，食料採取文化がつづいていたが，この文化を何とよぶか。","a":"続縄文文化","t":"g"},{"n":6,"q":"弥生文化は南西諸島にはおよばず，食料採取文化がつづいていたが，この文化を何とよぶか。","a":"貝塚文化","t":"g"},{"n":7,"q":"弥生文化は，土器の形式により何期に区分されるか。","a":"3期","t":"g"},{"n":8,"q":"弥生土器の名称は，1884（明治17）年，この様式の土器が東京の本郷弥生町で発見されたためであるが，この貝塚を何というか。","a":"向ヶ岡貝塚","t":"g"},{"n":9,"q":"弥生土器は縄文土器とくらべてどんな特徴があるか，２つあげよ。","a":"薄手・赤褐色","t":"g"},{"n":10,"q":"弥生土器は，用途に応じていくつかの基本形があったが，煮炊き用のものを何というか。","a":"甕","t":"g"},{"n":11,"q":"弥生土器で貯蔵用のものを何というか。","a":"壺","t":"g"},{"n":12,"q":"弥生土器で食物を蒸すためのものを何というか。","a":"甑","t":"g"},{"n":13,"q":"弥生土器で盛り付け用のものを何というか。","a":"高杯（坏）","t":"g"},{"n":14,"q":"金属器のうち，木製農具を製作する工具として，また武器などの実用の道具にも使われたものは何か。","a":"鉄器","t":"g"},{"n":15,"q":"金属器のうち，主に宝器・祭器・装身具として使われたものは何か。","a":"青銅器","t":"g"}]},{"t":"弥生人の生活","q":[{"n":1,"q":"弥生時代初期の水稲耕作は低湿地を利用して行われたが，この初期の水田を何というか。","a":"湿田","t":"g"},{"n":2,"q":"弥生時代後期になると，地下水位が低く，灌漑を行う生産性の高い水田がつくられ始めたが，この水田を何というか。","a":"乾田","t":"g"},{"n":3,"q":"弥生時代に水田の耕作用に使われた木製農具を２つあげよ。","a":"木鍬・木鋤","t":"g"},{"n":4,"q":"弥生時代の低湿地の水田で，足がしずむのを防ぐために使われた木製農具をあげよ。","a":"田下駄","t":"g"},{"n":5,"q":"水田に堆肥や青草などを踏み込む道具として使われた木製農具は何か。","a":"大足","t":"g"},{"n":6,"q":"弥生時代には，直播や田植えも始まっていたが，収穫時に使用された磨製の石器を何というか。","a":"石包（庖）丁","t":"g"},{"n":7,"q":"弥生時代前期から中期にかけて行われていた，6（＝石包丁）を用いた稲の刈り取り方法を何というか。","a":"穂首刈り","t":"g"},{"n":8,"q":"弥生時代後期になると農業技術が発展し，鉄製農具もあらわれたが，稲の刈り取りに使用された道具は何か。","a":"鉄鎌","t":"g"},{"n":9,"q":"弥生時代後期から始まった，8（＝鉄鎌）の道具を用いた稲の刈り取りの方法を何というか。","a":"根刈り","t":"g"},{"n":10,"q":"弥生時代に，刈り取った稲は，木臼や竪杵を使って脱穀されたが，収穫物の貯蔵のために建てられたものは何か。","a":"高床倉庫","t":"g"},{"n":11,"q":"日本最大級の環濠集落で，多数の木製農具が出土した例として，弥生時代前期から後期にわたる奈良県の代表的な遺跡をあげよ。","a":"唐古・鍵遺跡","t":"g"},{"n":12,"q":"住居・倉庫・水田跡などで知られる弥生時代後期の静岡県の遺跡をあげよ。","a":"登呂遺跡","t":"g"},{"n":13,"q":"水田遺構の発見により，弥生時代に稲作が本州北端近くまでおよんだことを示す青森県の代表的な遺跡を２つあげよ。","a":"垂柳遺跡・砂沢遺跡","t":"g"},{"n":14,"q":"朝鮮半島や九州北部に見られる，大きな平石を数個の石で支え，その下に埋葬した弥生時代の墓制を何というか。","a":"支石墓","t":"g"},{"n":15,"q":"九州北部で見られる，土器を用いた弥生時代の墓制を何というか。","a":"甕棺墓","t":"g"},{"n":16,"q":"甕棺墓の棺から，大量の副葬品が発見された福岡県春日市にある遺跡をあげよ。","a":"須玖岡本遺跡","t":"g"},{"n":17,"q":"板を組み合わせた棺に埋葬した弥生時代の墓制を何というか。","a":"木棺墓","t":"g"},{"n":18,"q":"九州北部などに多い墓制で，板石を組み合わせてつくった棺によるものを何というか。","a":"箱式石棺墓","t":"g"},{"n":19,"q":"弥生時代後期から古墳時代に見られる墓制で，土壙（墓穴）のまわりに方形の溝をめぐらしたものを何というか。","a":"方形周溝墓","t":"g"},{"n":20,"q":"弥生時代中期から後期の西日本で，周囲を削ったり，盛土をしたりして，大きな丘陵の形をした墓がつくられたが，これを何というか。","a":"墳丘墓","t":"g"},{"n":21,"q":"弥生時代中期から，吉備・山陰・北陸の各地方で行われた墓制で，方形墳丘墓の四隅がヒトデのように飛び出した特異な形の大型墳丘墓を何というか。","a":"四隅突出（型）墳丘墓","t":"g"},{"n":22,"q":"屈葬に対し，弥生時代には手足を伸ばした形の葬法が見られるが，これを何というか。","a":"伸展葬","t":"g"},{"n":23,"q":"弥生時代に農耕が成立し社会に大きな変化がおきたが，このことを示す埋葬方法の変化をあげよ。","a":"多量の副葬品","t":"g"},{"n":24,"q":"弥生時代の国産青銅器のうち，九州北部を中心に分布するものを２つあげよ。","a":"銅矛（鉾）・銅戈","t":"g"},{"n":25,"q":"弥生時代の国産青銅器のうち，近畿地方を中心に分布するものを１つあげよ。","a":"銅鐸","t":"g"},{"n":26,"q":"弥生時代の国産青銅器のうち，瀬戸内海地域を中心に分布するものを１つあげよ。","a":"平形銅剣","t":"g"},{"n":27,"q":"358本の銅剣，６個の銅鐸，16本の銅矛がまとまって出土した島根県出雲市斐川町にある弥生時代の遺跡をあげよ。","a":"（神庭）荒神谷遺跡","t":"g"}]},{"t":"小国の分立","q":[{"n":1,"q":"弥生時代の集落には，まわりに濠や土塁をめぐらした防御用の施設を持つものが少なくない。このような集落を何というか。","a":"環濠集落","t":"g"},{"n":2,"q":"弥生時代中期から後期にかけて，香川県紫雲出山遺跡のように，山頂や丘陵上に軍事・防衛的機能を重視してつくられたと考えられる集落が存在するが，これを何というか。","a":"高地性集落","t":"g"},{"n":3,"q":"二重の環濠を持つ巨大な環濠集落の遺跡で，大きな墳丘墓や多くの甕棺墓，望楼と推定される掘立柱の建物跡などが発見された，「クニ」の形成をうかがわせる佐賀平野にある大遺跡をあげよ。","a":"吉野ヶ里遺跡","t":"g"},{"n":4,"q":"中国の歴史書に登場する弥生時代の日本人は，どのような名称でよばれているか。","a":"倭人","t":"g"},{"n":5,"q":"紀元前後の倭（日本）が百余国の小国にわかれていて，定期的に中国に使者を送ってくると記す，倭に関する最古の記録がある中国の歴史書は何か。","a":"『漢書』地理志","t":"g"},{"n":6,"q":"紀元前108年におかれた，朝鮮半島の４郡のうち，今のピョンヤン（平壌）付近にあった郡を何というか。","a":"楽浪郡","t":"g"},{"n":7,"q":"紀元前108年に朝鮮半島に４郡を設置した中国の王朝と皇帝をあげよ。","a":"漢（前漢）の武帝","t":"g"},{"n":8,"q":"紀元57年にある小国の使者が朝貢し，中国の皇帝から印綬を与えられたことを記す，中国の歴史書は何か。","a":"『後漢書』東夷伝","t":"g"},{"n":9,"q":"8（＝『後漢書』東夷伝）の歴史書に記されている，印綬を与えられた倭の小国の名は何というか。","a":"奴国","t":"g"},{"n":10,"q":"紀元57年に，9（＝奴国）の国の使者に印綬を与えた中国の王朝と皇帝をあげよ。","a":"後漢の光武帝","t":"g"},{"n":11,"q":"1784（天明４）年に九州北部から，『後漢書』東夷伝に記されている金印が発見されたが，その発見地は何県のどこか。","a":"福岡県志賀島","t":"l"},{"n":12,"q":"11（＝福岡県志賀島）で発見された金印には，どのような文字が刻まれているか。","a":"漢委奴国王","t":"g"},{"n":13,"q":"『後漢書』東夷伝には，紀元107年に，倭の国王らが奴隷160人を献上したことが記されているが，この倭の国王とされる人物の名を何というか。","a":"帥升（師升）","t":"g"},{"n":14,"q":"『後漢書』東夷伝には，奴隷と考えられるものが何と記されているか。","a":"生口","t":"g"}]},{"t":"邪馬台国連合","q":[{"n":1,"q":"後漢につづく三国時代に，30国ほどの小国の連合体が倭（日本）に存在し，中国に朝貢している。このことを記す中国の歴史書は何か。","a":"「魏志」倭人伝","t":"g"},{"n":2,"q":"中国の三国時代の三国の国名をあげよ。","a":"魏・呉・蜀","t":"g"},{"n":3,"q":"中国の三国時代に，倭で約30カ国の連合体の盟主となった国を何というか。","a":"邪馬台国","t":"g"},{"n":4,"q":"239年に魏に朝貢した3（＝邪馬台国）の女王を何というか。","a":"卑弥呼","t":"g"},{"n":5,"q":"4（＝卑弥呼）の人物は「景初二年」に，朝鮮半島におかれた中国の郡を通じ，魏の皇帝に使者を送った。「景初二年」は「景初三年」の誤りだが，それは西暦何年にあたるか。","a":"239年","t":"d"},{"n":6,"q":"4（＝卑弥呼）の人物が使節を送った，中国が支配する朝鮮半島の今のソウル付近を中心とする郡を何というか。","a":"帯方郡","t":"g"},{"n":7,"q":"4（＝卑弥呼）の人物に，魏の皇帝はある称号と金印・銅鏡を与えたが，どのような称号か。","a":"親魏倭王","t":"g"},{"n":8,"q":"4（＝卑弥呼）の人物は呪術にすぐれ，呪術的権威を背景とする巫女的な王であったようだが，「魏志」倭人伝では卑弥呼の呪術のことを何と記しているか。","a":"鬼道","t":"g"},{"n":9,"q":"邪馬台国には身分秩序があったことを示す記述があるが，どのような身分秩序か。","a":"大人と下戸","t":"g"},{"n":10,"q":"邪馬台国で卑弥呼の死後，その地位を継いだとされる一族の女性の名を何というか。","a":"壱与（台与）","t":"g"},{"n":11,"q":"奈良県桜井市の三輪山西麓に広がる３～４世紀の巨大遺跡で，2009（平成21）年に整然と配置された大型建物跡が発見されて，邪馬台国との関係が注目されている遺跡は何か。","a":"纒向遺跡","t":"g"},{"n":12,"q":"邪馬台国の位置について，対立する２つの説をあげよ。","a":"近畿（大和）説・九州説","t":"g"}]}]},{"t":"3　古墳とヤマト政権","s":[{"t":"古墳の出現とヤマト政権","q":[{"n":1,"q":"３世紀後半，西日本を中心に各地に出現した，大量の土を高く盛り上げて造成した墓を何というか。","a":"古墳","t":"g"},{"n":2,"q":"大量の土を高く盛り上げた墓制を持つ文化が発達した時代を何というか。","a":"古墳時代","t":"g"},{"n":3,"q":"2（＝古墳時代）の時代は前期・中期・後期の３期に区分されているが，中期はほぼ何世紀に相当するか。","a":"5世紀","t":"g"},{"n":4,"q":"古墳のうち，円形の墳丘の一端に方形の墳丘を連接させた高塚式古墳を何というか。","a":"前方後円墳","t":"g"},{"n":5,"q":"出現期の古墳としては最大規模を持つ，奈良県にある4（＝前方後円墳）を何というか。","a":"箸墓古墳","t":"g"},{"n":6,"q":"出現期の古墳の分布などから，４世紀ころまでに大和地方を中心とする政治連合が形成されたと考えられている。この政治連合を何というか。","a":"ヤマト政権","t":"g"}]},{"t":"前期・中期の古墳","q":[{"n":1,"q":"古墳の墳丘上には，素焼の土製品がめぐらされていることが多いが，これを何というか。","a":"埴輪","t":"g"},{"n":2,"q":"1（＝埴輪）は，その形から，土管状の単純な器形のものと，家や器財・人物・動物などさまざまな形をあらわすものとに大別されるが，それぞれ何というか。","a":"円筒埴輪・形象埴輪","t":"g"},{"n":3,"q":"前期・中期の古墳に多い棺の収蔵施設で，長方形の石室をつくり，上部から棺をおさめ，天井石をのせて閉鎖し，土をかぶせたものを何というか。","a":"竪穴式石室","t":"g"},{"n":4,"q":"古墳で，直接木棺を埋めて周囲を厚く粘土でおおったものを何というか。","a":"粘土槨","t":"g"},{"n":5,"q":"前期古墳の副葬品には呪術的性格が強く，この時期の各地の首長たちが司祭者的性格を持っていたことを物語っているが，どんなものが副葬されているか。２つあげよ。","a":"銅鏡・腕輪形石製品など","t":"g"},{"n":6,"q":"中期古墳には巨大な規模を持つものが目立つが，大阪府堺市の百舌鳥古墳群にある国内最大規模の古墳を何というか。","a":"大仙陵古墳（仁徳天皇陵古墳）","t":"g"},{"n":7,"q":"大阪府羽曳野市の古市古墳群のなかで，最大規模の古墳を何というか。","a":"誉田御廟山古墳（応神天皇陵古墳）","t":"g"},{"n":8,"q":"中期古墳の副葬品は，前期と異なり，権力的・武人的性格が強いとされるが，どんなものが副葬されているか。２つあげよ。","a":"馬具・鉄製武器や武具","t":"g"},{"n":9,"q":"畿内の巨大古墳は５世紀のヤマト政権の盟主の墓と考えられるが，この盟主のことを何というか。","a":"大王","t":"g"},{"n":10,"q":"古墳の築造は東北地方から九州南部にまでおよんだが，特に大規模な古墳が数多くつくられた群馬・栃木県地方，岡山・広島県地方はそれぞれ古い地名で何とよぶか。","a":"毛野・吉備","t":"g"},{"n":11,"q":"古墳の築造は東北地方から九州南部にまでおよんだが，特に大規模な古墳が数多くつくられた島根県地方，宮崎県地方をそれぞれ古い地名で何とよぶか。","a":"出雲・日向","t":"g"}]},{"t":"東アジア諸国との交渉","q":[{"n":1,"q":"中国で，三国時代のあと国内を統一した王朝の名をあげよ。","a":"晋（西晋）","t":"g"},{"n":2,"q":"４世紀初め，中国では匈奴をはじめとする北方諸民族の侵入を受けて晋が江南に移り，南北の分裂時代になった。この時代を何というか。","a":"南北朝時代","t":"g"},{"n":3,"q":"朝鮮半島では，中国東北部から南下した勢力が，313年に楽浪郡を滅ぼしたが，この勢力とは何か。","a":"高句麗","t":"g"},{"n":4,"q":"４世紀半ばに朝鮮半島南部では，韓族の小国家連合を統一して２つの国家が成立したが，このうち，南西部の小国家連合名と，これを統一して成立した国家名をあげよ。","a":"馬韓・百済","t":"g"},{"n":5,"q":"朝鮮半島東南部の小国家連合名と，４世紀半ばにこれを統一して成立した国家名をあげよ。","a":"辰韓・新羅","t":"g"},{"n":6,"q":"6　朝鮮半島南部のもう１つの小国家連合は何とよばれたか。","a":"弁韓（弁辰）","t":"g"},{"n":7,"q":"6（＝弁韓）の諸国は統一が遅れ，鉄資源を求めて倭の勢力も進出したが，この地域は４世紀には何とよばれたか。","a":"加耶（加羅）","t":"g"},{"n":8,"q":"朝鮮半島南部の7（＝加耶）の地域は，『日本書紀』では何とよばれているか。","a":"任那","t":"g"},{"n":9,"q":"倭が「辛卯年」に朝鮮半島に進出し，高句麗と交戦したことを記す高句麗王の石碑を何というか。","a":"好太王碑（広開土王碑）","t":"g"},{"n":10,"q":"9（＝好太王碑）の碑文に記されている「辛卯年」は，西暦何年にあたるか。","a":"391年","t":"d"},{"n":11,"q":"9（＝好太王碑）の碑文は，鴨緑江の北岸，中国吉林省集安市の高句麗の都であった場所にあるが，この都を何というか。","a":"丸都","t":"g"},{"n":12,"q":"南北朝時代の中国の南朝に次々と倭の王が使いを送り，朝貢したことを記す中国の歴史書をあげよ。","a":"『宋書』倭国伝","t":"g"},{"n":13,"q":"倭の王が中国の南朝に朝貢したのは，主として何世紀のことか。","a":"5世紀","t":"g"},{"n":14,"q":"中国の南朝に朝貢した倭の王を総称して何というか。","a":"倭の五王","t":"g"},{"n":15,"q":"中国の南朝に朝貢した14（＝倭の五王）の王の名を順にあげよ。","a":"讃・珍（弥）・済・興・武","t":"g"},{"n":16,"q":"『宋書』倭国伝には，「東は毛人を征すること五十五国，西は衆夷を服すること六十六国……」という国内統一の状況を述べた倭王の上表文がのせられているが，この倭王はだれか。","a":"武","t":"p"},{"n":17,"q":"16（＝武）の人物は『日本書紀』の何天皇にあたるか。","a":"雄略天皇","t":"g"},{"n":18,"q":"埼玉県の古墳から出土した鉄剣銘に「●加多支鹵大王」という名があり，17（＝雄略天皇）の天皇と同一人物と考えられているが，この古墳名をあげよ。","a":"稲荷山古墳","t":"g"},{"n":19,"q":"倭の五王のうち，済と興にあたると推定されている天皇の名をそれぞれあげよ。","a":"允恭天皇・安康天皇","t":"g"}]},{"t":"大陸文化の受容","q":[{"n":1,"q":"朝鮮や中国との交流が盛んになると，この地の人々が近畿地方を中心に移住してくるようになり，大陸の新技術や文化を伝えた。このような人々を何というか。","a":"渡来人","t":"g"},{"n":2,"q":"ヤマト政権は，1（＝渡来人）の人々を技術者集団に組織し，各地に居住させたが，その例を３つあげよ。","a":"韓鍛冶部・陶作部・錦織部","t":"g"},{"n":3,"q":"応神天皇の時に，秦の始皇帝の子孫が渡来したことに始まるという伝承を持つ近畿地方の豪族で，養蚕・機織・開拓に従事した氏族を何というか。","a":"秦氏","t":"g"},{"n":4,"q":"始皇帝の子孫という伝承上の人物で，3（＝秦氏）の氏族の祖先とされるのはだれか。","a":"弓月君","t":"p"},{"n":5,"q":"応神天皇の時に，後漢の皇帝の子孫が17県の民を率いて渡来したという伝承を持つ豪族を何というか。","a":"東漢氏","t":"g"},{"n":6,"q":"後漢の皇帝の子孫という伝承上の人物で，5（＝東漢氏）の氏族の祖先とされるのはだれか。","a":"阿知使主","t":"p"},{"n":7,"q":"漢字の伝来に関連して，応神天皇の時，『論語』『千字文』を持って百済から渡来したと伝えられる人物はだれか。","a":"王仁","t":"p"},{"n":8,"q":"百済から渡来した7（＝王仁）の人物を祖先と称している豪族を何というか。","a":"西文氏","t":"g"},{"n":9,"q":"日本における漢字使用の始まりを示す遺品について，熊本県出土のものをあげよ。","a":"江田船山古墳出土の鉄刀","t":"g"},{"n":10,"q":"日本における漢字使用の始まりを示す遺品について，和歌山県の神社に伝えられたものをあげよ。","a":"隅田八幡神社の人物画像鏡","t":"g"},{"n":11,"q":"日本における漢字使用の始まりを示す遺品について，埼玉県出土のものをあげよ。","a":"稲荷山古墳出土の鉄剣","t":"g"},{"n":12,"q":"日本における漢字使用の始まりを示す遺品について，奈良県天理市の神社に伝えられたものをあげよ。","a":"石上神宮七支刀","t":"g"},{"n":13,"q":"６世紀初め，百済から渡来した儒教の学者を何というか。","a":"五経博士","t":"g"},{"n":14,"q":"仏教公伝は，百済の王が日本の天皇に仏像・経論を贈ったという伝えによるが，百済の王の名と天皇名をそれぞれあげよ。","a":"聖明王（聖王，明王）・欽明天皇","t":"g"},{"n":15,"q":"仏教公伝を「戊午年」（538年）とする文献を２つあげよ。","a":"上宮聖徳法王帝説・元興寺縁起","t":"g"},{"n":16,"q":"仏教公伝を「壬申年」（552年）とする文献をあげよ。","a":"日本書紀","t":"g"},{"n":17,"q":"『扶桑略記』によると６世紀初め，仏教公伝より先に日本に渡来して仏像を崇拝した，鞍作鳥の祖父と伝えられる人物をあげよ。","a":"司馬達等","t":"g"},{"n":18,"q":"５世紀末から６世紀前半にかけて，朝廷でまとめられたとされる大王の系譜で，のちの『古事記』『日本書紀』のもとになったものを何というか。","a":"帝紀","t":"g"},{"n":19,"q":"５世紀末から６世紀前半にかけて，朝廷でまとめられたとされる朝廷の説話・伝承を何というか。","a":"旧辞","t":"g"}]},{"t":"古墳文化の変化","q":[{"n":1,"q":"６世紀の古墳時代後期になると，古墳の埋葬施設は従来の竪穴式にかわり，朝鮮半島と共通のものが普及した。何とよばれるものか。","a":"横穴式石室","t":"g"},{"n":2,"q":"1（＝横穴式石室）は，遺体をおく主室と通路とで成り立っているが，それぞれ何というか。","a":"玄室・羨道","t":"g"},{"n":3,"q":"九州や茨城県・福島県などの古墳には，墓室に彩色あるいは線刻された壁画を持つものが見られるが，これを何というか。","a":"装飾古墳","t":"g"},{"n":4,"q":"福岡県宮若市にある後期の円墳で，横穴式石室の奥壁に竜・馬・船などを黒・赤２色で描いた彩色壁画が見られる古墳名をあげよ。","a":"竹原古墳","t":"g"},{"n":5,"q":"５世紀の終わりから６世紀にかけて，奈良県新沢千塚古墳群のように，１カ所に十数基から数百基もの小さな古墳がつくられるようになるが，これを何というか。","a":"群集墳","t":"g"}]},{"t":"古墳時代の人びとの生活","q":[{"n":1,"q":"古墳時代には，それまでの住居のほかに，どのような住居が見られるようになったか。","a":"平地住居","t":"g"},{"n":2,"q":"群馬県高崎市で日本で最初に発見された古墳時代後期の豪族居館跡として最大級の遺跡は何か。","a":"三ツ寺Ⅰ遺跡","t":"g"},{"n":3,"q":"古墳時代に使われた土器のうち，弥生土器の系統をひくものを何というか。","a":"土師器","t":"g"},{"n":4,"q":"５世紀になると，朝鮮半島から伝えられた技術により，1000度以上で焼成される灰色の硬質の土器があらわれたが，これを何というか。","a":"須恵器","t":"g"},{"n":5,"q":"日本の民族宗教として，さまざまな農耕儀礼が発達したが，その年の豊作を祈る春の祭りを何というか。","a":"祈年の祭（祈年祭）","t":"g"},{"n":6,"q":"稲の収穫を感謝し，翌年の豊作を祈る秋の祭りを何というか。","a":"新嘗の祭（新嘗祭）","t":"g"},{"n":7,"q":"一族の祖先神や守護神としてまつられる神を何というか。","a":"氏神","t":"g"},{"n":8,"q":"三重県にあり，大王家の祖先神とされる天照大神をまつる神社を何というか。","a":"伊勢神宮","t":"g"},{"n":9,"q":"島根県にあり，大国主神をまつる神社を何というか。","a":"出雲大社","t":"g"},{"n":10,"q":"奈良県にあり，三輪山を神体として崇拝する神社を何というか。","a":"大神神社","t":"g"},{"n":11,"q":"古墳時代にはさまざまな呪術的風習があったが，鹿の肩甲骨を焼いて吉凶を占うことを何というか。","a":"太占（太占の法）","t":"g"},{"n":12,"q":"古墳時代の呪術的風習で，水に入り，穢れを除くことを何というか。","a":"禊","t":"g"},{"n":13,"q":"古墳時代の呪術的風習で，種々の儀礼により悪霊をとりはらうことを何というか。","a":"祓","t":"g"},{"n":14,"q":"古墳時代の呪術的風習で，熱湯に手を入れさせ，手がただれるかどうかで真偽を判断するものは何か。","a":"盟神探湯","t":"g"}]},{"t":"古墳の終末","q":[{"n":1,"q":"千葉県印旛郡栄町にある７世紀前半ころ築造の終末期古墳は何か。","a":"龍角寺岩屋古墳","t":"g"},{"n":2,"q":"墳丘の平面が八角形の終末期古墳を何というか。","a":"八角墳","t":"g"}]},{"t":"ヤマト政権と政治制度","q":[{"n":1,"q":"ヤマト政権が諸豪族を服属させて，全国統一を進めていく過程でつくりあげた支配の仕組みを何というか。","a":"氏姓制度","t":"g"},{"n":2,"q":"ヤマト政権下で，統一された諸豪族が，血縁にもとづいて構成する同族集団を何というか。","a":"氏","t":"g"},{"n":3,"q":"2（＝氏）の集団の首長を何というか。","a":"氏上","t":"g"},{"n":4,"q":"2（＝氏）の集団の一般構成員を何というか。","a":"氏人","t":"g"},{"n":5,"q":"ヤマト政権の職務を分担した諸豪族に与えられ，その地位を示す称号を何というか。","a":"姓","t":"g"},{"n":6,"q":"大王家としばしば婚姻関係を結んだ大和の有力豪族や，地方の伝統ある豪族が持つ称号を何というか。","a":"臣","t":"g"},{"n":7,"q":"6（＝臣）の称号を持つ豪族の例をあげよ。","a":"葛城氏・平群氏・蘇我氏など","t":"g"},{"n":8,"q":"特定の職能を持って朝廷に仕える有力豪族が持つ姓は何か。","a":"連","t":"g"},{"n":9,"q":"8（＝連）の姓を持ち，軍事を担当した豪族を２氏あげよ。","a":"大伴氏・物部氏","t":"g"},{"n":10,"q":"8（＝連）の姓を持ち，祭祀を担当した豪族を２氏あげよ。","a":"忌部氏・中臣氏","t":"g"},{"n":11,"q":"氏姓制度で，主として地方の有力豪族に与えられた姓を何というか。","a":"君（公）","t":"g"},{"n":12,"q":"ヤマト政権の大王の下で，国政を担当する中央豪族に与えられる姓のうち，特に最有力なものを何というか。２つあげよ。","a":"大臣・大連","t":"g"},{"n":13,"q":"ヤマト政権下で，特定の技術・職業を持って朝廷に奉仕する集団を何というか。","a":"品部","t":"g"},{"n":14,"q":"13（＝品部）の集団を統率して朝廷に仕える中・下級豪族を何というか。","a":"伴造","t":"g"},{"n":15,"q":"ヤマト政権下で，地方官として，それぞれの地方の支配権を認められた豪族を何というか。","a":"国造","t":"g"},{"n":16,"q":"地方豪族支配下の民の一部を割いて設けた，ヤマト政権の直轄民を何というか。","a":"名代・子代","t":"g"},{"n":17,"q":"ヤマト政権の直轄地を何というか。","a":"屯倉","t":"g"},{"n":18,"q":"17（＝屯倉）を耕作するためにおかれた部を何というか。","a":"田部","t":"g"},{"n":19,"q":"大化改新前の諸豪族の私有地を何というか。","a":"田荘","t":"g"},{"n":20,"q":"諸豪族の私有民を何というか。","a":"部曲","t":"g"},{"n":21,"q":"諸豪族が所有する奴隷を何というか。","a":"ヤツコ（奴婢）","t":"g"},{"n":22,"q":"品部・名代・子代・部曲など，ヤマト政権や豪族が所有し支配していた人々を総称して何というか。","a":"部（部民）","t":"g"},{"n":23,"q":"大王権力の拡大に対し，６世紀初めに新羅と結び，九州北部でヤマト政権に対する反乱をおこした人物はだれか。","a":"（筑紫国造）磐井","t":"p"}]}]}]},{"t":"第2章　律令国家の形成","sec":[{"t":"1　飛鳥の朝廷","s":[{"t":"東アジアの動向とヤマト政権の発展","q":[{"n":1,"q":"６世紀初めに加耶西部の地域（『日本書紀』では「任那四県」と表記）を百済に割譲し，のちにその責任を問われて大連の地位を退いたとされる人物はだれか。","a":"大伴金村","t":"p"},{"n":2,"q":"加耶諸国を併合していった国を２つあげよ。","a":"新羅・百済","t":"g"},{"n":3,"q":"2（＝新羅・百済）の国により加耶諸国が滅ぼされたのは西暦何年のことか。","a":"562年","t":"d"},{"n":4,"q":"朝廷内の豪族間の争いが高まるなかで，大伴金村失脚後に勢力を強め，対立するようになった豪族は何氏と何氏か。","a":"蘇我氏・物部氏","t":"g"},{"n":5,"q":"4（＝蘇我氏・物部氏）の両氏の争いは，あるものの受容をめぐって激化したが，それは何か。","a":"仏教","t":"g"},{"n":6,"q":"蘇我氏と物部氏の争いは，587年に蘇我氏が物部氏を滅ぼすことで決着した。この時の両氏の氏上はだれか。","a":"蘇我馬子・物部守屋","t":"p"},{"n":7,"q":"蘇我氏の力は，渡来人と結び財政権を握ったことにあったが，当時，朝廷の財物をおさめた蔵を総称して何というか。","a":"三蔵","t":"g"},{"n":8,"q":"592年に蘇我馬子によって暗殺された天皇はだれか。","a":"崇峻天皇","t":"p"},{"n":9,"q":"8（＝崇峻天皇）の人物が暗殺された後に即位した，最初の女性天皇はだれか。","a":"推古天皇","t":"p"},{"n":10,"q":"9（＝推古天皇）の人物の甥で，蘇我馬子と協力して国政を担当し，改革を進めた人物はだれか。","a":"厩戸王（聖徳太子）","t":"p"},{"n":11,"q":"603年に，姓とは異なり，才能や功績に応じて個人に与えられる新しい位階制度がつくられ，人材登用がはかられた。この制度を何というか。","a":"冠位十二階（の制）","t":"g"},{"n":12,"q":"11（＝冠位十二階）の制度に用いられた徳目を上位から順にすべてあげよ。","a":"徳・仁・礼・信・義・智","t":"g"},{"n":13,"q":"604年に，「和を以て貴しとなし……」で始まる，豪族・官人に対する道徳的訓戒がつくられた。これを何というか。","a":"憲法十七条","t":"g"},{"n":14,"q":"７世紀初めに編纂されたが，645（大化元）年の蘇我氏滅亡の際に焼失したという歴史書を２つあげよ。","a":"天皇記・国記","t":"g"},{"n":15,"q":"「日出づる処の天子，書を日没する処の天子に致す」という，中国皇帝に臣属しない形式の国書を持った外交使節が派遣されたのは，西暦何年のことか。","a":"607年","t":"d"},{"n":16,"q":"15（＝607年）の年に外交使節として中国に派遣された人物はだれか。","a":"小野妹子","t":"p"},{"n":17,"q":"16（＝小野妹子）の人物が任じられた外交使節を何というか。","a":"遣隋使","t":"g"},{"n":18,"q":"607年に派遣された17（＝遣隋使）の外交使節についてが記載されている，中国の歴史書を何というか。","a":"『隋書』倭国伝","t":"g"},{"n":19,"q":"小野妹子が隋に派遣された時の隋の皇帝の名と，608年に日本へ国使としてつかわされた隋の使者の名をあげよ。","a":"煬帝・裴世清","t":"g"},{"n":20,"q":"608年に，再び隋に派遣された小野妹子に同行した，留学生を１人あげよ。","a":"高向玄理","t":"g"},{"n":21,"q":"608年に，再び隋に派遣された小野妹子に同行した，学問僧を２人あげよ。","a":"南淵請安・旻","t":"g"},{"n":22,"q":"中国では618年に隋が滅び，新しい王朝が成立し，高度に発達した中央集権国家を築いた。この王朝を何というか。","a":"唐","t":"g"},{"n":23,"q":"22（＝唐）の王朝に派遣された使節を何というか。","a":"遣唐使","t":"g"},{"n":24,"q":"23（＝遣唐使）の使節が最初に派遣されたのは西暦何年か。","a":"630年","t":"d"},{"n":25,"q":"23（＝遣唐使）が最初に派遣された時の使節はだれか。","a":"犬上御田鍬","t":"p"}]},{"t":"飛鳥の朝廷と文化","q":[{"n":1,"q":"推古朝を中心に，大化改新のころまで大王の宮殿が営まれた，奈良盆地南部の地名を何というか。","a":"飛鳥","t":"g"},{"n":2,"q":"６～７世紀の推古朝を中心とした時代の文化を何というか。","a":"飛鳥文化","t":"g"},{"n":3,"q":"2（＝飛鳥文化）の文化はそれまでの古墳文化に，百済・高句麗を通じてもたらされた，中国のある時代の文化の影響が加わって成立したものであるが，ある時代を何というか。","a":"南北朝時代","t":"g"},{"n":4,"q":"仏教の普及 g"},{"n":8,"q":"6（＝橘諸兄）の政権に対し，740（天平12）年に大宰府で挙兵し，敗死した人物はだれか。","a":"藤原広嗣","t":"p"},{"n":9,"q":"8（＝藤原広嗣）の人物の乱後，聖武天皇は転々と都を移したが，山背国における都の名をあげよ。","a":"恭仁京","t":"g"},{"n":10,"q":"8（＝藤原広嗣）の人物の乱後，聖武天皇は転々と都を移したが，摂津国における都の名をあげよ。","a":"難波宮","t":"g"},{"n":11,"q":"8（＝藤原広嗣）の人物の乱後，聖武天皇は転々と都を移したが，近江国における都の名をあげよ。","a":"紫香楽宮","t":"g"},{"n":12,"q":"奈良時代の仏教は，第一に国家の安泰を祈願するという国家仏教の性格を持つが，こうした思想を何というか。","a":"鎮護国家（思想）","t":"g"},{"n":13,"q":"12（＝鎮護国家）の思想により，聖武天皇が国ごとに僧寺と尼寺を建てて政治・社会の動揺を防ごうとした詔を何というか。","a":"国分寺建立の詔","t":"g"},{"n":14,"q":"13（＝国分寺建立の詔）の詔が出されたのは西暦何年か。","a":"741年","t":"d"},{"n":15,"q":"13（＝国分寺建立の詔）の詔によって，国ごとに建てられた僧寺の正式名称をあげよ。","a":"金光明四天王護国之寺","t":"g"},{"n":16,"q":"13（＝国分寺建立の詔）の詔によって，国ごとに建てられた尼寺の正式名称をあげよ。","a":"法華滅罪之寺","t":"g"},{"n":17,"q":"13（＝国分寺建立の詔）の詔によって国ごとに建てられた僧寺で，国家を守護するものとして特に重んじられた経典は何か。","a":"金光明最勝王経（金光明経）","t":"g"},{"n":18,"q":"聖武天皇は「夫れ天下の富を有つ者は朕なり。天下の勢を有つ者も朕なり。此の富勢を以てこの尊像を造る」という詔を発して，鎮護国家の大事業に着手したが，この詔は何か。","a":"大仏造立の詔","t":"g"},{"n":19,"q":"18（＝大仏造立の詔）の詔は，転々と都が移されていたころに発せられたが，どこの都か。","a":"紫香楽宮","t":"l"},{"n":20,"q":"18（＝大仏造立の詔）の詔が出されたのは西暦何年か。","a":"743年","t":"d"},{"n":21,"q":"18（＝大仏造立の詔）の詔によって造立が始まった，「尊像」の正式名称は何か。","a":"盧舎那仏","t":"g"},{"n":22,"q":"18（＝大仏造立の詔）の詔によって，盧舎那仏が造立された総国分寺でもある平城京の寺院を何というか。","a":"東大寺","t":"g"},{"n":23,"q":"聖武天皇にかわって即位し，大仏開眼供養を752（天平勝宝４）年に行った女性天皇はだれか。","a":"孝謙天皇","t":"p"},{"n":24,"q":"23（＝孝謙天皇）の天皇のもとで，光明皇太后の信任を得て政権を握った人物はだれか。","a":"藤原仲麻呂","t":"p"},{"n":25,"q":"24（＝藤原仲麻呂）の人物は，孝謙天皇の次の淳仁天皇から特に名を賜わったが，何という名か。","a":"恵美押勝","t":"g"},{"n":26,"q":"757（天平宝字元）年に，24（＝藤原仲麻呂）の人物に反対して反乱を企てて失敗する事件がおこったが，これを何というか。","a":"橘奈良麻呂の変","t":"g"},{"n":27,"q":"孝謙太上天皇（上皇）の信任を得て，急速に勢力を伸ばした僧侶はだれか。","a":"道鏡","t":"p"},{"n":28,"q":"27（＝道鏡）の勢力に対して反乱を企て失敗した，764（天平宝字８）年におこった事件を何というか。","a":"恵美押勝（藤原仲麻呂）の乱","t":"g"},{"n":29,"q":"孝謙太上天皇は重祚（再び皇位につくこと）して，何天皇とよばれたか。","a":"称徳天皇","t":"g"},{"n":30,"q":"道鏡は特別な地位に就任して権勢をふるったが，その地位を就任順に２つあげよ。","a":"太政大臣禅師・法王","t":"g"},{"n":31,"q":"八幡神の神託と称して，道鏡を皇位につけようとする事件が769（神護景雲３）年におきたが，この神託は何という神社のものか。","a":"宇佐八幡宮","t":"g"},{"n":32,"q":"31（＝宇佐八幡宮）の神託事件で，道鏡の天皇就任を妨げ，のちに平安遷都に活躍した人物はだれか。","a":"和気清麻呂","t":"p"},{"n":33,"q":"称徳天皇の死去後，壬申の乱以来つづいた天武系の天皇にかわって即位した，天智天皇の孫はだれか。","a":"光仁天皇","t":"p"},{"n":34,"q":"藤原式家の人物で，33（＝光仁天皇）の天皇の即位に尽力したのはだれか。","a":"藤原百川","t":"p"}]},{"t":"民衆と土地政策","q":[{"n":1,"q":"奈良時代に普及した平地式の住居を何というか。","a":"掘立柱住居","t":"g"},{"n":2,"q":"平安時代初期までの結婚形態で，はじめ男性が女性の家に通う形式のものを何というか。","a":"妻問婚","t":"g"},{"n":3,"q":"古代において，未開の地を開墾した田地を何というか。","a":"墾田","t":"g"},{"n":4,"q":"口分田の不足に対処する政府の政策のうち，722（養老６）年に長屋王政権のもとで立てられた計画は何か。","a":"百万町歩開墾計画","t":"g"},{"n":5,"q":"灌漑施設の新設と旧来の施設利用とを区別しながら，一定期間の墾田私有を認める法令を何というか。","a":"三世一身法","t":"g"},{"n":6,"q":"5（＝三世一身法）の法令は「養老七年の格」ともいうが，養老七年は西暦何年か。","a":"723年","t":"d"},{"n":7,"q":"橘諸兄政権は，一定限度の開墾地の永久私有を認める法令を制定した。これを何というか。","a":"墾田永年私財法","t":"g"},{"n":8,"q":"7（＝墾田永年私財法）の法令は西暦何年に出されたか。","a":"743年","t":"d"},{"n":9,"q":"7（＝墾田永年私財法）の発令後，貴族・寺院・地方豪族などの大規模な開墾による私有地が成立し始めたが，これを何とよぶか。","a":"荘園（初期荘園）","t":"g"},{"n":10,"q":"負担の重さに苦しむ農民の姿を伝える『万葉集』の長歌と，その作者をあげよ。","a":"貧窮問答歌・山上憶良","t":"g"},{"n":11,"q":"負担から逃れるため，農民が口分田を捨てて戸籍に登録された地を離れること，都の造営工事などから行方不明になることをそれぞれ何というか。","a":"浮浪・逃亡","t":"g"}]}]},{"t":"4　天平文化","s":[{"t":"天平文化と大陸","q":[{"n":1,"q":"天平は，どの天皇の時の年号か。","a":"聖武天皇","t":"g"},{"n":2,"q":"天平文化は，律令国家の体制のもとで，都における皇族・貴族の富と権力を背景にしているが，仏教的色彩と国際性も目立つ。この国際性は主に何によってもたらされたか。","a":"遣唐使","t":"g"},{"n":3,"q":"天平文化とは，主として，どの国の，どの時期の文化の影響が強いか。","a":"唐の最盛期（盛唐）","t":"g"}]},{"t":"国史編纂と『万葉集』","q":[{"n":1,"q":"712（和銅５）年に完成した現存する最古の歴史書は何か。","a":"古事記","t":"g"},{"n":2,"q":"1（＝古事記）の歴史書編纂の材料となったもので，６世紀にまとめられたとされる大王の系譜と，朝廷に伝わる神話・伝承をそれぞれ何というか。","a":"帝紀・旧辞","t":"g"},{"n":3,"q":"1（＝古事記）の歴史書は，天武天皇の命で，ある人物が暗誦していたものを，のちにある人物が筆録したものだが，この２人の人物をあげよ。","a":"稗田阿礼・太安万侶（安麻呂）","t":"g"},{"n":4,"q":"中国の史書にならって，編年体・漢文で記述され，720（養老４）年に完成した最古の官撰の正史は何か。","a":"日本書紀","t":"g"},{"n":5,"q":"4（＝日本書紀）の歴史書編纂の総裁はだれか。","a":"舎人親王","t":"p"},{"n":6,"q":"4（＝日本書紀）の歴史書以後，10世紀初頭にかけて，国家事業として史書の編纂がつづけられたが，これらを総称して何というか。","a":"六国史","t":"g"},{"n":7,"q":"6（＝六国史）の史書の２番目で，主に奈良時代を内容とする歴史書を何というか。","a":"続日本紀","t":"g"},{"n":8,"q":"6（＝六国史）の史書の最後の歴史書を何というか。","a":"日本三代実録","t":"g"},{"n":9,"q":"713（和銅６）年に，朝廷が諸国に命じて，各国の地誌・伝説・産物などを記載・提出させたものを何というか。","a":"風土記","t":"g"},{"n":10,"q":"9（＝風土記）の書のなかで，現在，まとまった内容が伝わっているのはいくつ（何カ国）か。","a":"5カ国","t":"n"},{"n":11,"q":"9（＝風土記）の書のなかで，現在，まとまった内容を伝えているのはどこの国のものか。","a":"常陸・出雲・播磨・豊後・肥前","t":"l"},{"n":12,"q":"現在伝わる9（＝風土記）の書のうち，ほぼ完全に内容が残っているのはどの国のものか。","a":"出雲","t":"g"},{"n":13,"q":"751（天平勝宝３）年に成立した，現存する日本最古の漢詩集を何というか。","a":"懐風藻","t":"g"},{"n":14,"q":"大友皇子の曽孫で，鑑真の伝記『唐大和上東征伝』を記し，詩人としても著名な人物はだれか。","a":"淡海三船","t":"p"},{"n":15,"q":"すぐれた詩人としても有名な石上宅嗣が，私邸に設け，学問をする人々に開放した図書館を何というか。","a":"●亭","t":"g"},{"n":16,"q":"奈良時代までの約4500首の歌をおさめた最古の歌集は何か。","a":"万葉集","t":"g"},{"n":17,"q":"16（＝万葉集）の歌集では，漢字の音訓を組み合わせて日本語を記す用法が用いられたが，これを何というか。","a":"万葉がな","t":"g"},{"n":18,"q":"16（＝万葉集）の歌集におさめられている歌で，方言を用いた東国の人々の歌を何というか。","a":"東歌","t":"g"},{"n":19,"q":"16（＝万葉集）の歌集におさめられている歌で，九州に兵士として送られた東国農民の歌を何というか。","a":"防人歌","t":"g"},{"n":20,"q":"奈良時代の宮廷歌人で，すぐれた叙景歌人・自然歌人として有名なのはだれか。","a":"山部赤人","t":"p"},{"n":21,"q":"万葉集に最多数の歌を残し，その編纂にも重要な役割をはたしたとされる人物はだれか。","a":"大伴家持","t":"p"},{"n":22,"q":"律令制下の教育制度で，中央におかれ，貴族や文筆を業とする東西史部の子弟を教育した機関は何か。","a":"大学","t":"g"},{"n":23,"q":"律令制下の大学の教育内容は，儒教の経典を学ぶもの，法律を学ぶもののほか音・書・算の諸道があったが，漢文学・歴史を学ぶものが９世紀に独立した。これを何というか。","a":"紀伝道","t":"g"},{"n":24,"q":"律令制下で地方の国ごとにおかれ，郡司など地方豪族の子弟を教育した機関は何か。","a":"国学","t":"g"}]},{"t":"国家仏教の展開","q":[{"n":1,"q":"仏教によって国家の安定をはかろうとする思想を何というか。","a":"鎮護国家（思想）","t":"g"},{"n":2,"q":"国家の経営する七大寺の１つで，藤原氏の氏寺としてその後も大きな勢力をふるった寺院は何か。","a":"興福寺","t":"g"},{"n":3,"q":"藤原氏の氏神として，氏寺と一体となって勢力をふるった神社は何か。","a":"春日神社","t":"g"},{"n":4,"q":"奈良の諸大寺では仏教の教理研究が盛んで，信仰による教団とは異なる学派的な宗派が生まれたが，これを総称して何というか。","a":"南都六宗","t":"g"},{"n":5,"q":"4（＝南都六宗）の宗派のうち，玄昉・道鏡らの僧侶を出し，興福寺などを中心に活動した宗派は何か。","a":"法相宗","t":"g"},{"n":6,"q":"4（＝南都六宗）の宗派のうち，東大寺を根本道場として活動した宗派は何か。","a":"華厳宗","t":"g"},{"n":7,"q":"失明の苦難をのりこえて唐から渡来し，日本に戒律を伝えた僧侶はだれか。","a":"鑑真","t":"p"},{"n":8,"q":"南都六宗のうち，7（＝鑑真）の人物によって始められた宗派は何か。","a":"律宗","t":"g"},{"n":9,"q":"7（＝鑑真）の人物が創建した寺院は何か。","a":"唐招提寺","t":"g"},{"n":10,"q":"南都六宗のうち，大安寺の道慈が入唐して深めた宗派は何か。","a":"三論宗","t":"g"},{"n":11,"q":" 皇が，恵美押勝の乱の戦没者供養のためにつくらせて近畿の十大寺に配った，現存する世界最古の印刷物をあげよ。","a":"百万塔陀羅尼","t":"g"}]}]},{"t":"5　平安王朝の形成","s":[{"t":"平安遷都と蝦夷との戦い","q":[{"n":1,"q":"光仁天皇の次に即位し，律令政治の再建につとめた天皇はだれか。","a":"桓武天皇","t":"p"},{"n":2,"q":"1（＝桓武天皇）の天皇の母にあたり，百済系渡来人の血をひくとされるのはだれか。","a":"高野新笠","t":"p"},{"n":3,"q":"1（＝桓武天皇）の天皇は，平城京から水陸交通の便利な場所へ都を移すことにしたが，新たな都の候補地となった国は何というか。","a":"山背国","t":"g"},{"n":4,"q":"784（延暦３）年に遷都された新しい都はどこか。","a":"長岡京","t":"l"},{"n":5,"q":"4（＝長岡京）の都建設の長官が暗殺される事件が発生し，この新都は短期間で廃されたが，暗殺された長官とはだれか。","a":"藤原種継","t":"p"},{"n":6,"q":"4（＝長岡京）の都につづいて建設された新都を何というか。","a":"平安京","t":"g"},{"n":7,"q":"6（＝平安京）の都への遷都は西暦何年か。","a":"794年","t":"d"},{"n":8,"q":"遷都とならぶ桓武天皇の大事業をあげよ。","a":"蝦夷征討","t":"g"},{"n":9,"q":"光仁天皇の時代の780（宝亀11）年に，東北地方で蜂起した蝦夷の豪族はだれか。","a":"伊治呰麻呂","t":"p"},{"n":10,"q":"８世紀後半の公卿で，9（＝伊治呰麻呂）の人物が乱をおこした際，征東副使となったのはだれか。","a":"紀古佐美","t":"p"},{"n":11,"q":"桓武天皇に登用され，797（延暦16）年に征夷大将軍となった人物はだれか。","a":"坂上田村麻呂","t":"p"},{"n":12,"q":"11（＝坂上田村麻呂）の人物に降伏した後，河内で斬られた蝦夷の族長はだれか。","a":"阿弖流為","t":"p"},{"n":13,"q":"11（＝坂上田村麻呂）の人物が802（延暦21）年に北上川中流域に築き，蝦夷支配の拠点とした城を何というか。","a":"胆沢城","t":"g"},{"n":14,"q":"13（＝胆沢城）に蝦夷支配のための役所が移されたが，この役所を何というか。","a":"鎮守府","t":"g"},{"n":15,"q":"14（＝鎮守府）の役所が最初におかれたのはどこか。","a":"多賀城","t":"l"},{"n":16,"q":"803（延暦22）年に胆沢城のさらに北方に築かれ，東北経営の前進拠点とされた城を何というか。","a":"志波城","t":"g"},{"n":17,"q":"805（延暦24）年に，蝦夷征討と平安京造営の二大事業の継続を主張する菅野真道に対し，藤原緒嗣が中止を主張して論争し，桓武天皇によって緒嗣の意見が採用された。この論争を何というか。","a":"徳政相論（論争）","t":"g"},{"n":18,"q":"811（弘仁２）年に，嵯峨天皇の命で蝦夷平定にあたった将軍はだれか。","a":"文室綿麻呂","t":"p"}]},{"t":"平安時代初期の政治改革","q":[{"n":1,"q":"令制の役所の統合・廃止が行われ，政治機構の簡略化が進められるなかで，令の規定にない官職も設けられたが，このような官職を何というか。","a":"令外官","t":"g"},{"n":2,"q":"1（＝令外官）の１つで桓武天皇が国司の監督を強化するため，８世紀末に新設した官職は何か。","a":"勘解由使","t":"g"},{"n":3,"q":"国司の交代にあたり，後任者が前任者に発行する事務引き継ぎの証明書を何というか。","a":"解由状","t":"g"},{"n":4,"q":"８世紀末，桓武天皇はそれまでの軍団・兵士を廃止し，かわりに郡司の子弟や有力農民の志願による少数精鋭の兵士を採用した。この兵士を何というか。","a":"健児","t":"g"},{"n":5,"q":"810（弘仁元）年に設置され，天皇の側近として太政官組織との直接連絡や機密文書を取り扱う役所を何というか。","a":"蔵人所","t":"g"},{"n":6,"q":"810年に，最初に蔵人頭に任命された藤原北家出身の人物はだれか。","a":"藤原冬嗣","t":"p"},{"n":7,"q":"９世紀初めにおかれた令外官で，京内の警察・裁判業務をつかさどり，衛門府・弾正台・刑部省・京職などの業務を吸収した官職は何か。","a":"検非違使","t":"g"},{"n":8,"q":"代表的な令外官である蔵人頭や7（＝検非違使）の官職が設置された時の天皇はだれか。","a":"嵯峨天皇","t":"p"},{"n":9,"q":"蔵人所の設置は，8（＝嵯峨天皇）の天皇のもとでおきた，前天皇が重祚を企てた事件が背景になっているが，この事件を何というか。","a":"平城太上天皇の変（藤原薬子の変）","t":"g"},{"n":10,"q":"9（＝平城太上天皇の変）の事件の原因をつくった太上天皇（上皇）はだれか。","a":"平城太上天皇（上皇）","t":"p"},{"n":11,"q":"10（＝平城太上天皇）の人物に加担し，権力を握ろうとした兄妹をあげよ。","a":"藤原仲成・藤原薬子","t":"g"},{"n":12,"q":"11（＝藤原仲成・藤原薬子）の兄妹は藤原氏の何家出身か。","a":"式家","t":"g"},{"n":13,"q":"律令制定以降，律令条文の補足や改正のために出された法令を何というか。","a":"格","t":"g"},{"n":14,"q":"律令や格の施行細則を何というか。","a":"式","t":"g"},{"n":15,"q":"嵯峨天皇のもとで，律令条文の補足・改正や施行細則の分類・整理と編纂が行われたが，これを何というか。","a":"弘仁格式","t":"g"},{"n":16,"q":"清和天皇の時に編纂された格式を何というか。","a":"貞観格式","t":"g"},{"n":17,"q":"延喜格式が編纂された時の天皇はだれか。","a":"醍醐天皇","t":"p"},{"n":18,"q":"弘仁・貞観・延喜格式の３つを総称して何というか。","a":"三代格式","t":"g"},{"n":19,"q":"清原夏野ら編集の，833（天長10）年に成立した養老令の官撰注釈書は何か。","a":"令義解","t":"g"},{"n":20,"q":"９世紀後半に，惟宗直本によって編集された養老令の私撰注釈書は何か。","a":"令集解","t":"g"}]},{"t":"地方と貴族社会の変貌","q":[{"n":1,"q":"班田は受けるが調・庸や兵役の負担を逃れるため，戸籍の男女の性別や年齢を偽って申告することを何というか。","a":"偽籍","t":"g"},{"n":2,"q":"桓武天皇は班田実施を現実に応じて改め，その励行をはかるため，班年を６年ごとから何年ごとに改めたか。","a":"12年","t":"d"},{"n":3,"q":"公地公民制の崩壊につれて，班田の実施は困難となったが，記録の上で班田実施の最後は西暦何年のことか。","a":"902年","t":"d"},{"n":4,"q":"財源に苦しんだ政府は直接に土地を経営するようになるが，８世紀以降，天皇家の財源として設けたものを何というか。","a":"勅旨田","t":"g"},{"n":5,"q":"823（弘仁14）年に，大宰府管内に設けられた政府の直営田を何というか。","a":"公営田","t":"g"},{"n":6,"q":"879（元慶３）年に，畿内に設けられた政府の直営田を何というか。","a":"官田","t":"g"},{"n":7,"q":"８世紀末から９世紀ころ，天皇と結びついて勢いを強めた少数の皇族・貴族の総称を何というか。","a":"院宮王臣家","t":"g"}]},{"t":"唐風文化と平安仏教","q":[{"n":1,"q":"平安遷都から９世紀末ころまでの文化を，嵯峨・清和天皇の時の年号から何というか。","a":"弘仁・貞観文化","t":"g"},{"n":2,"q":"文芸は国家の支柱で，国家隆盛の鍵であるとする思想を何というか。","a":"文章経国思想","t":"g"},{"n":3,"q":"９世紀前半に編まれた勅撰漢詩文集をつくられた順に３つあげよ。","a":"凌雲集・文華秀麗集・経国集","t":"g"},{"n":4,"q":"空海の漢詩文を弟子の真済がまとめたものを何というか。","a":"性霊集","t":"g"},{"n":5,"q":"空海の詩論書をあげよ。","a":"文鏡秘府論","t":"g"},{"n":6,"q":"平安時代初期に，貴族たちが大学に学ぶ子弟のために設けた学寮を何というか。","a":"大学別曹","t":"g"},{"n":7,"q":"和気氏が設けた大学別曹（学寮）を何というか。","a":"弘文院","t":"g"},{"n":8,"q":"藤原氏が設けた大学別曹（学寮）を何というか。","a":"勧学院","t":"g"},{"n":9,"q":"橘氏が設けた大学別曹（学寮）を何というか。","a":"学館院","t":"g"},{"n":10,"q":"在原氏が設けた大学別曹（学寮）を何というか。","a":"奨学院","t":"g"},{"n":11,"q":"空海が庶民教育のために都に設置した学校は何か。","a":"綜芸種智院","t":"g"},{"n":12,"q":"平安時代初期に入唐し，帰国後に法華経の信仰による新しい宗派を伝えた僧侶と，その宗派の名をあげよ。","a":"最澄・天台宗","t":"g"},{"n":13,"q":"天台宗の本拠は，都を離れた比叡山におかれたが，その寺院の名をあげよ。","a":"延暦寺","t":"g"},{"n":14,"q":"大乗戒壇の設立により南都仏教からの独立をめざす最澄が，これに反対する者たちにこたえるために著した書物は何か。","a":"顕戒論","t":"g"},{"n":15,"q":"釈迦の教えを経典にもとづいて学び，修行して悟りに達しようとする仏教を何というか。","a":"顕教","t":"g"},{"n":16,"q":"大日如来の教えにより，秘密の呪法を通じて仏の世界に接し，救いを得ようとする仏教を何というか。","a":"密教","t":"g"},{"n":17,"q":"16（＝密教）の仏教で，病気や災難を除くために行う呪術を何というか。","a":"加持祈祷","t":"g"},{"n":18,"q":"最澄と同時に入唐し，特に密教を学び，それにもとづく宗派を伝えた僧侶と，その宗派の名をあげよ。","a":"空海・真言宗","t":"g"},{"n":19,"q":"真言宗が中心道場とした高野山の寺院を何というか。","a":"金剛峰寺","t":"g"},{"n":20,"q":"嵯峨天皇から空海に勅賜され，真言宗が中心道場とした京都の寺院を何というか。","a":"教王護国寺（東寺）","t":"g"},{"n":21,"q":"空海が仏門に入るにいたった理由を記した書物で，仏教・道教・儒教３教の優劣を論じ，仏教の優位を説いたものを何というか。","a":"三教指帰","t":"g"},{"n":22,"q":"入唐し，帰国後に天台宗の密教化を進めた僧侶で，山門派の祖とされるのはだれか。","a":"円仁","t":"p"},{"n":23,"q":"22（＝円仁）の僧侶の著書で，唐の五台山などを巡礼した旅日記は何か。","a":"入唐求法巡礼行記","t":"g"},{"n":24,"q":"天台宗で，円珍を祖とする寺門派の中心寺院を何というか。","a":"園城寺（三井寺）","t":"g"},{"n":25,"q":"天台宗の密教に対して，真言宗の密教を何というか。","a":"東密","t":"g"},{"n":26,"q":"奈良時代以来，神々の信仰と仏教との融合が進むが，このような現象を何というか。","a":"神仏習合","t":"g"},{"n":27,"q":"26（＝神仏習合）の現象の１つとして，神社の境内に建てられた寺院を何というか。","a":"神宮寺","t":"g"},{"n":28,"q":"山岳信仰と仏教の密教的信仰とが混合し，山伏に代表される山岳修行の宗教が生まれたが，これを何というか。","a":"修験道","t":"g"}]},{"t":"密教芸術","q":[{"n":1,"q":"弘仁・貞観文化の美術には，神秘的な仏教の影響が強いが，どのような仏教か。","a":"密教","t":"g"},{"n":2,"q":"奈良県にある真言宗の寺院で，女人高野とよばれ，山岳寺院としての特色を示す建物を今日に伝える寺院は何か。","a":"室生寺","t":"g"},{"n":3,"q":"2（＝室生寺）の寺院にある平安時代初期の建築の代表を２つあげよ。","a":"金堂・五重塔","t":"g"},{"n":4,"q":"室生寺の金堂は，屋根を檜の皮で葺いていたが，このような葺き方を何というか。","a":"檜皮葺","t":"g"},{"n":5,"q":"弘仁・貞観文化の仏像彫刻を特徴づける技法を２つあげよ。","a":"一木造（一木彫）・翻波式","t":"g"},{"n":6,"q":"弘仁・貞観文化の彫法をよく示す大和の室生寺の仏像を２つあげよ。","a":"金堂釈迦如来像（立像）・弥勒堂釈迦如来坐像","t":"g"},{"n":7,"q":"河内の観心寺にある典型的な密教彫刻で，秘仏として保存され，彩色もよく残り，６本の腕ものびやかで全体に豊満な感じを与える仏像は何か。","a":"如意輪観音像","t":"g"},{"n":8,"q":"京都神護寺金堂の本尊で，おごそかな容貌で堂々とした体躯の仏像は何か。","a":"薬師如来像","t":"g"},{"n":9,"q":"奈良の元興寺にある一木造の立像で，堂々とした体躯で豊かで神秘的な表情，特に流水のような翻波式のひだのある像は何か。","a":"薬師如来像","t":"g"},{"n":10,"q":"奈良の法華寺の本尊で，髪・眼・口を彩色し豊満な女性美を感じさせ，光明皇后をモデルにしたとの伝説を持つ像を何というか。","a":"十一面観音像","t":"g"},{"n":11,"q":"奈良の薬師寺に残されている神仏習合による一木造の神像彫刻をあげよ。","a":"僧形八幡神像","t":"g"},{"n":12,"q":"密教で宇宙の真理を表わすために，諸仏・諸菩薩を配置して図示したものを何というか。","a":"曼荼羅（両界曼荼羅）","t":"g"},{"n":13,"q":"現存最古の12（＝曼荼羅）の作品が伝わる京都の北方の真言宗の寺院は何か。","a":"神護寺","t":"g"},{"n":14,"q":"12（＝曼荼羅）の代表的作品で，かつて宮中真言院で用いられたとされることから，伝真言院曼荼羅ともよばれるものが伝来する寺院は何か。","a":"教王護国寺（東寺）","t":"g"},{"n":15,"q":"密教の盛行につれて信仰が広がり，特に修験道の本尊として信仰されたもので，火焔のなかにあって右手に剣，左手に羂索を持つ姿であらわされる像は何か。","a":"不動明王像","t":"g"},{"n":16,"q":"15（＝不動明王像）の代表的な絵画として黄不動とよばれるものは，どこの寺院に伝わるか。","a":"園城寺（三井寺）","t":"l"},{"n":17,"q":"弘仁・貞観時代には唐風の書道（唐様）がもてはやされたが，その名手３人のことを何というか。","a":"三筆","t":"g"},{"n":18,"q":"17（＝三筆）の人物をすべてあげよ。","a":"嵯峨天皇・空海・橘逸勢","t":"g"},{"n":19,"q":"空海が最澄に送った手紙３通を１巻にしたものが現存している。これを何というか。","a":"風信帖","t":"g"},{"n":20,"q":"弘仁・貞観文化の絵師として，伝わっているのはだれか。","a":"百済河成","t":"p"},{"n":21,"q":"各氏族の系譜を明らかにするため，万多親王によって編集された書物は何か。","a":"新撰姓氏録","t":"g"}]}]}]},{"t":"第3章　貴族政治と国風文化","sec":[{"t":"1　摂関政治","s":[{"t":"藤原氏北家の発展","q":[{"n":1,"q":"奈良時代後期から平安時代初期にかけて優勢であったが，平城太上天皇の変（薬子の変）以後，没落したのは藤原氏の何家か。","a":"式家","t":"g"},{"n":2,"q":"平城太上天皇の変（薬子の変）以後，勢力を伸ばしたのは藤原氏の何家か。","a":"北家","t":"g"},{"n":3,"q":"2（＝北家）の家出身で，平安時代初期に嵯峨天皇の信任を得て台頭し，天皇家と姻戚関係を結んだ人物はだれか。","a":"藤原冬嗣","t":"p"},{"n":4,"q":"嵯峨天皇の信任を得て，3（＝藤原冬嗣）の人物は何という官職についたか。","a":"蔵人頭","t":"g"},{"n":5,"q":"藤原氏発展の一方で，他氏が没落する政治的事件が次々に発生するが，842（承和９）年に皇太子恒貞親王が廃され，伴・橘氏が失脚した事件を何というか。","a":"承和の変","t":"g"},{"n":6,"q":"5（＝承和の変）で，謀反を企てたとして流罪になった人物で，三筆の一人はだれか。","a":"橘逸勢","t":"p"},{"n":7,"q":"天皇が幼少の期間に，その政務を代行する官職を何というか。","a":"摂政","t":"g"},{"n":8,"q":"即位した幼少の天皇の外祖父として，皇族以外ではじめて7（＝摂政）の官職に就任したのはだれか。","a":"藤原良房","t":"p"},{"n":9,"q":"8（＝藤原良房）の人物が摂政に就任した時の天皇はだれか。","a":"清和天皇","t":"p"},{"n":10,"q":"866（貞観８）年に焼失した，平安宮にある朝堂院の南側の正門を何というか。","a":"応天門","t":"g"},{"n":11,"q":"10（＝応天門）の門が放火されたことからおこった事件を何というか。","a":"応天門の変","t":"g"},{"n":12,"q":"左大臣源信を失脚させようとして10（＝応天門）の門の放火事件をひきおこし，流罪になったのはだれか。","a":"伴善男","t":"p"},{"n":13,"q":"12（＝伴善男）の人物は，何という官職についていたか。","a":"大納言","t":"g"},{"n":14,"q":"応天門の変で没落した古来有力な一族は，伴（大伴）氏と何か。","a":"紀氏","t":"g"},{"n":15,"q":"天皇の成人後に，その後見役として政務を執行する官職を何というか。","a":"関白","t":"g"},{"n":16,"q":"はじめて15（＝関白）の官職に就任した人物はだれか。","a":"藤原基経","t":"p"},{"n":17,"q":"16（＝藤原基経）の人物が884（元慶８）年に，実質的に関白の職に就任した時の天皇はだれか。","a":"光孝天皇","t":"p"},{"n":18,"q":"16（＝藤原基経）の人物を関白に任命する正式な詔が発せられたのは887（仁和３）年のことだが，この時の天皇はだれか。","a":"宇多天皇","t":"p"},{"n":19,"q":"888（仁和４）年，詔のなかで使われた語句をめぐり藤原氏が示威を行い，天皇は詔を取り消し，その起草者である橘広相を罰したが，この事件を何というか。","a":"阿衡の紛議（阿衡事件）","t":"g"},{"n":20,"q":"宇多天皇に重用され，のちに藤原氏により大宰府へ左遷された人物はだれか。","a":"菅原道真","t":"p"},{"n":21,"q":"20（＝菅原道真）の人物が大宰府に左遷された時の藤原氏の代表者（氏の長者）はだれか。","a":"藤原時平","t":"p"},{"n":22,"q":"20（＝菅原道真）の人物が大宰府に左遷された時の天皇はだれか。","a":"醍醐天皇","t":"p"},{"n":23,"q":"宇多天皇ののち，10世紀前半に２度にわたり，摂政・関白がおかれずに天皇親政が行われた時期があるが，そのうち22（＝醍醐天皇）の天皇の治世を何とよぶか。","a":"延喜の治","t":"g"},{"n":24,"q":"10世紀前半に天暦の治という親政を行った天皇はだれか。","a":"村上天皇","t":"p"},{"n":25,"q":"10世紀後半におきたある事件以降，摂政・関白は常置となり，藤原氏北家の勢力は不動のものとなったが，ある事件とは何か。","a":"安和の変","t":"g"},{"n":26,"q":"25（＝安和の変）の事件以降，摂政・関白が常置となったが，このような政治形態を何というか。","a":"摂関政治","t":"g"},{"n":27,"q":"25（＝安和の変）の事件は西暦何年におきたか。","a":"969年","t":"d"},{"n":28,"q":"25（＝安和の変）の事件の時，藤原氏により失脚させられた醍醐天皇の皇子で，左大臣であった人物はだれか。","a":"源高明","t":"p"},{"n":29,"q":"25（＝安和の変）の事件後に摂政に就任し，摂関常置の例を開いた人物はだれか。","a":"藤原実頼","t":"p"}]},{"t":"摂関政治","q":[{"n":1,"q":"藤原北家の勢力が確立すると，摂政・関白はすべて藤原北家から出されるようになるが，この摂政・関白に任命される家柄を何というか。","a":"摂関家","t":"g"},{"n":2,"q":"摂政・関白の地位をめぐる藤原北家の一族間の争いのうち，兄弟間の争いの例をあげよ。","a":"藤原兼通（兄）と兼家（弟）","t":"g"},{"n":3,"q":"摂政・関白の地位をめぐる藤原北家の一族間の争いのうち，叔父の藤原道長と争った甥はだれか。","a":"藤原伊周","t":"p"},{"n":4,"q":"４人の娘を皇后や皇太子妃とし，３人の天皇の外祖父となって栄華の絶頂をきわめた人物はだれか。","a":"藤原道長","t":"p"},{"n":5,"q":"4（＝藤原道長）の人物の娘で，一条天皇の中宮となって，２人の天皇の母となった人物はだれか。","a":"藤原彰子","t":"p"},{"n":6,"q":"5（＝藤原彰子）の人物の子で，天皇となったのはだれか。即位順に２人あげよ。","a":"後一条天皇・後朱雀天皇","t":"p"},{"n":7,"q":"藤原道長と対立した伊周の妹で，一条天皇の皇后はだれか。","a":"藤原定子","t":"p"},{"n":8,"q":"藤原道長が全盛期に，「此の世をば　我が世とぞ思ふ望月の　かけたることも無しと思へば」という歌を詠んだことを伝える貴族の日記を何というか。","a":"小右記","t":"g"},{"n":9,"q":"8（＝小右記）の日記には藤原道長に対する批判的記事もあり，内容的にも重要だが，その筆者はだれか。","a":"藤原実資","t":"p"},{"n":10,"q":"藤原道長の子で宇治殿とよばれ，後一条天皇以下３代の摂政・関白として，約50年間政権を握ったのはだれか。","a":"藤原頼通","t":"p"},{"n":11,"q":"藤原道長や頼通による摂関家の全盛期は何世紀のことか。","a":"11世紀","t":"g"},{"n":12,"q":"藤原氏発展の背景には，娘を天皇の后妃として，皇室と姻戚関係を結ぶということがあったが，このような関係を何というか。","a":"外戚関係","t":"g"},{"n":13,"q":"摂関期，天皇（もしくは摂関）の決裁の参考にされ，国政の重要事項を審議した公卿の会議を何というか。","a":"陣定","t":"g"},{"n":14,"q":"大祓や七夕など，宮中で毎年同じ時期に行われる儀式を何というか。","a":"年中行事","t":"g"}]},{"t":"国際関係の変化","q":[{"n":1,"q":"９世紀末に，それまでの外交政策に大きな変化が生じたが，それは何か。","a":"遣唐使派遣中止","t":"g"},{"n":2,"q":"1（＝遣唐使派遣中止）はだれの建議によるものか。","a":"菅原道真","t":"p"},{"n":3,"q":"1（＝遣唐使派遣中止）の建議は西暦何年のことか。","a":"894年","t":"d"},{"n":4,"q":"中国では907年に唐が滅び，その後再統一されるまで諸王朝の興亡があったが，それらの諸王朝を何とよぶか。","a":"五代十国","t":"g"},{"n":5,"q":"唐滅亡後の分裂時代を経て，960年に成立した中国の統一王朝を何というか。","a":"宋（北宋）","t":"g"},{"n":6,"q":"奈良時代に日本と国交のあった渤海を，926年に滅ぼした契丹が建国した国は何か。","a":"遼","t":"g"},{"n":7,"q":"935年に朝鮮半島の新羅を滅ぼし，これに代わった国は何か。","a":"高麗","t":"g"}]}]},{"t":"2　国風文化","s":[{"t":"国文学の発達","q":[{"n":1,"q":"10〜11世紀の平安時代中期以降に展開した日本風の文化を何というか。","a":"国風文化（藤原文化）","t":"g"},{"n":2,"q":"1（＝国風文化）の文化が発達した時期に成立し，文学の発展や文芸の国風化に大きな役割をはたしたものは何か。","a":"かな文字","t":"g"},{"n":3,"q":"９世紀後半の代表的な６人の歌人のことを総称して何というか。","a":"六歌仙","t":"g"},{"n":4,"q":"3（＝六歌仙）の歌人のなかで唯一の女性の名をあげよ。","a":"小野小町","t":"g"},{"n":5,"q":"天皇または上皇・法皇の命により，編纂された和歌集を何というか。","a":"勅撰和歌集","t":"g"},{"n":6,"q":"905（延喜５）年に編纂された，最初の勅撰和歌集は何か。","a":"古今和歌集","t":"g"},{"n":7,"q":"6（＝古今和歌集）の歌集の撰者で，『土佐日記』の作者としても著名な人物はだれか。","a":"紀貫之","t":"p"},{"n":8,"q":"6（＝古今和歌集）の歌集から鎌倉時代初期の『新古今和歌集』まで，天皇や上皇の命によって８回にわたり勅撰和歌集が編纂されたが，これらを総称して何というか。","a":"八代集","t":"g"},{"n":9,"q":"日本の物語文学の祖といわれる，伝説を素材にした伝奇的な物語は何か。","a":"竹取物語","t":"g"},{"n":10,"q":"在原業平を主人公とし，和歌を主体とした短編からなる歌物語は何か。","a":"伊勢物語","t":"g"},{"n":11,"q":"11世紀初めに成立した大長編物語で，藤原氏全盛期の貴族社会を描写した物語文学の最高峰とされているものは何か。","a":"源氏物語","t":"g"},{"n":12, :"g"},{"n":14,"q":"13（＝往生要集）の書物を著した僧侶はだれか。","a":"源信（恵心僧都）","t":"p"},{"n":15,"q":"念仏の功徳で極楽往生した人の伝記を集めたものを，一般的に何というか。","a":"往生伝","t":"g"},{"n":16,"q":"15（＝往生伝）の伝記の最初のものとして，10世紀末に成立した書物をあげよ。","a":"日本往生極楽記","t":"g"},{"n":17,"q":"16（＝日本往生極楽記）の書物の著者はだれか。","a":"慶滋保胤","t":"p"},{"n":18,"q":"法華経などを入れて埋納するなどした，円筒形の金銅製容器を何というか。","a":"経筒","t":"g"},{"n":19,"q":"奈良県の山上ヶ岳山頂の金峯山経塚から出土した，日本で現存最古の埋納用の経筒をあげよ。","a":"藤原道長埋納経筒","t":"g"}]},{"t":"国風美術","q":[{"n":1,"q":"平安時代中期に完成した，日本風の貴族の住宅様式を何というか。","a":"寝殿造","t":"g"},{"n":2,"q":"1（＝寝殿造）の住宅の建物のうち，中央にあって主人が居住する正殿を何というか。","a":"寝殿","t":"g"},{"n":3,"q":"正殿の左右や後に相対させてつくられた別棟の建物を何というか。","a":"対（対屋）","t":"g"},{"n":4,"q":"これまでの中国風の絵画にかわって，平安時代中期からおこってきた日本の風物を題材とする日本的な絵画を何とよぶか。","a":"大和絵","t":"g"},{"n":5,"q":"4（＝大和絵）の絵画の祖と伝えられる，平安時代初期の画家をあげよ。","a":"巨勢金岡","t":"g"},{"n":6,"q":"中国風の絵画のことを何というか。","a":"唐絵","t":"g"},{"n":7,"q":"平安時代に完成した技法で，漆で文様を描き，金銀などの金属粉を蒔きつけて模様とするものを何というか。","a":"蒔絵","t":"g"},{"n":8,"q":"これまでの中国風の書風に対し，和様の書風が成立したが，その名手と称された人々を何とよぶか。","a":"三跡（三蹟）","t":"g"},{"n":9,"q":"8（＝三跡）の人々をすべてあげよ。","a":"小野道風・藤原佐理・藤原行成","t":"g"},{"n":10,"q":"藤原佐理が大宰府に赴任する途中，甥に送った書状が残っている。これを何というか。","a":"離洛帖","t":"g"},{"n":11,"q":"11世紀以降，阿弥陀如来を本尊として安置する建物が寺院の中心として盛んに建てられたが，この建物を何というか。","a":"阿弥陀堂","t":"g"},{"n":12,"q":"藤原道長が建立し，壮麗を誇ったが，のち火災で焼失した寺院を何というか。","a":"法成寺","t":"g"},{"n":13,"q":"12（＝法成寺）の寺院にちなんで藤原道長の日記を何というか。","a":"御堂関白記","t":"g"},{"n":14,"q":"藤原頼通が，道長から譲り受けた宇治の別荘を，末法初年の1052（永承７）年に寺院としたが，これを何というか。","a":"平等院","t":"g"},{"n":15,"q":"14（＝平等院）の寺院の本堂として，1053（天喜元）年に建立された阿弥陀堂を何というか。","a":"鳳凰堂","t":"g"},{"n":16,"q":"京都伏見区の日野にある，11世紀の代表的な阿弥陀堂は何か。","a":"法界寺阿弥陀堂","t":"g"},{"n":17,"q":"浄土教の流行により阿弥陀如来像が盛んに制作されるようになったが，この時期に完成した仏像彫刻の手法を何というか。","a":"寄木造","t":"g"},{"n":18,"q":"17（＝寄木造）の仏像彫刻の手法を完成したとされる仏師はだれか。","a":"定朝","t":"p"},{"n":19,"q":"18（＝定朝）の仏師の作として著名な仏像は何か。","a":"平等院鳳凰堂阿弥陀如来像","t":"g"},{"n":20,"q":"19（＝平等院鳳凰堂阿弥陀如来像）の仏像のほかに，この時期の阿弥陀如来像の代表例で，京都の寺院にあるものを１つあげよ。","a":"法界寺阿弥陀如来像","t":"g"},{"n":21,"q":"臨終に際して往生を願う人を迎えるために，阿弥陀如来が来臨するありさまを描いた絵を何というか。","a":"来迎図","t":"g"},{"n":22
