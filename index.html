２つあげよ。","a":"領事裁判権の承認・関税自主権の喪失","t":"g"},{"n":3,"q":"明治新政府が条約改正をめざして，1871（明治４）年に欧米に派遣した使節団を何とよんでいるか。","a":"岩倉（遣外）使節団","t":"g"},{"n":4,"q":"3（＝岩倉使節団）の使節団の特命全権大使はだれか。","a":"岩倉具視","t":"p"},{"n":5,"q":"3（＝岩倉使節団）の使節団の副使で，旧長州藩出身者は木戸孝允とだれか。","a":"伊藤博文","t":"p"},{"n":6,"q":"税権の回復を目的とした交渉の結果，1878年にアメリカは新条約に調印したものの，英・独などの反対で不成功に終わった。この時の外務卿はだれか。","a":"寺島宗則","t":"p"},{"n":7,"q":"清国とのはじめての条約は，日本代表伊達宗城と清国代表李鴻章との間で，対等なかたちで締結されたが，これを何というか。","a":"日清修好条規","t":"g"},{"n":8,"q":"7（＝日清修好条規）は西暦何年に調印されたか。","a":"1871年","t":"d"},{"n":9,"q":"1873年に朝鮮の鎖国排外政策を武力で打破し，国交を開こうとする主張がおこったが，この主張を何というか。","a":"征韓論","t":"g"},{"n":10,"q":"征韓論争に敗れ，下野した旧薩摩藩出身の政府要人はだれか。","a":"西郷隆盛","t":"p"},{"n":11,"q":"征韓論に対し，内治優先を説いた旧薩摩出身の政府要人はだれか。","a":"大久保利通","t":"p"},{"n":12,"q":"征韓論争に敗れて政府を去った５人の参議の名をあげよ。","a":"西郷隆盛・江藤新平・板垣退助・後藤象二郎・副島種臣","t":"g"},{"n":13,"q":"征韓論争をきっかけに発生した政変を何とよんでいるか。","a":"明治六年の政変","t":"g"},{"n":14,"q":"日本の軍艦雲揚が，朝鮮の漢江河口付近で示威行動中に砲撃を受け，応戦した。この挑発事件を何というか。","a":"江華島事件","t":"g"},{"n":15,"q":"14（＝江華島事件）の事件がおこったのは，西暦何年のことか。","a":"1875年","t":"d"},{"n":16,"q":"14（＝江華島事件）の事件で，日本政府は朝鮮に圧力をかけ，条約を締結したが，この条約を何というか。","a":"日朝修好条規（江華条約）","t":"g"},{"n":17,"q":"16（＝日朝修好条規）の条約によって開港された３港のうち，日本に最も近いのはどこか。","a":"釜山","t":"l"},{"n":18,"q":"1871年に琉球の漂流民が台湾に漂着して現地住民に殺害される事件がおきたが，この事件を何というか。","a":"琉球漂流民（漁民）殺害事件","t":"g"},{"n":19,"q":"18（＝琉球漂流民殺害事件）の事件の責任問題をめぐり，日清間の対立がおこり，日本が武力行使を行った。これを何というか。","a":"台湾出兵（征台の役）","t":"g"},{"n":20,"q":"19（＝台湾出兵）の武力行使の時，日本軍を率いたのはだれか。","a":"西郷従道","t":"p"},{"n":21,"q":"19（＝台湾出兵）の武力行使が行われたのは西暦何年か。","a":"1874年","t":"d"},{"n":22,"q":"日本政府は日清両属関係にあった琉球を日本領とする方針をとり，琉球藩王を華族としたが，その藩王名をあげよ。","a":"尚泰","t":"g"},{"n":23,"q":"1879年に日本政府は琉球を何県にしたか。","a":"沖縄県","t":"l"},{"n":24,"q":"琉球が日本に統合される過程を何というか，漢字４字で示せ。","a":"琉球処分","t":"g"},{"n":25,"q":"沖縄は日本領となったのち，差別的政策がとられることが多く，そのため沖縄倶楽部を組織し，参政権獲得運動を展開した。その中心人物はだれか。","a":"謝花昇","t":"p"},{"n":26,"q":"開拓長官黒田清隆の建議により，ロシアとの国境を確定する条約が締結されたが，この条約を何というか。","a":"樺太・千島交換条約","t":"g"},{"n":27,"q":"26（＝樺太・千島交換条約）の条約は西暦何年に締結されたか。","a":"1875年","t":"d"},{"n":28,"q":"26（＝樺太・千島交換条約）の条約の全権で，駐露公使はだれか。","a":"榎本武揚","t":"p"},{"n":29,"q":"文禄年間に小笠原貞頼が発見したといわれ，その後幕末には英・米が領有を主張したこともあったが，1876年に新政府が英・米に通告し，正式に日本領とした諸島を何というか。","a":"小笠原諸島","t":"g"}]},{"t":"新政府への反抗","q":[{"n":1,"q":"明治六年の政変で下野した前参議のうち西郷隆盛を除く４人は，岡本健三郎・古沢滋らと政治結社を組織したが，これを何というか。","a":"愛国公党","t":"g"},{"n":2,"q":"1（＝愛国公党）の政治結社を組織した前参議４人のうち，のちに自由民権運動の中心的存在として活躍する旧土佐藩出身の人物はだれか。","a":"板垣退助","t":"p"},{"n":3,"q":"1（＝愛国公党）の政治結社は政府を非難し，また国会の開設を要求する意見書を政府に提出したが，この意見書をふつう何とよんでいるか。","a":"民撰議院設立の建白書","t":"g"},{"n":4,"q":"3（＝民撰議院設立の建白書）の意見書はどこに提出されたか，政府機関名をあげよ。","a":"左院","t":"l"},{"n":5,"q":"3（＝民撰議院設立の建白書）の意見書は，イギリス人の経営する新聞に掲載されたがその新聞名をあげよ。","a":"日新真事誌","t":"g"},{"n":6,"q":"3（＝民撰議院設立の建白書）の意見書が政府に提出されたのは西暦何年か。","a":"1874年","t":"d"},{"n":7,"q":"没落した士族たちは明治政府の政策に不満をいだいたが，このような士族を何とよんだか。","a":"不平士族","t":"g"},{"n":8,"q":"征韓論を主張し敗れて参議の職を辞し，郷里の征韓党に迎えられ，島義勇らとともに反政府の兵をあげたのはだれか。","a":"江藤新平","t":"p"},{"n":9,"q":"8（＝江藤新平）の人物を中心とする士族の反乱を何というか。","a":"佐賀の乱","t":"g"},{"n":10,"q":"9（＝佐賀の乱）の反乱は西暦何年におこったか。","a":"1874年","t":"d"},{"n":11,"q":"明治政府は士族の帯刀を禁止する法令を出したが，これを何というか。","a":"廃刀令","t":"g"},{"n":12,"q":"11（＝廃刀令）の法令は西暦何年に出されたか。","a":"1876年","t":"d"},{"n":13,"q":"1876（明治９）年に熊本県でおこった士族の反乱名をあげよ。","a":"敬神党（神風連）の乱","t":"g"},{"n":14,"q":"1876年に福岡県でおこった士族の反乱名をあげよ。","a":"秋月の乱","t":"g"},{"n":15,"q":"1876年に山口県でおこった士族の反乱名をあげよ。","a":"萩の乱","t":"g"},{"n":16,"q":"徴兵令に対して西日本を中心に反対の一揆がおこったが，これを何というか。","a":"血税一揆（血税騒動）","t":"g"},{"n":17,"q":"征韓論を強硬に主張して敗れ，政府を辞し，郷里の鹿児島で私学校を経営したのはだれか。","a":"西郷隆盛","t":"p"},{"n":18,"q":"17（＝西郷隆盛）の人物は私学校の生徒たちに擁立されて，ついに武力蜂起にふみきったが，これを何というか。","a":"西南戦争","t":"g"},{"n":19,"q":"18（＝西南戦争）の武力蜂起は西暦何年におこったか。","a":"1877年","t":"d"}]}]},{"t":"3　立憲国家の成立と日清戦争","s":[{"t":"自由民権運動","q":[{"n":1,"q":"藩閥政治打破や憲法制定，国会開設などを要求した，政府に対する民主主義的政治運動を何とよんでいるか。","a":"自由民権運動","t":"g"},{"n":2,"q":"政治活動をめざして結成された結社を何というか。","a":"政社","t":"g"},{"n":3,"q":"民撰議院設立の建白書を政府に提出後，郷里の土佐に帰った板垣退助が民権思想普及のために設立した政社を何というか。","a":"立志社","t":"g"},{"n":4,"q":"3（＝立志社）の政社の社長で，板垣退助を助け，のちに衆議院議長にもなったのはだれか。","a":"片岡健吉","t":"p"},{"n":5,"q":"1875（明治８）年に板垣退助は，全国の有志とともに大阪で政治結社を組織したが，これを何というか。","a":"愛国社","t":"g"},{"n":6,"q":"立志社は，西南戦争中に８カ条にわたって政府の失政を掲げ，民撰議院の設立を要求する文書を政府に提出したが，これを何というか。","a":"立志社建白","t":"g"},{"n":7,"q":"高揚してきた民権運動に対し，政府の中心人物である大久保利通は，1875年に民権側の板垣退助らと会談した。この会談を何というか。","a":"大阪会議","t":"g"},{"n":8,"q":"7（＝大阪会議）の会議には板垣退助のほかに，台湾出兵に反対して下野した人物も参加したが，だれか。","a":"木戸孝允","t":"p"},{"n":9,"q":"7（＝大阪会議）の会議の結果，徐々に立憲政治に進む方針が決定され，詔として公表されたが，この詔を何というか。","a":"漸次立憲政体樹立の詔","t":"g"},{"n":10,"q":"9（＝漸次立憲政体樹立の詔）の詔で新設されることになった諸機関のうち，立法諮問機関名をあげよ。","a":"元老院","t":"g"},{"n":11,"q":"9（＝漸次立憲政体樹立の詔）の詔で新設されることになった諸機関のうち，司法機関名をあげよ。","a":"大審院","t":"g"},{"n":12,"q":"9（＝漸次立憲政体樹立の詔）の詔で開催されることになった府知事・県令の会議を何というか。","a":"地方官会議","t":"g"},{"n":13,"q":"政府は1875年に言論・著作の取締りを強化する法令を定めたが，1869年に公布され，この年に改正された条例は何か。","a":"出版条例","t":"g"},{"n":14,"q":"1875年に民権運動を取り締まるために新たに定められた法令を２つあげよ。","a":"讒謗律・新聞紙条例","t":"g"},{"n":15,"q":"1878年に統一的地方制度の確立を意図した３つの法令が公布されたが，これらを総称して何というか。","a":"地方三新法","t":"g"},{"n":16,"q":"15（＝地方三新法）の法令のうち，府県の下部にあたる地方単位を定めた法令を何というか。","a":"郡区町村編制法","t":"g"},{"n":17,"q":"15（＝地方三新法）の法令のうち，府県など地方における議会制度を全国的な制度として法制化した法令を何というか。","a":"府県会規則","t":"g"},{"n":18,"q":"17（＝府県会規則）の法令にもとづいて設けられた地方議会を何というか。","a":"府県会","t":"g"},{"n":19,"q":"地方三新法のうち，従来の府県税・民費などを地方税に統合して徴収するよう定めた法令を何というか。","a":"地方税規則","t":"g"},{"n":20,"q":"1878年に再興された愛国社は，1880年の第４回大会で組織を拡張し，名称を何と改めたか。","a":"国会期成同盟","t":"g"},{"n":21,"q":"20（＝国会期成同盟）の団体が集めた２府22県８万7000人の署名は何を要求したものであるか。","a":"国会開設","t":"g"},{"n":22,"q":"20（＝国会期成同盟）の団体は国会開設請願書を政府に提出したが，政府はこれを拒絶し，言論・集会・結社をきびしく取り締まる法令を定め，運動を弾圧した。この法令名をあげよ。またこれは西暦何年のことか。","a":"集会条例・1880年","t":"d"},{"n":23,"q":"国会開設要求の高まりのなかで，政府内でも意見がわかれたが，国会の即時開設を主張した参議はだれか。","a":"大隈重信","t":"p"},{"n":24,"q":"1881年に政府物件が不当に安く払い下げられることが明らかになり，民権派は激しく政府を攻撃した。この事件を何というか。","a":"開拓使官有物払下げ事件","t":"g"},{"n":25,"q":"24（＝開拓使官有物払下げ事件）の事件で，払下げを行おうとした人物とその役職名をあげよ。","a":"黒田清隆・開拓長官","t":"g"},{"n":26,"q":"24（＝開拓使官有物払下げ事件）の事件で，払下げ先となった政商はだれか。","a":"五代友厚","t":"p"},{"n":27,"q":"24（＝開拓使官有物払下げ事件）の事件で，払下げ先となった政商が経営していた会社を何というか。","a":"関西貿易社","t":"g"},{"n":28,"q":"1881年に，政府は世論の動きに関係しているとして大隈重信を罷免し，勅諭で10年後に国会を開設することを公約したが，この勅諭を何というか。","a":"国会開設の勅諭","t":"g"},{"n":29,"q":"28（＝国会開設の勅諭）の勅諭で，国会開設が約束された10年後は西暦何年になるか。","a":"1890年","t":"d"},{"n":30,"q":"開拓使官有物払下げ事件から大隈重信の罷免，国会開設の勅諭までの一連の事件を何というか。","a":"明治十四年の政変","t":"g"},{"n":31,"q":"国会開設の時期が決まると，民権運動は政党の結成へと動き出し，まずフランスの影響を受けた急進的自由主義の主張を持つ政党が結成された。この政党を何というか。","a":"自由党","t":"g"},{"n":32,"q":"31（＝自由党）の政党は西暦何年に結成されたか。","a":"1881年","t":"d"},{"n":33,"q":"31（＝自由党）の政党の総理（党首）はだれであったか。","a":"板垣退助","t":"p"},{"n":34,"q":"31（＝自由党）の政党は主権はどこに存在するとしたか。それを示す言葉をあげよ。","a":"主権在民","t":"l"},{"n":35,"q":"板垣退助に従い活躍した土佐出身の自由党の理論的指導者で，多数の著書とともに「（東洋）大日本国国憲按」を残した人物はだれか。","a":"植木枝盛","t":"p"},{"n":36,"q":"35（＝植木枝盛）の人物の著書のなかで，民衆のために平易に民権思想を説いた著書名をあげよ。","a":"民権自由論","t":"g"},{"n":37,"q":"ルソーの『社会契約論』を抄訳し，『東洋自由新聞』の主筆としてフランス流自由民権論を説き，東洋のルソーともいわれた思想家はだれか。","a":"中江兆民","t":"p"},{"n":38,"q":"37（＝中江兆民）の人物はルソーの『社会契約論』を抄訳して，何という書物を著したか。","a":"民約訳解","t":"g"},{"n":39,"q":"自由民権運動に加わり，民権論とともに男女同権を説き，自由党副総理と結婚した女性解放運動の先駆者はだれか。","a":"岸田（中島）俊子","t":"p"},{"n":40,"q":"明治十四年の政変で下野した人々を中心にして結成され，イギリス流の漸進的立憲論を説いた政党を何というか。","a":"立憲改進党","t":"g"},{"n":41,"q":"40（＝立憲改進党）の政党の総理（党首）はだれであったか。","a":"大隈重信","t":"p"},{"n":42,"q":"40（＝立憲改進党）の政党は西暦何年に結成されたか。","a":"1882年","t":"d"},{"n":43,"q":"40（＝立憲改進党）の政党は，主権はどこに存在するとしたか。それを示す言葉をあげよ。","a":"主権在君民（君民同治）","t":"l"},{"n":44,"q":"福沢諭吉と親しい実業家を会員とする，改進党系の民間団体を何というか。","a":"交詢社","t":"g"},{"n":45,"q":"自由民権派の政党結成を見て，『東京日日新聞』の社長らが政府擁護のために政党を結成したが，これを何というか。","a":"立憲帝政党","t":"g"},{"n":46,"q":"45（＝立憲帝政党）の政党の党首はだれであったか。","a":"福地源一郎","t":"p"},{"n":47,"q":"45（＝立憲帝政党）の政党は，主権はどこに存在するとしたか。それを示す言葉をあげよ。","a":"主権在君","t":"l"},{"n":48,"q":"民権派は，その主張や政策を表わすため，理想とする憲法の私案を作成したが，これを総称して何とよんでいるか。","a":"私擬憲法","t":"g"},{"n":49,"q":"自由党系の立志社が作成・発表した私擬憲法を何というか。","a":"日本憲法見込案","t":"g"},{"n":50,"q":"植木枝盛が起草したという国民主権・一院制・抵抗権・革命権などを規定した私擬憲法を何というか。","a":"（東洋）大日本国国憲按","t":"g"},{"n":51,"q":"立憲改進党系の民間団体の交詢社が作成・発表した私擬憲法を何というか。","a":"私擬憲法案","t":"g"},{"n":52,"q":"東京府下の千葉卓三郎が起草した，国民の権利の保障に力点をおいた私擬憲法をあげよ。","a":"五日市憲法草案（日本帝国憲法）","t":"g"}]},{"t":"松方財政","q":[{"n":1,"q":"明治10年代の初め，激しいインフレーションにより経済界はおおいに混乱し，政府歳入は実質的減少となり財政困難をきたした。このため，財政整理に着手した大蔵卿はだれか。","a":"松方正義","t":"p"},{"n":2,"q":"1（＝松方正義）の人物の財政改革を，ふつう何とよんでいるか。","a":"松方財政","t":"g"},{"n":3,"q":"2（＝松方財政）の改革はいつから始められたか。西暦年で答えよ。","a":"1881年","t":"d"},{"n":4,"q":"2（＝松方財政）の改革は，増税と歳出の切りつめによるデフレ政策であったが，経済界を安定させるための通貨政策として，まず行われたことは何か。","a":"（不換）紙幣の整理","t":"g"},{"n":5,"q":"2（＝松方財政）の改革における政府事業の整理を何とよんでいるか。","a":"官営事業（民間）払下げ","t":"g"},{"n":6,"q":"2（＝松方財政）の改革によって抜本的な貨幣・金融制度の改革が行われたが，1882（明治15）年に設立された政府の銀行を何というか。","a":"日本銀行","t":"g"},{"n":7,"q":"6（＝日本銀行）の銀行は，1885年から兌換紙幣を発行したが，その紙幣は何とよばれたか。","a":"日本銀行券","t":"g"},{"n":8,"q":"松方財政で正貨（本位貨幣）とされたのは何か。","a":"銀貨","t":"g"},{"n":9,"q":"日本で金本位制が確立したのは西暦何年のことか。","a":"1897年","t":"d"},{"n":10,"q":"1883年に国立銀行条例が改正されて，国立銀行は銀行券発行権を停止され，どのような銀行になったか。","a":"普通銀行","t":"g"}]},{"t":"民権運動の再編","q":[{"n":1,"q":"1882（明治15）年に福島県令の土木工事強行案に，県会議長ら自由党員が中心となって反対運動を展開したため，多数の自由党員・農民が逮捕・処罰された。この事件を何というか。","a":"福島事件","t":"g"},{"n":2,"q":"1（＝福島事件）の事件の時の県令はだれであったか。","a":"三島通庸","t":"p"},{"n":3,"q":"1（＝福島事件）の事件の時の県会議長はだれであったか。","a":"河野広中","t":"p"},{"n":4,"q":"1882年に遊説中の自由党総理板垣退助が暴漢に襲われて負傷した。「板垣死すとも自由は死せず」と喧伝されたこの事件を何というか。","a":"岐阜事件","t":"g"},{"n":5,"q":"1883年に新潟県で政府高官の暗殺を計画したとして，自由党員が捕えられ処罰された事件を何というか。","a":"高田事件","t":"g"},{"n":6,"q":"1884年に自由党急進派が妙義山麓で蜂起した事件を何というか。","a":"群馬事件","t":"g"},{"n":7,"q":"1884年に栃木県令三島通庸の圧政に対し，茨城・福島・栃木県の自由党員が，県令の暗殺を計画したが失敗し，茨城県加波山で蜂起したが，鎮圧・処罰された事件を何というか。","a":"加波山事件","t":"g"},{"n":8,"q":"1884年に不況にあえぐ埼玉県の農民が武力蜂起し，政府は軍隊を出動させて鎮圧した。この事件を何というか。","a":"秩父事件","t":"g"},{"n":9,"q":"8（＝秩父事件）の事件で農民たちは，自由党員に指導され，借金の返済延期，村費や雑収税の減免を求めて党を結成したが，これを何というか。","a":"困民党（借金党）","t":"g"},{"n":10,"q":"8（＝秩父事件）の事件に呼応するため，長野県・愛知県の自由党員が政府打倒の挙兵計画を立てたが，事前に発覚し処罰された。これらの事件をそれぞれ何というか。","a":"飯田事件・名古屋事件","t":"g"},{"n":11,"q":"1886年に自由党左派が政府高官の暗殺を計画したが，未然に発覚し処罰された。自由党による激化事件の最後となったこの事件を何というか。","a":"静岡事件","t":"g"},{"n":12,"q":"1885年に自由党左派は，朝鮮に武力で独立党政権を樹立し，日本の民権運動の再興を促進しようと計画したが，発覚し逮捕された。この事件を何というか。","a":"大阪事件","t":"g"},{"n":13,"q":"12（＝大阪事件）の事件の中心人物はだれか。","a":"大井憲太郎","t":"p"},{"n":14,"q":"12（＝大阪事件）の事件にはのちに『妾の半生涯』という自叙伝を著した女性運動家が関係したが，それはだれか。","a":"景山（福田）英子","t":"p"},{"n":15,"q":"過激事件に対処し切れず，自由党は解党を決定したが，西暦何年のことか。","a":"1884年","t":"d"},{"n":16,"q":"自由党解党後，衰退していた民権運動は，1886年末に，連合論が提唱されて，復活のきざしをみせた。この連合論を何というか。","a":"大同団結","t":"g"},{"n":17,"q":"国会開設を前に，16（＝大同団結）を提唱したのはだれか。","a":"星亨","t":"p"},{"n":18,"q":"16（＝大同団結）の運動をひき継ぎ，1887年に丁亥倶楽部を結成して旧自由・改進両党幹部の結集をはかったのはだれか。","a":"後藤象二郎","t":"p"},{"n":19,"q":"1887年に井上馨外相の条約改正交渉を契機として，民権派ばかりでなく国粋主義者も参加して反政府国民運動がおこった。この運動を何というか。","a":"三大事件建白運動","t":"g"},{"n":20,"q":"19（＝三大事件建白運動）の運動が掲げた３つの要求をあげよ。","a":"地租の軽減，言論・集会の自由，外交失策の挽回","t":"g"},{"n":21,"q":"19（＝三大事件建白運動）の運動の高揚に際して，政府は，1887年12月に突如弾圧法規を公布し，即日施行して民権派多数を皇居外３里の地に追放した。この法規を何というか。","a":"保安条例","t":"g"},{"n":22,"q":"21（＝保安条例）の法規で東京から追放された人物のうち，のちに護憲運動の指導者となるのはだれか。","a":"尾崎行雄","t":"p"}]},{"t":"憲法の制定","q":[{"n":1,"q":"長州出身の政治家で，大久保利通の死後，明治政府の最高指導者となり，明治憲法の制定などに貢献したのはだれか。","a":"伊藤博文","t":"p"},{"n":2,"q":"憲法調査のため渡欧した1（＝伊藤博文）の人物に，プロシア憲法を講義したウィーン大学の教授とベルリン大学の教授名をあげよ。","a":"シュタイン・グナイスト","t":"g"},{"n":3,"q":"1878（明治11）年に外務省法律顧問として来日し，憲法・商法の制定に尽力したドイツ人はだれか。","a":"ロエスレル","t":"p"},{"n":4,"q":"1886年に内閣および内務省法律顧問として来日し，憲法制定の助言や市制・町村制の原案作成に尽力したドイツ人はだれか。","a":"モッセ","t":"p"},{"n":5,"q":"1884年に宮中に設置された，憲法その他諸制度の調査のための機関名をあげよ。","a":"制度取調局","t":"g"},{"n":6,"q":"伊藤博文のもとで憲法の起草にあたった人物を３人あげよ。","a":"井上毅・伊東巳代治・金子堅太郎","t":"g"},{"n":7,"q":"1884年，将来の上院議員選出の基盤とするため，旧公卿・旧大名・維新の功臣に，家柄その他で爵位を与える法令を公布したが，これを何というか。","a":"華族令","t":"g"},{"n":8,"q":"7（＝華族令）の法令で爵位は５等にわかれたが，上から順にあげよ。","a":"公爵・侯爵・伯爵・子爵・男爵","t":"g"},{"n":9,"q":"憲法制定作業が進むなか，最高行政機関として新しい制度が創設されたが，これを何というか。","a":"内閣制度","t":"g"},{"n":10,"q":"9（＝内閣制度）の制度が創設されたのは西暦何年か。","a":"1885年","t":"d"},{"n":11,"q":"9（＝内閣制度）の制度の首班となる大臣を何というか。","a":"内閣総理大臣","t":"g"},{"n":12,"q":"11（＝内閣総理大臣）の初代はだれか。","a":"伊藤博文","t":"p"},{"n":13,"q":"内閣を構成する各省の長官を総称して何というか。","a":"国務大臣","t":"g"},{"n":14,"q":"初代農商務大臣に，西南戦争の際，熊本鎮台を死守した人物が任じられたが，だれか。","a":"谷干城","t":"p"},{"n":15,"q":"初代陸軍大臣に任じられ，また最初の元帥となり，日清・日露戦争に活躍した薩摩出身の軍人・政治家はだれか。","a":"大山巌","t":"p"},{"n":16,"q":"内閣制度の創設により，宮中・府中の別が確立し，天皇を補佐する宮中官が設けられたが，これを何というか。","a":"内大臣","t":"g"},{"n":17,"q":"憲法の草案を審議する機関として設置され，のちに天皇の重要政務に関する諮問機関とされたのは何か。","a":"枢密院","t":"g"},{"n":18,"q":"17（＝枢密院）の機関は西暦何年に設けられたか。","a":"1888年","t":"d"},{"n":19,"q":"プロシア憲法を参考にし，伊藤博文らの起草により発布された憲法の正式名を答えよ。","a":"大日本帝国憲法","t":"g"},{"n":20,"q":"19（＝大日本帝国憲法）の憲法は西暦何年何月何日に発布されたか。","a":"1889年2月11日","t":"d"},{"n":21,"q":"19（＝大日本帝国憲法）の憲法は，天皇が定め国民に与える形式をとったが，このような形式の憲法を何とよぶか。","a":"欽定憲法","t":"g"},{"n":22,"q":"19（＝大日本帝国憲法）の憲法とともに，皇位継承・即位などを定めた皇室関係の法規も制定されたが，これを何というか。","a":"皇室典範","t":"g"},{"n":23,"q":"19（＝大日本帝国憲法）の憲法では国民はどのように位置づけられたか。","a":"臣民","t":"g"},{"n":24,"q":"統治権の総攬者としての天皇が，議会の協賛なしに行使できる権能を何というか。","a":"天皇大権","t":"g"},{"n":25,"q":"大日本帝国憲法では天皇の権限であった，軍隊の最高指揮権を何というか。","a":"統帥権","t":"g"},{"n":26,"q":"大日本帝国憲法では，議会閉会中に緊急の必要により天皇が法律にかわる命令を発布することができたが，これを何というか。","a":"緊急勅令","t":"g"},{"n":27,"q":"天皇が直接軍隊を統帥すること，さらに忠節・礼儀・武勇・信義・質素の徳目を掲げ，天皇への絶対服従を説いた，1882年に出された勅諭を何というか。","a":"軍人勅諭","t":"g"},{"n":28,"q":"大日本帝国憲法下における最高立法機関を何というか。","a":"帝国議会","t":"g"},{"n":29,"q":"28（＝帝国議会）の機関のうち，皇族・華族議員などによって構成された立法機関を何というか。","a":"貴族院","t":"g"},{"n":30,"q":"28（＝帝国議会）の機関のうち，選挙によって選出された議員により構成され，予算の先議権を有した立法機関を何というか。","a":"衆議院","t":"g"},{"n":31,"q":"大日本帝国憲法の定める衆議院の議員の任期・定員・選挙などについて定めた法令が，憲法と同時に公布されたが，これを何というか。","a":"衆議院議員選挙法","t":"g"},{"n":32,"q":"1889年に公布された31（＝衆議院議員選挙法）の法令では，直接国税を何円以上納入する者に選挙権が与えられたか。","a":"15円","t":"g"},{"n":33,"q":"1889年に公布された31（＝衆議院議員選挙法）の法令では，何歳以上の男性に選挙権が与えられたか。","a":"25歳","t":"n"},{"n":34,"q":"第１回総選挙の時，選挙権を与えられていた人は，全人口の約何％であったか。","a":"0.011","t":"n"},{"n":35,"q":"1900年と1919（大正８）年に選挙法が改正され，選挙権の財産制限が緩和されたが，それぞれどのように改められたか。","a":"1900年に10円以上，1919年に3円以上","t":"g"},{"n":36,"q":"選挙権の財産制限が撤廃されたのは西暦何年か。","a":"1925年","t":"d"},{"n":37,"q":"郡区町村編制法では，人口稠密の地を区としたが，1888年の新制度で改められ市となり，また町村の合併もこの時並行して行われた。この新制度を何というか。","a":"市制・町村制","t":"g"},{"n":38,"q":"1890年には，プロイセンの州制度にならい，府・県・郡の整備がなされて，地方行政制度が確立した。これを何というか。","a":"府県制・郡制","t":"g"},{"n":39,"q":"地方自治制整備の中心となった当時の内務大臣はだれか。","a":"山県有朋","t":"p"},{"n":40,"q":"39（＝山県有朋）の人物を補佐し，地方自治制の制定に尽力したドイツ人顧問はだれか。","a":"モッセ","t":"p"}]},{"t":"諸法典の編纂","q":[{"n":1,"q":"近代的諸法典の編纂が進められるなか，1873（明治６）年に制定された改定律例にかわって，1880年に公布された犯罪と刑罰に関する法典を何というか。","a":"刑法","t":"g"},{"n":2,"q":"フランス法に範をとり，フランス人法学者ボアソナードが起草し，1880年に公布された刑事手続に関する法典を何というか。","a":"治罪法","t":"g"},{"n":3,"q":"2（＝治罪法）の法典を改定して，1890年に公布された刑事手続に関する法典を何というか。","a":"刑事訴訟法","t":"g"},{"n":4,"q":"ドイツ人ロエスレルが起草し，1890年に公布されたが，修正が加えられ1899年に施行された法典を何というか。","a":"商法","t":"g"},{"n":5,"q":"1890年にドイツ法に範をとり公布された法律で，民事上の紛争を解決するための手続法を何というか。","a":"民事訴訟法","t":"g"},{"n":6,"q":"フランス人法学者が草案を起草し，1890年に公布された法律が「民情風俗に適せず」の批判を受け，施行が無期延期となった。この法典を何というか。","a":"民法","t":"g"},{"n":7,"q":"1890年に公布された6（＝民法）の法典を起草したフランス人法学者はだれか。","a":"ボアソナード","t":"p"},{"n":8,"q":"1890年に公布された6（＝民法）の法典をめぐって反対・賛成の意見がたたかわされたが，これを何とよんでいるか。","a":"民法典論争","t":"g"},{"n":9,"q":"「民法出デヽ忠孝亡ブ」という論文で，ボアソナード民法の施行に反対した法学者はだれか。","a":"穂積八束","t":"p"},{"n":10,"q":"「家長権は封建の遺物」とし，ボアソナード民法の施行を主張した法学者はだれか。","a":"梅謙次郎","t":"p"},{"n":11,"q":"1896〜98年に修正されたいわゆる明治民法の下で，絶対的な権限を与えられた家族の統率者を何というか。","a":"戸主","t":"g"},{"n":12,"q":"明治民法の下で，家族の統率者の権限は何とよばれたか。","a":"戸主権","t":"g"}]},{"t":"初期議会","q":[{"n":1,"q":"大日本帝国憲法発布の翌日，内閣総理大臣は地方長官を鹿鳴館に集めて，政府は政党の外に立ち公正の道をとるべきことを訓示した。この考え方を何というか。","a":"超然主義","t":"g"},{"n":2,"q":"大日本帝国憲法発布の翌日，1（＝超然主義）の演説を行った内閣総理大臣はだれか。","a":"黒田清隆","t":"p"},{"n":3,"q":"1890（明治23）年に最初の衆議院議員選挙が行われ，議会が召集されたが，この最初の議会を何というか。","a":"第1回帝国議会（第一議会）","t":"g"},{"n":4,"q":"3（＝第1回帝国議会）の時の内閣総理大臣はだれであったか。","a":"山県有朋","t":"p"},{"n":5,"q":"最初の議会から日清戦争勃発直前の議会までは，政府と負担軽減を求める反対派が対立し，議会は混乱した。この時期の議会を何とよんでいるか。","a":"初期議会","t":"g"},{"n":6,"q":"5（＝初期議会）の議会では，反政府勢力が衆議院で過半数を占めたが，この反政府勢力を何というか。また，政府勢力を何といったか。","a":"民党・吏党","t":"g"},{"n":7,"q":"第一議会で，民党勢力はスローガンを掲げて政府の提出した予算案の削減を求めたが，このスローガンを２つあげよ。","a":"政費節減・民力休養","t":"g"},{"n":8,"q":"第一議会召集に際し，大井憲太郎らが中心となって自由党が再建されたが，この再建自由党の名称をあげよ。","a":"立憲自由党","t":"g"},{"n":9,"q":"第一議会で山県有朋首相が陸海軍経費増強の必要性を強調した際に用いた言葉で，国家主権の範囲（固有の領土）を指した用語は何か。また，国家の安全独立を保障する勢力範囲として，朝鮮半島を指した用語は何か。","a":"主権線・利益線","t":"g"},{"n":10,"q":"第二議会で，政府が提出した軍艦建造費を含む予算案は民党により大幅に削減され，政府は議会を解散した。この時の内閣総理大臣はだれか。","a":"松方正義","t":"p"},{"n":11,"q":"第二議会で，政府を擁護する蛮勇演説を行って民党を批判した海軍大臣はだれか。","a":"樺山資紀","t":"p"},{"n":12,"q":"はじめての衆議院の解散後の1892年の総選挙では，内務大臣が先頭に立って民党に対する大規模な圧迫を行った。この内務大臣はだれか。","a":"品川弥二郎","t":"p"},{"n":13,"q":"1892年の総選挙では，政府の圧迫で多数の死傷者が出るにいたったが，一連の圧迫を何というか。","a":"選挙干渉","t":"g"},{"n":14,"q":"第１次松方正義内閣は，第三議会をのり切れずに総辞職し，山県有朋・黒田清隆・井上馨ら実力者を閣僚とする内閣が成立した。この内閣を何というか。","a":"第2次伊藤博文内閣","t":"g"},{"n":15,"q":"14（＝第2次伊藤博文内閣）の内閣は明治維新以来の実力者を擁したところから何内閣とよばれたか。","a":"元勲内閣","t":"g"},{"n":16,"q":"14（＝第2次伊藤博文内閣）の内閣の軍事予算を民党が削減した際，天皇は宮廷費を節減して軍艦建造費にあてるから，議会も政府に協力してほしいという詔書を出した。この詔書を何というか。","a":"和衷協同の詔書（建艦詔書）","t":"g"}]},{"t":"条約改正","q":[{"n":1,"q":"1870年代の岩倉具視・寺島宗則の外交交渉の失敗を受けた1880年代，列国の歓心を得て，外交上の懸案事項を解決しようと西欧化政策を進めた外務卿・外務大臣はだれか。","a":"井上馨","t":"p"},{"n":2,"q":"1（＝井上馨）の人物の条約改正交渉が行われていたころ，イギリス人コンドルの設計した社交場で，音楽会や舞踏会が盛んに催された。この社交場を何とよぶか。","a":"鹿鳴館","t":"g"},{"n":3,"q":"1（＝井上馨）の人物の条約改正案は，内容的にも問題があったため，政府内外から反対の声があがった。領事裁判権撤廃の代償として批判された点は何か。","a":"外国人判事の任用・外国人の内地雑居許可","t":"g"},{"n":4,"q":"1（＝井上馨）の人物の条約改正案に反対した，政府の外国人法律顧問はだれか。","a":"ボアソナード","t":"p"},{"n":5,"q":"1（＝井上馨）の人物の条約改正案に反対をとなえて，農商務大臣を辞任したのはだれか。","a":"谷干城","t":"p"},{"n":6,"q":"1886（明治19）年にイギリスの貨物船が紀州沖で難破した際，日本人乗客が救出されなかった事件がおこり，国民は領事裁判権撤廃の必要を痛感したが，このイギリス船を何というか。","a":"ノルマントン号","t":"g"},{"n":7,"q":"井上馨の条約改正交渉の失敗を機に，民権派が展開した運動を何というか。","a":"三大事件建白運動","t":"g"},{"n":8,"q":"井上馨の欧化政策は言論界からもきびしい批判を受けたが，雑誌『日本人』で国粋保存主義をとなえたのはだれか。","a":"三宅雪嶺","t":"p"},{"n":9,"q":"井上馨の欧化政策に対し，新聞『日本』で国民主義をとなえ反対したのはだれか。","a":"陸羯南","t":"p"},{"n":10,"q":"1889年に秘密のうちに，各国との条約改正に向けた個別交渉を進めたが，ロンドンタイムズに条約案が掲載され，その改正案を攻撃された外務大臣はだれか。","a":"大隈重信","t":"p"},{"n":11,"q":"1889年に10（＝大隈重信）の外務大臣は，右翼団体の一員によって爆弾を投げつけられ，重傷を負い辞任した。この右翼の団体を何というか。","a":"玄洋社","t":"g"},{"n":12,"q":"1890年代から，政府は，シベリア鉄道着工などロシアの南下を警戒して条約改正に好意的になったイギリスと交渉を再開したが，来日中のロシア皇太子が傷つけられ，その事件の責任をとり外務大臣が辞職した。この外務大臣はだれか。","a":"青木周蔵","t":"p"},{"n":13,"q":"1891年，来日中のロシア皇太子が傷つけられた事件を何というか。","a":"大津事件","t":"g"},{"n":14,"q":"13（＝大津事件）の事件でロシア皇太子を傷つけた巡査はだれか。","a":"津田三蔵","t":"p"},{"n":15,"q":"13（＝大津事件）の事件による日露関係の悪化をおそれた政府は，犯人を大逆罪で死刑にしようとしたが，大審院特別法廷は無期徒刑の判決を下して司法権の独立を守った。この時の大審院長はだれか。","a":"児島惟謙","t":"p"},{"n":16,"q":"政府はイギリスとの間で，日清戦争勃発直前に，領事裁判権の撤廃と税権の一部回復を内容とする条約を締結したが，その条約を何というか。","a":"日英通商航海条約","t":"g"},{"n":17,"q":"16（＝日英通商航海条約）の条約締結の時の外務大臣はだれか。","a":"陸奥宗光","t":"p"},{"n":18,"q":"16（＝日英通商航海条約）の条約が締結されたのは西暦何年か。","a":"1894年","t":"d"},{"n":19,"q":"関税自主権が完全に回復されるのは西暦何年か。","a":"1911年","t":"d"},{"n":20,"q":"関税自主権が回復された時の外務大臣はだれか。","a":"小村寿太郎","t":"p"}]},{"t":"朝鮮問題","q":[{"n":1,"q":"朝鮮政府内には保守派と改革派との対立があったが，1882（明治15）年に保守派がクーデタを決行し，日本公使館も襲撃された。この事件を何とよぶか。","a":"壬午軍乱（壬午事変）","t":"g"},{"n":2,"q":"1（＝壬午軍乱）の事件のころ，朝鮮政府内の保守派の中心人物は国王の父であったが，だれか。","a":"大院君","t":"p"},{"n":3,"q":"1（＝壬午軍乱）の事件のころ，朝鮮政府内の改革派の中心人物は国王の王妃であったが，だれか。","a":"閔妃","t":"p"},{"n":4,"q":"朝鮮政府内で壬午軍乱後に，清国と結んで政権を握った保守派を何というか。","a":"事大党","t":"g"},{"n":5,"q":"朝鮮で親日策をとり，朝鮮の近代化を進めようとした開明派を何というか。","a":"独立党","t":"g"},{"n":6,"q":"朝鮮の近代化を進めようとした5（＝独立党）の中心人物を２人あげよ。","a":"金玉均・朴泳孝","t":"g"},{"n":7,"q":"1884年に清国がヨーロッパのある国との戦争に敗れたのを機に，朝鮮で独立党が日本公使と結んでクーデタをおこしたが，清国軍の来援で失敗した。この事件を何というか。","a":"甲申事変","t":"g"},{"n":8,"q":"1884年に，清国がヨーロッパのある国に敗れた戦争とは何か。","a":"清仏戦争","t":"g"},{"n":9,"q":"甲申事変の結果，日本と清国の対立が深まり，その解消のために，日清両軍が朝鮮から撤兵する内容の条約が結ばれた。この条約を何というか。","a":"天津条約","t":"g"},{"n":10,"q":"9（＝天津条約）の条約の日本側の全権はだれか。","a":"伊藤博文","t":"p"},{"n":11,"q":"9（＝天津条約）の条約の清国側の全権はだれか。","a":"李鴻章","t":"p"},{"n":12,"q":"福沢諭吉は1885年の『時事新報』に発表した論説のなかで，日本は清国・朝鮮との連帯を強めるよりは，アジアを捨てて欧米列強側に立つべきことを説いた。これを何というか。","a":"脱亜論","t":"g"},{"n":13,"q":"1889年に朝鮮の地方官が凶作を理由に大豆などの穀物の対日輸出を禁止したが，これを何というか。","a":"防穀令","t":"g"}]},{"t":"日清戦争と三国干渉","q":[{"n":1,"q":"1894（明治27）年に朝鮮半島南部の全羅道で農民反乱がおこり，これが崔済愚の創始した排外的な民族宗教団体と結びつき，各地に波及した。これを何というか。","a":"甲午農民戦争（東学の乱）","t":"g"},{"n":2,"q":"1（＝甲午農民戦争）の農民反乱によって清国軍と日本軍が朝鮮に出兵し，両国間の戦いが勃発したが，これを何というか。","a":"日清戦争","t":"g"},{"n":3,"q":"2（＝日清戦争）の戦争で，仁川港外でおこった日清両海軍による最初の戦いを何というか。","a":"豊島沖の海戦","t":"g"},{"n":4,"q":"2（＝日清戦争）の戦争で，清国海軍が誇った北洋艦隊が，日本海軍によって撃滅された戦いを何というか。","a":"黄海の海戦","t":"g"},{"n":5,"q":"1895年に北洋艦隊の基地である山東半島北端の港が陥落し，日本は賠償金支払いの保障とするためその地を占領したが，どこか。","a":"威海衛","t":"l"},{"n":6,"q":"日清戦争は，軍隊の近代化を進めていた日本の圧勝に終わったが，両国間で締結された講和条約を何というか。","a":"下関条約","t":"g"},{"n":7,"q":"日清講和会議の日本側の全権は伊藤博文とだれか。","a":"陸奥宗光","t":"p"},{"n":8,"q":"日清講和会議の清国側の全権はだれか。","a":"李鴻章","t":"p"},{"n":9,"q":"下関条約で清国は朝鮮について何を認めたか。","a":"独立国であること（属国でないこと）","t":"g"},{"n":10,"q":"下関条約で清国は日本に対して領土の割譲を認めたが，このうち，ロシアなどの圧力で返還したのはどこか。","a":"遼東半島","t":"l"},{"n":11,"q":"下関条約で日本が清国から割譲され，台北を中心に植民地支配したのはどこか。","a":"台湾","t":"l"},{"n":12,"q":"下関条約で日本が清国から割譲された小さな島々はどこか。","a":"澎湖諸島","t":"l"},{"n":13,"q":"下関条約で清国は日本に対して賠償金の支払いを認めたが，その額はいくらか。","a":"2億両","t":"n"},{"n":14,"q":"下関条約で清国は揚子江沿岸の４港の開港を認めたが，どこか。","a":"沙市・重慶・蘇州・杭州","t":"l"},{"n":15,"q":"下関条約で日本領となった台湾を支配するため設置された統治機関を何というか。","a":"台湾総督府","t":"g"},{"n":16,"q":"15（＝台湾総督府）の機関の初代の長には，当時の海軍軍令部長が任命されたが，この人物はだれか。","a":"樺山資紀","t":"p"},{"n":17,"q":"下関条約調印の６日後，ヨーロッパのある国々が，「極東ノ永久ノ平和ニ対シ障害ヲ与フル」ものとして，日本の獲得地の一部返還を勧告してきた。このことを何というか。","a":"三国干渉","t":"g"},{"n":18,"q":"17（＝三国干渉）の勧告を行った３国をあげよ。","a":"ロシア・フランス・ドイツ","t":"g"},{"n":19,"q":"17（＝三国干渉）の勧告で日本に返還が要求された地域はどこか。","a":"遼東半島","t":"l"},{"n":20,"q":"日本は遼東半島の返還要求に応じたが，国民はこれを屈辱と感じ，中国の故事を合言葉にしてロシアへの敵愾心を高めた。この言葉は何か。","a":"臥薪嘗胆","t":"g"}]}]},{"t":"4　日露戦争と国際関係","s":[{"t":"立憲政友会の成立","q":[{"n":1,"q":"1896（明治29）年に進歩党の大隈重信を外相に迎えて組閣し，松隈内閣とよばれた内閣名をあげよ。","a":"第2次松方正義内閣","t":"g"},{"n":2,"q":"松隈内閣の総辞職後，1898年に成立した内閣で，軍備拡張のため増税案を議会に提出したところ否決され，総辞職した内閣名をあげよ。","a":"第3次伊藤博文内閣","t":"g"},{"n":3,"q":"2（＝第3次伊藤博文内閣）の内閣が否決された増税案とは何か。","a":"地租増徴案","t":"g"},{"n":4,"q":"1898年に最初の政党内閣が成立したが，この内閣をふつう何とよんでいるか。","a":"隈板内閣","t":"g"},{"n":5,"q":"4（＝隈板内閣）の内閣の与党名をあげよ。","a":"憲政党","t":"g"},{"n":6,"q":"5（＝憲政党）の政党は，２つの政党が合併して成立したものであるが，２つの政党名をあげよ。","a":"自由党・進歩党","t":"g"},{"n":7,"q":"隈板内閣は党の分裂で，わずか４カ月で崩壊したが，この時この内閣の総理大臣であった大隈重信が党首となった政党名をあげよ。","a":"憲政本党","t":"g"},{"n":8,"q":"最初の政党内閣である隈板内閣が崩壊したあとを受けて成立した内閣は，官僚勢力の確立をはかり，種々の施策を実施した。この内閣名をあげよ。","a":"第2次山県有朋内閣","t":"g"},{"n":9,"q":"8（＝第2次山県有朋内閣）の内閣により，陸・海軍大臣は現役の大将・中将に限られることになったが，この制度を何というか。","a":"軍部大臣現役武官制","t":"g"},{"n":10,"q":"8（＝第2次山県有朋内閣）の内閣は政党員が官界に進出するのを防ぐため，試験任用を拡大して，自由任用を制限する法改正を行った。この時に改正された法令を何というか。","a":"文官任用令","t":"g"},{"n":11,"q":"8（＝第2次山県有朋内閣）の内閣は労働運動の高揚に対し，従来の治安立法を集大成した法令を制定したが，これを何というか。","a":"治安警察法","t":"g"},{"n":12,"q":"11（＝治安警察法）の法令は西暦何年に制定されたか。","a":"1900年","t":"d"},{"n":13,"q":"議会を円滑に運営するためには，与党となる政党が必要であると考えた維新の元勲出身の政治家はだれか。","a":"伊藤博文","t":"p"},{"n":14,"q":"13（＝伊藤博文）の人物を中心に組織された政党を何というか。","a":"立憲政友会","t":"g"},{"n":15,"q":"14（＝立憲政友会）の政党は西暦何年に結成されたか。","a":"1900年","t":"d"},{"n":16,"q":"14（＝立憲政友会）の政党を基礎として1900年に成立した内閣名をあげよ。","a":"第4次伊藤博文内閣","t":"g"},{"n":17,"q":"明治政府の功労者で，第一線を退いたあと，天皇を助け重要政策の決定や首相の推薦などにあたった人々を何とよんだか。","a":"元老","t":"g"}]},{"t":"中国分割と日英同盟","q":[{"n":1,"q":"先進資本主義国家の後進国への政治的・経済的侵略政策を何とよんでいるか。","a":"帝国主義","t":"g"},{"n":2,"q":"1（＝帝国主義）の動きは，世界的にはいつごろから始まったか。","a":"19世紀末〜20世紀初め","t":"d"},{"n":3,"q":"1（＝帝国主義）の政策により，中国などは列強による領土の期限付き借用というかたちで侵略された。このような土地を何とよんでいるか。","a":"租借地","t":"g"},{"n":4,"q":"列強は中国分割にのり出したが，イギリスが清国から租借した山東半島北岸の港湾名を何というか。","a":"威海衛","t":"g"},{"n":5,"q":"イギリスが清国から租借した広東省南部の地で，香港の対岸の半島名をあげよ。","a":"九竜半島","t":"g"},{"n":6,"q":"フランスが清国から租借した広東省西南部の港湾はどこか。","a":"広州湾","t":"l"},{"n":7,"q":"ドイツが清国から租借した山東省西南部の港湾はどこか。","a":"膠州湾","t":"l"},{"n":8,"q":"1898（明治31）年にロシアは清国からどこの半島の一部（先端部分）を租借したか。","a":"遼東半島","t":"l"},{"n":9,"q":"ロシアが清国から租借した8（＝遼東半島）の半島の主要都市を２つあげよ。","a":"旅順・大連","t":"g"},{"n":10,"q":"列強の中国分割に対して，アメリカの国務長官は３原則を提唱したが，この国務長官名をあげよ。","a":"ジョン＝ヘイ","t":"g"},{"n":11,"q":"10（＝ジョン＝ヘイ）の人物が，中国分割に対して提唱した３原則は，中国（清国）の領土保全のほかに何か。２つあげよ。","a":"門戸開放・機会均等","t":"g"},{"n":12,"q":"列強の中国分割に対し，山東半島では外国人排斥運動を行う白蓮教系の民間宗教団体があらわれたが，これを何というか。","a":"義和団","t":"g"},{"n":13,"q":"12（＝義和団）の団体が外国人排斥運動を進めるうえで，スローガンとしたのは何か。","a":"扶清滅洋","t":"g"},{"n":14,"q":"12（＝義和団）の外国人排斥運動はやがて北京にもおよび，列国公使館を襲撃し，さらに清国は列国に宣戦布告したが，列国は日本を中心に連合軍を組織して鎮圧した。これを何というか。","a":"北清事変","t":"g"},{"n":15,"q":"14（＝北清事変）によって敗北した清国は，賠償金の支払いと北京守備兵の駐留権を認める条約を列国と結んだが，これを何というか。","a":"北京議定書","t":"g"},{"n":16,"q":"14（＝北清事変）の鎮圧の際，ロシアは鉄道守備を名目として満州を占領した。これに対し日本政府の伊藤博文や井上馨らは，満韓交換を行う協定をロシアと結ぶべきと主張したが，この立場を何というか。","a":"日露協商論（満韓交換論）","t":"g"},{"n":17,"q":"14（＝北清事変）の鎮圧後に，世界に数多くの利権を有するイギリスと提携すべきであるという主張が桂太郎・小村寿太郎らによってなされ，その結果，調印された条約を何というか。","a":"日英同盟協約","t":"g"},{"n":18,"q":"17（＝日英同盟協約）の条約は西暦何年に成立したか。","a":"1902年","t":"d"},{"n":19,"q":"17（＝日英同盟協約）の条約は，この後２度改定されたが，適用範囲をインドまで拡大したのは西暦何年か。","a":"1905年","t":"d"},{"n":20,"q":"17（＝日英同盟協約）の条約の改定で，ドイツの進出にも適用し，アメリカを適用外としたのは西暦何年のことか。","a":"1911年","t":"d"},{"n":21,"q":"17（＝日英同盟協約）の条約は，1921（大正10）年に締結された条約で廃棄されることになったが，この条約を何というか。","a":"四カ国条約","t":"g"},{"n":22,"q":"日本とロシアの対立が激しくなると，対露同志会がとなえたような対露強硬論が展開されたが，これらの強硬論を何というか。","a":"主（開）戦論","t":"g"},{"n":23,"q":"1903年に戸水寛人博士らが，桂首相に提出した対露強硬主張の意見書を何というか。","a":"七博士意見書","t":"g"},{"n":24,"q":"人道主義の立場や社会主義の立場で，日露戦争に反対する人たちもいたが，これらの人たちの主張を何というか。","a":"非（反）戦論","t":"g"},{"n":25,"q":"はじめは日露開戦に反対の論説を掲げたが，まもなく開戦賛成の立場に転じた有力新聞は何か。","a":"万朝報","t":"g"},{"n":26,"q":"25（＝万朝報）の新聞が開戦論に転じたため退社し，平和主義・社会主義の立場で新聞を発行して反戦論をとなえた人物を２人あげよ。","a":"堺利彦・幸徳秋水","t":"g"},{"n":27,"q":"26（＝堺利彦・幸徳秋水）の人物らが中心となって組織した結社を何というか。","a":"平民社","t":"g"},{"n":28,"q":"27（＝平民社）の結社が発行し，日露戦争で反戦論を展開した新聞名をあげよ。","a":"平民新聞","t":"g"},{"n":29,"q":"日露戦争に際して，人道主義の立場から，あらゆる戦争に反対する主張をしたキリスト教徒はだれか。","a":"内村鑑三","t":"p"},{"n":30,"q":"反戦運動を行い，日露戦争勃発前から『東京毎日新聞』に反戦小説『火の柱』を連載した人物はだれか。","a":"木下尚江","t":"p"},{"n":31,"q":"日露戦争のさなか，反戦詩「君死にたまふこと勿れ」を『明星』に発表した女流詩人はだれか。","a":"与謝野晶子","t":"p"},{"n":32,"q":"日露戦争のさなか，反戦詩「お百度詣で」を『太陽』に発表した女流詩人はだれか。","a":"大塚楠緒子","t":"p"}]},{"t":"日露戦争","q":[{"n":1,"q":"満州をめぐる日本とロシアとの交渉は決裂し，戦争が始まったが，この戦争を何というか。","a":"日露戦争","t":"g"},{"n":2,"q":"1（＝日露戦争）の戦争は西暦何年に勃発したか。","a":"1904年","t":"d"},{"n":3,"q":"ロシアの東洋艦隊の基地を奪取するため，乃木希典の率いる軍が攻撃した戦いを何というか。","a":"旅順包囲戦","t":"g"},{"n":4,"q":"1905（明治38）年３月，南満州の要地で日露両国軍が死力を尽して戦った。この戦いを何というか。","a":"奉天会戦","t":"g"},{"n":5,"q":"日露戦争に参加した，ロシアが誇っていたヨーロッパ艦隊を何というか。","a":"バルチック艦隊","t":"g"},{"n":6,"q":"日本の連合艦隊が総力をあげて戦い，ロシアの5（＝バルチック艦隊）の艦隊に大勝利をおさめた戦いを何というか。","a":"日本海海戦","t":"g"},{"n":7,"q":"日露戦争は，アメリカ大統領の斡旋を受け入れて終結したが，この大統領とはだれか。","a":"セオドア＝ローズヴェルト","t":"p"},{"n":8,"q":"日露講和条約を何というか。","a":"ポーツマス条約","t":"g"},{"n":9,"q":"8（＝ポーツマス条約）の条約は西暦何年に調印されたか。","a":"1905年","t":"d"},{"n":10,"q":"日露講和会議の日本側の全権はだれか。","a":"小村寿太郎","t":"p"},{"n":11,"q":"日露講和会議のロシア側の全権はだれか。","a":"ウィッテ","t":"p"},{"n":12, "17（＝韓国併合条約）の条約が締結されたのは西暦何年のことか。","a":"1910年","t":"d"},{"n":19,"q":"韓国併合後の朝鮮統治のために新たにおかれた機関を何というか。","a":"朝鮮総督府","t":"g"},{"n":20,"q":"19（＝朝鮮総督府）の機関の長官を何というか。","a":"総督","t":"g"},{"n":21,"q":"初代の20（＝総督）にはだれが就任したか。","a":"寺内正毅","t":"p"},{"n":22,"q":"韓国併合後，総督府によって行われた朝鮮の土地所有権の確定，価格の査定，台帳の作成などの事業を何というか。","a":"土地調査事業","t":"g"},{"n":23,"q":"1908年に朝鮮の土地開発を目的に日韓両国政府によって設立された国策会社を何というか。","a":"東洋拓殖会社","t":"g"},{"n":24,"q":"旅順・大連を含む遼東半島南部の日本租借地を何とよんだか。","a":"関東州","t":"g"},{"n":25,"q":"24（＝関東州）の日本租借地を統治するため，1906年に旅順に設置された機関を何というか。","a":"関東都督府","t":"g"},{"n":26,"q":"25（＝関東都督府）の機関は，1919（大正８）年に廃止され，軍事部門と行政部門とに分離された。行政部門を担当した統治機関を何というか。","a":"関東庁","t":"g"},{"n":27,"q":"ポーツマス条約でロシアから得た長春・旅順間の鉄道，および付属鉱山・製鉄所を経営するため，1906年に設立された半官半民の特殊会社を何というか。","a":"南満州鉄道株式会社（満鉄）","t":"g"},{"n":28,"q":"ポーツマス条約でロシアから得た鉄道は，ロシアが経営していたハルビン・旅順間の鉄道の一部であるが，この鉄道を含めロシアがウラジヴォストークから北満州を横断して敷設した鉄道を何というか。","a":"東清鉄道","t":"g"},{"n":29,"q":"1905年に中国同盟会を組織し，民族・民権・民生の革命理論を主張した人物はだれか。","a":"孫文","t":"p"},{"n":30,"q":"29（＝孫文）の人物の革命理論を総称して何とよんでいるか。","a":"三民主義","t":"g"},{"n":31,"q":"1911年に革命派の新軍による武昌蜂起がたちまち全国に波及し，翌年１月には臨時政府が成立し，建国宣言がなされ，２月には皇帝が退位して清朝は滅亡した。この変革を何というか。","a":"辛亥革命","t":"g"},{"n":32,"q":"31（＝辛亥革命）の変革で成立した新しい国の名を何というか。","a":"中華民国","t":"g"},{"n":33,"q":"1913年に，32（＝中華民国）の国の大総統に最終的に就任したのはだれか。","a":"袁世凱","t":"p"}]},{"t":"桂園時代","q":[{"n":1,"q":"日英同盟協約を締結し，日露戦争を遂行したが，日比谷焼打ち事件で退陣した内閣名をあげよ。","a":"第1次桂太郎内閣","t":"g"},{"n":2,"q":"日露戦争後，第２次桂太郎内閣は国民の間に芽生えた自由主義的傾向を是正するため詔書の発布をあおいだが，この詔書を何というか。","a":"戊申詔書","t":"g"},{"n":3,"q":"日露戦争後の経済不況下に，疲弊した地方自治体の財政再建と農業振興，民心向上などを目的とした内務省主導の運動が推進されたが，これを何というか。","a":"地方改良運動","t":"g"},{"n":4,"q":"立憲政友会の２代総裁が組織した内閣は，鉄道国有法を制定し，満鉄を設立したが，日本社会党の結成を承認するなど社会主義者に寛大であった。この内閣を何というか。","a":"第1次西園寺公望内閣","t":"g"},{"n":5,"q":"藩閥・軍閥を代表する桂太郎と立憲政友会の西園寺公望が明治時代末期に政権を交互に担当したが，これを何とよんでいるか。","a":"桂園時代","t":"g"},{"n":6,"q":"1898（明治31）年に「社会主義の原理とこれを日本に応用するの可否」を研究する目的で結成された研究団体を何というか。","a":"社会主義研究会","t":"g"},{"n":7,"q":"6（＝社会主義研究会）の研究団体は1900年に，研究と宣伝のために改組されたが，その名称をあげよ。","a":"社会主義協会","t":"g"},{"n":8,"q":"アメリカ留学から帰国後，キリスト教的立場から社会主義運動に参加し，社会主義研究会や日本最初の社会主義政党の創立に加わり，また早稲田大学野球部の創立者としても有名なのはだれか。","a":"安部磯雄","t":"p"},{"n":9,"q":"キリスト教社会主義者として，また文学者として日露戦争に反対した小説『火の柱』でも知られ，日本最初の社会主義政党の創立に参加したのはだれか。","a":"木下尚江","t":"p"},{"n":10,"q":"中学時代にキリスト教に入信して，片山潜らと『労働世界』を発行し，日本最初の社会主義政党の創立に参加したのはだれか。","a":"西川光二郎","t":"p"},{"n":11,"q":"日露開戦に反対して『万朝報』を退社し，戦後渡米して，帰国後は無政府主義をとなえた，『廿世紀之怪物帝国主義』でも知られる，1911年に刑死した人物はだれか。","a":"幸徳秋水","t":"p"},{"n":12,"q":"日露開戦に反対して『万朝報』を退社し，『平民新聞』を発行し，その後，日本の社会主義・共産主義を指導したが，昭和初期には社会民主主義に転向したのはだれか。","a":"堺利彦","t":"p"},{"n":13,"q":"片山潜・安部磯雄・幸徳秋水・木下尚江・西川光二郎・河上清の６人が結成した，日本最初の社会主義政党を何というか。","a":"社会民主党","t":"g"},{"n":14,"q":"13（＝社会民主党）の政党が結成されたのは西暦何年のことか。","a":"1901年","t":"d"},{"n":15,"q":"13（＝社会民主党）の政党に対し，結成直後に結社禁止を命じた内閣名をあげよ。","a":"第4次伊藤博文内閣","t":"g"},{"n":16,"q":"「国法の範囲内において社会主義の実行を期す」と政府に届け出て，許可を得た日本最初の合法的社会主義政党を何というか。","a":"日本社会党","t":"g"},{"n":17,"q":"16（＝日本社会党）の政党は西暦何年に結成されたか。","a":"1906年","t":"d"},{"n":18,"q":"16（＝日本社会党）の政党の結成を認めた内閣総理大臣はだれか。","a":"西園寺公望","t":"p"},{"n":19,"q":"16（＝日本社会党）の政党はやがて党内分裂をおこすが，議会を中心に全国的組織運動を主張する片山潜ら穏健派は何とよばれたか。","a":"議会政策派","t":"g"},{"n":20,"q":"16（＝日本社会党）の政党内で，アメリカより帰国した幸徳秋水らは労働者のストライキによる革命的行動を主張したが，この派を何というか。","a":"直接行動派","t":"g"},{"n":21,"q":"無政府主義者たちが明治天皇暗殺を計画したとの理由で，社会主義者ら26人が検挙され，幸徳秋水以下12人が死刑に処せられた事件を何というか。","a":"大逆事件","t":"g"},{"n":22,"q":"21（＝大逆事件）の事件は西暦何年におこったか。","a":"1910年","t":"d"},{"n":23,"q":"21（＝大逆事件）の事件がおこった時の内閣名をあげよ。","a":"第2次桂太郎内閣","t":"g"},{"n":24,"q":"21（＝大逆事件）の事件以後，社会主義運動は停滞するにいたったが，この時期を何とよんでいるか。","a":"冬の時代","t":"g"}]}]},{"t":"5　近代産業の発展","s":[{"t":"産業革命","q":[{"n":1,"q":"作業機械や動力機械の発明を契機として，新しい生産様式が生み出され，生産も飛躍的に増大した。この変革を何とよんでいるか。","a":"産業革命","t":"g"},{"n":2,"q":"1（＝産業革命）の変革はいつごろ，どこの国で始まったか。","a":"18世紀後半・イギリス","t":"d"},{"n":3,"q":"1（＝産業革命）のような変革は，日本でもまず製糸・紡績業などで始まったが，それはいつごろか。","a":"1890年代","t":"d"},{"n":4,"q":"日本では1900年代に，電力を動力源として変革が進んだが，どのような工業部門においてか。","a":"重工業部門","t":"g"},{"n":5,"q":"資本主義体制のもとで，過剰生産を主な原因としておきる経済の大混乱を何というか。","a":"恐慌","t":"g"},{"n":6,"q":"5（＝恐慌）のような事態のなかで産業界が行う機械の一部停止や作業時間の短縮を何というか。","a":"操業短縮","t":"g"},{"n":7,"q":"日本最初の恐慌は西暦何年におこったか。","a":"1890年","t":"d"},{"n":8,"q":"日清戦争の戦勝景気の後，1900（明治33）年から反動恐慌がおきたが，これを何というか。","a":"資本主義恐慌","t":"g"},{"n":9,"q":"日露戦争後の反動恐慌で，1907年から金融・産業部門の倒産があいつぎ，不況は慢性化した。この恐慌を何というか。","a":"明治40年の恐慌","t":"d"},{"n":10,"q":"1897年に日清戦争の賠償金の一部を準備金として進められたもので，欧米にならって始められた貨幣制度は何か。","a":"金本位制","t":"g"},{"n":11,"q":"10（＝金本位制）の貨幣制度を実施するために制定された法令は何か。","a":"貨幣法","t":"g"},{"n":12,"q":"1880年に貿易金融を目的として設立された銀行で，第二次世界大戦後に東京銀行として再発足したものは何か。","a":"横浜正金銀行","t":"g"},{"n":13,"q":"1897年に設立され，農工業を改良・発展させるための資金を融資した特殊銀行は何か。","a":"日本勧業銀行","t":"g"},{"n":14,"q":"1902年に設立された特殊銀行で，外資導入や資本輸出に活躍した長期融資機関は何か。","a":"日本興業銀行","t":"g"},{"n":15,"q":"三菱会社と半官半民の共同運輸会社との合併によって1885年に設立され，政府の進める海運業奨励政策にあと押しされて，1893年にはボンベイ航路，1896年には欧米への航路を開いた日本最大の海運会社は何か。","a":"日本郵船会社","t":"g"},{"n":16,"q":"政府の海運業奨励政策として1896年に出されたもので，鉄鋼船の建造と外国航路への就航に奨励金を出した法令をそれぞれあげよ。","a":"造船奨励法・航海奨励法","t":"g"}]},{"t":"紡績・製糸・鉄道","q":[{"n":1,"q":"日本の産業革命のさきがけとなった紡績業の発展は，渋沢栄一らによって1883（明治16）年に開業された会社の大規模経営の成功を１つの契機としている。この会社名をあげよ。","a":"大阪紡績会社","t":"g"},{"n":2,"q":"1（＝大阪紡績会社）の会社の生産方式が急速に普及し，従来の水車利用の紡績機を圧倒した。新しい生産方式名とそれ以前の紡績機名をあげよ。","a":"機械紡績・ガラ紡","t":"g"},{"n":3,"q":"2（＝機械紡績・ガラ紡）の紡績機を発明した人物はだれか。","a":"臥雲辰致","t":"p"},{"n":4,"q":"新しい生産方式により，綿糸の生産量が飛躍的に伸びたが，綿糸の国内生産高が輸入高を上まわるのは西暦何年か。","a":"1890年","t":"d"},{"n":5,"q":"綿糸の輸出高が輸入高を上まわるのは西暦何年か。","a":"1897年","t":"d"},{"n":6,"q":"開国以来，重要な輸出産業であった製糸業も技術革新が行われ，1894年には新技術による生産量が，幕末以来の技術による生産量を上まわった。この新しい技術と幕末以来の技術をそれぞれ答えよ。","a":"器械製糸・座繰製糸","t":"g"},{"n":7,"q":"1897年に日本最初の木製動力織機（国産力織機）を発明して，日本の織物業の発展に貢献したのはだれか。","a":"豊田佐吉","t":"p"},{"n":8,"q":"1881年に華族を主体として設立され，今日の東北本線の建設を行った会社を何というか。","a":"日本鉄道会社","t":"g"},{"n":9,"q":"新橋・横浜間の鉄道開通から17年後には新橋・神戸間の鉄道が全通したが，この鉄道路線を何というか。","a":"東海道線","t":"g"},{"n":10,"q":"9（＝東海道線）の鉄道路線全通の年は鉄道営業キロ数で民営が官営を上まわった年でもあるが，西暦何年のことか。","a":"1889年","t":"d"},{"n":11,"q":"軍事・財政・私鉄救済の目的で，政府による民営鉄道の買収が行われたが，この鉄道の国有化をはかった法令を何というか。","a":"鉄道国有法","t":"g"},{"n":12,"q":"11（＝鉄道国有法）の法令の制定は西暦何年か。","a":"1906年","t":"d"}]},{"t":"重工業の形成","q":[{"n":1,"q":"日清戦争後の軍備拡張・製鋼工業振興政策によって設立・開業された官営工場を何というか。","a":"八幡製鉄所","t":"g"},{"n":2,"q":"1（＝八幡製鉄所）の工場の開業は西暦何年か。","a":"1901年","t":"d"},{"n":3,"q":"1（＝八幡製鉄所）の工場で使用した鉄鉱石は，清国との独占的な契約で輸入されたものであったが，清国のどこの鉄山のものか。","a":"大冶","t":"l"},{"n":4,"q":"日露戦争後の1907（明治40）年に，三井とイギリスのアームストロング・ヴィッカース両兵器会社との提携で，日本最大の民間兵器製造会社が室蘭に設立された。この会社名をあげよ。","a":"日本製鋼所","t":"g"},{"n":5,"q":"工作機械の分野において，先進国なみの精度を持った旋盤が，1905年に国産化された。これを製造した会社を何というか。","a":"池貝鉄工所","t":"g"},{"n":6,"q":"種々の産業や金融を支配下におき，一族の独占的出資のもとに産業・経済・政治をも支配するようになった大独占資本を何というか。","a":"財閥","t":"g"},{"n":7,"q":"株式への投資および株式所有によって企業を支配する会社を何というか。","a":"持株会社","t":"g"},{"n":8,"q":"江戸時代の両替商で，1876年に銀行・商社を設立し，さらに1888年には三池炭鉱の払下げを受けた財閥を何というか。","a":"三井（財閥）","t":"g"},{"n":9,"q":"8（＝三井）の財閥の本社として1909年に設立され，同族の共有財産として銀行・物産の株式などを保有し，王子製紙などの系列会社を統括した会社とは何か。","a":"三井合名会社","t":"g"},{"n":10,"q":"江戸時代末期に土佐藩の通商に従事した岩崎弥太郎が，日本の海運業を独占するなかで財閥を形成していった。この財閥を何というか。","a":"三菱（財閥）","t":"g"},{"n":11,"q":"江戸時代以来の別子銅山をもとに築かれた財閥を何というか。","a":"住友（財閥）","t":"g"},{"n":12,"q":"江戸に両替店を開き，幕末・維新の混乱期に，金や太政官札の買占めで巨利を得て成長し，発展した財閥を何というか。","a":"安田（財閥）","t":"g"},{"n":13,"q":"幕末・維新時の京都の糸商人が，1877年に足尾銅山，その後院内銀山・阿仁銅山を入手して形成した財閥を何というか。","a":"古河（財閥）","t":"g"},{"n":14,"q":"京都の生糸商人出身で，13（＝古河）の財閥の創始者はだれか。","a":"古河市兵衛","t":"p"},{"n":15,"q":"深川工作分局でセメント製造を始め，のち諸企業に進出して浅野財閥を形成したのはだれか。","a":"浅野総一郎","t":"p"}]},{"t":"農業と農民","q":[{"n":1,"q":"地租改正・松方デフレ後に増加した，みずからは農業経営をせず，小作料による収入に依存する大土地所有者を何というか。","a":"寄生地主","t":"g"},{"n":2,"q":"日露戦争後にみられた農村困窮などの社会問題に対し，第２次桂太郎内閣は内務省中心で運動をすすめた。この運動とは何か。","a":"地方改良運動","t":"g"}]},{"t":"社会運動の発生","q":[{"n":1,"q":"1888（明治21）年に三宅雪嶺によって炭鉱労働者の惨状が，雑誌『日本人』に取り上げられ，問題化した。この炭鉱名をあげよ。","a":"高島炭鉱","t":"g"},{"n":2,"q":"銅山が有毒廃液を渡良瀬川に流し，流域の田畑に被害を与えた。この事件を何とよんでいるか。","a":"足尾鉱毒事件","t":"g"},{"n":3,"q":"2（＝足尾鉱毒事件）の事件で住民を指導し，明治天皇に直訴を試みたのはだれか。","a":"田中正造","t":"p"},{"n":4,"q":"政府は足尾銅山に鉱毒流出防止工事を命じる一方，洪水緩和のため遊水池を設けることにした。このためわずかの買収費で廃村とされた栃木県の村名をあげよ。","a":"谷中村","t":"g"},{"n":5,"q":"1899年の刊行物で，東京の貧民窟・下層労働者・小作人の実態を調査し，社会のひずみを訴えた書物と，その著者名をあげよ。","a":"日本之下層社会・横山源之助","t":"g"},{"n":6,"q":"1903年の農商務省の刊行物で，全国工場労働者の実態を調査した報告書を何というか。","a":"職工事情","t":"g"},{"n":7, を何というか。","a":"国民之友","t":"g"},{"n":12,"q":"11（＝国民之友）の雑誌を発行した出版社を何というか。","a":"民友社","t":"g"},{"n":13,"q":"徳富蘇峰はある事件をきっかけに従来の主張をすてて国家主義を主張するようになったが，ある事件とは何か。","a":"日清戦争（三国干渉）","t":"g"},{"n":14,"q":"1897年に東京博文館発行の雑誌に，「君民一体，忠君愛国」など，国民精神の発揚を説いてキリスト教を排撃し，日本の大陸進出を肯定する論文が掲載されたが，その著者はだれか。","a":"高山樗牛","t":"p"},{"n":15,"q":"14（＝高山樗牛）の人物がとなえた思想を何というか。","a":"日本主義","t":"g"},{"n":16,"q":"歴史小説『滝口入道』の著者としても有名な14（＝高山樗牛）の人物が主幹をつとめた東京博文館発行の雑誌は何か。","a":"太陽","t":"g"},{"n":17,"q":"日本主義に同調した人物のなかに，ドイツ観念論の紹介者として，また『教育ト宗教ノ衝突』の著者として有名な人がいるが，だれか。","a":"井上哲次郎","t":"p"},{"n":18,"q":"政府の神道国教化政策に反対し，真の神仏分離，信仰の自由を主張し，仏教の復興に努力した浄土真宗の僧侶はだれか。","a":"島地黙雷","t":"p"},{"n":19,"q":"キリスト教を批判し，東洋文明は仏教のなかにあると主張して仏教の覚醒を促し，また哲学館（現，東洋大学）を創立した仏教哲学者はだれか。","a":"井上円了","t":"p"},{"n":20,"q":"1859（安政６）年に来日したアメリカ人宣教師・医師で，1867（慶応３）年に日本初の和英辞書を出版し，ローマ字を考案した，明治学院（現，明治学院大学）の創始者はだれか。","a":"ヘボン","t":"p"},{"n":21,"q":"1871年に熊本藩が創立した学校の教師として招かれたアメリカ人はだれか。","a":"ジェーンズ","t":"p"},{"n":22,"q":"21（＝ジェーンズ）の人物が教育・経営をまかされた学校を何というか。","a":"熊本洋学校","t":"g"},{"n":23,"q":"22（＝熊本洋学校）の学校で学び，同志社を卒業後に伝道に専念し，神道と融合した日本的キリスト教をとなえたのはだれか。","a":"海老名弾正","t":"p"},{"n":24,"q":"横浜で受洗し，東京富士見町教会を創立し，終生その牧師をつとめ，福音主義信仰の確立をはかり，また旧約聖書や讃美歌の翻訳にも大きな功績を残したのはだれか。","a":"植村正久","t":"p"}]},{"t":"教育の普及","q":[{"n":1,"q":"1879（明治12）年に画一的学校制度の行き詰まりを打開するため，アメリカの教育制度を参考に発令されたのは何か。","a":"教育令","t":"g"},{"n":2,"q":"初代文部大臣森有礼によって1886年に公布された一連の勅令で，国家主義的思想にもとづいた近代的学校体系を確立した法令を総称して何というか。","a":"学校令","t":"g"},{"n":3,"q":"2（＝学校令）の法令のうち，国家にとって有為な人材を育成するための最高学府の設立に関して，1886年に公布された法令を何というか。","a":"帝国大学令","t":"g"},{"n":4,"q":"3（＝帝国大学令）の法令にもとづいて，1886年に東京・京都などに設立された学校を総称して何というか。","a":"帝国大学","t":"g"},{"n":5,"q":"学校令のうち，広範な教師層の育成を目的として制定された法令を何というか。","a":"師範学校令","t":"g"},{"n":6,"q":"学校令のうち，中等教育に関して公布された法令を何というか。","a":"中学校令","t":"g"},{"n":7,"q":"学校令のうち，初等教育に関して公布された法令を何というか。","a":"小学校令","t":"g"},{"n":8,"q":"7（＝小学校令）の法令で初等教育機関は２種にわかれていたが，それぞれ何というか。","a":"尋常小学校・高等小学校","t":"g"},{"n":9,"q":"1894年以降，中学校のなかの高等中学校が分離され新しい名称となったが，何という名称の学校になったか。","a":"高等学校","t":"g"},{"n":10,"q":"1899年に男子の中学校に相当する女子の高等普通教育を制度 年に大阪で創刊され，のち東京へ進出し，はじめは大衆的な報道が中心であったが，しだいに論説面を強化して大新聞となったのは何か。","a":"朝日新聞","t":"g"},{"n":11,"q":"1882年に福沢諭吉が創刊した新聞で，不偏不党の立場をとり，経済記事の充実に特色があった新聞名をあげよ。","a":"時事新報","t":"g"},{"n":12,"q":"1890年に黒岩涙香が東京で創刊した有力紙で，日露開戦前には幸徳秋水や内村鑑三らを擁して，最初は非戦の論陣をはった新聞名をあげよ。","a":"万朝報","t":"g"},{"n":13,"q":"1885年に女性の教養向上をめざして創刊された明治時代の婦人専門誌で，のちの『文学界』の母体となった雑誌名をあげよ。","a":"女学雑誌","t":"g"},{"n":14,"q":"1887年に京都で刊行された『反省会雑誌』が，のち東京に移り，1899年には仏教から社会評論・学術・思想・文芸の総合雑誌となった。この雑誌名をあげよ。","a":"中央公論","t":"g"},{"n":15,"q":"江戸時代の世相・人情などを中心とした遊戯的文学を総称して何というか。","a":"戯作文学","t":"g"},{"n":16,"q":"『安愚楽鍋』など，明治の文明開化の世相を滑稽本風に描き，江戸時代の作風を継承した最後の人といわれるのはだれか。","a":"仮名垣魯文","t":"p"},{"n":17,"q":"明治時代初期に盛んに行われた文学の翻案で，自由思想を含み，近代文学誕生のもとをなしたものを何というか。","a":"翻訳小説","t":"g"},{"n":18,"q":"民権運動の発生と前後して誕生し，政治思想の宣伝を目的とした小説を何とよんでいるか。","a":"政治小説","t":"g"},{"n":19,"q":"『経国美談』で，ギリシアのテーベが専制政治を打倒し，民主政治を確立する経緯を描き，立憲政治思想を鼓舞したのはだれか。","a":"矢野龍溪","t":"p"},{"n":20,"q":"憂国の志士が世界を周遊し，時勢を慨嘆した趣向の『佳人之奇遇』という政治小説を著したのはだれか。","a":"東海散士","t":"p"},{"n":21,"q":"1887年前後におこった，戯作や勧善懲悪を排して，現実の世相・人情をありのままに描くのが近代文学であるとした文学理論を何というか。","a":"写実主義","t":"g"},{"n":22,"q":"21（＝写実主義）の文学理論を最初にとなえた人はだれか。","a":"坪内逍遙","t":"p"},{"n":23,"q":"22（＝坪内逍遙）の人物が写実主義の理論を主張した評論とその理論を実践した小説をそれぞれあげよ。","a":"小説神髄・当世書生気質","t":"g"},{"n":24,"q":"従来の文語体の文章にかわって，話し言葉と同様の文章で文学が書かれるようになったが，この文体を何というか。","a":"言文一致体","t":"g"},{"n":25,"q":"坪内逍遙の弟子で言文一致体の先駆となった小説家とその作品名をあげよ。","a":"二葉亭四迷・浮雲","t":"g"},{"n":26,"q":"1885年創設の文学団体で，欧化主義に対し伝統的な江戸趣味と近代的写実主義で文芸作品の大衆化をはかった団体名をあげよ。","a":"硯友社","t":"g"},{"n":27,"q":"26（＝硯友社）の団体の機関誌を何というか。","a":"我楽多文庫","t":"g"},{"n":28,"q":"26（＝硯友社）の団体を主宰した人物は，井原西鶴に傾倒し華麗な文章を書いた人として有名であるが，だれか。また，この人物の代表作をあげよ。","a":"尾崎紅葉・金色夜叉","t":"p"},{"n":29,"q":"26（＝硯友社）の団体の創立に参加した人で，「です」調の言文一致体の短編集『夏木立』を発表し，のちに新体詩の分野でも業績を残した人はだれか。","a":"山田美妙","t":"p"},{"n":30,"q":"理想主義的な作品を数多く描き，東洋的な観念を主題とする作風を示し，尾崎紅葉と並び称されて，紅露時代を築いたのはだれか。","a":"幸田露伴","t":"p"},{"n":31,"q":"30（＝幸田露伴）の人物の代表作をあげよ。","a":"五重塔","t":"g"},{"n":32,"q":"陸軍軍医であり，雑誌『しがらみ草紙』などで文学活動をはじめ，小説・戯曲・評論・翻訳など幅広い活動を行い，のちに文豪とあおがれたのはだれか。","a":"森鷗外","t":"p"},{"n":33,"q":"32（＝森鷗外）の人物の最初の作品で，ベルリン留学の主人公と踊り子との恋愛と離別を描いた小説は何というか。","a":"舞姫","t":"g"},{"n":34,"q":"アンデルセンの原作である詩人アントニオの愛の物語を森鷗外が翻訳した作品を何というか。","a":"即興詩人","t":"g"},{"n":35,"q":"封建的な因習や貧困にうちひしがれた女性の哀愁を抒情豊かに描いた女流作家はだれか。","a":"樋口一葉","t":"p"},{"n":36,"q":"35（＝樋口一葉）の人物が，遊廓に近い下町の少年・少女の姿を美しい文体で描いた作品を何というか。","a":"たけくらべ","t":"g"},{"n":37,"q":"日清戦争前後から日露戦争にかけて，近代的自我に目覚めた人たちが，個性の尊重と解放を文学を通して主張するようになった。このような文学の主張を何というか。","a":"ロマン主義","t":"g"},{"n":38,"q":"1893年に創刊の文芸雑誌は，37（＝ロマン主義）の主張を推し進める母体となった。この文芸雑誌名と創刊者をあげよ。","a":"文学界・北村透谷","t":"g"},{"n":39,"q":"37（＝ロマン主義）の文学の風潮は，明治30年代に全盛期を迎え，特に詩歌において顕著であった。1897年出版の詩集で，近代詩を開拓したのはだれか。また，その人物の最初の詩集名をあげよ。","a":"島崎藤村・若菜集","t":"p"},{"n":40,"q":"男性的な漢文調の近代詩で独自の詩風を確立し，1899年に処女詩集『天地有情』を残したのはだれか。","a":"土井晩翠","t":"p"},{"n":41,"q":"新詩社同人の女性で，大胆に人間の官能と解放の歌をつくり，日露戦争を批判する詩でも知られるのはだれか。また，その短歌集をあげよ。","a":"与謝野晶子・みだれ髪","t":"p"},{"n":42,"q":"新詩社からは，1900年にロマン主義の詩歌で知られる機関誌が発刊されたが，この機関誌名と中心人物名をあげよ。","a":"明星・与謝野鉄幹（寛）","t":"g"},{"n":43,"q":"42（＝明星・与謝野鉄幹）の機関誌に官能的な詩を発表して認められ，短歌・詩・童謡など各方面に名作を残した詩人・歌人はだれか。","a":"北原白秋","t":"p"},{"n":44,"q":"尾崎紅葉の弟子で，独特の美的世界を華麗な文章で描き，高野山の旅僧が飛騨山中で経験した神秘的な短編小説『高野聖』の作者はだれか。","a":"泉鏡花","t":"p"},{"n":45,"q":"『自然と人生』で自然詩人の名をほしいままにしたが，夫婦の愛情が封建的家族制度の犠牲となるロマン主義の小説『不如帰』を発表したのはだれか。","a":"徳冨蘆花","t":"p"},{"n":46,"q":"日露戦争のころから，ゾラやモーパッサンの影響を受け，現実に目を向け，人間社会をありのままに観察しようとする文学的立場があらわれてきた。これを何というか。","a":"自然主義","t":"g"},{"n":47,"q":"46（＝自然主義）の文学を確立する先駆となった1906年発刊の，被差別部落出身の瀬川丑松の生き方を取り扱った島崎藤村の作品名を何というか。","a":"破戒","t":"g"},{"n":48,"q":"1907年に，小説家の内弟子へのとげられない愛欲と身辺描写を克明に著した作品『蒲団』を発表したのはだれか。","a":"田山花袋","t":"p"},{"n":49,"q":"日清戦争に従軍し，『愛弟通信』を発表して注目された人で，ロマン主義から自然主義へ傾き，晩年には社会批判の方向を示した小説家はだれか。","a":"国木田独歩","t":"p"},{"n":50,"q":"49（＝国木田独歩）の人物が文壇で認められた作品で，自然美をつづった散文詩的短編集を何というか。","a":"武蔵野","t":"g"},{"n":51,"q":"49（＝国木田独歩）の人物が1901年に発表した作品で，理想と現実を標題とした作品名をあげよ。","a":"牛肉と馬鈴薯","t":"g"},{"n":52,"q":"尾崎紅葉の弟子で，心理葛藤描写にすぐれた『黴』など，自己の生活を題材にした作品が多い自然主義文学の代表的作家はだれか。","a":"徳田秋声","t":"p"},{"n":53,"q":"インテリの苦悶を描いた『何処へ』など，懐疑的傾向の作品を多く残し，戯曲や評論の分野でも活躍した自然主義文学の作家はだれか。","a":"正宗白鳥","t":"p"},{"n":54,"q":"醜い現実暴露を否定し，博識と広い視野に立つ理知的・倫理的な文学的立場を何とよんでいるか。","a":"反自然主義（余裕派）","t":"g"},{"n":55,"q":"54（＝反自然主義）の文学的立場の作家で，多くの作品を残した近代文学史上の文豪はだれか。","a":"夏目漱石","t":"p"},{"n":56,"q":"『ホトトギス』に連載された55（＝夏目漱石）の人物の出世作を何というか。","a":"吾輩は猫である","t":"g"},{"n":57,"q":"55（＝夏目漱石）の人物の作品で，松山中学校での経験を素材に無鉄砲な青年教師の姿をユーモラスに描いた作品は何か。","a":"坊っちゃん","t":"g"},{"n":58,"q":"55（＝夏目漱石）の人物の作品で，主人公“先生”の心理を通して，人間のエゴイズムを巧みに描いた作品を何というか。","a":"こころ","t":"g"},{"n":59,"q":"55（＝夏目漱石）の人物の作品で，自我の追求の最後の到達点を示すと期待された未完の大作をあげよ。","a":"明暗","t":"g"},{"n":60,"q":"窮乏生活のなかから社会的関心を深め，３行書きによる生活派短歌を試み，大逆事件を契機として社会主義への傾斜を強めた歌人はだれか。また，その代表的歌集を何というか。","a":"石川啄木・一握の砂","t":"p"},{"n":61,"q":"60（＝石川啄木・一握の砂）の人物の晩年の評論で，時代の行き詰まりと国家権力への直観的批判を示したものを何というか。","a":"時代閉塞の現状","t":"g"},{"n":62,"q":"短詩型文学である俳句や短歌の革新運動を展開したのはだれか。","a":"正岡子規","t":"p"},{"n":63,"q":"62（＝正岡子規）の人物が俳句や短歌の革新運動を展開した雑誌名をあげよ。","a":"ホトトギス","t":"g"},{"n":64,"q":"俳句革新運動の精神は，写生と17文字の定型と季題の伝統を守ることにあったが，この精神を守りつづけた俳人で，正岡子規の門人はだれか。","a":"高浜虚子","t":"p"},{"n":65,"q":"短歌では万葉調と写生が歌壇の主流を占めるようになったが，この動きを進めた短歌の雑誌名をあげよ。","a":"アララギ","t":"g"},{"n":66,"q":"根岸短歌会に参加し，写生風の短歌をつくり，「冴え」と「品位」を主張した歌人で，小説『土』でも知られるのはだれか。","a":"長塚節","t":"p"},{"n":67,"q":"正岡子規の弟子で，根岸短歌会の機関誌『馬酔木』の創刊や小説『野菊の墓』を著した歌人はだれか。","a":"伊藤左千夫","t":"p"}]},{"t":"明治の芸術／生活様式の近代化","q":[{"n":1,"q":"明治になって，伝統的演劇の歌舞伎にも新たな趣向が取り入れられ，また改革も試みられた。内容・扮装など史実を重んじた歴史劇を何というか。","a":"活歴物（活歴劇）","t":"g"},{"n":2,"q":"江戸時代後期には世話物で，また明治に入ると新時代の傾向の歌舞伎（散切物・活歴物）の脚本を書き，活躍したのはだれか。","a":"河竹黙阿弥","t":"p"},{"n":3,"q":"1886（明治19）年に西洋演劇にならった急進的な改革を試みる会が結成されたが，このような動きを何というか。","a":"演劇改良運動","t":"g"},{"n":4,"q":"1889年に落成した歌舞伎座を中心に，歌舞伎の一大全盛期がおとずれた。この全盛期を築いたのは，市川団十郎とだれか，２人あげよ。","a":"尾上菊五郎・市川左団次","t":"p"},{"n":5,"q":"明治時代中期の歌舞伎の全盛時代を，当時活躍していた役者の名前から何というか。","a":"団・菊・左時代","t":"g"},{"n":6,"q":"1888年に自由党員が自由民権思想の大衆普及と浮浪壮士に職を与える目的で始めた素人演劇を何というか。","a":"壮士芝居（書生芝居）","t":"g"},{"n":7,"q":"自由と民権を宣伝し，時局を風刺するオッペケペー節を創始して人気を博し，壮士芝居を演じたのはだれか。","a":"川上音二郎","t":"p"},{"n":8,"q":"壮士芝居は，日清戦争に際しては戦争劇を，やがて当時の評判小説を演じて歓迎され，商業演劇としての基礎を築いた。この演劇を歌舞伎に対して何とよぶようになったか。","a":"新派劇","t":"g"},{"n":9,"q":"歌舞伎などに対して，ヨーロッパ近代劇の影響を受けておこった演劇を何というか。","a":"新劇","t":"g"},{"n":10,"q":"1906年，文芸一般の革新を目的として結成されたが，のち新劇発展の基礎を築いた演劇団体を何というか。","a":"文芸協会","t":"g"},{"n":11,"q":"10（＝文芸協会）の団体のリーダーは坪内逍遙であったが，もう一人の中心人物はだれか。","a":"島村抱月","t":"p"},{"n":12,"q":"10（＝文芸協会）の団体は，イプセンの『人形の家』などを上演したが，ノラの役で有名になった女優はだれか。","a":"松井須磨子","t":"p"},{"n":13,"q":"1909年にヨーロッパ留学から帰国した歌舞伎俳優が，小山内薫とともに西洋近代劇の移植，日本人の創作劇上演のための劇団を結成した。この劇団名を何というか。","a":"自由劇場","t":"g"},{"n":14,"q":"小山内薫とともに13（＝自由劇場）の劇団を結成した歌舞伎俳優はだれか。","a":"2代目市川左団次","t":"p"},{"n":15,"q":"アメリカに留学し，帰国後に文部省教科書編集局長となり，西洋音楽の移植につとめ，『小学唱歌集』を編集したのはだれか。","a":"伊沢修二","t":"p"},{"n":16,"q":"1887年に国立の音楽教育機関が設立されたが，これを何というか。","a":"東京音楽学校","t":"g"},{"n":17,"q":"1901年に文部省の留学生としてドイツに学んだが，病を得て帰国後に死去した作曲家で，「箱根八里」「花」などの曲を残した人物はだれか。","a":"滝廉太郎","t":"p"},{"n":18,"q":"17（＝滝廉太郎）の人物の代表的歌曲で，郷里の城郭を題材としたものは何か。","a":"荒城の月","t":"g"},{"n":19,"q":"1878年に来日し，東京大学で哲学・政治学などを講義し，日本古美術の価値を強調したアメリカ人はだれか。","a":"フェノロサ","t":"p"},{"n":20,"q":"19（＝フェノロサ）の人物に師事・協力して日本美術の復興に努力し，のち明治美術の父と称されたのはだれか。","a":"岡倉天心（覚三）","t":"p"},{"n":21,"q":"欧化主義に反対して国粋保存運動が高まると，政府は日本美術の奨励策をとり，1887年に美術教育のための学校をフェノロサや岡倉天心の尽力で創立した。その学校名をあげよ。","a":"東京美術学校","t":"g"},{"n":22,"q":"21（＝東京美術学校）の学校の日本画教授として迎えられ，内国勧業博覧会に「竜虎図」という六曲一双の屏風絵を発表した画家はだれか。","a":"橋本雅邦","t":"p"},{"n":23,"q":"人間の母性愛を象徴的に描いた「悲母観音」で著名な日本画家はだれか。","a":"狩野芳崖","t":"p"},{"n":24,"q":"1898年に岡倉天心を中心にして，橋本雅邦ら26人の日本画家・彫刻家らが結成した在野の美術団体を何というか。","a":"日本美術院","t":"g"},{"n":25,"q":"東京美術学校の卒業生で，洋画の技法を取り入れて伝統的日本画の革新につとめ，「落葉」「黒き猫」などの作品を描いたのはだれか。","a":"菱田春草","t":"p"},{"n":26,"q":"政府は開化策の一環として，1876年に工部省工学寮内に美術学校を開設し，イタリア人画家を招き洋画を学ばせた。この学校を何というか。","a":"工部美術学校","t":"g"},{"n":27,"q":"1876年に26（＝工部美術学校）の学校に招かれたイタリア人画家はだれか。","a":"フォンタネージ","t":"p"},{"n":28,"q":"1875年に大蔵省に招かれて来日し，紙幣・切手・有価証券などの原版を作成し，銅版画技術を指導したイタリア人はだれか。","a":"キヨソネ","t":"p"},{"n":29,"q":"川上冬崖やイギリス人ワーグマンに師事し，明治期の洋画の開拓者といわれ，代表作「鮭」を残した画家はだれか。","a":"高橋由一","t":"p"},{"n":30,"q":"東京美術学校に西洋絵画・彫刻科がおかれなかったため，1889年に設立された日本最初の洋画団体を何というか。","a":"明治美術会","t":"g"},{"n":31,"q":"30（＝明治美術会）の団体の設立の中心になり，フォンタネージの画風をひき継ぎ，農民を写実的に描いた「収穫」の作者はだれか。","a":"浅井忠","t":"p"},{"n":32,"q":"フランスの印象派の強い影響のもと，空気と光，影に青や紫を用いる画法を特徴とする画派を何というか。","a":"外光派（紫派）","t":"g"},{"n":33,"q":"32（＝外光派）の画派の一人で，フランスに留学してラファエル＝コランに師事し，清新で明るい画風を始め，「読書」「舞妓」で有名な画家はだれか。","a":"黒田清輝","t":"p"},{"n":34,"q":"33（＝黒田清輝）の人物の代表作で，箱根芦ノ湖畔に涼をとる夫人を描いた，1897年の作品を何というか。","a":"湖畔","t":"g"},{"n":35,"q":"黒田清輝や久米桂一郎を中心として，1896年に設立された洋画団体を何というか。","a":"白馬会","t":"g"},{"n":36,"q":"東京美術学校在学中に白馬賞を受賞し，インドや日本の神話，上代の生活を色調豊かに描き，明治のロマン的風潮を代表した画家はだれか。","a":"青木繁","t":"p"},{"n":37,"q":"36（＝青木繁）の代表作で，大魚をかつぐ漁師の裸像群を描いた作品名をあげよ。","a":"海の幸","t":"g"},{"n":38,"q":"日本画から転向し，「天平の面影」，雑誌『明星』や与謝野晶子の『みだれ髪』の表紙を描いた画家はだれか。","a":"藤島武二","t":"p"},{"n":39,"q":"東京美術学校在学中，第１回文展において「南風」で最高賞を受賞し，渡仏して洋画と工芸図案を研究した画家はだれか。","a":"和田三造","t":"p"},{"n":40,"q":"1876年に工部美術学校の教授として招かれ，日本の洋風彫刻の基礎を築いたイタリア人彫刻家はだれか。","a":"ラグーザ","t":"p"},{"n":41,"q":"フランス・ドイツに留学し，ベルリン美術学校教授ヘルラルに師事し，洋風彫刻と天平彫刻とを融合しようとした「ゆあみ」の作者はだれか。","a":"新海竹太郎","t":"p"},{"n":42,"q":"ロダンの「考える人」に感銘を受けて彫刻に転じ，「坑夫」などの本格的な近代彫刻の作品を制作し，彫刻界に転機をもたらしたのはだれか。","a":"荻原守衛","t":"p"},{"n":43,"q":"42（＝荻原守衛）の人物の代表作品を，「坑夫」以外に１つあげよ。","a":"女","t":"g"},{"n":44,"q":"伝統的木彫の技法に写実性を加え，伝統彫刻の近代化に努力したのはだれか。","a":"高村光雲","t":"p"},{"n":45,"q":"44（＝高村光雲）の人物の代表作で，シカゴ万国博覧会で優勝した作品は何か。","a":"老猿","t":"g"},{"n":46,"q":"1877年に来日したイギリス人で，工部大学校で教師として造家学科を担当し，日本の洋風建築の発達に尽力したのはだれか。","a":"コンドル","t":"p"},{"n":47,"q":"46（＝コンドル）の人物の代表的建築物で，1891年に東京神田駿河台に建てられたものは何か。","a":"ニコライ堂","t":"g"},{"n":48,"q":"工部大学校の第１回卒業生で，イギリスに留学後，教育者・設計家として活躍し，東京駅などの設計で知られるのはだれか。","a":"辰野金吾","t":"p"},{"n":49,"q":"48（＝辰野金吾）の人物の代表的建築で，1896年に東京日本橋に完成したものは何か。","a":"日本銀行本店","t":"g"},{"n":50,"q":"工部大学校の第１回卒業生で，宮廷建築家として活躍し，ヴェルサイユ宮殿を模した耐震２階建ての本格的西洋建築の設計者として知られるのはだれか。","a":"片山東熊","t":"p"},{"n":51,"q":"50（＝片山東熊）の人物が設計した本格的西洋建築物で，現在の迎賓館は何か。","a":"赤坂離宮","t":"g"},{"n":52,"q":"1880年代に上野ではじめて点灯し，大都市で実用化された照明は何か。","a":"電灯","t":"g"}]}]}]},{"t":"第10章　二つの世界大戦とアジア","sec":[{"t":"1　第一次世界大戦と日本","s":[{"t":"大正政変","q":[{"n":1,"q":"大日本帝国憲法の解釈で，統治権は法人である国家にあり，天皇はその最高機関として統治権を行使するという憲法学説を何というか。","a":"天皇機関説（国家法人説）","t":"g"},{"n":2,"q":"1（＝天皇機関説）の学説を『憲法撮要』などでとなえ，国民に新しい政治を期待させた東京帝国大学教授・憲法学者はだれか。","a":"美濃部達吉","t":"p"},{"n":3,"q":"1911（明治44）年８月に成立した内閣は，財政の立て直しのため緊縮財政の方針をとり，辛亥革命に触発される抗日運動対策として２個師団増設を主張する陸軍の要求を退けた。この内閣名をあげよ。","a":"第2次西園寺公望内閣","t":"g"},{"n":4,"q":"陸軍は２個師団をどこに配置することを要求していたか。","a":"朝鮮","t":"l"},{"n":5,"q":"第２次西園寺公望内閣が２個師団増設を退けると，陸軍大臣は帷幄上奏を行い辞任したが，この大臣はだれか。","a":"上原勇作","t":"p"},{"n":6,"q":"西園寺公望首相は辞職した陸軍大臣の後任大臣の推薦を求めたが，陸軍はいわゆる「陸軍のストライキ」を行い推薦を拒絶し，このため第２次西園寺公望内閣は総辞職に追い込まれた。これはどのような制度があったからか。","a":"軍部大臣現役武官制","t":"g"},{"n":7,"q":"陸軍の要求した２個師団の増設を，1915（大正４）年に実現した内閣名をあげよ。","a":"第2次大隈重信内閣","t":"g"},{"n":8,"q":"陸軍の圧力で退陣した西園寺公望内閣のあと，内大臣・侍従長として宮中にあった人物が首相に推薦されたが，この時に大正天皇の詔勅を受けて組閣した内閣名をあげよ。","a":"第3次桂太郎内閣","t":"g"},{"n":9,"q":"8（＝第3次桂太郎内閣）の内閣の成立は軍部・元老の横暴と受けとられ，首相の退陣を要求する運動が全国的に広まった。この運動を何とよんでいるか。","a":"第一次護憲運動","t":"g"},{"n":10,"q":"9（＝第一次護憲運動）の運動のスローガンを２つあげよ。","a":"閥族打破・憲政擁護","t":"g"},{"n":11,"q":"9（＝第一次護憲運動）の運動の先頭に立った政治家を２人あげよ。","a":"尾崎行雄・犬養毅","t":"g"},{"n":12,"q":"9（＝第一次護憲運動）の運動に対して，桂太郎首相は新しく政党を組織して衆議院で多数の獲得をはかったが失敗した。この新しい政党を何というか。","a":"立憲同志会","t":"g"},{"n":13,"q":"数万の群衆が議事堂を取り囲むなかで，第３次桂太郎内閣は総辞職し，53日間で崩壊した。この一連の事件を何とよんでいるか。","a":"大正政変","t":"g"},{"n":14,"q":"13（＝大正政変）の事件のあと，立憲政友会を与党とし，薩摩閥の海軍の長老が組閣したが，この内閣を何というか。","a":"第1次山本権兵衛内閣","t":"g"},{"n":15,"q":"14（＝第1次山本権兵衛内閣）の内閣のもとで軍部大臣の任用に関する制度が改正されたが，現役武官以外に任用が認められたものを２つあげよ。","a":"予備役・後備役","t":"g"},{"n":16,"q":"14（＝第1次山本権兵衛内閣）の内閣は政党員の上級官吏任用へ道を開いたが，何という法令を改正したか。","a":"文官任用令","t":"g"},{"n":17,"q":"14（＝第1次山本権兵衛内閣）の内閣は1914年，軍艦購入などに関する贈収賄事件の責任をとって辞職した。この事件を何というか。","a":"シーメンス事件","t":"g"}]},{"t":"第一次世界大戦","q":[{"n":1,"q":"19世紀後半に国内を統一したドイツは，ビスマルクの外交政策によって，オーストリア・イタリアとの間に，1882年に相互防衛条約を締結した。これを何というか。","a":"三国同盟","t":"g"},{"n":2,"q":"英・露・仏は1891年の露仏同盟を軸に，1904年に英仏協商，1907年に英露協商を結んで３国の関係を強めた。これを何というか。","a":"三国協商","t":"g"},{"n":3,"q":"汎ゲルマン主義と汎スラブ主義がバルカン半島で激しく対決するなか，ボスニアの州都サライェヴォでオーストリアの帝位継承者夫妻が暗殺される事件がおこった。これを契機に勃発した戦争を何というか。","a":"第一次世界大戦","t":"g"},{"n":4,"q":"3（＝第一次世界大戦）の戦争は西暦何年に勃発したか。","a":"1914年","t":"d"}]},{"t":"日本の中国進出","q":[{"n":1,"q":"第一次世界大戦の勃発後，将来の東アジアにおける日本の地位の強化をはかるべきであると判断し，参戦を決定した内閣名をあげよ。","a":"第2次大隈重信内閣","t":"g"},{"n":2,"q":"第一次世界大戦勃発時の外務大臣はだれか。","a":"加藤高明","t":"p"},{"n":3,"q":"第一次世界大戦中に，日本は日英同盟を理由にドイツに宣戦を布告し，ドイツの中国における根拠地を占領したが，何という都市か。","a":"青島","t":"g"},{"n":4,"q":"中国からドイツの勢力を駆逐した日本は，ドイツが中国に所有していた権益の継承と懸案事項の解決のため，1915（大正４）年１月に中華民国政府に５号21カ条からなる要求を行った。これを何というか。","a":"二十一カ条の要求","t":"g"},{"n":5,"q":"4（＝二十一カ条の要求）の要求の１つに，中国の鉄鉱石・石炭の採掘と製鉄を主とする会社を，日中合弁にしようとするものがあったが，この会社名をあげよ。","a":"漢冶萍公司","t":"g"},{"n":6,"q":"日本は最後通牒を発して，二十一カ条の要求を第５号を除き袁世凱政権に承認させたが，中国はこの要求を受諾した５月９日を抗日運動のための記念日とした。これを何というか。","a":"国恥記念日","t":"g"},{"n":7,"q":"中華民国の北京政権の実権を握り，内閣を組織して日本から財政的援助を受けた軍閥はだれか。","a":"段祺瑞","t":"p"},{"n":8,"q":"日本は，7（＝段祺瑞）の北京政権に多額の借款を与えて権益の拡大をはかった。この借款を何というか。","a":"西原借款","t":"g"},{"n":9,"q":"8（＝西原借款）の借款を行った内閣名をあげよ。","a":"寺内正毅内閣","t":"g"},{"n":10,"q":"日露戦争後の日本の満州独占経営，さらに二十一カ条の要求などによる中国進出に対し，アメリカとの関係が急速に悪化した。このため，1917年に日本は特派大使を送り，アメリカ国務長官と妥協点を探りあったが，この大使名と国務長官名をあげよ。","a":"石井菊次郎・ランシング","t":"g"},{"n":11,"q":"1917年に，アメリカは中国における日本の特殊権益を，日本は中国における領土保全・門戸開放・機会均等の三原則を承認する日米の共同宣言が調印された。これを何というか。","a":"石井・ランシング協定","t":"g"},{"n":12,"q":"11（＝石井・ランシング協定）の協定は，こののちある条約の調印にともない廃棄されたが，その条約を何というか。また，その条約の調印は西暦何年か。","a":"九カ国条約・1922年","t":"d"},{"n":13,"q":"1917年にロシアでニコライ２世のロマノフ王朝が倒され，さらに同年，レーニンが率いるボリシェヴィキが政権を獲得した一連の革命を何というか。","a":"ロシア革命","t":"g"},{"n":14,"q":"13（＝ロシア革命）の革命によって成立した政権を何というか。","a":"ソヴィエト政権","t":"g"},{"n":15,"q":"日・米・英・仏軍が13（＝ロシア革命）の革命に干渉するため軍隊を派遣したが，この派兵を何とよんでいるか。","a":"シベリア出兵","t":"g"},{"n":16,"q":"15（＝シベリア出兵）の派兵はどこの国の軍隊の救出を名目として行われたか。","a":"チェコスロヴァキア軍","t":"l"},{"n":17,"q":"15（＝シベリア出兵）の派兵は西暦何年に行われたか。","a":"1918年","t":"d"},{"n":18,"q":"15（＝シベリア出兵）の派兵を行った時の日本の内閣名をあげよ。","a":"寺内正毅内閣","t":"g"},{"n":19,"q":"日本軍による15（＝シベリア出兵）の派兵に際し，1920年にニコライエフスクの日本守備兵がパルチザンとの協定を無視したため，多数の日本人将兵と居留民が殺害された。この事件を何というか。","a":"尼港事件","t":"g"},{"n":20,"q":"15（＝シベリア出兵）の派兵について，日本軍の出兵はいつまでつづいたか。","a":"1922年","t":"d"}]},{"t":"大戦景気","q":[{"n":1,"q":"第一次世界大戦によって，日本は経済不況と財政危機とを一挙にふきとばし，未曽有の好景気を迎えた。これを何とよんでいるか。","a":"大戦景気","t":"g"},{"n":2,"q":"第一次世界大戦による世界的な船舶不足で，日本の海運・造船業は活気づき，巨利を得るものがあらわれた。これを何とよんだか。","a":"船成金","t":"g"},{"n":3,"q":"第一次世界大戦による好景気で鉄鋼業でも生産高が飛躍的に伸びたが，それは特に二十一カ条の要求で得た採掘権をもとに満鉄が設立した大製鉄所に負うところが大きかった。この製鉄所名をあげよ。","a":"鞍山製鉄所","t":"g"},{"n":4,"q":"第一次世界大戦によるドイツからの輸入途絶のため，国内自給の体制が整えられ，新興産業として発展し始めたのは，どのような工業部門か。","a":"化学工業","t":"g"},{"n":5,"q":"第一次世界大戦による好景気を契機に工業原動力の転換も進んだ。何から何へ転換していったか。","a":"蒸気力から電力へ","t":"g"},{"n":6,"q":"資本輸出の例で，第一次世界大戦後，日本の紡績会社が中国各地に建設した紡績工場を何とよんでいるか。","a":"在華紡","t":"g"}]},{"t":"政党内閣の成立","q":[{"n":1,"q":"産業の発展や市民社会の成立，第一次世界大戦当時の世界的自由主義の風潮を背景に，高揚した大正期の自由主義・民主主義的風潮を何とよんでいるか。","a":"大正デモクラシー","t":"g"},{"n":2,"q":"1916（大正５）年に，「憲政の本義を説いて其有終の美を済すの途を論ず」と題する論文が雑誌『中央公論』に発表されたが，これを発表したのはだれか。","a":"吉野作造","t":"p"},{"n":3,"q":"2（＝吉野作造）の人物は，主権がどこにあるかということを別にして，政治の目的は民衆の福利にあり，政策決定は民衆の意向によるべきだとした。この主張を何というか。","a":"民本主義","t":"l"},{"n":4,"q":"2（＝吉野作造）の人物の論文「憲政の本義を説いて其有終の美を済すの途を論ず」の具体的なねらいは何であったか。","a":"政党政治・普通選挙の実現","t":"g"},{"n":5,"q":"1916年に，第２次大隈重信内閣のあとを受けて，非立憲的藩閥内閣を組織した内閣名をあげよ。","a":"寺内正毅内閣","t":"g"},{"n":6,"q":"大戦景気による物価上昇や，シベリア出兵などから米価が急騰し，そのため米価引下げ・米の安売りを要求して，１道３府35県で暴動がおこった。これを何というか。","a":"米騒動","t":"g"},{"n":7,"q":"6（＝米騒動）の暴動のきっかけとなったのは主婦たちの行動であったが，これを何とよぶか。","a":"越中女一揆（女房一揆）","t":"g"},{"n":8,"q":"6（＝米騒動）の暴動が始まったのは何県か。","a":"富山県","t":"l"},{"n":9,"q":"6（＝米騒動）の暴動がおこったのは西暦何年か。","a":"1918年","t":"d"},{"n":10,"q":"1918年に，立憲政友会の総裁で，華族でも藩閥出身でもない人物が総理大臣になったが，だれか。","a":"原敬","t":"p"},{"n":11,"q":"10（＝原敬）の人物は華族でも藩閥出身でもないため，何とよばれたか。","a":"平民宰相","t":"g"},{"n":12,"q":"10（＝原敬）の人物は陸軍大臣・海軍大臣・外務大臣以外はすべて立憲政友会の党員で組閣したが，このように議会内多数党により組織された内閣を何というか。","a":"政党内閣","t":"g"},{"n":13,"q":"野党（憲政会）は普通選挙法案を提出したが，原敬内閣では納税資格の引下げを行うにとどまった。いくらからいくらに引き下げたか。","a":"10円以上から3円以上に","t":"n"},{"n":14,"q":"1921年に原敬が東京駅で刺殺されたあと，立憲政友会の総裁として内閣をひき継いだが，閣内不統一のため翌年辞職したのはだれか。","a":"高橋是清","t":"p"},{"n":15,"q":"海軍大将でワシントン会議の全権をつとめ，立憲政友会の支持を受けて組閣し，陸軍軍縮・シベリア撤兵を実現したのはだれか。","a":"加藤友三郎","t":"p"}]}]},{"t":"2　ワシントン体制","s":[{"t":"パリ講和会議とその影響","q":[{"n":1,"q":"ドイツの無条件降伏により，第一次世界大戦は終結したが，1919（大正８）年に開かれたこの講和会議を何というか。","a":"パリ講和会議","t":"g"},{"n":2,"q":"1（＝パリ講和会議）の講和会議にあたって，14カ条からなる平和の原則を提示したアメリカ大統領はだれか。","a":"ウィルソン","t":"p"},{"n":3,"q":"第一次世界大戦のドイツと連合国との講和条約を何というか。","a":"ヴェルサイユ条約","t":"g"},{"n":4,"q":"第一次世界大戦の講和条約がもとになってつくられたヨーロッパの国際秩序を何というか。","a":"ヴェルサイユ体制","t":"g"},{"n":5,"q":"パリ講和会議に参加した日本の首席全権はだれか。","a":"西園寺公望","t":"p"},{"n":6,"q":"アメリカ大統領ウィルソンが提案し，1920年に発足した最初の国際平和維持機関を何というか。","a":"国際連盟","t":"g"},{"n":7,"q":"6（＝国際連盟）の国際機関は総会・理事会・事務局から構成されていたが，理事会を構成する常任の４カ国をあげよ。","a":"英・仏・伊・日","t":"g"},{"n":8,"q":"6（＝国際連盟）の国際機関の理事会を構成する常任の４カ国は何とよばれたか。","a":"常任理事国","t":"g"},{"n":9,"q":"6（＝国際連盟）の国際機関設立の提案を行ったアメリカは，ある宣言に抵触するとして上院が批准を拒否し，当初加盟しなかった。その宣言を何というか。","a":"モンロー宣言","t":"g"},{"n":10,"q":"第一次世界大戦後，6（＝国際連盟）の国際機関から日本に支配をまかされた地域はどこか。","a":"赤道以北旧ドイツ領南洋諸島","t":"l"},{"n":11,"q":"6（＝国際連盟）の国際機関から支配をまかされた地域およびその権限は，それぞれ何とよばれるか。","a":"委任統治領・委任統治権","t":"g"},{"n":12,"q":"パリ講和会議では，二十一カ条の要求を無効とする中国の要求が無視されたため，北京の学生集会を契機に，反日・反帝国主義運動が中国全土に展開された。これを何というか。","a":"五・四運動","t":"g"},{"n":13,"q":"ウィルソン14カ条の民族自決主義をきっかけに，朝鮮全土で発生した独立運動を何というか。","a":"三・一独立運動（万歳事件）","t":"g"},{"n":14,"q":"13（＝三・一独立運動）の独立運動がおきた時の日本の首相はだれか。","a":"原敬","t":"p"}]},{"t":"ワシントン会議と協調外交","q":[{"n":1,"q":"第一次世界大戦後，国際協調によって戦争を回避しようと，軍備縮小などを目的として，アメリカ大統領ハーディングの提唱で開かれた国際会議を何というか。","a":"ワシントン会議","t":"g"},{"n":2,"q":"1（＝ワシントン会議）の会議は西暦何年に開催されたか。","a":"1921～22年","t":"d"},{"n":3,"q":"1（＝ワシントン会議）の会議の日本全権は徳川家達，幣原喜重郎とあと一人はだれか。","a":"加藤友三郎","t":"p"},{"n":4,"q":"1（＝ワシントン会議）の会議では，太平洋諸島に対する相互の権利尊重，問題の平和的解決が約束されたが，この条約を何というか。","a":"四カ国条約","t":"g"},{"n":5,"q":"4（＝四カ国条約）の条約により，廃棄されることになった条約は何か。","a":"日英同盟","t":"g"},{"n":6,"q":"ワシントン会議では，中国の主権尊重・門戸開放・機会均等について条約の締結がなされたが，この条約を何というか。","a":"九カ国条約","t":"g"},{"n":7,"q":"6（＝九カ国条約）の条約により，廃棄されることになった協定は何か。","a":"石井・ランシング協定","t":"g"},{"n":8,"q":"ワシントン会議の結果，形成された国際秩序を何というか。","a":"ワシントン体制","t":"g"},{"n":9,"q":"ワシントン会議におけるアメリカの主要目的は，日米両国の建艦競争を抑止することにあったが，いわゆる５大国（米・英・日・仏・伊）で締結された軍備縮小の条約を何というか。","a":"ワシントン海軍軍縮条約","t":"g"},{"n":10,"q":"9（＝ワシントン海軍軍縮条約）の条約の軍備縮小は，何を対象にして行われたか。","a":"主力艦（戦艦，巡洋艦など）","t":"g"},{"n":11,"q":"9（＝ワシントン海軍軍縮条約）の条約で主力艦の保有率は，５大国間でどのように定められたか。","a":"英米5・日3・仏伊1.67","t":"g"},{"n":12,"q":"9（＝ワシントン海軍軍縮条約）の条約の有効期間は何年間とされたか。","a":"10年間","t":"d"},{"n":13,"q":"中国への進出をめぐり，欧米との武力対立を避け，経済的進出をはたそうとする外交政策を何というか。","a":"協調外交","t":"g"},{"n":14,"q":"大正から昭和にかけて協調外交政策を推進した外務大臣はだれか。","a":"幣原喜重郎","t":"p"},{"n":15,"q":"1925年には，上海の在華紡でのストライキをきっかけに大規模な反帝国主義闘争が中国全土に広がったが，この事件を何というか。","a":"五・三〇事件","t":"g"},{"n":16,"q":"1925年に加藤高明内閣の陸軍大臣によって，４個師団の削減とともに兵備の近代化が進められたが，この陸軍の軍縮を行った陸軍大臣はだれか。","a":"宇垣一成","t":"p"},{"n":17,"q":"陸軍の軍縮で職を失った将校の救済と，学生の軍事思想向上のために，中等学校以上に配属将校がおかれて，正課として実施されたのは何か。","a":"軍事教練","t":"g"}]},{"t":"社会運動の勃興","q":[{"n":1,"q":"1912（大正元）年に，労働者階級の地位の向上と労働組合の結成とを目的とする労働団体が設立された。これを何というか。","a":"友愛会","t":"g"},{"n":2,"q":"1（＝友愛会）の労働団体を設立した初代会長はだれか。","a":"鈴木文治","t":"p"},{"n":3,"q":"1（＝友愛会）の労働団体は労働組合の全国組織へと発展したが，1919年には何と改称されたか。","a":"大日本労働総同盟友愛会","t":"g"},{"n":4,"q":"3（＝大日本労働総同盟友愛会）により日本最初の労働者の祭典メーデーが行われたのは西暦何年か。","a":"1920年","t":"d"},{"n":5,"q":"3（＝大日本労働総同盟友愛会）は労資協調主義から，明確な階級闘争主義に転じ，1921年には何と改称されたか。","a":"日本労働総同盟","t":"g"},{"n":6,"q":"1925年に日本労働総同盟を除名された左派が，日本共産党の影響の下に設立した団体は何か。","a":"日本労働組合評議会","t":"g"},{"n":7,"q":"戦後恐慌は小作農の生活を窮迫させ，各地で小作料引下げを要求する運動が1921年以降激化した。これを何とよんでいるか。","a":"小作争議","t":"g"},{"n":8,"q":"1922年に小作人組合の全国機関が誕生したが，これを何というか。","a":"日本農民組合","t":"g"},{"n":9,"q":"8（＝日本農民組合）の機関はだれによって設立されたか。２人あげよ。","a":"賀川豊彦・杉山元治郎","t":"p"},{"n":10,"q":"激化した小作争議のために，当事者の申立てで裁判所が調停を行う法律が1924年に成立したが，これを何というか。","a":"小作調停法","t":"g"},{"n":11,"q":"1918年に，吉野作造，麻生久など民本主義をとなえる自由主義者・進歩的学者らによって，デモクラシー思想の発展・普及のために結成された団体は何か。","a":"黎明会","t":"g"},{"n":12,"q":"1918年，吉野作造の指導下で東京帝国大学の学生が思想運動団体を結成したが，これを何というか。","a":"東大新人会","t":"g"},{"n":13,"q":"大正デモクラシーの風潮のもとで，社会主義運動も復活した。1920年に，資本主義に反対するさまざまな思想を持つ人たちによって結成された社会主義団体を何というか。","a":"日本社会主義同盟","t":"g"},{"n":14,"q":"1920年に『経済学研究』に掲載した東京帝国大学助教授のロシアの無政府主義者に関する研究論文が危険思想と見なされ，東大を休職処分にされる事件がおきた。この学者はだれか。","a":"森戸辰男","t":"p"},{"n":15,"q":"14（＝森戸辰男）の人物が東京帝国大学を休職処分とされた論文は，ロシアの何という思想家についての研究論文か。","a":"クロポトキン","t":"g"},{"n":16,"q":"社会主義者のなかで，国家権力をはじめいっさいの権威を否定し，自由人の自由な結合による理想社会をめざす思想がとなえられたが，このような考え方を何というか。","a":"無政府主義（アナーキズム）","t":"g"},{"n":17,"q":"16（＝無政府主義）の考え方の中心人物で，労働組合運動と結びつけたアナルコ＝サンディカリズムをとなえた人物はだれか。","a":"大杉栄","t":"p"},{"n":18,"q":"1919年にモスクワで結成された，世界の革命政党や組織の指導機関を何というか。","a":"コミンテルン（第3インターナショナル）","t":"g"},{"n":19,"q":"1922年に，18（＝コミンテルン）の日本支部として，ボルシェビズムの考え方に立ち，労働組合や革命勢力を統合し指導するために非合法裏に設立された政党を何というか。","a":"日本共産党","t":"g"},{"n":20,"q":"19（＝日本共産党）の政党の委員長になったのはだれか。","a":"堺利彦","t":"p"},{"n":21,"q":"19（＝日本共産党）の政党の創設に参画したが，1923年には解党を主張し，のち離党して労農派の中心的理論家として活躍したのはだれか。","a":"山川均","t":"p"},{"n":22,"q":"女性解放運動は，1911（明治44）年に，「女性文学の発達をはかり，各天賦の特性を発揮せしめ，他日女性の天才を生まん事を目的とす」という文学団体に始まったが，この団体を何というか。","a":"青鞜社","t":"g"},{"n":23,"q":"22（＝青鞜社）の団体の中心人物はだれか。","a":"平塚らいてう（雷鳥，明）","t":"p"},{"n":24,"q":"創刊号において23（＝平塚らいてう）の人物が「元始，女性は実に太陽であった」と宣言した雑誌を何というか。","a":"青鞜","t":"g"},{"n":25,"q":"1920年に，女性の政党加入・政治演説会参加を禁じた法律第５条の修正運動を展開する新しい団体が結成されたが，この団体を何というか。","a":"新婦人協会","t":"g"},{"n":26,"q":"25（＝新婦人協会）を平塚らいてうらと結成し，のちに婦人参政権獲得期成同盟会を結成したのはだれか。","a":"市川房枝","t":"p"},{"n":27,"q":"第５条で女性の政治活動を禁止していた法律とは何か，法律名をあげよ。","a":"治安警察法","t":"g"},{"n":28,"q":"27（＝治安警察法）の法律が改正されて女性の政治演説会参加が認められたのは西暦何年か。","a":"1922年","t":"d"},{"n":29,"q":"1921年に，山川菊栄・伊藤野枝らにより結成された女性の社会主義団体を何というか。","a":"赤瀾会","t":"g"},{"n":30,"q":"1924年に，普選運動の活発化にともなって，市川房枝らを中心に，女性の参政権を要求する団体が結成されたが，これを何というか。","a":"婦人参政権獲得期成同盟会","t":"g"},{"n":31,"q":"大正時代に被差別民自身により主体的に差別撤廃をはかろうとする運動が始められたが，この運動を何というか。","a":"部落解放運動","t":"g"},{"n":32,"q":"1922年に，31（＝部落解放運動）の運動を展開するために結成された団体を何というか。","a":"全国水平社","t":"g"}]},{"t":"普選運動と護憲三派内閣の成立","q":[{"n":1,"q":"1923年９月１日に発生した大災害は何か。","a":"関東大震災","t":"g"},{"n":2,"q":"1（＝関東大震災）の大災害の最中に組閣し，震災内閣の異名をとった内閣名をあげよ。","a":"第2次山本権兵衛内閣","t":"g"},{"n":3,"q":"関東大震災に際し，行政・司法権を軍の支配下におく天皇の勅令が出されたが，これを何というか。","a":"戒厳令","t":"g"},{"n":4,"q":"関東大震災の混乱のなかで数千人も殺害されたのはどのような人々か。","a":"朝鮮人","t":"g"},{"n":5,"q":"関東大震災の混乱のなかで組織された住民の自衛組織を何というか。","a":"自警団","t":"g"},{"n":6,"q":"関東大震災の混乱下に労働運動指導者10人が警察署で軍隊と警察に殺される事件がおきたが，この事件を何というか。","a":"亀戸事件","t":"g"},{"n":7,"q":"関東大震災の混乱下で無政府主義者の大杉栄・伊藤野枝夫妻が憲兵大尉に殺害された事件を何というか。","a":"甘粕事件","t":"g"},{"n":8,"q":"1923年12月に，帝国議会の開院式に臨む摂政宮が無政府主義者の一青年に狙撃される事件がおきたが，この事件を何というか。","a":"虎の門事件","t":"g"},{"n":9,"q":"8（＝虎の門事件）の事件で狙撃された摂政宮とはだれか。","a":"裕仁親王","t":"p"},{"n":10,"q":"8（＝虎の門事件）の事件で摂政宮を狙撃した無政府主義者はだれか。","a":"難波大助","t":"p"},{"n":11,"q":"虎の門事件で退陣した第２次山本権兵衛内閣のあと，貴族院を中心に超然内閣を組織した枢密院議長はだれか。","a":"清浦奎吾","t":"p"},{"n":12,"q":"11（＝清浦奎吾）の内閣は多くの閣僚を貴族院から選出したため，1924（大正13）年に超然内閣打倒のスローガンを掲げた倒閣運動が展開された。この運動を何というか。","a":"第二次護憲運動","t":"g"},{"n":13,"q":"12（＝第二次護憲運動）の運動を展開したのは，立憲政友会，革新倶楽部ともう１つは何か。","a":"憲政会","t":"g"},{"n":14,"q":"12（＝第二次護憲運動）の運動に対して政府は議会を解散し，総選挙に臨んだが敗れ，野党３派が政党内閣を組織した。この内閣を何とよんだか。","a":"護憲三派内閣","t":"g"},{"n":15,"q":"14（＝護憲三派内閣）の内閣の首相はだれか。","a":"加藤高明","t":"p"},{"n":16,"q":"14（＝護憲三派内閣）の内閣のうち，立憲政友会と革新倶楽部の党首をそれぞれあげよ。","a":"高橋是清・犬養毅","t":"g"},{"n":17,"q":"14（＝護憲三派内閣）の内閣成立から1932（昭和７）年に犬養内閣が倒れるまで，衆議院で多数を占めた政党が組閣する慣例がつづいた。これを何とよんだか。","a":"憲政の常道","t":"g"},{"n":18,"q":"14（＝護憲三派内閣）の内閣によって，1925年に改正された衆議院議員選挙法は，通称で何とよばれるか。","a":"普通選挙法","t":"g"},{"n":19,"q":"1925年に，日ソ国交樹立後の社会運動の活発化を見越して制定された社会運動取締法を何というか。","a":"治安維持法","t":"g"},{"n":20,"q":"19（＝治安維持法）の最高刑は懲役・禁錮10年であったが，のちに死刑が追加された。西暦何年のことか。","a":"1928年","t":"d"},{"n":21,"q":"日ソ国交が樹立した，1925年に北京で調印された条約を何というか。","a":"日ソ基本条約","t":"g"},{"n":22,"q":"21（＝日ソ基本条約）の条約を締結した時の外相はだれか。","a":"幣原喜重郎","t":"p"}]}]},{"t":"3　市民生活の変容と大衆文化","s":[{"t":"都市化の進展と市民生活","q":[{"n":1,"q":"大正から昭和初期に都市を中心に増加した，事務系の職場で働くホワイトカラーの人々を何というか。","a":"俸給生活者（サラリーマン）","t":"g"},{"n":2,"q":"大正から昭和初期，タイピストや電話交換手などの職種に進出した働く女性を何とよんだか。","a":"職業婦人","t":"g"},{"n":3,"q":"大正から昭和初期に，郊外に住む中流階級の間で流行した和洋折衷の住宅を何というか。","a":"文化住宅","t":"g"},{"n":4,"q":"洋服を着たり断髪したりなど，当時流行のファッションに身をつつんだ女性を称してよんだ，昭和初期の流行語は何か。","a":"モガ（モダンガール）","t":"g"},{"n":5,"q":"私鉄が経営し，私鉄沿線に建てられた百貨店のことを何というか。","a":"ターミナルデパート","t":"g"},{"n":6,"q":"阪急電鉄社長小林一三が組織した女性だけの劇団を何というか。","a":"宝塚少女歌劇団（宝塚歌劇団）","t":"g"}]},{"t":"大衆文化の誕生","q":[{"n":1,"q":"大正から昭和初期の文化の特徴として，活字文化の広まりや放送の開始などによる一般国民の文化参加・創造をあげることができる。こうした文化は何とよばれるか。","a":"大衆文化","t":"g"},{"n":2,"q":"小説や随筆などの軽い読み物から，論文や社会評論まで，さまざまな情報を加えて総合的に編集された雑誌を何というか。","a":"総合雑誌","t":"g"},{"n":3,"q":"一週間に１回発行される，1922（大正11）年刊行の『週刊朝日』や『サンデー毎日』などの雑誌を何というか。","a":"週刊誌","t":"g"},{"n":4,"q":"吉野作造の民本主義を説く論文などを掲載して，大正デモクラシーの論壇の中心になった総合雑誌は何か。","a":"中央公論","t":"g"},{"n":5,"q":"社会改造を民衆に求めるという編集方針で，社会主義者などの論文発表の場となった山本実彦が発行した総合雑誌は何か。","a":"改造","t":"g"},{"n":6,"q":"大日本雄弁会講談社が“日本一面白くて為になる”雑誌界の王をめざして創刊した大衆娯楽雑誌は何か。","a":"キング","t":"g"},{"n":7,"q":"夏目漱石の門下生で，その作風は情緒的・唯美的であったが，のちに童話作家として活躍し，児童詩の普及に貢献した人物はだれか。","a":"鈴木三重吉","t":"p"},{"n":8,"q":"7（＝鈴木三重吉）の人物が1918年に創刊した児童雑誌名をあげよ。","a":"赤い鳥","t":"g"},{"n":9,"q":"関東大震災後の不況下で，改造社が『現代日本文学全集』を１冊１円で刊行して成功し，この方式が昭和初期の出版界に流行した。このような出版物を何というか。","a":"円本","t":"g"},{"n":10,"q":"内外の古典などを手軽なかたちで世に紹介した本の形式は何とよばれたか。","a":"文庫本","t":"g"},{"n":11,"q":"10（＝文庫本）の形式の本のなかで，ドイツのレクラム文庫を範として，1927（昭和２）年に最初に創刊されたものを，その出版社名から何というか。","a":"岩波文庫","t":"g"},{"n":12,"q":"高等学校令や大学令を出して高い教育を求める民衆の要求にこたえた内閣は何か。","a":"原敬内閣","t":"g"},{"n":13,"q":"帝国大学以外に，公立・私立大学や単科大学の設立も認めた1918年の法令を何というか。","a":"大学令","t":"g"},{"n":14,"q":"東京芝の愛宕山の東京放送局でラジオの本放送が開始されたのは何年か。","a":"1925年","t":"d"},{"n":15,"q":"大衆娯楽として成立した映画は，大正期においてはセリフや音がない無声映画であったが，1930年代になると画面と音が一体化するようになった。こうした有声映画は何とよばれたか。","a":"トーキー","t":"g"}]},{"t":"学問と芸術","q":[{"n":1,"q":"階級闘争によるプロレタリア革命を必然とする，近代労働者解放の科学的理論・労働運動の指導理論は何か。","a":"マルクス主義（マルキシズム）","t":"g"},{"n":2,"q":"貧困層の現状・原因・救済策を『朝日新聞』に連載し，大きな反響をよんだ京都帝国大学教授・経済学者はだれか。","a":"河上肇","t":"p"},{"n":3,"q":"2（＝河上肇）の人物が京都帝国大学教授時代に『朝日新聞』に連載した代表的著作を何というか。","a":"貧乏物語","t":"g"},{"n":4,"q":"2（＝河上肇）の人物が，その後，雑誌『社会問題研究』で紹介した労働価値説に立って資本主義を分析した社会主義経済学は何か。","a":"マルクス主義経済学","t":"g"},{"n":5,"q":"マルクスの説いた歴史発展の諸段階のなかに，明治維新以降の日本の近代社会を位置づける立場から編集・刊行された書物は何か。","a":"日本資本主義発達史講座","t":"g"},{"n":6,"q":"マルクス主義の理論家で，5（＝日本資本主義発達史講座）の書物を企画・編集したが，日本共産党員として活動中に逮捕され，獄死したのはだれか。","a":"野呂栄太郎","t":"p"},{"n":7,"q":"ドイツ観念論哲学に禅などの東洋思想を加味して，独自の観念論的体系をうち立て，『善の研究』を著したのはだれか。","a":"西田幾多郎","t":"p"},{"n":8,"q":"ニーチェなどの西洋哲学や日本思想を研究し，『古寺巡礼』や『風土』などを著した倫理学者はだれか。","a":"和辻哲郎","t":"p"},{"n":9,"q":"歴史学者で『古事記』『日本書紀』の文献学的批判を行い，『神代史の研究』『古事記及日本書紀の研究』などを著して古代史の解明に貢献し，1940（昭和15）年には国粋主義者から不敬と非難され，著書発禁処分を受けたのはだれか。","a":"津田左右吉","t":"p"},{"n":10,"q":"民間伝承・風習・祭礼などを通して生活変遷のあとを訪ね，民衆文化を明らかにしようとする学問を何というか。","a":"民俗学","t":"g"},{"n":11,"q":"雑誌『郷土研究』を発行し，無名の民衆（「常民」）の生活史の解明につとめ，10（＝民俗学）の学問を開拓したのはだれか。","a":"柳田国男","t":"p"},{"n":12,"q":"児童中心主義に立ち，その個性・自発性を尊重し，学習即生活を目的に，画一的教育に反対した教育運動を何というか。","a":"自由教育運動","t":"g"},{"n":13,"q":"児童の生活体験に即した綴り方を通して，思想・感情を形成する教育法の実践運動が行われたが，この運動を何というか。","a":"綴方教育運動","t":"g"},{"n":14,"q":"欧米，特にドイツに学び，東北帝国大学教授となり，鉄鋼・合金の研究を行い，物理冶金学を開拓して世界的業績をなしたのはだれか。","a":"本多光太郎","t":"p"},{"n":15,"q":"14（＝本多光太郎）の人物の業績をあげよ。","a":"KS磁石鋼の発明","t":"g"},{"n":16,"q":"伝染病研究所で北里柴三郎に師事し，ロックフェラー医学研究所員となり，現在のガーナで，研究中の病原菌に感染して死亡したのはだれか。","a":"野口英世","t":"p"},{"n":17,"q":"16（＝野口英世）の人物の業績をあげよ。","a":"黄熱病の研究","t":"g"},{"n":18,"q":"産業界・学界の要請で，高度・精密な研究施設を備えた研究機関が，1917（大正６）年以降多く設立されたが，のちに，コンツェルンを形成し新興財閥の母体となった研究機関は何か。","a":"理化学研究所","t":"g"},{"n":19,"q":"明治末期の文壇を風靡した自然主義文学にかわって，人道主義・新理想主義・個人主義を尊重して大正文学の主流となった文学流派を何というか。","a":"白樺派","t":"g"},{"n":20,"q":"19（＝白樺派）の文学流派理論的指導者で，理想主義的人道主義実践の場として，1918年宮崎県に「新しき村」を建設し，『お目出たき人』や，戦争で盲目となった画家と妹とが人間的葛藤に苦しむ姿を戯曲化した『その妹』などを残したのはだれか。","a":"武者小路実篤","t":"p"},{"n":21,"q":"19（＝白樺派）の文学流派中随一のリアリストで，唯一の長編『暗夜行路』でも冷徹な目で簡潔な描写を行い，強い個性的な倫理観を示した作家はだれか。","a":"志賀直哉","t":"p"},{"n":22,"q":"19（＝白樺派）の文学流派作家で，『或る女』や『カインの末裔』などを残し，社会主義的人道主義と自分が上層階級の出身であることとの矛盾に苦悩し，軽井沢で自殺したのはだれか。","a":"有島武郎","t":"p"},{"n":23,"q":"現実を直視し醜い面ばかりを描く自然主義の反動として，芸術至上主義を主張し，風俗・官能・詩情の世界にひたった文学流派を何というか。","a":"耽美派（唯美派）","t":"g"},{"n":24,"q":"23（＝耽美派）の文学流派の作家で，刺青を彫った一女性の病的な官能美を描いた作品『刺青』を出世作とし，その後も『痴人の愛』など特異な官能描写による作品を発表したのはだれか。","a":"谷崎潤一郎","t":"p"},{"n":25,"q":"はじめゾラに傾倒し自然主義的作風を示したが，欧米から帰国後は，『あめりか物語』で耽美派を代表する作家となり，花柳界の人情の機微を描いた『腕くらべ』などを残したのはだれか。","a":"永井荷風","t":"p"},{"n":26,"q":"大正中期以降，文壇の主流となったのは新現実派であった。この派のうち，現実の矛盾を理知的にえぐり出し表現した文学流派を何というか。また，その同人雑誌を何というか。","a":"新思潮（新理知）派・新思潮","t":"g"},{"n":27,"q":"26（＝新思潮派・新思潮）の文学流派の作家で，『今昔物語集』などに素材を求めた『羅生門』『鼻』など，数々の傑作を生み出したのはだれか。","a":"芥川龍之介","t":"p"},{"n":28,"q":"26（＝新思潮派・新思潮）の文学流派の作家で，はじめ常識的で明快なテーマ小説を発表し，のち通俗小説家となり，1919年に九州耶馬溪の洞門にまつわる『恩讐の彼方に』を発表し，1923年に雑誌『文藝春秋』を創刊したのはだれか。","a":"菊池寛","t":"p"},{"n":29,"q":"大正末期から昭和初期にかけて，プロレタリア文学とならんで，『文芸時代』によって文学技法や表現の革命をめざし，既成文壇に対抗した文学流派を何というか。","a":"新感覚派","t":"g"},{"n":30,"q":"出世作『日輪』や『機械』『旅愁』で知られる，29（＝新感覚派）の文学流派の中心人物はだれか。","a":"横光利一","t":"p"},{"n":31,"q":"29（＝新感覚派）の文学流派の作家で，『雪国』などを著し，1968年のノーベル文学賞を受賞したのはだれか。","a":"川端康成","t":"p"},{"n":32,"q":"31（＝川端康成）の人物が1926（昭和元）年に『文芸時代』に発表した，伊豆を舞台とした旅情と青春の哀歓を描写した作品を何というか。","a":"伊豆の踊子","t":"g"},{"n":33,"q":"大正末期から新聞や大衆雑誌などを発表の場として，広範な小市民階級の要求にこたえる読み物が発表されるようになった。こうした文学を何とよんでいるか。","a":"大衆文学","t":"g"},{"n":34,"q":"剣客机竜之助が幕末を舞台に活躍する波瀾の時代小説『大菩薩峠』を著したのはだれか。","a":"中里介山","t":"p"},{"n":35,"q":"大作『宮本武蔵』など，多くの時代小説を創作した大衆文学の第一人者はだれか。","a":"吉川英治","t":"p"},{"n":36,"q":"娯楽雑誌に『鞍馬天狗』を発表して成功し，『赤穂浪士』などで大衆文学の地位を確立したのはだれか。","a":"大佛次郎","t":"p"},{"n":37,"q":"1923年に『二銭銅貨』を発表して以来，日本における探偵小説・推理小説の基礎を築いたのはだれか。","a":"江戸川乱歩","t":"p"},{"n":38,"q":"大衆小説家・文芸評論家として活躍し，その死後，大衆小説家の登竜門として賞にその名を残すことになったのはだれか。","a":"直木三十五","t":"p"},{"n":39,"q":"第一次世界大戦後のデモクラシーの風潮と労働者の増加により階級対立が激しくなり，その結果，大正末期から昭和にかけて無産階級文学運動がおこったが，この文学運動を何とよんでいるか。","a":"プロレタリア文学運動","t":"g"},{"n":40,"q":"1921年に発刊された，39（＝プロレタリア文学運動）の運動の出発点となった雑誌名をあげよ。","a":"種蒔く人","t":"g"},{"n":41,"q":"プロレタリア文学運動は分裂し，急進的な傾向を示す人たちによって1928年に新たに機関誌が発刊され，『種蒔く人』をひき継いだ『文芸戦線』と対立した。その機関誌は何か。","a":"戦旗","t":"g"},{"n":42,"q":"41（＝戦旗）は何という団体の機関誌か。","a":"全日本無産者芸術連盟（ナップ）","t":"g"},{"n":43,"q":"早稲田大学を中退後に下級船員となり労働運動に参加し，のちに作家として雑誌『文芸戦線』を中心に活躍し，『海に生くる人々』を著した作家はだれか。","a":"葉山嘉樹","t":"p"},{"n":44,"q":"雑誌『戦旗』を中心に作品を発表し，『一九二八年三月十五日』で認められ，1933年に官憲の拷問で虐殺されたプロレタリア作家はだれか。","a":"小林多喜二","t":"p"},{"n":45,"q":"44（＝小林多喜二）の代表作で，オホーツク海へ出漁する労働者の様子を描いたプロレタリア文学の代表作は何か。","a":"蟹工船","t":"g"},{"n":46,"q":"プロレタリア作家徳永直の代表作品で，共同印刷争議を題材としたものを何というか。","a":"太陽のない街","t":"g"},{"n":47,"q":"東京美術学校を卒業後，欧米に学びロダンに傾倒したが，帰国後に，享楽主義詩人として詩作を開始し，やがて理想主義の傾向を強め，独自の力強い男性的詩風を完成した詩人・彫刻家はだれか。","a":"高村光太郎","t":"p"},{"n":48,"q":"自由詩と象徴詩の結合により口語詩を完成し，『月に吠える』を残した詩人はだれか。","a":"萩原朔太郎","t":"p"},{"n":49,"q":"雑誌『アララギ』を継承し，大正・昭和の歌壇の中心となった，最初の歌集『赤光』でも知られる歌人はだれか。","a":"斎藤茂吉","t":"p"},{"n":50,"q":"1913年に，文芸協会の後身として評論家島村抱月，女優松井須磨子を中心に組織された新劇団体を何というか。","a":"芸術座","t":"g"},{"n":51,"q":"1909（明治42）年に，２代目市川左団次と自由劇場を創立したが，渡欧してモスクワ芸術座に傾倒し，帰国後に新設の劇場で多数の翻訳劇を演出したのはだれか。","a":"小山内薫","t":"p"},{"n":52,"q":"前売券制度や椅子席の観劇を採用し，近代的方法を実現した「演劇の実験室」として51（＝小山内薫）の人物らによって建設された劇場を何というか。","a":"築地小劇場","t":"g"},{"n":53,"q":"52（＝築地小劇場）の劇場の建設に際し私財を投じ，新劇運動とくにリアリズム演劇の確立につとめ，のちに新築地劇団を創立し，プロレタリア演劇に進出したのはだれか。","a":"土方与志","t":"p"},{"n":54,"q":"日本最初の交響楽団を結成し，日本交響楽協会を組織するなど交響楽運動の推進につとめた，童謡「赤とんぼ」などの作曲でも知られる人はだれか。","a":"山田耕筰","t":"p"},{"n":55,"q":"日本最初のオペラ『オルフェウス』に出演し，『蝶々夫人』を2000回主演した日本の国際的オペラ歌手はだれか。","a":"三浦（芝田）環","t":"p"},{"n":56,"q":"1907年に，勅令によって文部省が主催する美術展覧会が創始され，新人登場の場ともなり，美術界に大きな影響を与えた。この展覧会を何というか。","a":"文展","t":"g"},{"n":57,"q":"1919年に，勅令で設立された帝国美術院によって催された展覧会を何というか。","a":"帝展","t":"g"},{"n":58,"q":"1898年に岡倉天心らが創立したあと，明治末に不振となっていたが，1914年に再興された日本美術院主催の展覧会は何とよばれるか。","a":"院展","t":"g"},{"n":59,"q":"官立の文部省主催の展覧会に不満を持つ旧日本美術院派の人々は，1914年に58（＝院展）の展覧会を再興したが，その中心人物で，岡倉天心の弟子の日本画家はだれか。","a":"横山大観","t":"p"},{"n":60,"q":"沢の水が大河となり海にそそぐ変化をロマン的タッチで描いた59（＝横山大観）の人物の水墨画の大作を何というか。","a":"生々流転","t":"g"},{"n":61,"q":"狩野芳崖・橋本雅邦に師事し，院展でも活躍し，「大原御幸」「天心先生」の作品で知られる日本画家はだれか。","a":"下村観山","t":"p"},{"n":62,"q":"文展洋画部に，第１部（日本画）と同様に一科（旧派）・二科（新派）の設置を要求して拒絶された人々が，1914年に設立した在野の洋画団体を何というか。","a":"二科会","t":"g"},{"n":63,"q":"62（＝二科会）の団体設立の中心人物で，浅井忠に学び，渡仏してルノアールに学び，「紫禁城」などを描き東洋風の豪華な画風で知られるのはだれか。","a":"梅原龍三郎","t":"p"},{"n":64,"q":"浅井忠に学び，渡仏後，ミレーやピサロ，特にセザンヌの感化を受け，滞欧中に描いた作品を二科展に出品して認められたのはだれか。","a":"安井曽太郎","t":"p"},{"n":65,"q":"64（＝安井曽太郎）の人物が独自の画風を示した女性の肖像画の傑作をあげよ。","a":"金蓉","t":"g"},{"n":66,"q":"1914年に再興された院展の洋画部と日本画部との対立から，1922年に独立・設立された洋画団体を何というか。","a":"春陽会","t":"g"},{"n":67,"q":"はじめ外光派を学んだが，後期印象派の影響を受け，さらに写実主義に進み草土社を設立した後，66（＝春陽会）の団体の客員として参加活躍し，「麗子像」などを描いたのはだれか。","a":"岸田劉生","t":"p"},{"n":68,"q":"ロマン的美人画で大衆の心をとらえ，「黒船屋」「灯籠流し」などを描いた大正期の抒情画家はだれか。","a":"竹久夢二","t":"p"},{"n":69,"q":"東京美術学校を卒業後，文展にたびたび入賞し，母校の教授として写実風の巧みな作風で後進の指導にあたり，「墓守」などを残した彫刻家はだれか。","a":"朝倉文夫","t":"p"}]}]},{"t":"4　恐慌の時代","s":[{"t":"戦後恐慌から金融恐慌へ","q":[{"n":1,"q":"1920（大正９）年，株式の大暴落を契機に，繊維・米をはじめとする商品価格が大暴落をつづけた。この恐慌を何というか。","a":"戦後恐慌","t":"g"},{"n":2,"q":"1923年におこった関東大震災の際，政府は震災地から振り出されていた手形を補償する処置をとって混乱を収拾したが，この手形を何というか。","a":"震災手形","t":"g"},{"n":3,"q":"2（＝震災手形）の手形の補償が不況のためなかなか進まず，この手形をかかえた銀行の経営が悪化していくなかで，1926（昭和元）年に成立し，この手形の処理にのり出した内閣を何というか。","a":"第1次若槻礼次郎内閣","t":"g"},{"n":4,"q":"議会で2（＝震災手形）の手形の処理案が審議されている時，大蔵大臣の失言から，取付け騒ぎがおこり，中小銀行が休業することになったが，その大蔵大臣はだれか。","a":"片岡直温","t":"p"},{"n":5,"q":"1877（明治10）年に設立され，第一次世界大戦中に飛躍的に成長し，戦後恐慌で打撃を受け倒産した神戸の総合商社を何というか。","a":"鈴木商店","t":"g"},{"n":6,"q":"植民地におかれた紙幣発行権を持つ銀行で，5（＝鈴木商店）の総合商社への不健全融資が原因で休業することになった銀行を何というか。","a":"台湾銀行","t":"g"},{"n":7,"q":"片岡直温の失言から取付け騒ぎがおき，その後各地の銀行・会社・商店の倒産が相ついだが，この事態を何とよんでいるか。","a":"金融恐慌","t":"g"},{"n":8,"q":"第１次若槻礼次郎内閣の外交政策に不満を持つ野党と結んだ機関が，内閣の求めた台湾銀行救済の緊急勅令案を否決したことが総辞職のきっかけとなったが，その機関を何というか。","a":"枢密院","t":"g"},{"n":9,"q":"第１次若槻礼次郎内閣は金融界の混乱を収拾できずに退陣したが，そのあと組閣した陸軍大将で長州閥の後継者であった立憲政友会総裁はだれか。","a":"田中義一","t":"p"},{"n":10,"q":"9（＝田中義一）の内閣が金融恐慌の収拾のために緊急勅令によって出した命令は何か。","a":"モラトリアム（支払猶予令）","t":"g"},{"n":11,"q":"9（＝田中義一）の内閣の大蔵大臣として，金融恐慌の沈静化に成功したのはだれか。","a":"高橋是清","t":"p"},{"n":12,"q":"金融恐慌後，預金は大銀行に集中し，政府も銀行法を改正して弱小銀行を整理・統合する方針を打ち出したため，特定の銀行が金融界を支配するようになった。いわゆる五大銀行をあげよ。","a":"三井・三菱・住友・安田・第一","t":"g"},{"n":13,"q":"五大銀行を中心とした金融独占資本により，産業界では部門別の企業連合も結成されたが，これを何というか。","a":"カルテル（企業連合）","t":"g"},{"n":14,"q":"同一産業部門の企業合同のことを何というか。","a":"トラスト（企業合同）","t":"g"},{"n":15,"q":"種々の産業が同一系統の資本に支配される独占の形態を，何というか。","a":"コンツェルン","t":"g"}]},{"t":"社会主義運動の高まりと積極外交への転換","q":[{"n":1,"q":"第１回普通選挙に向けて社会主義者・労働運動家・知識人などにより政党の結成が進んだが，これらの政党を総称して何というか。","a":"無産政党","t":"g"},{"n":2,"q":"1（＝無産政党）のうち，最初に結成された政党は，1925（大正14）年に農民組合が中心となり，日本労働組合評議会系・日本労働総同盟系を除いたものであったが，即日禁止された。この政党を何というか。","a":"農民労働党","t":"g"},{"n":3,"q":"1（＝無産政党）のうち，1926（昭和元）年に杉山元治郎らを中心に右派・中間派によって結成された政党を何というか。","a":"労働農民党","t":"g"},{"n":4,"q":"左派の加入要求から3（＝労働農民党）の政党が分裂し，中間派の麻生久・浅沼稲次郎らが1926年に結成した政党を何というか。","a":"日本労農党","t":"g"},{"n":5,"q":"3（＝労働農民党）の政党の分裂後，右派の安部磯雄・片山哲らが1926年に結成した政党を何というか。","a":"社会民衆党","t":"g"},{"n":6,"q":"無産政党は，田中義一内閣のもとで実施された最初の普通選挙で８人の当選者を出したが，この選挙は西暦何年に行われたか。","a":"1928年","t":"d"},{"n":7,"q":"無産政党の進出に衝撃を受けた田中義一内閣は，日本共産党に対し，1928年と翌29年の２度にわたって弾圧を加えた。これらの弾圧事件をそれぞれ何というか。","a":"三・一五事件，四・一六事件","t":"g"},{"n":8,"q":"1928年に全国に設置された，思想・言論・政治行動などを取り締まる機関を何というか。","a":"特別高等警察（特高）","t":"g"},{"n":9,"q":"田中義一内閣は欧米に対しては協調外交を継承し，アメリカ大統領クーリッジの提案を受けて，補助艦制限を目的とする国際会議に代表を派遣したが，不調に終わった。この会議を何というか。また，西暦何年に開催されたか。","a":"ジュネーヴ軍縮会議・1927年","t":"d"},{"n":10,"q":"パリで開催された国際会議では，国策の手段としての戦争の放棄を約した条約が結ばれたが，この国際会議は西暦何年に開催されたか。","a":"1928年","t":"d"},{"n":11,"q":"パリの国際会議で結ばれた条約は，条文中の「人民ノ名ニ於テ」が国内で問題化し，田中義一内閣が「この一文は日本には適用されない」と条件をつけて批准した。この条約を何というか。","a":"不戦条約","t":"g"},{"n":12,"q":"11（＝不戦条約）の条約に調印した日本の首席全権はだれか。","a":"内田康哉","t":"p"},{"n":13,"q":"1924年，「連ソ・容共・扶助工農」のスローガンを掲げる中国共産党との提携を決意した中国の政党名をあげよ。また，この提携を何とよぶか。","a":"（中国）国民党・第1次国共合作","t":"g"},{"n":14,"q":"中国国民党が，中国南部の広東で1925年に発足した政権を核に，1927年に南京で樹立した政府を何というか。","a":"国民政府","t":"g"},{"n":15,"q":"14（＝国民政府）の政府の主席はだれか。","a":"蔣介石","t":"p"},{"n":16,"q":"1925年に上海で在華紡のスト弾圧に抗議した学生・民衆のデモに，イギリス租界警察が発砲し死傷者が出たことから，中国全土に激しい反帝国主義運動がおこった。この事件を何というか。","a":"五・三〇事件","t":"g"},{"n":17,"q":"16（＝五・三〇事件）の事件を機に蔣介石は中国統一をめざし，1926年には北方軍閥の支配地域に進撃を開始したが，これを何というか。","a":"北伐","t":"g"},{"n":18,"q":"田中義一内閣は，中国に対する従来の外交方針を変更し，中国統一をめざす北伐軍を阻止する方針を定めたが，この外交を何というか。","a":"積極（強硬）外交","t":"g"},{"n":19,"q":"18（＝積極外交）の外交方針にのっとり，日本は1927年５月に居留民保護を名目として中国の青島・済南などへの出兵を強行した。これを何というか。","a":"（第1次）山東出兵","t":"g"},{"n":20,"q":"1928年の，第２次山東出兵の際には日本軍と中国軍との衝突事件がおこったが，この事件を何というか。","a":"済南事件","t":"g"},{"n":21,"q":"第１次山東出兵のあと，田中義一内閣は大陸関係の外交官や軍人を召集して，対中国積極策の基本政策を決定したが，この会議を何というか。","a":"東方会議","t":"g"},{"n":22,"q":"1928年６月に，日本と密接な関係を持っていた満州軍閥の巨頭が関東軍により爆殺されたが，この人物はだれか。","a":"張作霖","t":"p"},{"n":23,"q":"22（＝張作霖）の人物の爆殺事件の真相は国民に隠されたため，この事件は当時日本で何とよばれたか。","a":"満州某重大事件","t":"g"}]},{"t":"金解禁と世界恐慌","q":[{"n":1,"q":"経済的不況を乗り切るために，財政緊縮など３大政策を掲げて1929（昭和４）年に成立した内閣を何というか。","a":"浜口雄幸内閣","t":"g"},{"n":2,"q":"1（＝浜口雄幸内閣）の内閣の与党をあげよ。","a":"立憲民政党","t":"g"},{"n":3,"q":"1（＝浜口雄幸内閣）の内閣の３大政策の１つに，1917（大正６）年に停止した金本位制への復帰があるが，この政策を何というか。","a":"金解禁（金輸出解禁）","t":"g"},{"n":4,"q":"3（＝金解禁）の政策は西暦何年に実施されたか。","a":"1930年","t":"d"},{"n":5,"q":"浜口雄幸内閣の３大政策の１つで，不健全な企業の整理や経営の効率化を何というか。","a":"産業合理化","t":"g"},{"n":6,"q":"5（＝産業合理化）の政策を実行するために，1931年に公布された法律は何か。","a":"重要産業統制法","t":"g"},{"n":7,"q":"財政緊縮・産業合理化・金解禁の３大政策を実施した，浜口雄幸内閣の大蔵大臣はだれか。","a":"井上準之助","t":"p"},{"n":8,"q":"ニューヨークのウォール街における株価の暴落を契機として，恐慌が全資本主義国に波及した。これを何というか。また，いつのことか。","a":"世界恐慌・1929年","t":"g"},{"n":9,"q":"8（＝世界恐慌・1929年）の恐慌に対し，アメリカのフランクリン＝ローズヴェルト大統領は新規まきなおし政策をとり，不況を克服しようとした。この政策を何というか。","a":"ニューディール政策","t":"g"},{"n":10,"q":"8（＝世界恐慌・1929年）の恐慌に対してイギリスは帝国経済会議を開き，イギリス本国と属領間に特恵関税を設定したが，この政策を何というか。","a":"ブロック経済","t":"g"},{"n":11,"q":"8（＝世界恐慌・1929年）の恐慌の時期に金解禁を行ったため，正貨の流出・企業倒産・賃金引下げなどをまねき，日本経済は大不況におちいったが，この恐慌を何というか。","a":"昭和恐慌","t":"g"},{"n":12,"q":"8（＝世界恐慌・1929年）の恐慌によりアメリカ向けの生糸輸出が激減し繭価が下落し，また1930年の豊作による米価の下落も重なって，農家が危機的状況におちいったことを何というか。","a":"農業恐慌","t":"g"}]},{"t":"協調外交の挫折","q":[{"n":1,"q":"イギリス首相マクドナルドの提案で，補助艦の制限が話し合われた会議を何というか。","a":"ロンドン海軍軍縮会議","t":"g"},{"n":2,"q":"米・英・日で補助艦の制限を定めた条約名をあげよ。","a":"ロンドン海軍軍縮条約","t":"g"},{"n":3,"q":"ロンドン海軍軍縮会議は西暦何年に開催されたか。","a":"1930年","t":"d"},{"n":4,"q":"ロンドン海軍軍縮会議には首席全権として元首相が派遣されたがだれか。","a":"若槻礼次郎","t":"p"},{"n":5,"q":"ロンドン海軍軍縮条約の批准をめぐって，海軍や右翼・野党などが激しく政府を攻撃したが，彼らが政府を攻撃した根拠は何か。","a":"統帥権干犯","t":"g"},{"n":6,"q":"ロンドン海軍軍縮条約を調印したのは何内閣か。","a":"浜口雄幸内閣","t":"g"},{"n":7,"q":"6（＝浜口雄幸内閣）の内閣の外務大臣で，協調外交を推進したのはだれか。","a":"幣原喜重郎","t":"p"}]}]},{"t":"5　軍部の台頭","s":[{"t":"満州事変","q":[{"n":1,"q":"満州某重大事件のあと，満州を国民政府に合流させたのはだれか。","a":"張学良","t":"p"},{"n":2,"q":"中国で国権回復運動が高まるなかで，陸軍は奉天郊外で満鉄線の爆破事件をおこし，満州への軍事行動を開始した。この事件を何というか。","a":"柳条湖事件（南満州鉄道爆破事件）","t":"g"},{"n":3,"q":"2（＝柳条湖事件）の事件は西暦何年のことか。","a":"1931年","t":"d"},{"n":4,"q":"2（＝柳条湖事件）の事件をおこした日本陸軍を何というか。","a":"関東軍","t":"g"},{"n":5,"q":"4（＝関東軍）の軍の参謀で，『満蒙問題私見』や『世界最終戦論』を著し，この軍事行動計画の中心となった人物はだれか。","a":"石原莞爾","t":"p"},{"n":6,"q":"柳条湖事件の勃発に対し，政府は不拡大方針を発表したが，その時の内閣名をあげよ。","a":"第2次若槻礼次郎内閣","t":"g"},{"n":7,"q":"柳条湖事件後の政府の不拡大方針にもかかわらず，関東軍は軍事行動を拡大しつづけた。こうしてひきおこされた戦争を何というか。","a":"満州事変","t":"g"},{"n":8,"q":"1932（昭和７）年１月に，日本人僧侶が殺害されたことを口実に，日本軍が中国のある都市に出兵し，日中両軍が衝突事件をおこした。これを何とよんでいるか。","a":"第1次上海事変","t":"g"},{"n":9,"q":"中国東北部の主要地域をほぼ占領した関東軍は，新国家を樹立したが，この日本の傀儡国家を何というか。","a":"満州国","t":"g"},{"n":10,"q":"9（＝満州国）の国の元首となった人物はだれか。","a":"溥儀","t":"p"},{"n":11,"q":"9（＝満州国）の国の元首の地位を建国当初は何というか。","a":"執政","t":"g"}]},{"t":"政党内閣の崩壊と国際連盟からの脱退","q":[{"n":1,"q":"ロンドン軍縮問題・満州事変を契機に，国粋的・保守的思想を持って行動する民間人の運動が急速に活発化した。このような思想で行動する人々を一般に何というか。","a":"右翼","t":"g"},{"n":2,"q":"1930（昭和５）年に，橋本欣五郎を中心として参謀本部や陸軍省の青年将校らが結成した秘密結社を何というか。","a":"桜会","t":"g"},{"n":3,"q":"1930年ごろから活発となる，右翼や青年将校・国家主義者らが現状打破をめざした革新運動を何というか。","a":"国家改造運動","t":"g"},{"n":4,"q":"1931年に，桜会が宇垣一成を首班とする軍部内閣，また荒木貞夫を首班とする軍部内閣の樹立をはかったが，未遂に終わった。これらの事件を何というか。発生した順に２つあげよ。","a":"三月事件・十月事件","t":"g"},{"n":5,"q":"猶存社を組織し，4（＝三月事件・十月事件）の事件にも加担した民間右翼の指導者はだれか。","a":"大川周明","t":"p"},{"n":6,"q":"青年将校らに思想的影響を与えた国家社会主義者で，のちに二・二六事件に関与して処刑された人物はだれか。","a":"北一輝","t":"p"},{"n":7,"q":"6（＝北一輝）の人物が1919（大正８）年に著し，のち改稿して1923年に刊行した日本の国家改造計画に関する著書を何というか。","a":"日本改造法案大綱","t":"g"},{"n":8,"q":"井上日召を中心に，一人一殺主義で，政界・財界の要人を暗殺した右翼団体を何というか。","a":"血盟団","t":"g"},{"n":9,"q":"1932年２月に，8（＝血盟団）の団員によって暗殺された，浜口雄幸・若槻礼次郎内閣の大蔵大臣はだれか。","a":"井上準之助","t":"p"},{"n":10,"q":"1932年３月にある財閥の理事長が8（＝血盟団）の団員に暗殺されたが，だれか。","a":"団琢磨","t":"p"},{"n":11,"q":"10（＝団琢磨）の人物は何という会社の理事長であったか。","a":"三井合名会社","t":"g"},{"n":12,"q":"井上準之助・団琢磨が暗殺された事件を何とよんでいるか。","a":"血盟団事件","t":"g"},{"n":13,"q":"1932年５月に，海軍の青年将校らは首相官邸を襲撃し，時の首相を射殺したが，この事件を何というか。","a":"五・一五事件","t":"g"},{"n":14,"q":"13（＝五・一五事件）の事件で射殺された首相はだれか。","a":"犬養毅","t":"p"},{"n":15,"q":"13（＝五・一五事件）の事件により，「憲政の常道」といわれた政治的慣行は終わったが，具体的には何の終焉を指すか。","a":"政党内閣","t":"g"},{"n":16,"q":"13（＝五・一五事件）の事件後，挙国一致内閣を組織したのはだれか。","a":"斎藤実","t":"p"},{"n":17,"q":"16（＝斎藤実）の内閣が満州国を承認した条約を何というか。","a":"日満議定書","t":"g"},{"n":18,"q":"満州国の成立について，中国の訴えと日本の意向で国際連盟は調査団を派遣し報告書を作成したが，この調査団の団長はだれか。","a":"リットン","t":"p"},{"n":19,"q":"国際連盟で，18（＝リットン）の報告書とそれにもとづく対日勧告案が採択された際の日本の対応はどのようなものであったか。","a":"国際連盟を脱退した","t":"g"},{"n":20,"q":"18（＝リットン）の報告書が国際連盟の総会で採択された時の日本代表はだれか。","a":"松岡洋右","t":"p"},{"n":21,"q":"18（＝リットン）の報告書が国際連盟の総会で採択されたのは西暦何年のことか。","a":"1933年","t":"d"},{"n":22,"q":"満州事変を処理するため，日本と中国国民政府間で結ばれた停戦協定を何というか。","a":"塘沽停戦協定","t":"g"}]},{"t":"恐慌からの脱出","q":[{"n":1,"q":"世界恐慌による輸出不振と激しい金の流出にみまわれ
